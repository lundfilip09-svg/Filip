<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Treningsplan</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .week-circles { display: flex; gap: 10px; flex-wrap: wrap; }
    .day-circle { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .circle {
      width: 44px; height: 44px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-family: var(--font-mono); font-weight: 600;
      border: 2px solid;
    }
    .circle.done { background: rgba(107,227,164,0.18); border-color: #6BE3A4; color: #6BE3A4; }
    .circle.rest { background: rgba(255,255,255,0.03); border-color: rgba(255,255,255,0.12); color: var(--text-tertiary); }
    .circle.is-today { box-shadow: 0 0 0 2px rgba(91,164,245,0.5); }
    .day-label { font-size: 9px; font-family: var(--font-mono); color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; }
    .goal-row { margin-bottom: 18px; }
    .goal-row:last-child { margin-bottom: 0; }
    .goal-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; flex-wrap: wrap; gap: 4px; }
    .goal-name { font-size: 14px; font-family: var(--font-mono); color: var(--text-secondary); font-weight: 600; }
    .goal-vals { font-size: 11px; font-family: var(--font-mono); color: var(--text-tertiary); }
    .goal-vals span { color: var(--text-primary); }
    .goal-bar-bg { height: 8px; background: rgba(255,255,255,0.06); border-radius: 4px; overflow: hidden; }
    .goal-bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
    .plan-grid { display: grid; grid-template-columns: 90px 1fr; gap: 8px 12px; align-items: center; }
    .plan-day-label { font-size: 11px; font-family: var(--font-mono); color: var(--text-secondary); }
  </style>
</head>
<body>

<nav class="main-nav">
  <div class="nav-inner">
    <div class="nav-tabs">
      <a href="dashboard.html" class="nav-tab" data-p="dashboard">Dashboard</a>
      <a href="gym.html"       class="nav-tab" data-p="gym">Gym</a>
      <a href="sprint.html"    class="nav-tab" data-p="sprint">Sprint</a>
      <a href="sovn.html"      class="nav-tab" data-p="sovn">Søvn</a>
      <a href="gjoremal.html"  class="nav-tab" data-p="gjoremal">Gjøremål</a>
      <a href="treningsplan.html" class="nav-tab" data-p="treningsplan">Treningsplan</a>
    </div>
  </div>
</nav>

<main class="page">

  <!-- Week overview -->
  <div class="card">
    <div class="section-title">Ukeoversikt — <span id="weekLabel" style="text-transform:none;letter-spacing:0;color:var(--text-secondary);font-weight:400"></span></div>
    <div class="week-circles" id="weekCircles">
      <div class="loading">Laster…</div>
    </div>
  </div>

  <!-- Sprint goals -->
  <div class="card">
    <div class="section-title">Sprintmål</div>
    <div id="sprintGoals"><div class="loading">Laster…</div></div>
  </div>

  <!-- Editable weekly plan -->
  <div class="card">
    <div class="section-title">Ukeplan</div>
    <div class="plan-grid" id="planGrid"></div>
    <div style="margin-top:14px">
      <button class="btn btn-success btn-sm" onclick="savePlan()">Lagre plan</button>
    </div>
  </div>

</main>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
let db;
document.querySelector('[data-p="treningsplan"]').classList.add('active');

let _tt;
function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `toast ${type} show`;
  clearTimeout(_tt); _tt = setTimeout(() => el.classList.remove('show'), 3000);
}
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Week circles ───────────────────────────────────────────────────────────
const DAY_NAMES = ['man','tir','ons','tor','fre','lør','søn'];

function getWeekBounds() {
  const now = new Date();
  const day = now.getDay();
  const diffToMon = day === 0 ? -6 : 1 - day;
  const mon = new Date(now);
  mon.setDate(now.getDate() + diffToMon);
  mon.setHours(0, 0, 0, 0);
  return mon;
}

async function loadWeekCircles() {
  const mon = getWeekBounds();
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
  const monStr = mon.toISOString().slice(0,10);
  const sunStr = sun.toISOString().slice(0,10);
  const todayStr = new Date().toISOString().slice(0,10);

  const opts = { day:'numeric', month:'short' };
  document.getElementById('weekLabel').textContent =
    `${mon.toLocaleDateString('no-NO', opts)} – ${sun.toLocaleDateString('no-NO', opts)}`;

  const { data } = await db.from('gym_log')
    .select('date').gte('date', monStr).lte('date', sunStr);
  const loggedDates = new Set((data || []).map(r => r.date));

  const el = document.getElementById('weekCircles');
  el.innerHTML = DAY_NAMES.map((name, i) => {
    const d = new Date(mon); d.setDate(mon.getDate() + i);
    const ds = d.toISOString().slice(0,10);
    const done = loggedDates.has(ds);
    const isToday = ds === todayStr;
    return `<div class="day-circle">
      <div class="circle ${done ? 'done' : 'rest'}${isToday ? ' is-today' : ''}">${d.getDate()}</div>
      <div class="day-label">${name}</div>
    </div>`;
  }).join('');
}

// ── Sprint goals ───────────────────────────────────────────────────────────
const GOALS = [
  { dist: '100m', goal: 11.10, start: 12.50, color: '#5BA4F5' },
  { dist: '200m', goal: 22.30, start: 25.00, color: '#6BE3A4' },
];

async function loadSprintGoals() {
  const el = document.getElementById('sprintGoals');

  const { data } = await db.from('sprint_log')
    .select('distance,time_seconds')
    .in('distance', ['100m','200m'])
    .order('time_seconds', { ascending: true });

  const best = {};
  (data || []).forEach(r => { if (!best[r.distance]) best[r.distance] = r.time_seconds; });

  el.innerHTML = GOALS.map(g => {
    const pb  = best[g.dist] ?? null;
    const pct = pb === null ? 0
      : Math.min(100, Math.max(0, (g.start - pb) / (g.start - g.goal) * 100));
    const pbStr    = pb !== null ? `${pb.toFixed(2)}s` : '—';
    const delta    = pb !== null ? (pb - g.goal) : null;
    const deltaStr = delta === null ? '' : delta <= 0 ? '✓ Mål nådd!' : `${delta.toFixed(2)}s fra mål`;
    const deltaColor = delta !== null && delta <= 0 ? 'var(--success)' : 'var(--text-tertiary)';

    return `<div class="goal-row">
      <div class="goal-header">
        <span class="goal-name">${g.dist}</span>
        <span class="goal-vals">
          PB: <span>${pbStr}</span>
          &nbsp;·&nbsp; Mål: <span>${g.goal.toFixed(2)}s</span>
          &nbsp;·&nbsp; <span style="color:${deltaColor}">${deltaStr}</span>
        </span>
      </div>
      <div class="goal-bar-bg">
        <div class="goal-bar-fill" style="width:${pct.toFixed(1)}%;background:${g.color}"></div>
      </div>
    </div>`;
  }).join('');
}

// ── Editable weekly plan ───────────────────────────────────────────────────
const PLAN_DAYS = ['Mandag','Tirsdag','Onsdag','Torsdag','Fredag','Lørdag','Søndag'];
const PLAN_KEY  = 'treningsplan_v1';

function loadPlan() {
  const saved = JSON.parse(localStorage.getItem(PLAN_KEY) || '{}');
  const el = document.getElementById('planGrid');
  el.innerHTML = PLAN_DAYS.map((day, i) => `
    <div class="plan-day-label">${day}</div>
    <input class="input-sm" id="plan-${i}" type="text"
      placeholder="Hvile / fri dag…" value="${escHtml(saved[i] || '')}">
  `).join('');
}

function savePlan() {
  const plan = {};
  PLAN_DAYS.forEach((_, i) => {
    const val = document.getElementById(`plan-${i}`).value.trim();
    if (val) plan[i] = val;
  });
  localStorage.setItem(PLAN_KEY, JSON.stringify(plan));
  toast('Ukeplan lagret');
}

// ── Init ──────────────────────────────────────────────────────────────────
(async () => {
  try {
    const r = await fetch('/api/config');
    if (!r.ok) throw new Error('Config-tjeneste svarte ' + r.status);
    const cfg = await r.json();
    if (cfg.error) throw new Error(cfg.error);
    db = supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);
  } catch (err) {
    document.querySelector('.page').innerHTML =
      `<div class="card" style="text-align:center;padding:40px">
        <div style="color:var(--danger);font-family:var(--font-mono);font-size:13px">${err.message}</div>
        <div style="color:var(--text-tertiary);font-size:11px;margin-top:10px">
          Deploy til Vercel og sett SUPABASE_URL og SUPABASE_ANON_KEY som miljøvariabler.
        </div>
      </div>`;
    return;
  }
  loadPlan();
  await Promise.all([loadWeekCircles(), loadSprintGoals()]);
})();
</script>
</body>
</html>
