<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Treningsoversikt</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* ── Hero band ──────────────────────────────────────────── */
    .hero-band {
      display: grid;
      grid-template-columns: 1fr 120px 120px;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 14px;
    }
    .hero-main {
      padding: 22px 26px;
      background: var(--bg-card);
      border-right: 1px solid rgba(255,255,255,0.07);
    }
    .hero-eyebrow {
      font-size: 9px; font-family: var(--font-mono); color: var(--text-tertiary);
      text-transform: uppercase; letter-spacing: 0.14em; margin-bottom: 6px;
    }
    .hero-session {
      font-size: 24px; font-weight: 700; letter-spacing: -0.025em;
      color: var(--text-primary); line-height: 1.15; margin-bottom: 6px;
    }
    .hero-session.is-rest { color: var(--text-tertiary); font-size: 18px; font-weight: 400; }
    .hero-next {
      font-size: 11px; font-family: var(--font-mono);
      color: var(--text-tertiary); margin-top: 2px;
    }
    .hero-kpi {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 20px 12px;
      background: var(--bg-card); text-align: center;
      border-right: 1px solid rgba(255,255,255,0.07);
    }
    .hero-kpi:last-child { border-right: none; }
    .hero-kpi-val {
      font-size: 28px; font-weight: 700; font-family: var(--font-mono);
      line-height: 1; color: var(--text-primary);
    }
    .hero-kpi-label {
      font-size: 8px; font-family: var(--font-mono); color: var(--text-tertiary);
      text-transform: uppercase; letter-spacing: 0.1em; margin-top: 5px;
      line-height: 1.4;
    }

    /* ── Day strip ──────────────────────────────────────────── */
    .day-strip {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      margin-bottom: 14px;
    }
    .day-card {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 10px;
      padding: 11px 10px 10px;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
      display: flex; flex-direction: column; gap: 5px;
      min-height: 86px;
    }
    .day-card:hover:not(.is-selected) {
      background: rgba(255,255,255,0.045);
      border-color: rgba(255,255,255,0.1);
    }
    .day-card.is-today    { border-color: rgba(91,164,245,0.35); }
    .day-card.is-selected { background: rgba(91,164,245,0.08); border-color: rgba(91,164,245,0.55); }
    .day-card.is-logged   { border-color: rgba(107,227,164,0.35); }
    .day-card.is-logged.is-today { border-color: rgba(91,164,245,0.4); }
    .day-card-top { display: flex; justify-content: space-between; align-items: flex-start; }
    .day-card-name {
      font-size: 8px; font-family: var(--font-mono); color: var(--text-tertiary);
      text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 2px;
    }
    .day-card-date {
      font-size: 20px; font-weight: 700; font-family: var(--font-mono);
      color: var(--text-secondary); line-height: 1;
    }
    .day-card.is-today .day-card-date { color: #5BA4F5; }
    .day-logged-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #6BE3A4; flex-shrink: 0; margin-top: 3px;
    }
    .day-card-plan {
      font-size: 10px; font-family: var(--font-mono);
      color: var(--text-secondary); line-height: 1.3;
      margin-top: auto;
    }
    .day-card-rest {
      font-size: 9px; font-family: var(--font-mono);
      color: rgba(255,255,255,0.18); text-transform: uppercase;
      letter-spacing: 0.08em; margin-top: auto;
    }

    /* ── Main + sidebar layout ──────────────────────────────── */
    .tp-body {
      display: grid;
      grid-template-columns: 1fr 272px;
      gap: 14px;
      align-items: start;
    }
    @media (max-width: 860px) {
      .tp-body { grid-template-columns: 1fr; }
      .hero-band { grid-template-columns: 1fr 100px 100px; }
    }
    @media (max-width: 600px) {
      .hero-band { grid-template-columns: 1fr; }
      .hero-kpi { flex-direction: row; justify-content: space-between; padding: 14px 20px; }
      .hero-kpi:not(:first-child) { border-top: 1px solid rgba(255,255,255,0.07); border-right: none; }
      .hero-main { border-right: none; border-bottom: 1px solid rgba(255,255,255,0.07); }
      .day-strip { gap: 4px; }
      .day-card { padding: 8px 6px; min-height: 72px; }
      .day-card-date { font-size: 15px; }
    }

    /* ── Detail panel ───────────────────────────────────────── */
    .detail-panel { }
    .detail-header {
      display: flex; align-items: baseline;
      justify-content: space-between; margin-bottom: 18px; gap: 12px; flex-wrap: wrap;
    }
    .detail-day-meta {
      font-size: 9px; font-family: var(--font-mono); color: var(--text-tertiary);
      text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 3px;
    }
    .detail-day-title {
      font-size: 18px; font-weight: 700; color: var(--text-primary);
      letter-spacing: -0.02em;
    }
    .detail-day-title.is-empty { color: var(--text-tertiary); font-weight: 400; font-size: 15px; }
    .detail-logged-badge {
      font-size: 9px; font-family: var(--font-mono); text-transform: uppercase;
      letter-spacing: 0.1em; padding: 3px 9px; border-radius: 20px;
      background: rgba(107,227,164,0.12); color: #6BE3A4;
      border: 1px solid rgba(107,227,164,0.2); white-space: nowrap;
    }
    .detail-field { margin-bottom: 14px; }
    .detail-field-label {
      font-size: 9px; font-family: var(--font-mono); color: var(--text-tertiary);
      text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 6px;
    }
    .detail-input {
      width: 100%; box-sizing: border-box;
    }
    .detail-actions { display: flex; gap: 8px; }

    /* ── Session history ────────────────────────────────────── */
    .hist-section { margin-top: 20px; }
    .hist-section-hd {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 12px;
    }
    .hist-section-title {
      font-size: 11px; font-family: var(--font-mono);
      text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--text-tertiary); flex: 1;
    }
    .trend-badge {
      font-size: 9px; font-family: var(--font-mono);
      padding: 3px 10px; border-radius: 20px;
      white-space: nowrap;
    }
    .trend-good    { background: rgba(107,227,164,0.12); color: #6BE3A4; border: 1px solid rgba(107,227,164,0.2); }
    .trend-bad     { background: rgba(255,107,107,0.12); color: #FF6B6B; border: 1px solid rgba(255,107,107,0.2); }
    .trend-neutral { background: rgba(255,255,255,0.05); color: var(--text-tertiary); border: 1px solid rgba(255,255,255,0.08); }

    .sess-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 10px;
    }
    .sess-card {
      background: var(--card-bg);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      padding: 14px 16px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .sess-card:hover { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.12); }
    .sess-card.expanded { border-color: rgba(91,164,245,0.3); }
    .sess-date {
      font-size: 9px; font-family: var(--font-mono);
      color: var(--text-tertiary); text-transform: uppercase;
      letter-spacing: 0.1em; margin-bottom: 4px;
    }
    .sess-name {
      font-size: 14px; font-weight: 600;
      color: var(--text-primary); line-height: 1.2; margin-bottom: 6px;
    }
    .sess-meta {
      display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
    }
    .sess-pain {
      font-size: 10px; font-family: var(--font-mono);
      color: var(--text-tertiary);
    }
    .sess-pain-val { font-weight: 600; }
    .sess-pain-val.pain-low  { color: #6BE3A4; }
    .sess-pain-val.pain-mid  { color: var(--warning); }
    .sess-pain-val.pain-high { color: #FF6B6B; }
    .sess-tag {
      font-size: 9px; font-family: var(--font-mono);
      padding: 2px 7px; border-radius: 10px;
      background: rgba(107,227,164,0.1); color: #6BE3A4;
      border: 1px solid rgba(107,227,164,0.2);
    }
    .sess-notes-preview {
      font-size: 10px; color: var(--text-tertiary);
      margin-top: 7px; line-height: 1.5;
      overflow: hidden; text-overflow: ellipsis;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }

    /* Session detail drawer */
    .sess-detail {
      display: none;
      background: rgba(91,164,245,0.04);
      border: 1px solid rgba(91,164,245,0.15);
      border-radius: 10px;
      padding: 16px 20px;
      margin-top: 4px;
      grid-column: 1 / -1;
    }
    .sess-detail.open { display: block; }
    .sess-detail-hd {
      display: flex; align-items: baseline;
      justify-content: space-between; margin-bottom: 14px;
    }
    .sess-detail-title { font-size: 16px; font-weight: 700; color: var(--text-primary); }
    .sess-detail-date  { font-size: 10px; font-family: var(--font-mono); color: var(--text-tertiary); }
    .sess-detail-close {
      background: none; border: none; color: var(--text-tertiary);
      cursor: pointer; font-size: 14px; padding: 2px 4px;
    }
    .sess-detail-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 12px; }
    .sess-detail-block {
      background: rgba(255,255,255,0.03); border-radius: 7px; padding: 10px 12px;
    }
    .sess-detail-lbl  { font-size: 9px; font-family: var(--font-mono); color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4px; }
    .sess-detail-val  { font-size: 15px; font-weight: 700; font-family: var(--font-mono); color: var(--text-primary); }
    .sess-detail-notes { font-size: 11px; color: var(--text-secondary); line-height: 1.6; }

    /* Pain trend mini chart */
    .pain-sparkline {
      display: flex; align-items: flex-end; gap: 3px; height: 32px; margin-top: 8px;
    }
    .spark-bar {
      flex: 1; border-radius: 2px 2px 0 0; min-height: 2px;
      transition: height 0.3s ease;
    }

    /* ── Sidebar ────────────────────────────────────────────── */
    .sidebar { display: flex; flex-direction: column; gap: 12px; }
    .widget-label {
      font-size: 9px; font-family: var(--font-mono); color: var(--text-tertiary);
      text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 12px;
    }
    .stat-quad {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    }
    .stat-block {
      background: rgba(255,255,255,0.025); border-radius: 8px; padding: 12px;
    }
    .stat-block-val {
      font-size: 22px; font-weight: 700; font-family: var(--font-mono);
      line-height: 1; color: var(--text-primary);
    }
    .stat-block-lbl {
      font-size: 9px; font-family: var(--font-mono); color: var(--text-tertiary);
      margin-top: 3px;
    }
    .week-bars {
      display: flex; gap: 5px; align-items: flex-end; height: 52px;
    }
    .wbar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .wbar-fill { width: 100%; border-radius: 3px 3px 2px 2px; transition: height 0.35s ease; }
    .wbar-name { font-size: 8px; font-family: var(--font-mono); color: var(--text-tertiary); }
    .progress-row { margin-bottom: 10px; }
    .progress-row:last-child { margin-bottom: 0; }
    .progress-header { display: flex; justify-content: space-between; margin-bottom: 5px; }
    .progress-name { font-size: 11px; font-family: var(--font-mono); color: var(--text-secondary); }
    .progress-pct  { font-size: 10px; font-family: var(--font-mono); color: var(--text-tertiary); }
    .progress-bg { height: 5px; background: rgba(255,255,255,0.06); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
  </style>
</head>

<main class="page">

  <!-- Hero band -->
  <div class="hero-band">
    <div class="hero-main">
      <div class="hero-eyebrow" id="heroEyebrow">I dag — laster…</div>
      <div class="hero-session" id="heroSession">—</div>
      <div class="hero-next" id="heroNext"></div>
    </div>
    <div class="hero-kpi">
      <div class="hero-kpi-val" id="kpiDone">—</div>

    <div class="hero-kpi">

      <div class="detail-field">

      <div class="detail-actions">

      <!-- Stats -->

            <div class="stat-block-lbl">Fullførte</div>
          </div>
          <div class="stat-block">
            <div class="stat-block-val" id="sbPlanned">—</div>
            <div class="stat-block-lbl">Planlagte</div>
          </div>
          <div class="stat-block">
            <div class="stat-block-val" id="sbPct">—</div>
            <div class="stat-block-lbl">Konsistens</div>
          </div>
          <div class="stat-block">
            <div class="stat-block-val" id="sbRest">—</div>

      <!-- Week bar chart -->
      <div class="card">
        <div class="widget-label">Ukens belastning</div>

      <!-- Week completion progress -->

  <!-- Session history -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
let db;
document.querySelector('[data-p="treningsplan"]').classList.add('active');

let _tt;
function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `toast ${type} show`;
  clearTimeout(_tt); _tt = setTimeout(() => el.classList.remove('show'), 3000);
}
async function signOut() {
  if (db) await db.auth.signOut();
  window.location.href = 'login.html';
}
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Constants ──────────────────────────────────────────────────────────────
const PLAN_KEY   = 'treningsplan_v1';
const SHORT_DAYS = ['Man','Tir','Ons','Tor','Fre','Lør','Søn'];
const FULL_DAYS  = ['Mandag','Tirsdag','Onsdag','Torsdag','Fredag','Lørdag','Søndag'];

// ── State ──────────────────────────────────────────────────────────────────
let plan                 = {};   // { 0: 'Sprint', notes_0: '...', ... }
let loggedDates          = new Set();
let currentWeekLoggedDates = new Set(); // always current week (for hero KPIs)
let selectedIdx          = todayIdx();
let weekOffset           = 0;    // 0 = this week, -1 = last week, etc.

// ── Helpers ────────────────────────────────────────────────────────────────
function todayIdx() { return (new Date().getDay() + 6) % 7; }

function getMondayForOffset(offset) {
  const now  = new Date();
  const diff = (now.getDay() + 6) % 7;
  const mon  = new Date(now);
  mon.setDate(now.getDate() - diff + offset * 7);
  mon.setHours(0, 0, 0, 0);
  return mon;
}

function getMonday() { return getMondayForOffset(0); }

function getISOWeek(d) {
  const tmp = new Date(d.getTime());
  tmp.setHours(0, 0, 0, 0);
  tmp.setDate(tmp.getDate() + 3 - (tmp.getDay() + 6) % 7);
  const w1 = new Date(tmp.getFullYear(), 0, 4);
  return 1 + Math.round(((tmp.getTime() - w1.getTime()) / 86400000 - 3 + (w1.getDay() + 6) % 7) / 7);
}

function getPlanKey(offset) {
  if (offset === 0) return PLAN_KEY;
  return PLAN_KEY + '_' + getMondayForOffset(offset).toISOString().slice(0, 10);
}

function planText(i)  { return (plan[i]             || '').trim(); }
function notesText(i) { return (plan[`notes_${i}`]  || '').trim(); }

function isRest(i) {
  const t = planText(i).toLowerCase();
  return !t || t.startsWith('hvile') || t.startsWith('fri');
}

function dayDate(i) {
  const mon = getMondayForOffset(weekOffset);
  const d   = new Date(mon);
  d.setDate(mon.getDate() + i);
  return d;
}

// ── Hero ───────────────────────────────────────────────────────────────────
function renderHero() {
  const ti  = todayIdx();
  const now = new Date();

  document.getElementById('heroEyebrow').textContent =
    'I dag — ' + now.toLocaleDateString('no-NO', { weekday:'long', day:'numeric', month:'long' }).toUpperCase();

  // Always read current week's plan for hero
  const heroPlan = JSON.parse(localStorage.getItem(PLAN_KEY) || '{}');
  const hpt = i => (heroPlan[i] || '').trim();
  const hir = i => { const t = hpt(i).toLowerCase(); return !t || t.startsWith('hvile') || t.startsWith('fri'); };

  const txt = hpt(ti);
  const sessionEl = document.getElementById('heroSession');
  if (txt && !hir(ti)) {
    sessionEl.textContent = txt;
    sessionEl.className   = 'hero-session';
  } else {
    sessionEl.textContent = 'Hviledag';
    sessionEl.className   = 'hero-session is-rest';
  }

  let nextStr = '';
  for (let d = 1; d <= 6; d++) {
    const ni = (ti + d) % 7;
    if (!hir(ni)) { nextStr = `Neste: ${FULL_DAYS[ni]} — ${hpt(ni)}`; break; }
  }
  document.getElementById('heroNext').textContent = nextStr;

  // KPIs always show current week
  const mon = getMonday();
  let logged = 0;
  for (let i = 0; i < 7; i++) {
    const d = new Date(mon); d.setDate(mon.getDate() + i);
    if (currentWeekLoggedDates.has(d.toISOString().slice(0, 10))) logged++;
  }
  let daysLeft = 0;
  for (let i = ti + 1; i < 7; i++) { if (!hir(i)) daysLeft++; }

  document.getElementById('kpiDone').textContent = `${logged}`;
  document.getElementById('kpiLeft').textContent = `${daysLeft}`;
}

// ── Day strip ──────────────────────────────────────────────────────────────
function renderDayStrip() {
  const ti = todayIdx();
  const el = document.getElementById('dayStrip');
  el.innerHTML = SHORT_DAYS.map((name, i) => {
    const d      = dayDate(i);
    const ds     = d.toISOString().slice(0, 10);
    const logged = loggedDates.has(ds);
    const today  = weekOffset === 0 && i === ti;
    const sel    = i === selectedIdx;
    const txt    = planText(i);
    const rest   = isRest(i);

    let cls = 'day-card';
    if (today)  cls += ' is-today';
    if (sel)    cls += ' is-selected';
    if (logged) cls += ' is-logged';

    const preview = txt.length > 12 ? txt.slice(0, 11) + '…' : txt;

    return `<div class="${cls}" onclick="selectDay(${i})">
      <div class="day-card-top">
        <div>
          <div class="day-card-name">${name}</div>
          <div class="day-card-date">${d.getDate()}</div>
        </div>
        ${logged ? '<div class="day-logged-dot"></div>' : ''}
      </div>
      ${preview
        ? `<div class="day-card-plan">${escHtml(preview)}</div>`
        : `<div class="day-card-rest">Hvile</div>`
      }
    </div>`;
  }).join('');
}

// ── Detail panel ───────────────────────────────────────────────────────────
function renderDetail() {
  const i    = selectedIdx;
  const d    = dayDate(i);
  const ds   = d.toISOString().slice(0, 10);
  const txt  = planText(i);
  const logged = loggedDates.has(ds);

  const dateLabel = d.toLocaleDateString('no-NO', { day:'numeric', month:'long' });
  document.getElementById('detailMeta').textContent =
    `${FULL_DAYS[i]} — ${dateLabel}`;

  const titleEl = document.getElementById('detailTitle');
  if (txt && !isRest(i)) {
    titleEl.textContent = txt;
    titleEl.className   = 'detail-day-title';
  } else {
    titleEl.textContent = 'Ingen plan';
    titleEl.className   = 'detail-day-title is-empty';
  }

  document.getElementById('detailLoggedBadge').innerHTML =
    logged ? '<span class="detail-logged-badge">✓ Fullført</span>' : '';

  document.getElementById('detailPlan').value  = txt;
  document.getElementById('detailNotes').value = notesText(i);
}

function selectDay(i) {
  selectedIdx = i;
  renderDayStrip();
  renderDetail();
}

// ── Sidebar ────────────────────────────────────────────────────────────────
function renderSidebar() {
  const mon = getMondayForOffset(weekOffset);
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
  const ti  = todayIdx();
  let logged = 0, planned = 0, rest = 0;

  for (let i = 0; i < 7; i++) {
    const ds = dayDate(i).toISOString().slice(0, 10);
    if (loggedDates.has(ds)) logged++;
    if (!isRest(i)) planned++; else rest++;
  }
  const pct = planned > 0 ? Math.round(logged / planned * 100) : 0;

  document.getElementById('sbLogged').textContent  = logged;
  document.getElementById('sbPlanned').textContent = planned;
  document.getElementById('sbPct').textContent     = pct + '%';
  document.getElementById('sbRest').textContent    = rest;

  // Week range label
  const opts = { day:'numeric', month:'short' };
  document.getElementById('weekRangeLabel').textContent =
    `${mon.toLocaleDateString('no-NO', opts)} – ${sun.toLocaleDateString('no-NO', opts)}`;

  // Bar chart
  const barEl = document.getElementById('weekBars');
  barEl.innerHTML = SHORT_DAYS.map((name, i) => {
    const ds      = dayDate(i).toISOString().slice(0, 10);
    const done    = loggedDates.has(ds);
    const isT     = weekOffset === 0 && i === ti;
    const hasPlan = !isRest(i);
    const h = done ? 40 : hasPlan ? 18 : 6;
    const bg = done
      ? '#6BE3A4'
      : hasPlan
        ? 'rgba(91,164,245,0.35)'
        : 'rgba(255,255,255,0.07)';
    const ring = isT ? ';outline:1px solid rgba(91,164,245,0.6);outline-offset:2px' : '';
    return `<div class="wbar-col">
      <div class="wbar-fill" style="height:${h}px;background:${bg}${ring}"></div>
      <div class="wbar-name">${name}</div>
    </div>`;
  }).join('');

  // Week progress bars (each planned day as a row)
  const progEl = document.getElementById('weekProgress');
  const rows   = [];
  for (let i = 0; i < 7; i++) {
    if (isRest(i)) continue;
    const ds     = dayDate(i).toISOString().slice(0, 10);
    const done   = loggedDates.has(ds);
    const isPast = weekOffset < 0 || i < ti;
    const pct2   = done ? 100 : isPast ? 20 : 0;
    const fill   = done ? '#6BE3A4' : isPast ? 'rgba(255,100,100,0.45)' : 'rgba(91,164,245,0.35)';
    const lbl    = planText(i).length > 12 ? planText(i).slice(0, 11) + '…' : planText(i);
    rows.push(`<div class="progress-row">
      <div class="progress-header">
        <span class="progress-name">${SHORT_DAYS[i]} — ${escHtml(lbl)}</span>
        <span class="progress-pct">${done ? '✓' : isPast ? 'Glemt' : '—'}</span>
      </div>
      <div class="progress-bg">
        <div class="progress-fill" style="width:${pct2}%;background:${fill}"></div>
      </div>
    </div>`);
  }
  progEl.innerHTML = rows.length ? rows.join('') : '<div class="empty">Ingen planlagte dager</div>';
}

// ── Save / clear ───────────────────────────────────────────────────────────
function saveDay() {
  const txt   = document.getElementById('detailPlan').value.trim();
  const notes = document.getElementById('detailNotes').value.trim();

  if (txt) plan[selectedIdx] = txt;
  else     delete plan[selectedIdx];

  const nk = `notes_${selectedIdx}`;
  if (notes) plan[nk] = notes;
  else       delete plan[nk];

  localStorage.setItem(getPlanKey(weekOffset), JSON.stringify(plan));
  renderHero();
  renderDayStrip();
  renderDetail();
  renderSidebar();
  toast('Lagret');
}

function clearDay() {
  delete plan[selectedIdx];
  delete plan[`notes_${selectedIdx}`];
  localStorage.setItem(getPlanKey(weekOffset), JSON.stringify(plan));
  renderHero();
  renderDayStrip();
  renderDetail();
  renderSidebar();
  toast('Dag tømt');
}

// ── Week navigation ────────────────────────────────────────────────────────
function renderWeekNav() {
  const mon  = getMondayForOffset(weekOffset);
  const sun  = new Date(mon); sun.setDate(mon.getDate() + 6);
  const opts = { day:'numeric', month:'short' };
  const wn   = getISOWeek(mon);
  document.getElementById('weekNavLabel').textContent =
    `Uke ${wn} · ${mon.toLocaleDateString('no-NO', opts)} – ${sun.toLocaleDateString('no-NO', opts)}`;
  const nextBtn = document.getElementById('weekNavNext');
  nextBtn.disabled      = weekOffset >= 0;
  nextBtn.style.opacity = weekOffset >= 0 ? '0.35' : '';
  nextBtn.style.cursor  = weekOffset >= 0 ? 'default' : '';
}

async function changeWeek(delta) {
  const next = weekOffset + delta;
  if (next > 0) return;
  weekOffset  = next;
  plan        = JSON.parse(localStorage.getItem(getPlanKey(weekOffset)) || '{}');
  selectedIdx = weekOffset === 0 ? todayIdx() : 0;

  const mon = getMondayForOffset(weekOffset);
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
  const { data } = await db.from('gym_log').select('date')
    .gte('date', mon.toISOString().slice(0, 10))
    .lte('date', sun.toISOString().slice(0, 10));
  loggedDates = new Set((data || []).map(r => r.date));

  renderWeekNav();
  renderDayStrip();
  renderDetail();
  renderSidebar();
}

// ── Session history & pain trend ───────────────────────────────────────────
let _sessData   = [];
let _kneeMap    = {};
let _openDetail = null;

function painColorClass(score) {
  if (score === null || score === undefined) return '';
  if (score <= 3) return 'pain-low';
  if (score <= 6) return 'pain-mid';
  return 'pain-high';
}

function calcPainTrend(kneeSessions) {
  const scored = kneeSessions.filter(k => k.after_score !== null && k.after_score !== undefined);
  if (scored.length < 3) return null;
  const half   = Math.ceil(scored.length / 2);
  const avg    = arr => arr.reduce((s, k) => s + k.after_score, 0) / arr.length;
  const delta  = avg(scored.slice(0, half)) - avg(scored.slice(half));
  if (delta < -0.6) return { text: '↓ Knesmerte forbedres', type: 'good' };
  if (delta >  0.6) return { text: '↑ Knesmerte øker',     type: 'bad' };
  return { text: '— Knesmerte stabil', type: 'neutral' };
}

async function loadSessionHistory() {
  const { data: gymData } = await db.from('gym_log')
    .select('*').order('date', { ascending: false }).limit(30);
  const el = document.getElementById('sessionGrid');
  if (!gymData?.length) {
    el.innerHTML = '<div class="empty" style="grid-column:1/-1;padding:20px 0">Ingen loggede økter ennå</div>';
    return;
  }
  _sessData = gymData;

  const dates = [...new Set(gymData.map(g => g.date))];
  const { data: kneeData } = await db.from('knee_pain').select('*').in('date', dates);
  _kneeMap = {};
  (kneeData || []).forEach(k => { _kneeMap[k.date + '|' + (k.session_type || '')] = k; });

  const kneeSorted = gymData
    .map(g => _kneeMap[g.date + '|' + (g.session_type || '')])
    .filter(Boolean);
  const trend = calcPainTrend(kneeSorted);
  if (trend) {
    const badge = document.getElementById('painTrendBadge');
    badge.textContent   = trend.text;
    badge.className     = `trend-badge trend-${trend.type}`;
    badge.style.display = '';
  }

  renderSessionGrid();
}

function renderSessionGrid() {
  const el = document.getElementById('sessionGrid');
  if (!_sessData.length) { el.innerHTML = '<div class="empty">Ingen loggede økter</div>'; return; }

  el.innerHTML = _sessData.map(g => {
    const knee       = _kneeMap[g.date + '|' + (g.session_type || '')] || null;
    const d          = new Date(g.date + 'T12:00:00');
    const dateStr    = d.toLocaleDateString('no-NO', { day:'numeric', month:'long' });
    const dayStr     = d.toLocaleDateString('no-NO', { weekday:'long' });
    const before     = knee?.before_score;
    const after      = knee?.after_score;
    const hasPain    = before != null && after != null;
    const notesPreview = (g.session_notes || '').trim();
    const isOpen     = _openDetail === g.id;

    const painHtml = hasPain
      ? `<span class="sess-pain">Smerte: <span class="sess-pain-val ${painColorClass(before)}">${before}</span>
           <span style="color:var(--text-tertiary)"> → </span>
           <span class="sess-pain-val ${painColorClass(after)}">${after}</span></span>`
      : '';

    return `<div class="sess-card${isOpen ? ' expanded' : ''}" id="sess-card-${g.id}"
      onclick="toggleSessionDetail('${g.id}')">
      <div class="sess-date">${dayStr} · ${dateStr}</div>
      <div class="sess-name">${escHtml(g.session_type || 'Økt')}</div>
      <div class="sess-meta">
        ${painHtml}
        <span class="sess-tag">✓ Fullført</span>
      </div>
      ${notesPreview ? `<div class="sess-notes-preview">${escHtml(notesPreview)}</div>` : ''}
    </div>
    ${isOpen ? buildDetailHtml(g, knee) : `<div class="sess-detail" id="sess-detail-${g.id}"></div>`}`;
  }).join('');
}

function buildDetailHtml(g, knee) {
  const d       = new Date(g.date + 'T12:00:00');
  const dateStr = d.toLocaleDateString('no-NO', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

  const scoreBlock = (label, val) => val != null
    ? `<div class="sess-detail-block">
        <div class="sess-detail-lbl">${label}</div>
        <div class="sess-detail-val ${painColorClass(val)}">${val}</div>
       </div>`
    : '';

  const painBlocks = [
    scoreBlock('Smerte før', knee?.before_score),
    scoreBlock('Under økt',  knee?.during_score),
    scoreBlock('Etter økt',  knee?.after_score),
    scoreBlock('Dagen etter',knee?.day_after_score),
  ].filter(Boolean).join('');

  const sameType = _sessData.filter(s => s.session_type === g.session_type);
  const sparkVals = sameType.slice(0, 8).reverse()
    .map(s => _kneeMap[s.date + '|' + (s.session_type || '')]?.after_score ?? null);
  const maxVal = Math.max(...sparkVals.filter(v => v !== null), 1);
  const sparkHtml = sparkVals.map(v => {
    if (v === null) return `<div class="spark-bar" style="height:2px;background:rgba(255,255,255,0.08)"></div>`;
    const h  = Math.round(4 + (v / maxVal) * 26);
    const bg = v <= 3 ? '#6BE3A4' : v <= 6 ? 'var(--warning)' : '#FF6B6B';
    return `<div class="spark-bar" style="height:${h}px;background:${bg}"></div>`;
  }).join('');

  return `<div class="sess-detail open" id="sess-detail-${g.id}" onclick="event.stopPropagation()">
    <div class="sess-detail-hd">
      <div>
        <div class="sess-detail-title">${escHtml(g.session_type || 'Økt')}</div>
        <div class="sess-detail-date">${dateStr}</div>
      </div>
      <button class="sess-detail-close" onclick="event.stopPropagation();toggleSessionDetail('${g.id}')">✕</button>
    </div>
    ${painBlocks ? `<div class="sess-detail-grid">${painBlocks}</div>` : ''}
    ${sparkVals.some(v => v !== null)
      ? `<div style="margin-bottom:12px">
          <div style="font-size:9px;font-family:var(--font-mono);color:var(--text-tertiary);
            margin-bottom:4px;text-transform:uppercase;letter-spacing:0.1em">Smerte etter — historikk (${escHtml(g.session_type || '')})</div>
          <div class="pain-sparkline">${sparkHtml}</div>
        </div>`
      : ''}
    ${g.session_notes
      ? `<div><div style="font-size:9px;font-family:var(--font-mono);color:var(--text-tertiary);
            text-transform:uppercase;letter-spacing:0.1em;margin-bottom:5px">Notater</div>
          <div class="sess-detail-notes">${escHtml(g.session_notes)}</div></div>`
      : ''}
  </div>`;
}

function toggleSessionDetail(id) {
  _openDetail = _openDetail === id ? null : id;
  renderSessionGrid();
  if (_openDetail) {
    setTimeout(() => {
      document.getElementById(`sess-detail-${id}`)?.scrollIntoView({ behavior:'smooth', block:'nearest' });
    }, 60);
  }
}

// ── Init ───────────────────────────────────────────────────────────────────
(async () => {
  try {
    const r = await fetch('/api/config');
    if (!r.ok) throw new Error('Config-tjeneste svarte ' + r.status);
    const cfg = await r.json();
    if (cfg.error) throw new Error(cfg.error);
    db = supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);
    const { data: { session } } = await db.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }
  } catch (err) {
    document.querySelector('.page').innerHTML =
      `<div class="card" style="text-align:center;padding:40px">
        <div style="color:var(--danger);font-family:var(--font-mono);font-size:13px">${err.message}</div>
      </div>`;
    return;
  }

  plan = JSON.parse(localStorage.getItem(PLAN_KEY) || '{}');

  const mon = getMonday();
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
  const { data } = await db.from('gym_log')
    .select('date')
    .gte('date', mon.toISOString().slice(0, 10))
    .lte('date', sun.toISOString().slice(0, 10));
  loggedDates = new Set((data || []).map(r => r.date));
  currentWeekLoggedDates = new Set(loggedDates);

  renderHero();
  renderWeekNav();
  renderDayStrip();
  renderDetail();
  renderSidebar();
  loadSessionHistory();
})();
</script>
