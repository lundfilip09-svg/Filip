<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="/favicon.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#050506">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Dashboard">
  <title>Dashboard</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .ai-page {
      display: flex; flex-direction: column; gap: 0;
      max-width: 1100px; margin: 0 auto;
      padding: 24px 16px 60px;
      position: relative; z-index: 1;
      height: calc(100vh - 48px);
    }

    /* Chat + ukesrapport-panel side om side (kolonne på mobil) */
    .ai-layout { display: flex; gap: 14px; flex: 1; min-height: 0; align-items: stretch; }

    /* ── Header ── */
    .ai-header { padding-bottom: 18px; flex-shrink: 0; display: flex; align-items: flex-end; justify-content: space-between; gap: 12px; }
    .ai-title {
      font-size: 24px; font-weight: 700; letter-spacing: -0.03em;
      background: linear-gradient(135deg, #fff 0%, #c8c5be 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 4px;
    }
    .ai-subtitle {
      font-size: 10px; font-family: var(--font-mono); letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--text-tertiary);
    }
    .ai-subtitle span { color: rgba(91,164,245,0.7); }

    /* ── Chat card ── */
    .chat-card {
      flex: 1; min-height: 0;
      background: var(--card-bg);
      border-radius: var(--card-radius);
      border: 1px solid rgba(255,255,255,0.06);
      border-top: 2px solid rgba(91,164,245,0.28);
      backdrop-filter: blur(24px) saturate(1.2);
      -webkit-backdrop-filter: blur(24px) saturate(1.2);
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    /* ── Chat history ── */
    .chat-history {
      flex: 1; overflow-y: auto;
      padding: 20px; display: flex; flex-direction: column;
      gap: 16px; scroll-behavior: smooth;
    }
    .chat-history::-webkit-scrollbar { width: 4px; }
    .chat-history::-webkit-scrollbar-track { background: transparent; }
    .chat-history::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    /* ── Messages ── */
    .msg { display: flex; flex-direction: column; max-width: 86%; gap: 4px; }
    .msg-user { align-self: flex-end; align-items: flex-end; }
    .msg-ai   { align-self: flex-start; align-items: flex-start; }

    .msg-label {
      font-size: 9px; font-family: var(--font-mono); letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--text-tertiary);
    }

    .msg-bubble {
      padding: 12px 14px; border-radius: 14px;
      font-size: 13px; line-height: 1.65; word-break: break-word;
    }
    .msg-user .msg-bubble {
      background: rgba(91,164,245,0.15);
      border: 1px solid rgba(91,164,245,0.25);
      border-bottom-right-radius: 4px;
      color: var(--text-primary);
    }
    .msg-ai .msg-bubble {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-bottom-left-radius: 4px;
      color: var(--text-secondary);
    }
    .msg-ai .msg-bubble strong { color: var(--text-primary); font-weight: 600; }
    .msg-ai .msg-bubble code {
      font-family: var(--font-mono); font-size: 11px;
      background: rgba(255,255,255,0.07); border-radius: 4px;
      padding: 1px 5px;
    }
    .msg-ai .msg-bubble ul, .msg-ai .msg-bubble ol {
      margin: 6px 0 6px 18px;
    }
    .msg-ai .msg-bubble li { margin-bottom: 3px; }

    /* ── Loading ── */
    .msg-loading .msg-bubble {
      display: flex; align-items: center; gap: 5px; padding: 14px 16px;
    }
    .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--text-tertiary);
      animation: pulse 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
      40%           { opacity: 1;   transform: scale(1.1); }
    }

    /* ── Error message ── */
    .msg-error .msg-bubble {
      background: rgba(255,107,107,0.08);
      border-color: rgba(255,107,107,0.2);
      color: var(--danger);
    }

    /* ── Empty state ── */
    .chat-empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 10px;
      color: var(--text-tertiary); text-align: center; padding: 20px;
    }
    .chat-empty-icon {
      font-size: 36px; opacity: 0.4; margin-bottom: 4px;
    }
    .chat-empty-title {
      font-size: 13px; font-weight: 600; color: var(--text-secondary);
    }
    .chat-empty-sub {
      font-size: 11px; font-family: var(--font-mono);
      color: var(--text-tertiary); line-height: 1.5;
    }

    /* ── Input area ── */
    .chat-input-area {
      flex-shrink: 0;
      border-top: 1px solid rgba(255,255,255,0.06);
      padding: 14px 16px;
      background: rgba(255,255,255,0.02);
    }
    .chat-input-row {
      display: flex; align-items: flex-end; gap: 10px;
    }
    .chat-textarea {
      flex: 1; resize: none; min-height: 42px; max-height: 120px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px; padding: 10px 14px;
      font-size: 13px; font-family: var(--font-sans);
      color: var(--text-primary); outline: none;
      transition: border-color 0.15s;
      line-height: 1.5; overflow-y: auto;
    }
    .chat-textarea::placeholder { color: var(--text-tertiary); }
    .chat-textarea:focus { border-color: rgba(91,164,245,0.35); }
    .chat-textarea:disabled { opacity: 0.5; cursor: not-allowed; }

    .chat-send {
      flex-shrink: 0; width: 42px; height: 42px;
      background: rgba(91,164,245,0.18);
      border: 1px solid rgba(91,164,245,0.3);
      border-radius: 10px; color: var(--accent-blue);
      font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, opacity 0.15s;
    }
    .chat-send:hover:not(:disabled) { background: rgba(91,164,245,0.28); }
    .chat-send:disabled { opacity: 0.4; cursor: not-allowed; }

    .chat-hint {
      margin-top: 8px;
      font-size: 9px; font-family: var(--font-mono); color: var(--text-tertiary);
      text-align: center; letter-spacing: 0.08em;
    }

    /* ── Quick prompts ── */
    .quick-prompts {
      display: flex; flex-wrap: wrap; gap: 6px;
      padding: 12px 16px 0;
      flex-shrink: 0;
    }
    .qp-btn {
      font-size: 10px; font-family: var(--font-mono);
      padding: 5px 10px; border-radius: 6px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--text-tertiary); cursor: pointer;
      transition: all 0.15s; white-space: nowrap;
      letter-spacing: 0.04em;
    }
    .qp-btn:hover { background: rgba(255,255,255,0.08); color: var(--text-secondary); }
    /* ── Ukesrapporter: høyre sidepanel + lesemodal ── */
    .ws-panel {
      width: 250px; flex-shrink: 0;
      display: flex; flex-direction: column; min-height: 0;
      background: var(--card-bg);
      border: 1px solid rgba(255,255,255,0.06);
      border-top: 2px solid rgba(177,151,252,0.28);
      border-radius: var(--card-radius);
      backdrop-filter: blur(24px) saturate(1.2);
      -webkit-backdrop-filter: blur(24px) saturate(1.2);
      overflow: hidden;
    }
    .ws-panel-hd {
      padding: 14px 14px 12px; display: flex; flex-direction: column; gap: 9px;
      border-bottom: 1px solid rgba(255,255,255,0.06); flex-shrink: 0;
    }
    .ws-panel-title {
      font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--text-secondary);
    }
    .ws-btn {
      font-size: 11px; font-family: var(--font-mono); padding: 5px 12px; border-radius: 7px;
      background: rgba(177,151,252,0.14); border: 1px solid rgba(177,151,252,0.3);
      color: #B197FC; cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .ws-btn:hover { background: rgba(177,151,252,0.24); }
    .ws-btn:disabled { opacity: 0.5; cursor: default; }
    .ws-list { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 3px; }
    .ws-list::-webkit-scrollbar { width: 4px; }
    .ws-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
    .ws-item {
      text-align: left; width: 100%; padding: 9px 10px; border-radius: 8px;
      background: transparent; border: 1px solid transparent; cursor: pointer;
      color: var(--text-secondary); font-size: 12px; font-family: var(--font-sans);
      display: flex; flex-direction: column; gap: 3px; transition: all 0.15s;
    }
    .ws-item:hover { background: rgba(177,151,252,0.08); border-color: rgba(177,151,252,0.18); }
    .ws-item-date { font-size: 10px; font-family: var(--font-mono); color: var(--text-tertiary); }
    .ws-badge {
      font-size: 9px; font-family: var(--font-mono); letter-spacing: 0.06em;
      color: #B197FC; border: 1px solid rgba(177,151,252,0.35);
      border-radius: 5px; padding: 1px 6px; align-self: flex-start;
    }
    .ws-empty { padding: 14px; font-size: 11px; color: var(--text-tertiary); line-height: 1.6; }
    .ws-hint { font-size: 10px; font-family: var(--font-mono); color: #B197FC; opacity: 0.85; }

    .ws-modal-backdrop {
      position: fixed; inset: 0; z-index: 60;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
      display: none; align-items: center; justify-content: center; padding: 20px;
    }
    .ws-modal-backdrop.open { display: flex; }
    .ws-modal {
      background: #101014; border: 1px solid rgba(177,151,252,0.25);
      border-radius: 14px; max-width: 640px; width: 100%; max-height: 82vh;
      display: flex; flex-direction: column; overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .ws-modal-hd {
      padding: 16px 18px 12px; display: flex; align-items: center;
      justify-content: space-between; gap: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.07); flex-shrink: 0;
    }
    .ws-modal-title { font-size: 14px; font-weight: 700; color: var(--text-primary); }
    .ws-modal-body { padding: 16px 18px; overflow-y: auto; font-size: 13px; line-height: 1.65; color: var(--text-secondary); }
    .ws-modal-body strong { color: var(--text-primary); }

    @media (max-width: 900px) {
      .ai-layout { flex-direction: column; }
      .ws-panel { width: auto; max-height: 230px; }
      .ws-panel-hd { flex-direction: row; align-items: center; justify-content: space-between; padding: 11px 14px; }
    }
    @media (max-width: 768px) {
      /* Fix: header stacks so subtitle isn't squeezed into a narrow column */
      .ai-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
        padding-bottom: 12px;
      }
      .ai-header > div:last-child {
        width: 100%;
        flex-wrap: wrap;
        gap: 4px;
      }
      .ai-header .btn-sm { font-size: 10px !important; padding: 3px 7px; } /* !important slår inline font-size:11px på knappene */
      /* iOS-zoom-fiks ligger nå globalt i styles.css (input/textarea/select 16px) */
    }
  </style>
</head>
<body>

<nav class="main-nav" data-nav></nav>

<div class="ai-page">
  <div class="ai-header">
    <div>
      <div class="ai-title">AI Overseer</div>
      <div class="ai-subtitle"><span data-i18n="ai.sub_pre">Personlig assistent</span> · <span data-i18n="ai.model">Sonnet 4.6</span> · <span data-i18n="ai.sub_post">Søvn · Sprint · Rehab</span></div>
    </div>
    <div style="display:flex;gap:6px;flex-shrink:0;align-items:center">
      <button class="btn btn-ghost btn-sm" id="copyReportBtn" onclick="copyHealthReport()" style="font-size:11px" data-i18n="ai.copy_report">Kopier AI-helserapport</button>
      <button class="btn btn-ghost btn-sm" id="copyDiagBtn" onclick="copyInjuryStatus()" style="font-size:11px" data-i18n="ai.copy_diag">Kopier diagnose</button>
      <button class="btn btn-ghost btn-sm" id="copySleepBtn" onclick="copySleepAnalysis()" style="font-size:11px" data-i18n="ai.copy_sleep">Kopier søvnanalyse</button>
      <button class="btn btn-ghost btn-sm" onclick="clearChat()" style="font-size:11px;opacity:0.6" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.6'" data-i18n="ai.clear">Tøm samtale</button>
    </div>
  </div>

  <div class="ai-layout">
  <div class="chat-card">
    <div class="quick-prompts" id="quickPrompts">
      <button class="qp-btn" onclick="quickPrompt(t('ai.quick1_prompt'))" data-i18n="ai.quick1">Ukens form</button>
      <button class="qp-btn" onclick="quickPrompt(t('ai.quick2_prompt'))" data-i18n="ai.quick2">Knesmerte-analyse</button>
      <button class="qp-btn" onclick="quickPrompt(t('ai.quick3_prompt'))" data-i18n="ai.quick3">Neste økt</button>
      <button class="qp-btn" onclick="quickPrompt(t('ai.quick4_prompt'))" data-i18n="ai.quick4">Søvn vs kne</button>
      <button class="qp-btn" onclick="quickPrompt(t('ai.quick5_prompt'))" data-i18n="ai.quick5">HRV-status</button>
    </div>

    <div class="chat-history" id="chatHistory">
      <div class="chat-empty" id="chatEmpty">
        <div class="chat-empty-icon">🤖</div>
        <div class="chat-empty-title" data-i18n="ai.empty_title">Klar til analyse</div>
        <div class="chat-empty-sub" data-i18n="ai.empty_sub">Spør om trening, knesmerte, søvn eller form.<br>Henter data automatisk fra alle logger.</div>
      </div>
    </div>

    <div class="chat-input-area">
      <div class="chat-input-row">
        <textarea
          class="chat-textarea"
          id="chatInput"
          placeholder="Skriv en melding…"
          data-i18n-placeholder="ai.placeholder"
          rows="1"
          onkeydown="handleKey(event)"
          oninput="autoResize(this); localStorage.setItem('ai_draft', this.value)"
        ></textarea>
        <button class="chat-send" id="sendBtn" onclick="sendMessage()" title="Send (Enter)">
          ↑
        </button>
      </div>
      <div class="chat-hint" data-i18n="ai.hint">Enter sender · Shift+Enter ny linje</div>
    </div>
  </div>

  <!-- Ukesrapporter: genereres automatisk lørdag morgen (cron), lagres i Supabase -->
  <aside class="ws-panel">
    <div class="ws-panel-hd">
      <span class="ws-panel-title">📅 <span data-i18n="ws.panel_title">Ukesrapporter</span></span>
      <button class="ws-btn" id="wsRegenBtn" onclick="regenWeeklySummary()" data-i18n="ws.regenerate">↻ Lag på nytt</button>
    </div>
    <div class="ws-list" id="wsList"></div>
  </aside>
  </div><!-- /ai-layout -->
</div>

<!-- Lesemodal for ukesrapport -->
<div class="ws-modal-backdrop" id="wsModalBackdrop" onclick="if(event.target===this)closeWsModal()">
  <div class="ws-modal">
    <div class="ws-modal-hd">
      <span class="ws-modal-title" id="wsModalTitle"></span>
      <button class="btn btn-ghost btn-sm" onclick="closeWsModal()" style="font-size:11px" data-i18n="ws.close">Lukk</button>
    </div>
    <div class="ws-modal-body" id="wsModalBody"></div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="utils.js"></script>
<script>
let db;
document.querySelector('[data-p="ai"]').classList.add('active');
applyLang();

// ── Markdown → HTML (minimal) ────────────────────────────────────────────────
function mdToHtml(text) {
  return text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/^### (.+)$/gm, '<strong style="font-size:12px;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-tertiary)">$1</strong>')
    .replace(/^## (.+)$/gm, '<strong style="font-size:14px">$1</strong>')
    .replace(/^# (.+)$/gm, '<strong style="font-size:15px">$1</strong>')
    .replace(/^[-*] (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>');
}

// ── Message rendering ─────────────────────────────────────────────────────────
let messageCount = 0;

function appendMessage(role, content, isError = false) {
  const history = document.getElementById('chatHistory');
  const empty = document.getElementById('chatEmpty');
  if (empty) empty.remove();

  const id = `msg-${++messageCount}`;
  const div = document.createElement('div');
  div.className = `msg msg-${role}${isError ? ' msg-error' : ''}`;
  div.id = id;

  if (role === 'user') {
    div.innerHTML = `
      <div class="msg-label">${t('ai.you')}</div>
      <div class="msg-bubble">${content.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')}</div>`;
  } else {
    div.innerHTML = `
      <div class="msg-label">${t('ai.title')}</div>
      <div class="msg-bubble"><p>${mdToHtml(content)}</p></div>`;
  }

  history.appendChild(div);
  history.scrollTop = history.scrollHeight;
  return id;
}

function showLoading() {
  const history = document.getElementById('chatHistory');
  const empty = document.getElementById('chatEmpty');
  if (empty) empty.remove();

  const div = document.createElement('div');
  div.className = 'msg msg-ai msg-loading';
  div.id = 'loadingMsg';
  div.innerHTML = `
    <div class="msg-label">AI Overseer</div>
    <div class="msg-bubble">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>`;
  history.appendChild(div);
  history.scrollTop = history.scrollHeight;
}

function hideLoading() {
  document.getElementById('loadingMsg')?.remove();
}

// ── Chat history (session-scoped, cleared on page load) ──────────────────────
let isSending = false;
let chatHistory = []; // {role:'user'|'assistant', content:string}[]

async function saveHistory() {
  localStorage.setItem('ai_chat_history', JSON.stringify(chatHistory));
  // Persist last user+assistant pair to Supabase (fire-and-forget)
  try {
    const { data: { session } } = await db.auth.getSession();
    if (!session) return;
    const lastTwo = chatHistory.slice(-2);
    if (lastTwo.length === 2 && lastTwo[0].role === 'user' && lastTwo[1].role === 'assistant') {
      await db.from('ai_chat_history').insert(lastTwo.map(m => ({
        user_id: session.user.id,
        role: m.role,
        content: m.content,
      })));
    }
  } catch { /* silent — localStorage still valid */ }
}

// Live-sync: lytt på nye meldinger i ai_chat_history og vis dem på alle enheter.
// Dedupe: enheten som sendte meldingen viser den allerede lokalt, så vi hopper
// over hvis samme rolle+innhold allerede ligger i chatHistory.
let _chatChannel = null;
function subscribeChatRealtime(userId) {
  if (_chatChannel) { try { db.removeChannel(_chatChannel); } catch {} }
  _chatChannel = db
    .channel('ai_chat_' + userId)
    .on('postgres_changes',
      { event: 'INSERT', schema: 'public', table: 'ai_chat_history', filter: `user_id=eq.${userId}` },
      (payload) => {
        const m = payload.new;
        if (!m || (m.role !== 'user' && m.role !== 'assistant')) return;
        // Allerede vist lokalt? (samme rolle+innhold blant de siste meldingene)
        const dup = chatHistory.slice(-6).some(x => x.role === m.role && x.content === m.content);
        if (dup) return;
        chatHistory.push({ role: m.role, content: m.content });
        if (chatHistory.length > 10) chatHistory = chatHistory.slice(-10);
        localStorage.setItem('ai_chat_history', JSON.stringify(chatHistory));
        appendMessage(m.role === 'user' ? 'user' : 'ai', m.content);
      })
    .subscribe();
}

async function clearChat() {
  try {
    const { data: { session } } = await db.auth.getSession();
    if (session) {
      await db.from('ai_chat_history').delete().eq('user_id', session.user.id);
    }
  } catch { /* silent */ }
  chatHistory = [];
  localStorage.removeItem('ai_chat_history');
  document.getElementById('chatHistory').innerHTML = `
    <div class="chat-empty" id="chatEmpty">
      <div class="chat-empty-icon">🤖</div>
      <div class="chat-empty-title" data-i18n="ai.empty_title">${t('ai.empty_title')}</div>
      <div class="chat-empty-sub" data-i18n="ai.empty_sub">${t('ai.empty_sub').replace('\n', '<br>')}</div>
    </div>`;
  toast(t('ai.cleared'));
}

function historyForApi() {
  // Take last 9 stored messages so that + the new user message = 10 total.
  // Anthropic requires the array to start with a user turn.
  let msgs = chatHistory.slice(-9);
  while (msgs.length > 0 && msgs[0].role !== 'user') msgs = msgs.slice(1);
  return msgs;
}

// ── Send message ─────────────────────────────────────────────────────────────
async function sendMessage() {
  if (isSending) return;
  const input = document.getElementById('chatInput');
  const btn = document.getElementById('sendBtn');
  const msg = input.value.trim();
  if (!msg) return;

  isSending = true;
  input.disabled = true;
  btn.disabled = true;
  input.value = '';
  input.style.height = '';
  localStorage.removeItem('ai_draft');

  appendMessage('user', msg);
  showLoading();

  try {
    const { data: { session } } = await db.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }

    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 30000);
    let res;
    try {
      res = await fetch('/api/ai-chat', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${session.access_token}`,
        },
        body: JSON.stringify({
          message: msg,
          history: historyForApi(),
          localDate: today(),                                   // brukerens lokale dato (YYYY-MM-DD), funker i USA
          tz: Intl.DateTimeFormat().resolvedOptions().timeZone, // brukerens tidssone
        }),
        signal: controller.signal,
      });
    } finally {
      clearTimeout(timeout);
    }

    hideLoading();

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      appendMessage('ai', err.error || t('ai.err_generic', { status: res.status }), true);
    } else {
      const { reply } = await res.json();
      appendMessage('ai', reply);
      chatHistory.push({ role: 'user', content: msg });
      chatHistory.push({ role: 'assistant', content: reply });
      if (chatHistory.length > 10) {
        const toRemove = chatHistory.length - 10;
        chatHistory = chatHistory.slice(-10);
        // Fjern tilsvarende DOM-elementer så DOM ikke vokser ubegrenset
        const history = document.getElementById('chatHistory');
        const msgs = history.querySelectorAll('.msg:not(.msg-loading)');
        for (let i = 0; i < toRemove && msgs[i]; i++) msgs[i].remove();
      }
      saveHistory();
    }
  } catch (e) {
    hideLoading();
    const msg = e.name === 'AbortError'
      ? t('ai.err_timeout')
      : t('ai.err_network');
    appendMessage('ai', msg, true);
  } finally {
    isSending = false;
    input.disabled = false;
    btn.disabled = false;
    input.focus();
  }
}

function quickPrompt(text) {

}

function autoResize(el) {
  el.style.height = '';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ── Ukesrapporter (uke = søndag–lørdag, lagres i Supabase) ──────────
// Genereres automatisk av cron lørdag morgen (api/weekly-summary.js).
// Panelet viser alle uker; klikk åpner lesemodal. NO+EN lagres — visningen
// følger språkbryteren. Fallback: mangler ukas rapport på en lørdag,
// genereres den klient-side ved sidelasting.
let wsSummaries = [];   // [{week_start, content_no, content_en}], nyeste først
let wsOpenWeek = null;
let _wsGenerating = false;

function wsCurrentWeekStart() {
  const d = new Date();
  d.setDate(d.getDate() - d.getDay()); // søndagen i inneværende uke
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function wsLabel(weekStart) {
  const end = new Date(weekStart + 'T12:00:00');
  end.setDate(end.getDate() + 6); // lørdagen
  return t('ws.week_ending', { date: end.toLocaleDateString(fmtLocale(), { day: 'numeric', month: 'short', year: 'numeric' }) });
}
// Gamle localStorage-rapporter brukte ISO-uke (man-basert) → søndagen før mandagen
function _isoWeekToSunday(year, week) {
  const jan4 = new Date(Date.UTC(year, 0, 4));
  const mon1 = new Date(jan4); mon1.setUTCDate(jan4.getUTCDate() - ((jan4.getUTCDay() + 6) % 7));
  const sun = new Date(mon1); sun.setUTCDate(mon1.getUTCDate() + (week - 1) * 7 - 1);
  return sun.toISOString().slice(0, 10);
}

function renderWsList() {
  const list = document.getElementById('wsList');
  if (!list) return;
  if (!wsSummaries.length) {
    list.innerHTML = `<div class="ws-empty">${t('ws.none')}</div>`;
    return;
  }
  const cur = wsCurrentWeekStart();
  list.innerHTML = wsSummaries.map(s => `
    <button class="ws-item" onclick="openWsModal('${s.week_start}')">
      <span>${wsLabel(s.week_start)}</span>
      <span class="ws-item-date">${s.week_start} → +6d</span>
      ${s.week_start === cur ? `<span class="ws-badge">${t('ws.current')}</span>` : ''}
    </button>`).join('');
}

function openWsModal(weekStart) {
  const s = wsSummaries.find(x => x.week_start === weekStart);
  if (!s) return;
  wsOpenWeek = weekStart;
  const content = (_lang === 'en' ? (s.content_en || s.content_no) : (s.content_no || s.content_en)) || '';
  document.getElementById('wsModalTitle').textContent = '📅 ' + wsLabel(weekStart);
  document.getElementById('wsModalBody').innerHTML = `<p>${mdToHtml(content)}</p>`;
  document.getElementById('wsModalBackdrop').classList.add('open');
}
function closeWsModal() {
  wsOpenWeek = null;
  document.getElementById('wsModalBackdrop').classList.remove('open');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeWsModal(); });

async function loadWsSummaries() {
  try {
    const { data, error } = await db.from('weekly_summaries')
      .select('week_start, content_no, content_en')
      .order('week_start', { ascending: false })
      .limit(60);
    if (!error && Array.isArray(data)) wsSummaries = data;
  } catch { /* stille */ }
}

// Engangsimport: flytt gamle localStorage-rapporter inn i databasen
async function importLegacyWs(userId) {
  const keys = Object.keys(localStorage).filter(k => k.startsWith('ws_summary_'));
  for (const k of keys) {
    const m = k.match(/^ws_summary_(\d{4})-W(\d{1,2})$/);
    const content = localStorage.getItem(k);
    if (m && content) {
      try {
        await db.from('weekly_summaries').upsert(
          { user_id: userId, week_start: _isoWeekToSunday(+m[1], +m[2]), content_no: content },
          { onConflict: 'user_id,week_start', ignoreDuplicates: true });
      } catch { /* stille */ }
    }
    localStorage.removeItem(k);
  }
}

async function initWeeklySummaries(userId) {
  await importLegacyWs(userId);
  await loadWsSummaries();
  renderWsList();
  // Lørdags-fallback: cron skal ha laget ukas rapport — mangler den, lag nå
  if (new Date().getDay() === 6 && !wsSummaries.some(s => s.week_start === wsCurrentWeekStart())) {
    regenWeeklySummary(true);
  }
}

async function regenWeeklySummary(silent = false) {
  if (_wsGenerating) return;
  const btn = document.getElementById('wsRegenBtn');
  _wsGenerating = true;
  if (btn) { btn.disabled = true; btn.textContent = t('ws.generating'); }
  try {
    const { data: { session } } = await db.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 60000);
    let res;
    try {
      res = await fetch('/api/weekly-summary', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session.access_token}` },
        body: JSON.stringify({
          localDate: today(),
          tz: Intl.DateTimeFormat().resolvedOptions().timeZone,
        }),
        signal: controller.signal,
      });
    } finally { clearTimeout(timeout); }
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      if (!silent) toast(err.error || t('ws.gen_failed'));
      return;
    }
    const r = await res.json();
    wsSummaries = wsSummaries.filter(s => s.week_start !== r.week_start);
    wsSummaries.push({ week_start: r.week_start, content_no: r.content_no, content_en: r.content_en });
    wsSummaries.sort((a, b) => (a.week_start < b.week_start ? 1 : -1));
    renderWsList();
    if (!silent) { toast(t('ws.saved')); openWsModal(r.week_start); }
  } catch (e) {
    if (!silent) toast(e.name === 'AbortError' ? t('ai.err_timeout') : t('ws.gen_failed'));
  } finally {
    _wsGenerating = false;
    if (btn) { btn.disabled = false; btn.textContent = t('ws.regenerate'); }
  }
}

// ── Copy AI Health Report ────────────────────────────────────────────────────
// Bygger en ferdig "master prompt" på ENGELSK (skal limes inn i gratis-AI i USA)
// og kopierer til utklippstavla. Statisk bakgrunn er hardkodet; PB-er, plager,
// fysio-notater og siste 7 dager hentes LIVE fra Supabase så rapporten aldri
// blir utdatert. NB: rapport-teksten er bevisst engelsk-only (data, ikke UI) —
// knapp/toast er tospråklige via i18n.
async function writeClip(text) {
  try { await navigator.clipboard.writeText(text); return true; }
  catch (e) {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.focus(); ta.select();
      const ok = document.execCommand('copy'); ta.remove(); return ok;
    } catch (_) { return false; }
  }
}

const _INJ_BODY_EN = { 'body.knee':'Knee','body.hamstring':'Hamstring','body.glute':'Glute',
  'body.hipflexor':'Hip flexor','body.hip':'Hip','body.shoulder':'Shoulder','body.back':'Back',
  'body.neck':'Neck','body.ankle':'Ankle','body.calf':'Calf','body.achilles':'Achilles',
  'body.foot':'Foot','body.other':'Other' };
const _INJ_SIDE_EN = { left:'left', right:'right', both:'both' };
const _INJ_STAT_EN = { active:'ACTIVE', improving:'IMPROVING', archived:'archived' };
const _INJ_SEV_EN  = { mild:'mild', moderate:'moderate', severe:'severe' };

function _isoDaysAgo(n) {
  const d = new Date(); d.setDate(d.getDate() - n);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

async function copyHealthReport() {
  const btn = document.getElementById('copyReportBtn');
  if (btn) btn.disabled = true;
  toast(t('ai.report_building'));
  try {
    const cutoff = _isoDaysAgo(6); // siste 7 dager inkl. i dag
    const [health, knee, gym, sprint, activity, records, physio, injuries, injPain] = await Promise.all([
      db.from('health_data').select('date,sleep_score,hrv,rhr,sleep_hours,deep_sleep_minutes,rem_sleep_minutes,light_sleep_minutes').gte('date', cutoff).order('date', { ascending: false }),
      db.from('knee_pain').select('date,before_score,during_score,after_score,day_after_score,notes').gte('date', cutoff).order('date', { ascending: false }),
      db.from('gym_log').select('date,session_type,rpe,session_notes,duration_min').gte('date', cutoff).order('date', { ascending: false }),
      db.from('sprint_log').select('date,distance,type,rpe,notes,duration_min').gte('date', cutoff).order('date', { ascending: false }),
      db.from('activity_log').select('date,activity_type,activity_label,duration_min,rpe').gte('date', cutoff).order('date', { ascending: false }),
      db.from('sprint_records').select('distance,best_time').order('distance', { ascending: true }),
      db.from('physio_notes').select('date,therapist,note').order('date', { ascending: false }).limit(3),
      db.from('injuries').select('id,body_part,side,status,severity,start_date,note').neq('status', 'archived').order('updated_at', { ascending: false }),
      db.from('injury_pain').select('injury_id,date,before_score,during_score,after_score,day_after_score,created_at').gte('date', cutoff).order('date', { ascending: false }),
    ]);

    const H = health.data || [], K = knee.data || [], G = gym.data || [],
          S = sprint.data || [], A = activity.data || [], R = records.data || [],
          P = physio.data || [], I = injuries.data || [], IP = injPain.data || [];

    // Per-skade smerte: injury_pain er kilde-til-sannhet (kun alvorlige skader logges).
    const _isKneeBp = bp => bp === 'body.knee' || /kne|knee/i.test(bp || '');
    const _sevInj = I.filter(i => i.severity === 'severe');
    const _ipByKey = {};
    IP.forEach(r => {
      const key = `${r.injury_id}|${r.date}`;
      if (!_ipByKey[key] || (r.created_at || '') > (_ipByKey[key].created_at || '')) _ipByKey[key] = r;
    });

    // PB-linje — live fra sprint_records, fallback til kjente verdier
    const recMap = {};
    R.forEach(r => { if (r.best_time != null) recMap[r.distance] = Number(r.best_time).toFixed(2); });
    const pb100 = recMap['100m'] || '11.52';
    const pb200 = recMap['200m'] || '23.11';
    const otherPB = R.filter(r => !['100m','200m'].includes(r.distance) && r.best_time != null)
      .map(r => `${distLabel(r.distance)} (${Number(r.best_time).toFixed(2)}s)`);
    const eventsLine = `100m (${pb100}s) / 200m (${pb200}s)` + (otherPB.length ? ' / ' + otherPB.join(' / ') : '');

    // Aktive plager → engelsk
    const injLines = I.map(i => {
      const part = _INJ_BODY_EN[i.body_part] || i.body_part;
      const side = i.side && _INJ_SIDE_EN[i.side] ? ' ' + _INJ_SIDE_EN[i.side] : '';
      const meta = `${_INJ_STAT_EN[i.status] || i.status}, ${_INJ_SEV_EN[i.severity] || i.severity}${i.start_date ? ', since ' + i.start_date : ''}`;
      return `- ${part}${side} [${meta}]${i.note ? ': ' + i.note : ''}`;
    });
    const injBlock = injLines.length ? injLines.join('\n') : '- None currently logged (assume injury-free unless noted below).';

    // Fysio-notater
    const physioBlock = P.length
      ? P.map(p => `(${p.date}${p.therapist ? ', ' + p.therapist : ''}) ${p.note}`).join('\n\n')
      : 'No physio notes logged yet.';

    // Siste 7 dager — én linje per dag (i dag → bakover)
    const idx = (rows) => { const m = {}; rows.forEach(r => { (m[r.date] ||= []).push(r); }); return m; };
    const hM = {}; H.forEach(h => hM[h.date] = h);
    const kM = {}; K.forEach(k => kM[k.date] = k);
    const gM = idx(G), sM = idx(S), aM = idx(A);

    const dayLines = [];
    for (let n = 0; n < 7; n++) {
      const ds = _isoDaysAgo(n);
      const wd = new Date(ds + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'short' });
      const parts = [];
      const h = hM[ds];
      parts.push(`Sleep score: ${h && h.sleep_score != null ? h.sleep_score : '–'}${h && h.sleep_hours != null ? ' (' + Number(h.sleep_hours).toFixed(1) + 'h)' : ''}`);
      if (h && (h.hrv != null || h.rhr != null)) parts.push(`HRV ${h.hrv ?? '–'} / RHR ${h.rhr ?? '–'}`);
      if (h) { const _st = (h.deep_sleep_minutes||0)+(h.rem_sleep_minutes||0)+(h.light_sleep_minutes||0); if (_st > 10) parts.push(`Sleep stages: Deep ${Math.round((h.deep_sleep_minutes||0)/_st*100)}% / REM ${Math.round((h.rem_sleep_minutes||0)/_st*100)}%`); }
      const k = kM[ds];
      if (_sevInj.length) {
        const painParts = _sevInj.map(inj => {
          const row = _ipByKey[`${inj.id}|${ds}`] || (_isKneeBp(inj.body_part) ? k : null);
          const nm  = (_INJ_BODY_EN[inj.body_part] || inj.body_part) + (inj.side && _INJ_SIDE_EN[inj.side] ? ' ' + _INJ_SIDE_EN[inj.side] : '');
          return `${nm} pain b/d/a/next: ${row ? `${row.before_score ?? '–'}/${row.during_score ?? '–'}/${row.after_score ?? '–'}/${row.day_after_score ?? '–'}` : 'not logged'}`;
        });
        parts.push(painParts.join(' | '));
      } else {
        parts.push(`Pain before/during/after/next-day: ${k ? `${k.before_score ?? '–'}/${k.during_score ?? '–'}/${k.after_score ?? '–'}/${k.day_after_score ?? '–'}` : 'not logged'}`);
      }
      const sess = [];
      (gM[ds] || []).forEach(g => sess.push(`Strength${g.session_type ? ' (' + g.session_type + ')' : ''}${g.duration_min ? ' ' + g.duration_min + 'min' : ''}${g.rpe != null ? ' RPE ' + g.rpe : ''}${g.session_notes ? ' — ' + g.session_notes : ''}`));
      (sM[ds] || []).forEach(s => sess.push(`Sprint${s.distance ? ' ' + distLabel(s.distance) : ''}${s.type ? ' ' + s.type : ''}${s.duration_min ? ' ' + s.duration_min + 'min' : ''}${s.rpe != null ? ' RPE ' + s.rpe : ''}${s.notes ? ' — ' + s.notes : ''}`));
      (aM[ds] || []).forEach(a => sess.push(`${a.activity_type === 'Annet' && a.activity_label ? a.activity_label : a.activity_type}${a.duration_min ? ' ' + a.duration_min + 'min' : ''}${a.rpe != null ? ' RPE ' + a.rpe : ''}`));
      parts.push(`Sessions: ${sess.length ? sess.join('; ') : 'rest / none logged'}`);
      dayLines.push(`${ds} (${wd}): ${parts.join(' | ')}`);
    }

    // Dynamisk miljø: Norge til aug 2026, deretter USA
    const _inUSA = new Date() >= new Date('2026-08-20');
    const _envLocation = _inUSA
      ? 'Fergus Falls, Minnesota, USA (High School Exchange VG2 at Hillcrest)'
      : 'Norway (home; starting US High School Exchange at Hillcrest, Fergus Falls MN in Aug 2026)';
    const _envActivities = _inUSA
      ? 'Combining High School Soccer / American Football (2–3×/week) with Sprint Training and Strength/Rehab.'
      : 'Sprint training + strength/rehab at Norna-Salhus IL, ~5–6×/week.';
    const _q1 = _inUSA
      ? 'Analyze if my injury pain trends (per active issue listed above) indicate that my current soccer/football/sprint load is safe or causing regression.'
      : 'Analyze if my injury pain trends (per active issue listed above) indicate that my current sprint/strength load is safe or causing regression.';

    const report =
`=== ATHLETE CONTEXT ===
Name: Filip Lund (born 2009) — competitive 100m/200m sprinter, Norway
Height: 187 cm / Weight: 70 kg
Main Events: ${eventsLine}
Current Club: Norna-Salhus IL (Norway)
Coaching Team: Erlend Sæterstøl, Jørgen Homstad, Joakim Dang, Sondre Amundsen

=== MEDICAL & INJURY HISTORY ===
Primary diagnosis: Patellar tendinopathy (jumper's knee), left knee — onset January 2026 after a rapid ramp-up in sprint volume. Tolerates static/slow heavy loading well, but is highly sensitive to high-velocity stretch-shortening cycles (football, max sprinting). Doing daily targeted rehab.
NOTE: This is not the only issue — treat the live list below as the authoritative, current set of injuries, and weigh each one (per-injury pain is in the daily data).
Active issues (live from tracker):
${injBlock}
Latest Physio/Clinical Notes (live from tracker, newest first):
${physioBlock}

=== CURRENT ENVIRONMENT ===
Location: ${_envLocation}
Current Activities: ${_envActivities}

=== RECENT TRACKING DATA (LAST 7 DAYS) ===
${dayLines.join('\n')}

=== YOUR ROLE AS AN EXPERT SPRINT & REHAB COACH ===
Based strictly on sports science, tendon adaptation timelines, and my tracking data above:
1. ${_q1}
2. Give me a concrete recommendation for my training load TOMORROW.
3. Highlight any red flags I need to watch out for in my upcoming sessions.`;

    const ok = await writeClip(report);
    toast(ok ? t('ai.report_copied') : t('ai.report_copy_fail'));
  } catch (e) {
    toast(t('ai.report_copy_fail'));
  } finally {
    if (btn) btn.disabled = false;
  }
}

    const I = inj.data || [], K = knee.data || [], G = gym.data || [],
          S = sprint.data || [], A = act.data || [], IP = injPain.data || [];

    const loc = _lang === 'en' ? 'en-GB' : 'nb-NO';
    const fmtDM = ds => ds ? new Date(ds + 'T12:00:00').toLocaleDateString(loc, { day: '2-digit', month: 'short' }) : '–';
    // Notat-sammendrag: de to første setningene + «Provoserer:»/«Hjelper:»-
    // setninger uansett hvor de står i notatet. Setningsskille = .!? fulgt av
    // mellomrom (datoer som «01.06» splittes ikke).
    const noteSummary = raw => {
      const x = String(raw || '').trim();
      if (!x) return '';
      const sents = x.split(/(?<=[.!?])\s+/).map(s => s.trim()).filter(Boolean);
      const out = sents.slice(0, 2);
      sents.forEach(s => {
        if (/^(provoserer|hjelper|unngår|vurdert|rehab-progresjon|avoid|helps|aggravate|assessed)/i.test(s) && !out.includes(s)) out.push(s);
      });
      const res = out.join(' ');
      return res.length > 400 ? res.slice(0, 397) + '…' : res;
    };

    // Smerte siste 7 dager gruppert per skade (injury_id).
    const painByInj = {};
    IP.forEach(r => { (painByInj[r.injury_id] || (painByInj[r.injury_id] = [])).push(r); });
    // Maks per fase (før/under/etter/d.etter) over et sett rader.
    const phaseMax = rows => {
      const m = [null, null, null, null];
      rows.forEach(r => [r.before_score, r.during_score, r.after_score, r.day_after_score]
        .forEach((v, idx) => { if (v != null && (m[idx] == null || v > m[idx])) m[idx] = v; }));
      return m;
    };
    const fp = v => v == null ? '–' : v;

    const lines = I.map(i => {
      const part = t(i.body_part); // 'body.knee' → «Kne» / «Knee»
      const side = i.side ? ` (${t('inj.side_' + i.side)})` : '';
      const sev  = i.severity ? t('inj.sev_' + i.severity) + ', ' : '';
      const st   = t('inj.st_' + i.status);
      const head = `• ${part}${side} — ${sev}${st} ${t('inj.since')} ${fmtDM(i.start_date)}`;
      // Per-skade smerte. Legacy knee_pain KUN som fallback for kne hvis injury_pain mangler.
      let rows = painByInj[i.id] || [];
      if (!rows.length && /kne|knee/i.test(i.body_part)) rows = K;
      let painLine;
      if (rows.length) {
        const [b, d, a, da] = phaseMax(rows);
        painLine = t('diag.pain_line', { b: fp(b), d: fp(d), a: fp(a), da: fp(da) });
      } else {
        painLine = t('diag.pain_none');
      }
      const note = noteSummary(i.note);
      return [head, painLine, note].filter(Boolean).join('\n');
    });

    // Siste 7 dager: økter (sprint telles per dato), snitt-RPE
    const sprintDates = [...new Set(S.map(s => s.date))];
    const rpeByDate = {};
    S.forEach(s => { if (rpeByDate[s.date] == null && s.rpe != null) rpeByDate[s.date] = s.rpe; });
    const allRpe = [...G.map(g => g.rpe), ...sprintDates.map(d => rpeByDate[d]), ...A.map(a => a.rpe)].filter(v => v != null);
    const avgRpe = allRpe.length ? Math.round(allRpe.reduce((a, b) => a + b, 0) / allRpe.length) : null;

    const today = new Date().toLocaleDateString(loc, { day: '2-digit', month: 'short', year: 'numeric' });
    const msg = `${t('diag.header')} — Filip Lund, ${today}

${lines.length ? lines.join('\n\n') : t('diag.none')}

${t('diag.last7', { n: G.length + sprintDates.length + A.length, rpe: avgRpe ?? '–' })}`;

    const ok = await writeClip(msg);
    toast(ok ? t('ai.diag_copied') : t('ai.report_copy_fail'));
  } catch (e) {
    toast(t('ai.report_copy_fail'));
  } finally {
    if (btn) btn.disabled = false;
  }
}

// ── Kopier søvnanalyse: siste 14 netter med søvntid, legging, HRV, RHR, score ─
async function copySleepAnalysis() {
  const btn = document.getElementById('copySleepBtn');
  if (btn) btn.disabled = true;
  try {
    // middags-anker (lokal) så slice(0,10) gir riktig kalenderdag uansett tidssone (USA)
    const cutoff = new Date(); cutoff.setHours(12, 0, 0, 0); cutoff.setDate(cutoff.getDate() - 13);
    const cutoffStr = cutoff.toISOString().slice(0, 10);
    const { data } = await db.from('health_data')
      .select('date,sleep_hours,sleep_start,sleep_end,deep_sleep_minutes,rem_sleep_minutes,light_sleep_minutes,awake_minutes,hrv,rhr,sleep_score')
      .gte('date', cutoffStr).order('date');
    const rows = (data || []).filter(r => r.sleep_hours || r.sleep_score || r.hrv);
    if (!rows.length) { toast(t('ai.report_copy_fail')); return; }

    const loc = _lang === 'en' ? 'en-GB' : 'nb-NO';
    const fmtDM = ds => new Date(ds + 'T12:00:00').toLocaleDateString(loc, { day: '2-digit', month: 'short' });
    const avg = arr => { const v = arr.filter(x => x != null); return v.length ? Math.round(v.reduce((a,b)=>a+b,0)/v.length*10)/10 : null; };
    const pct = (min, total) => total > 0 ? Math.round(min / total * 100) : null;

    const avgHours  = avg(rows.map(r => r.sleep_hours));
    const avgScore  = avg(rows.map(r => r.sleep_score));
    const avgHrv    = avg(rows.map(r => r.hrv));
    const avgRhr    = avg(rows.map(r => r.rhr));

    // Snitt søvnlegging og oppvåkning (fra sleep_start/sleep_end som "HH:MM")
    const toMins = t => { if (!t) return null; const [h,m] = t.split(':').map(Number); return (h < 12 ? h + 24 : h) * 60 + m; };
    const toTime = m => { const hh = Math.round(m) % (24*60); return `${String(Math.floor(hh/60)%24).padStart(2,'0')}:${String(hh%60).padStart(2,'0')}`; };
    const bedtimeMins  = rows.map(r => toMins(r.sleep_start)).filter(x => x != null);
    const wakeTimeMins = rows.map(r => r.sleep_end ? (parseInt(r.sleep_end)*60 + parseInt(r.sleep_end.split(':')[1])) : null).filter(x => x != null);
    const avgBedtime = bedtimeMins.length ? toTime(avg(bedtimeMins)) : null;
    const avgWake    = wakeTimeMins.length ? toTime(avg(wakeTimeMins)) : null;

    // Spredning i søvnlegging (max - min) som mål på uregelmessig døgnrytme
    const bedSpread = bedtimeMins.length > 1 ? Math.round(Math.max(...bedtimeMins) - Math.min(...bedtimeMins)) : null;
    const spreadNote = bedSpread != null
      ? (_lang === 'en'
          ? (bedSpread > 90 ? `Bedtime varies up to ${Math.round(bedSpread/60*10)/10}h — irregular circadian rhythm.`
            : bedSpread > 45 ? `Bedtime varies ~${Math.round(bedSpread/60*10)/10}h — mild irregularity.`
            : 'Bedtime is consistent — good circadian regularity.')
          : (bedSpread > 90 ? `Søvnlegging varierer opptil ${Math.round(bedSpread/60*10)/10}t — uregelmessig døgnrytme.`
            : bedSpread > 45 ? `Søvnlegging varierer ~${Math.round(bedSpread/60*10)/10}t — mild uregelmessighet.`
            : 'Jevn søvnlegging — god døgnrytme.'))
      : '';

    // Arkitektur-snitt
    const deepAvgPct = avg(rows.map(r => {
      const tot = (r.deep_sleep_minutes||0)+(r.rem_sleep_minutes||0)+(r.light_sleep_minutes||0);
      return tot > 0 ? pct(r.deep_sleep_minutes||0, tot) : null;
    }));
    const remAvgPct = avg(rows.map(r => {
      const tot = (r.deep_sleep_minutes||0)+(r.rem_sleep_minutes||0)+(r.light_sleep_minutes||0);
      return tot > 0 ? pct(r.rem_sleep_minutes||0, tot) : null;
    }));

    // Per-natt-tabell: siste 14 netter
    const hLabel  = _lang === 'en' ? 'h' : 't';
    const nightLines = rows.map(r => {
      const hoursStr = r.sleep_hours ? `${Math.floor(r.sleep_hours)}${hLabel}${String(Math.round((r.sleep_hours%1)*60)).padStart(2,'0')}` : '–';
      const bedStr   = r.sleep_start ? r.sleep_start.slice(0,5) : '–';
      const wakeStr  = r.sleep_end   ? r.sleep_end.slice(0,5)   : '–';
      const scoreStr = r.sleep_score != null ? `score ${r.sleep_score}` : '';
      const hrvStr   = r.hrv  != null ? `HRV ${r.hrv}` : '';
      const rhrStr   = r.rhr  != null ? `RHR ${r.rhr}` : '';
      const parts    = [hoursStr, bedStr !== '–' ? `🛌${bedStr}` : '', wakeStr !== '–' ? `⏰${wakeStr}` : '', scoreStr, hrvStr, rhrStr].filter(Boolean);
      return `  ${fmtDM(r.date)}: ${parts.join(' · ')}`;
    }).join('\n');

    const en = _lang === 'en';
    const header = en
      ? `Sleep Analysis — Filip Lund, ${new Date().toLocaleDateString('en-GB', {day:'2-digit',month:'short',year:'numeric'})}`
      : `Søvnanalyse — Filip Lund, ${new Date().toLocaleDateString('nb-NO', {day:'2-digit',month:'short',year:'numeric'})}`;

    const summaryLabel = en ? `Last ${rows.length} nights (${fmtDM(rows[0].date)} – ${fmtDM(rows[rows.length-1].date)}):` : `Siste ${rows.length} netter (${fmtDM(rows[0].date)} – ${fmtDM(rows[rows.length-1].date)}):`;
    const avgLine = [
      avgHours != null ? (en ? `Avg sleep: ${Math.floor(avgHours)}h${String(Math.round((avgHours%1)*60)).padStart(2,'0')}` : `Snitt søvntid: ${Math.floor(avgHours)}t${String(Math.round((avgHours%1)*60)).padStart(2,'0')}`) : null,
      avgScore != null ? (en ? `Avg score: ${avgScore}/100` : `Snitt score: ${avgScore}/100`) : null,
      avgHrv   != null ? `HRV ${avgHrv} ms` : null,
      avgRhr   != null ? (en ? `RHR ${avgRhr} bpm` : `Hvilepuls ${avgRhr}`) : null,
    ].filter(Boolean).join(' · ');

    const timingLine = [
      avgBedtime ? (en ? `Avg bedtime: ${avgBedtime}` : `Snitt legging: ${avgBedtime}`) : null,
      avgWake    ? (en ? `Avg wake: ${avgWake}`    : `Snitt oppvåkning: ${avgWake}`) : null,
    ].filter(Boolean).join(' · ');

    const archLine = (deepAvgPct != null || remAvgPct != null)
      ? (en ? `Architecture: deep ${deepAvgPct ?? '–'}% · REM ${remAvgPct ?? '–'}%`
            : `Arkitektur: dyp ${deepAvgPct ?? '–'}% · REM ${remAvgPct ?? '–'}%`)
      : '';

    const nightsLabel = en ? 'Nightly breakdown:' : 'Natt for natt:';
    const msg = [header, '', summaryLabel, avgLine, timingLine, archLine, spreadNote, '', nightsLabel, nightLines]
      .filter(l => l !== null && l !== undefined).join('\n');

    const ok = await writeClip(msg);
    toast(ok ? t('ai.sleep_copied') : t('ai.report_copy_fail'));
  } catch (e) {
    console.error(e);
    toast(t('ai.report_copy_fail'));
  } finally {
    if (btn) btn.disabled = false;
  }
}

  applyLang();
  document.querySelectorAll('.msg-user .msg-label').forEach(e => e.textContent = t('ai.you'));
  document.querySelectorAll('.msg-ai:not(.msg-loading) .msg-label').forEach(e => e.textContent = t('ai.title'));
  renderWsList();                              // ukeliste på nytt språk
  if (wsOpenWeek) openWsModal(wsOpenWeek);     // åpen rapport bytter språk
};
