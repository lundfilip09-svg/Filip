<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gjøremål</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .lists-bar {
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    }
    .list-chip {
      padding: 6px 14px; border-radius: 20px; font-size: 12px;
      font-family: var(--font-mono); cursor: pointer; transition: all 0.15s;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      color: var(--text-tertiary); white-space: nowrap;
    }
    .list-chip.active { background: rgba(91,164,245,0.15); border-color: rgba(91,164,245,0.3); color: #5BA4F5; }
    .list-chip:hover:not(.active) { background: rgba(255,255,255,0.08); color: var(--text-secondary); }
    .list-del-btn {
      background: none; border: none; color: var(--text-tertiary); cursor: pointer;
      font-size: 12px; padding: 2px 4px; opacity: 0; transition: opacity 0.15s;
    }
    .list-chip-wrap { position: relative; display: flex; align-items: center; gap: 2px; }
    .list-chip-wrap:hover .list-del-btn { opacity: 1; }
    .list-del-btn:hover { color: var(--danger); }
    .add-list-row { display: flex; gap: 6px; }
    .add-list-row input { width: 160px; flex: none; }
    .add-todo-row { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .add-todo-row input[type="text"] { flex: 1; min-width: 180px; }
    .add-todo-row input[type="date"] { width: 140px; flex: none; }
    .todo-count { font-size: 10px; font-family: var(--font-mono); color: var(--text-tertiary); margin-left: auto; }
    .filter-row { display: flex; gap: 6px; margin-bottom: 10px; }
    .filter-btn {
      font-size: 10px; font-family: var(--font-mono); padding: 3px 10px;
      border-radius: 6px; cursor: pointer; border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03); color: var(--text-tertiary); transition: all 0.15s;
    }
    .filter-btn.active { background: rgba(255,255,255,0.1); color: var(--text-secondary); border-color: rgba(255,255,255,0.2); }
  </style>
</head>
<body>

<nav class="main-nav">
  <div class="nav-inner">
    <div class="nav-tabs">
      <a href="dashboard.html" class="nav-tab" data-p="dashboard">Dashboard</a>
      <a href="gym.html"       class="nav-tab" data-p="gym">Gym</a>
      <a href="sprint.html"    class="nav-tab" data-p="sprint">Sprint</a>
      <a href="sovn.html"      class="nav-tab" data-p="sovn">Søvn</a>
      <a href="gjoremal.html"  class="nav-tab" data-p="gjoremal">Gjøremål</a>
    </div>
  </div>
</nav>

<main class="page">

  <!-- Lists bar -->
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap">
      <div class="lists-bar" id="listsBar">
        <div class="loading">Laster…</div>
      </div>
      <div class="add-list-row">
        <input class="input-sm" id="newListName" type="text" placeholder="Ny liste…" style="width:150px" onkeydown="if(event.key==='Enter')addList()">
        <button class="btn btn-ghost btn-sm" onclick="addList()">+</button>
      </div>
    </div>
  </div>

  <!-- Todos -->
  <div class="card">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap">
      <div class="section-title" style="margin-bottom:0;flex:1" id="listHeading">Gjøremål</div>
      <span class="todo-count" id="todoCount"></span>
    </div>

    <!-- Add todo -->
    <div class="add-todo-row">
      <input type="text" id="todoTitle" placeholder="Nytt gjøremål…" onkeydown="if(event.key==='Enter')addTodo()">
      <input type="date" id="todoDue">
      <button class="star-btn" id="newImportant" onclick="toggleNewImportant()" title="Viktig">☆</button>
      <button class="btn btn-primary btn-sm" onclick="addTodo()">Legg til</button>
    </div>

    <!-- Filters -->
    <div class="filter-row">
      <button class="filter-btn active" data-filter="active"  onclick="setFilter('active')">Aktive</button>
      <button class="filter-btn"        data-filter="all"     onclick="setFilter('all')">Alle</button>
      <button class="filter-btn"        data-filter="important" onclick="setFilter('important')">Viktige</button>
      <button class="filter-btn"        data-filter="done"    onclick="setFilter('done')">Fullførte</button>
    </div>

    <!-- List -->
    <div id="todoList"><div class="empty">Ingen gjøremål</div></div>
  </div>

</main>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="config.js"></script>
<script>
const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
document.querySelector('[data-p="gjoremal"]').classList.add('active');

let _tt;
function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `toast ${type} show`;
  clearTimeout(_tt); _tt = setTimeout(() => el.classList.remove('show'), 3000);
}
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function today() { return new Date().toISOString().slice(0, 10); }
function fmtDate(ds) {
  if (!ds) return '';
  const d = new Date(ds + 'T12:00:00');
  return d.toLocaleDateString('no-NO', { day:'numeric', month:'short' });
}

// ── State ─────────────────────────────────────────────────────────────────
let lists       = ['Generelt'];
let activeList  = 'Generelt';
let allTodos    = [];
let filter      = 'active';
let newImportant = false;

// ── Auto-clean ────────────────────────────────────────────────────────────
async function autoClean() {
  const todayStart = today() + 'T00:00:00.000Z';
  await db.from('todos').delete().eq('completed', true).lt('completed_at', todayStart);
}

// ── Lists ─────────────────────────────────────────────────────────────────
async function loadLists() {
  const { data } = await db.from('todos').select('list_name');
  const fromDb = [...new Set((data || []).map(t => t.list_name))];
  const defaultLists = ['Generelt', 'Trening', 'Skole'];
  lists = [...new Set([...defaultLists, ...fromDb])];
  renderListsBar();
}

function renderListsBar() {
  const bar = document.getElementById('listsBar');
  bar.innerHTML = lists.map(l => `
    <div class="list-chip-wrap">
      <div class="list-chip ${l===activeList?'active':''}" onclick="selectList('${escHtml(l)}')">${escHtml(l)}</div>
      ${l !== 'Generelt' ? `<button class="list-del-btn" onclick="deleteList('${escHtml(l)}')" title="Slett liste">✕</button>` : ''}
    </div>
  `).join('');
}

function selectList(name) {
  activeList = name;
  renderListsBar();
  document.getElementById('listHeading').textContent = name;
  renderTodos();
}

async function addList() {
  const name = document.getElementById('newListName').value.trim();
  if (!name || lists.includes(name)) return;
  lists.push(name);
  document.getElementById('newListName').value = '';
  selectList(name);
}

async function deleteList(name) {
  if (!confirm(`Slett listen "${name}" og alle dens gjøremål?`)) return;
  await db.from('todos').delete().eq('list_name', name);
  lists = lists.filter(l => l !== name);
  if (activeList === name) activeList = lists[0] || 'Generelt';
  renderListsBar();
  await loadTodos();
  toast(`"${name}" slettet`);
}

// ── Todos ─────────────────────────────────────────────────────────────────
async function loadTodos() {
  const { data } = await db.from('todos')
    .select('*').order('important', { ascending: false })
    .order('due_date', { ascending: true, nullsLast: true })
    .order('created_at', { ascending: false });
  allTodos = data || [];
  renderTodos();
}

function renderTodos() {
  const el  = document.getElementById('todoList');
  let items = allTodos.filter(t => t.list_name === activeList);

  if (filter === 'active')    items = items.filter(t => !t.completed);
  else if (filter === 'done') items = items.filter(t => t.completed);
  else if (filter === 'important') items = items.filter(t => t.important && !t.completed);

  document.getElementById('todoCount').textContent =
    `${items.filter(t=>!t.completed).length} aktive`;

  if (!items.length) {
    el.innerHTML = '<div class="empty">Ingen gjøremål her</div>'; return;
  }

  el.innerHTML = items.map(t => {
    const due = t.due_date ? new Date(t.due_date + 'T12:00:00') : null;
    const isOverdue = due && due < new Date() && !t.completed;
    return `<div class="todo-item ${t.important?'important':''} ${t.completed?'done':''}">
      <div class="todo-cb ${t.completed?'checked':''}" onclick="toggleTodo('${t.id}',${t.completed})"></div>
      <span class="todo-text ${t.completed?'done-text':''}">${escHtml(t.title)}</span>
      ${t.due_date ? `<span class="todo-due ${isOverdue?'overdue':''}">${fmtDate(t.due_date)}</span>` : ''}
      <button class="star-btn ${t.important?'active':''}" onclick="toggleImportant('${t.id}',${t.important})" title="Viktig">
        ${t.important ? '★' : '☆'}
      </button>
      <button class="todo-del" onclick="deleteTodo('${t.id}')">✕</button>
    </div>`;
  }).join('');
}

// ── Filter ────────────────────────────────────────────────────────────────
function setFilter(f) {
  filter = f;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.filter === f);
  });
  renderTodos();
}

// ── Add todo ──────────────────────────────────────────────────────────────
function toggleNewImportant() {
  newImportant = !newImportant;
  const btn = document.getElementById('newImportant');
  btn.textContent = newImportant ? '★' : '☆';
  btn.style.color = newImportant ? 'var(--warning)' : '';
}

async function addTodo() {
  const title = document.getElementById('todoTitle').value.trim();
  const due   = document.getElementById('todoDue').value || null;
  if (!title) return;

  const { data, error } = await db.from('todos').insert({
    title, list_name: activeList, due_date: due, important: newImportant,
  }).select().single();
  if (error) { toast('Feil ved lagring', 'err'); return; }

  allTodos.unshift(data);
  document.getElementById('todoTitle').value = '';
  document.getElementById('todoDue').value   = '';
  newImportant = false;
  document.getElementById('newImportant').textContent = '☆';
  document.getElementById('newImportant').style.color = '';
  renderTodos();
  toast('Lagt til');
}

// ── Toggle complete ───────────────────────────────────────────────────────
async function toggleTodo(id, isDone) {
  const newDone = !isDone;
  await db.from('todos').update({
    completed: newDone,
    completed_at: newDone ? new Date().toISOString() : null,
  }).eq('id', id);
  const t = allTodos.find(x => x.id === id);
  if (t) { t.completed = newDone; t.completed_at = newDone ? new Date().toISOString() : null; }
  renderTodos();
}

// ── Toggle important ──────────────────────────────────────────────────────
async function toggleImportant(id, isImportant) {
  await db.from('todos').update({ important: !isImportant }).eq('id', id);
  const t = allTodos.find(x => x.id === id);
  if (t) t.important = !isImportant;
  renderTodos();
}

// ── Delete ────────────────────────────────────────────────────────────────
async function deleteTodo(id) {
  await db.from('todos').delete().eq('id', id);
  allTodos = allTodos.filter(x => x.id !== id);
  renderTodos();
  toast('Slettet');
}

// ── Init ──────────────────────────────────────────────────────────────────
(async () => {
  await autoClean();
  await Promise.all([loadLists(), loadTodos()]);
})();
</script>
</body>
</html>
