<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="icon" href="/favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="/favicon.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#050506">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Dashboard">
  <title>Dashboard</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* ── Nav slim ── */
    .nav-tab { padding: 10px 14px !important; }

    /* ── Root shell: sidebar + content ── */
    .gm-shell {
      display: grid;
      grid-template-columns: 220px 1fr;
      min-height: calc(100vh - 42px);
      max-width: 1400px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    /* ═══ SIDEBAR ═══════════════════════════════════════════ */
    .gm-sidebar {
      border-right: 1px solid rgba(255,255,255,0.05);
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 42px;
      height: calc(100vh - 42px);
      overflow-y: auto;
    }

    .gm-sb-head {
      padding: 30px 20px 22px;
    }
    .gm-sb-title {
      display: block;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      margin-bottom: 3px;
    }
    .gm-sb-sub {
      font-size: 10px;
      font-family: var(--font-mono);
      color: var(--text-tertiary);
      letter-spacing: 0.04em;
    }

    .gm-sb-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 0 14px 22px;
    }
    .gm-ss {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 10px;
      padding: 12px 13px;
    }
    .gm-ss-val {
      font-size: 20px;
      font-weight: 700;
      font-family: var(--font-mono);
      letter-spacing: -0.04em;
      line-height: 1;
      margin-bottom: 4px;
      color: var(--text-primary);
    }
    .gm-ss-val.warning { color: var(--warning); }
    .gm-ss-lbl {
      font-size: 9px;
      font-family: var(--font-mono);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-tertiary);
    }

    .gm-sb-section {
      font-size: 9px;
      font-family: var(--font-mono);
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--text-tertiary);
      padding: 0 20px 7px;
    }

    .gm-list-nav {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0 8px;
      overflow-y: auto;
      gap: 1px;
    }

    /* Rendered by JS */
    .gm-li {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-tertiary);
      transition: all 0.12s;
      user-select: none;
    }
    .gm-li:hover  { background: rgba(255,255,255,0.05); color: var(--text-secondary); }
    .gm-li.active { background: rgba(91,164,245,0.1);   color: var(--text-primary); }
    /* "+" ny liste-fane — vises kun på mobil (desktop bruker input i sidebar) */
    .gm-li-add {
      display: none;
      flex-shrink: 0;
      align-items: center;
      justify-content: center;
      width: 32px; height: 32px;
      padding: 0;
      border: 1px dashed rgba(91,164,245,0.4);
      border-radius: 8px;
      background: rgba(91,164,245,0.08);
      color: #5BA4F5;
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
    }
    .gm-li-add:active { background: rgba(91,164,245,0.18); }
    .gm-li-name { flex: 1; }
    .gm-li-count {
      font-size: 10px;
      font-family: var(--font-mono);
      color: var(--text-tertiary);
      background: rgba(255,255,255,0.06);
      padding: 1px 7px;
      border-radius: 8px;
      flex-shrink: 0;
      min-width: 22px;
      text-align: center;
    }
    .gm-li.active .gm-li-count { background: rgba(91,164,245,0.15); color: #5BA4F5; }
    .gm-li-del, .gm-li-edit {
      opacity: 0;
      background: none;
      border: none;
      color: var(--text-tertiary);
      cursor: pointer;
      font-size: 10px;
      padding: 2px 4px;
      border-radius: 4px;
      transition: all 0.12s;
      line-height: 1;
    }
    .gm-li:hover .gm-li-del, .gm-li:hover .gm-li-edit { opacity: 0.6; }
    .gm-li-del:hover { color: var(--danger) !important; opacity: 1 !important; }
    .gm-li-edit:hover { color: var(--text-secondary) !important; opacity: 1 !important; }
    @media (hover: none) { .gm-li-del, .gm-li-edit { opacity: 0.4; } } /* alltid synlig på touch */

    .gm-new-list-wrap {
      padding: 12px 8px 20px;
      border-top: 1px solid rgba(255,255,255,0.05);
      margin-top: 8px;
      display: flex;
      gap: 6px;
    }
    .gm-new-list-wrap input {
      flex: 1;
      font-size: 12px !important;
      padding: 6px 10px !important;
    }

    /* ═══ MAIN ═══════════════════════════════════════════════ */
    .gm-main {
      padding: 36px 52px 80px;
      display: flex;
      flex-direction: column;
      gap: 28px;
      min-width: 0;
    }

    /* Page header */
    .gm-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
    }
    .gm-page-title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.035em;
      color: var(--text-primary);
      line-height: 1;
      margin-bottom: 6px;
    }
    .gm-page-sub {
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--text-tertiary);
    }
    .gm-header-date {
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--text-tertiary);
      text-align: right;
      flex-shrink: 0;
    }

    /* Stats overview */
    .gm-stat-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }
    .gm-sc {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 16px 18px;
    }
    .gm-sc-val {
      font-size: 28px;
      font-weight: 700;
      font-family: var(--font-mono);
      letter-spacing: -0.05em;
      line-height: 1;
      color: var(--text-primary);
      margin-bottom: 5px;
    }
    .gm-sc-val.blue    { color: var(--accent-blue); }
    .gm-sc-val.warning { color: var(--warning); }
    .gm-sc-val.success { color: var(--success); }
    .gm-sc-val.danger  { color: var(--danger); }
    .gm-sc-lbl {
      font-size: 9px;
      font-family: var(--font-mono);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-tertiary);
    }

    /* Quick-add command panel */
    .gm-add-panel {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      overflow: hidden;
      transition: border-color 0.18s, box-shadow 0.18s;
    }
    .gm-add-panel:focus-within {
      border-color: rgba(91,164,245,0.35);
      box-shadow: 0 0 0 3px rgba(91,164,245,0.07);
    }
    .gm-add-top {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 5px 18px;
    }
    .gm-add-ghost-cb {
      width: 20px;
      height: 20px;
      border-radius: 5px;
      border: 1.5px solid rgba(255,255,255,0.14);
      flex-shrink: 0;
    }
    .gm-add-top #todoTitle {
      flex: 1;
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
      font-size: 15px !important;
      padding: 14px 4px !important;
      color: var(--text-primary) !important;
      outline: none !important;
      min-width: 0;
      width: auto !important;
    }
    .gm-add-top #todoTitle::placeholder { color: var(--text-tertiary); }
    .gm-add-bottom {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      padding: 10px 18px;
      border-top: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.015);
    }
    .gm-add-bottom #todoDue,
    .gm-add-bottom #todoRemind { display: none; }
    .add-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.12);
      background: transparent;
      color: var(--text-secondary);
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .add-chip:hover {
      background: rgba(255,255,255,0.07);
      color: var(--text-primary);
    }
    .add-chip.active {
      background: rgba(91,164,245,0.15);
      border-color: rgba(91,164,245,0.4);
      color: var(--accent);
    }
    .todo-edit-date { color-scheme: dark; }
    .gm-add-spacer { flex: 1; }

    /* Task list */
    .gm-list-block { display: flex; flex-direction: column; }
    .gm-list-toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .filter-row { display: flex; gap: 4px; flex: 1; }
    .filter-btn {
      font-size: 11px;
      font-family: var(--font-mono);
      padding: 5px 13px;
      border-radius: 8px;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      color: var(--text-tertiary);
      transition: all 0.12s;
    }
    .filter-btn.active {
      background: rgba(255,255,255,0.09);
      color: var(--text-primary);
      border-color: rgba(255,255,255,0.16);
    }
    .filter-btn:hover:not(.active) {
      background: rgba(255,255,255,0.06);
      color: var(--text-secondary);
    }
    .gm-count-text {
      font-size: 10px;
      font-family: var(--font-mono);
      color: var(--text-tertiary);
      flex-shrink: 0;
    }

    /* Redesigned todo rows */
    .todo-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 13px 16px;
      border-radius: 10px;
      margin-bottom: 4px;
      background: rgba(255,255,255,0.025);
      border-left: 2px solid transparent;
      transition: background 0.12s;
      min-height: 54px;
    }
    .todo-item:hover  { background: rgba(255,255,255,0.05); }
    .todo-item.important { border-left-color: var(--warning); }
    .todo-item.done   { opacity: 0.38; }

    .todo-cb {
      width: 20px; height: 20px;
      border-radius: 5px;
      border: 1.5px solid rgba(255,255,255,0.18);
      flex-shrink: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .todo-cb:hover { border-color: rgba(255,255,255,0.4); }
    .todo-cb.checked { background: var(--success); border-color: var(--success); }
    .todo-cb.checked::after { content: '✓'; font-size: 11px; color: #050506; font-weight: 700; }

    .todo-body { flex: 1; min-width: 0; }
    .todo-text {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      line-height: 1.3;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }
    .todo-text.done-text {
      text-decoration: line-through;
      color: var(--text-tertiary);
      font-weight: 400;
    }
    .todo-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 3px;
    }
    .todo-due {
      font-size: 10px;
      font-family: var(--font-mono);
      color: var(--text-tertiary);
    }
    .todo-due.overdue { color: var(--danger); }

    .todo-actions {
      display: flex;
      align-items: center;
      gap: 2px;
      flex-shrink: 0;
    }
    .star-btn {
      background: none; border: none;
      cursor: pointer; font-size: 16px;
      color: rgba(255,255,255,0.12);
      transition: color 0.12s;
      padding: 5px; line-height: 1;
    }
    .star-btn:hover { color: rgba(255,255,255,0.4); }
    .star-btn.active { color: var(--warning); }
    .todo-del {
      background: none; border: none;
      cursor: pointer; font-size: 12px;
      color: var(--text-tertiary);
      opacity: 0;
      transition: opacity 0.12s;
      padding: 5px 6px;
    }
    .todo-item:hover .todo-del { opacity: 0.6; }
    .todo-del:hover { color: var(--danger); opacity: 1 !important; }
    @media (hover: none) { .todo-del { opacity: 0.4; } } /* alltid synlig på touch */

    /* ── Drag & drop ── */
    .drag-handle {
      cursor: grab;
      color: rgba(255,255,255,0.18);
      font-size: 14px;
      flex-shrink: 0;
      padding: 0 3px;
      opacity: 0;
      transition: opacity 0.12s;
      user-select: none;
      line-height: 1;
    }
    .todo-item:hover .drag-handle { opacity: 1; }
    .drag-handle:active { cursor: grabbing; }
    .todo-item.dragging {
      opacity: 0.3;
      border-left-color: transparent !important;
    }
    .todo-item.drag-before {
      border-top: 2px solid rgba(91,164,245,0.65);
      margin-top: -1px;
    }
    .todo-item.drag-after {
      border-bottom: 2px solid rgba(91,164,245,0.65);
      margin-bottom: -1px;
    }

    /* ── List-sidebar drag (reuses same classes) ── */
    .gm-li:hover .drag-handle { opacity: 1; }
    .gm-li.dragging { opacity: 0.3; }
    .gm-li.drag-before {
      border-top: 2px solid rgba(91,164,245,0.65);
      margin-top: -1px;
    }
    .gm-li.drag-after {
      border-bottom: 2px solid rgba(91,164,245,0.65);
      margin-bottom: -1px;
    }
    @media (max-width: 720px) { .gm-li .drag-handle { display: none; } }

    /* ── Mobil: rediger-modus for lister (long-press) ── */
    .gm-li, .gm-li * {
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    .gm-list-edit-bar {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 8px 14px 0;
      font-size: 10px;
      font-family: var(--font-mono);
      color: var(--text-tertiary);
    }
    .gm-list-edit-bar .gm-le-hint { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .gm-le-done {
      flex-shrink: 0;
      border: 1px solid rgba(91,164,245,0.4);
      background: rgba(91,164,245,0.12);
      color: #5BA4F5;
      border-radius: 8px;
      padding: 5px 14px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .gm-list-nav.editing { animation: gmEditPulse 1.6s ease-in-out infinite; }
    @keyframes gmEditPulse { 0%,100%{opacity:1} 50%{opacity:0.82} }
    .gm-list-nav.editing .gm-li {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(91,164,245,0.25);
    }
    .gm-list-nav.editing .gm-li.active { border-color: rgba(91,164,245,0.5); }
    /* Vis slett/endre-knapper i rediger-modus (overstyrer mobil-skjuling) */
    .gm-list-nav.editing .gm-li-del,
    .gm-list-nav.editing .gm-li-edit {
      display: inline-flex !important;
      align-items: center;
      opacity: 0.95;
      font-size: 12px;
      padding: 3px 5px;
    }
    .gm-list-nav.editing .gm-li.dragging { opacity: 0.45; transform: scale(0.96); }
    /* Horisontale innsettings-indikatorer (chip-rad ligger vannrett på mobil) */
    .gm-list-nav.editing .gm-li.drag-before {
      border-top: none; margin-top: 0;
      border-left: 2px solid rgba(91,164,245,0.8); margin-left: -1px;
    }
    .gm-list-nav.editing .gm-li.drag-after {
      border-bottom: none; margin-bottom: 0;
      border-right: 2px solid rgba(91,164,245,0.8); margin-right: -1px;
    }
    body.gm-editing-lists .gm-list-edit-bar { display: flex; }

    /* ── Responsive ── */
    @media (max-width: 960px) {
      .gm-shell { grid-template-columns: 196px 1fr; }
      .gm-main  { padding: 28px 32px 60px; }
      .gm-stat-row { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 720px) {
      .gm-shell {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
      }
      .gm-sidebar {
        position: static;
        height: auto;
        border-right: none;
        border-bottom: 1px solid rgba(255,255,255,0.05);
      }
      .gm-sb-head    { padding: 20px 16px 10px; }
      .gm-sb-stats   { display: none; }
      .gm-sb-section { display: none; }
      .gm-list-nav {
        flex-direction: row;
        flex-wrap: nowrap;
        overflow-x: auto;
        padding: 0 12px 10px;
        gap: 4px;
      }
      .gm-li { white-space: nowrap; flex-shrink: 0; padding: 6px 12px; }
      .gm-li-del, .gm-li-edit { display: none !important; }
      .gm-li-add { display: inline-flex; }
      .gm-new-list-wrap { display: none; }
      .gm-main  { padding: 20px 16px 60px; }
      .gm-page-title { font-size: 22px; }
      .gm-stat-row { grid-template-columns: repeat(2, 1fr); gap: 8px; }
      .gm-add-bottom { flex-wrap: wrap; }
    }
    @media (max-width: 480px) {
      .gm-stat-row { grid-template-columns: repeat(2, 1fr); }
      .gm-add-top  { padding: 4px 14px; }
      .gm-add-bottom { padding: 8px 14px; }
      .gm-page-title { font-size: 20px; }
    }

    /* ── Inline editing ── */
    .todo-text:not(.done-text) { cursor: pointer; }
    @media (hover: hover) {
      .todo-text:not(.done-text):hover {
        background: rgba(255,255,255,0.05);
        border-radius: 4px;
        padding: 1px 5px;
        margin: -1px -5px;
      }
    }
    .todo-due { cursor: pointer; }
    .todo-due:hover {
      background: rgba(255,255,255,0.07);
      border-radius: 3px;
      padding: 1px 4px;
      margin: -1px -4px;
    }
    .todo-add-date {
      font-size: 10px;
      font-family: var(--font-mono);
      color: var(--text-tertiary);
      opacity: 0;
      cursor: pointer;
      transition: opacity 0.12s;
      padding: 1px 4px;
      border-radius: 3px;
    }
    .todo-item:hover .todo-add-date { opacity: 0.4; }
    .todo-add-date:hover { opacity: 1 !important; color: var(--accent-blue); }
    .todo-quick {
      font-size: 10px;
      font-family: var(--font-mono);
      color: var(--text-tertiary);
      opacity: 0;
      cursor: pointer;
      transition: opacity 0.12s, background 0.12s, color 0.12s;
      padding: 1px 6px;
      border-radius: 3px;
      border: 1px solid transparent;
    }
    .todo-item:hover .todo-quick { opacity: 0.55; }
    .todo-quick:hover { opacity: 1 !important; color: var(--accent-blue); background: rgba(91,164,245,0.10); }
    .todo-quick.on {
      opacity: 1;
      color: var(--accent-blue);
      background: rgba(91,164,245,0.15);
      border-color: rgba(91,164,245,0.40);
    }
    /* Mykere fullføring: ikke brå forsvinning */
    .todo-item.completing {
      opacity: 0;
      transform: translateX(8px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .todo-item.completing .todo-text { text-decoration: line-through; }
    /* Touch-enheter (iPhone): ingen hover → vis kontroller alltid + ett trykk = handling */
    @media (hover: none) {
      /* Skjul alle dato/påminnelse-snarveier og knapper på mobil.
         Detalj-modal håndterer alt dette — ett trykk på raden åpner den. */
      .todo-quick, .todo-item:hover .todo-quick { opacity: 0; pointer-events: none; }
      .todo-add-date, .todo-item:hover .todo-add-date { opacity: 0; pointer-events: none; }
      .todo-remind, .todo-item:hover .todo-remind,
      .todo-add-remind, .todo-item:hover .todo-add-remind { display: none; }
      .todo-del, .todo-item:hover .todo-del { opacity: 0.5; }
      .drag-handle, .todo-item:hover .drag-handle { opacity: 0.4; }
      /* nøytraliser rad-/tekst-hover så Safari ikke krever to trykk */
      .todo-item:hover { background: transparent; }
      .todo-text:not(.done-text):hover { background: transparent; padding: 0; margin: 0; }
    }
    .todo-remind {
      font-size: 10px;
      font-family: var(--font-mono);
      color: var(--accent-blue);
      cursor: pointer;
      padding: 1px 4px;
      border-radius: 3px;
    }
    .todo-remind:hover { background: rgba(255,255,255,0.07); }
    .todo-add-remind {
      font-size: 10px;
      font-family: var(--font-mono);
      color: var(--text-tertiary);
      opacity: 0;
      cursor: pointer;
      transition: opacity 0.12s;
      padding: 1px 4px;
      border-radius: 3px;
    }
    .todo-item:hover .todo-add-remind { opacity: 0.4; }
    .todo-add-remind:hover { opacity: 1 !important; color: var(--accent-blue); }
    .todo-edit-input {
      background: rgba(255,255,255,0.06) !important;
      border: 1px solid rgba(91,164,245,0.35) !important;
      border-radius: 4px !important;
      color: var(--text-primary) !important;
      font-size: 14px !important;
      font-weight: 500 !important;
      font-family: inherit !important;
      padding: 2px 6px !important;
      outline: none !important;
      width: 100%;
      box-sizing: border-box;
      box-shadow: 0 0 0 2px rgba(91,164,245,0.08) !important;
    }
    .todo-edit-date {
      background: rgba(255,255,255,0.06) !important;
      border: 1px solid rgba(91,164,245,0.35) !important;
      border-radius: 3px !important;
      color: var(--text-tertiary) !important;
      font-size: 10px !important;
      font-family: var(--font-mono) !important;
      padding: 1px 5px !important;

    /* ── Detalj-modal ── */
    .dt-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; backdrop-filter: blur(4px); padding: 16px;

    .dt-overlay.hidden { display: none; }
    .dt-modal {
      background: #0e0e10; border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px; padding: 22px 24px 24px; width: 100%; max-width: 460px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.6);

    }
    .dt-hd {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px;
    }
    .dt-hd-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .dt-eyebrow {
      font-size: 9px; font-family: var(--font-mono); text-transform: uppercase;
      letter-spacing: 0.14em; color: var(--text-tertiary);
    }
    .dt-close {
      background: none; border: none; color: var(--text-tertiary);

    .dt-cb {

    .dt-cb:hover { border-color: rgba(255,255,255,0.45); }
    .dt-cb.checked { background: var(--success); border-color: var(--success); }
    .dt-cb.checked::after { content: '✓'; font-size: 13px; color: #050506; font-weight: 700; }
    .dt-title {
      width: 100%; box-sizing: border-box;

    @media (max-width: 720px) {
      .dt-field-clear {
        display: block; width: 100%; box-sizing: border-box;
        margin: 8px 0 0; padding: 11px 16px;
        font-size: 13px; text-align: center;

    .dt-toggle-imp {

      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);

    }
    .dt-toggle-imp:hover { background: rgba(255,255,255,0.06); }

<!-- ══ Detalj-modal ══════════════════════════════════════════ -->
<div class="dt-overlay hidden" id="detailModal" onclick="if(event.target===this)closeDetail()">
  <div class="dt-modal" id="detailBody"></div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="utils.js"></script>
<script>
let db;
document.querySelector('[data-p="gjoremal"]').classList.add('active');

// Set header date
(function() {
  const el = document.getElementById('headerDate');
  if (el) el.textContent = new Date().toLocaleDateString(fmtLocale(), { weekday: 'long', day: 'numeric', month: 'long' });
})();

// ── State ─────────────────────────────────────────────────────────────────
let lists        = ['Generelt'];
let activeList   = 'Generelt';
let allTodos     = [];
let filter       = 'active';
let newImportant = false;

// ── Drag & drop state ─────────────────────────────────────────────────────
let _dragId = null;
let _dragEl = null;

// ── List-sidebar drag state ────────────────────────────────────────────────
let _listDragEl = null;

// ── Mobil rediger-modus (long-press på liste) ──────────────────────────────
let listEditMode = false;
function enterListEdit() {
  if (listEditMode) return;
  listEditMode = true;
  document.body.classList.add('gm-editing-lists');
  try { navigator.vibrate && navigator.vibrate(12); } catch(e) {}
  renderListsBar();
}
function exitListEdit() {
  if (!listEditMode) return;
  listEditMode = false;
  document.body.classList.remove('gm-editing-lists');
  renderListsBar();
}

function onListDragStart(e) {
  _listDragEl = e.currentTarget;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', 'list');
  setTimeout(() => _listDragEl && _listDragEl.classList.add('dragging'), 0);
}
function onListDragEnd() {
  if (_listDragEl) _listDragEl.classList.remove('dragging');
  clearDragClasses();
  _listDragEl = null;
}
async function saveListOrder() {
  try {
    await Promise.all(lists.map((name, position) =>
      db.from('todo_lists').upsert({ name, position }, { onConflict: 'name' })
    ));
  } catch(e) {}
}

function getOrder(ln) {
  try { return JSON.parse(localStorage.getItem('gm_order_' + ln) || 'null') || null; } catch(e) { return null; }
}
function saveOrder(ln, ids) {
  localStorage.setItem('gm_order_' + ln, JSON.stringify(ids));
  // Persist to Supabase so order survives cross-device (fire-and-forget)
  Promise.all(ids.map((id, index) =>
    db.from('todos').update({ sort_order: index }).eq('id', id)
  )).catch(() => {});
}
function applyOrder(container, ln) {
  const order = getOrder(ln);
  if (!order || !order.length) return;
  const items = [...container.querySelectorAll('.todo-item[data-id]')];
  if (!items.length) return;
  const idSet = new Set(order);
  const ordered = order.map(id => items.find(el => el.dataset.id === id)).filter(Boolean);
  const extra   = items.filter(el => !idSet.has(el.dataset.id));
  [...ordered, ...extra].forEach(el => container.appendChild(el));
}
function clearDragClasses() {
  document.querySelectorAll('.drag-before,.drag-after').forEach(el => el.classList.remove('drag-before','drag-after'));
}
function onDragStart(e, id) {
  _dragId = id; _dragEl = e.currentTarget;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => _dragEl && _dragEl.classList.add('dragging'), 0);
}
function onDragEnd() {
  if (_dragEl) _dragEl.classList.remove('dragging');
  clearDragClasses();
  _dragId = null; _dragEl = null;
}

// ── Auto-clean (max once per day) ────────────────────────────────────────
async function autoClean() {
  const key = 'ac_' + today();
  if (localStorage.getItem(key)) return;
  localStorage.setItem(key, '1');
  await db.from('todos').delete().eq('completed', true).lt('completed_at', today() + 'T00:00:00.000Z');
}

// ── Stats ─────────────────────────────────────────────────────────────────
function updateStats() {
  const todayStr = today();
  const set = (id, val) => { const e = document.getElementById(id); if (e) e.textContent = val; };

  // Sidebar: global across all lists
  set('sbActive',    allTodos.filter(t => !t.completed).length);
  set('sbImportant', allTodos.filter(t => t.important && !t.completed).length);

  // Main row: current list only
  const lt = allTodos.filter(t => t.list_name === activeList);
  set('statActive',    lt.filter(t => !t.completed).length);
  set('statImportant', lt.filter(t => t.important && !t.completed).length);
  set('statDone',      lt.filter(t => t.completed && t.completed_at && t.completed_at.slice(0,10) === todayStr).length);
  set('statOverdue',   lt.filter(t => !t.completed && t.due_date && t.due_date < todayStr).length);
}

// Re-render dynamic (JS-generert) innhold ved språkbytte. toggleLang() i utils.js kaller denne.
function onLangChange() {
  applyLang();
  renderListsBar();
  renderTodos();
  updateStats();
}

// ── Lists ─────────────────────────────────────────────────────────────────
async function loadLists() {
  const hidden = JSON.parse(localStorage.getItem('gm_hidden_defaults') || '[]');
  const defaultLists = ['Generelt', 'Trening', 'Skole'].filter(d => !hidden.includes(d));

  // Load from todo_lists (persisted order). Fall back to deriving from todos if table missing.
  const { data: listRows, error: listErr } = await db.from('todo_lists')
    .select('name').order('position', { ascending: true });

  if (!listErr && listRows && listRows.length > 0) {
    lists = listRows.map(r => r.name).filter(n => !hidden.includes(n));
    // Ensure un-hidden defaults appear even if not yet in todo_lists
    for (const d of defaultLists) {
      if (!lists.includes(d)) lists.unshift(d);
    }
  } else {
    // Pre-migration fallback: derive from todos
    const { data } = await db.from('todos').select('list_name');
    const fromDb = [...new Set((data || []).map(t => t.list_name))].filter(n => !hidden.includes(n));
    lists = [...new Set([...defaultLists, ...fromDb])];
  }

  const savedTab = localStorage.getItem('gjoremal_active_tab');
  if (savedTab && lists.includes(savedTab)) {
    activeList = savedTab;
    const h = document.getElementById('listHeading');
    if (h) h.textContent = activeList;
  }
  renderListsBar();
}

function renderListsBar() {
  const bar = document.getElementById('listsBar');
  bar.classList.toggle('editing', listEditMode);
  bar.innerHTML = lists.map(l => {
    const cnt = allTodos.filter(t => t.list_name === l && !t.completed).length;
    return `<div class="gm-li ${l===activeList?'active':''}" data-list="${escHtml(l)}"
               draggable="true"
               ondragstart="onListDragStart(event)" ondragend="onListDragEnd(event)"
               onclick="selectList(this.dataset.list)">
      <span class="drag-handle" aria-label="${t('gm.drag_list')}">⠿</span>
      <span class="gm-li-name">${escHtml(l)}</span>
      ${cnt > 0 ? `<span class="gm-li-count">${cnt}</span>` : ''}
      <button class="gm-li-edit" data-list="${escHtml(l)}" onclick="event.stopPropagation();renameList(this.dataset.list)" title="${t('gm.rename')}">✎</button>
      <button class="gm-li-del" data-list="${escHtml(l)}" onclick="event.stopPropagation();deleteList(this.dataset.list)" title="${t('delete')}" style="${l==='Generelt'?'visibility:hidden;pointer-events:none':''}">✕</button>
    </div>`;
  }).join('')
    + `<button class="gm-li-add" onclick="addListPrompt()" title="${t('gm.new_list')}" aria-label="${t('gm.new_list')}">+</button>`;
}

function selectList(name) {
  if (listEditMode) return;   // i rediger-modus: tap bytter ikke liste
  activeList = name;
  try { localStorage.setItem('gjoremal_active_tab', name); } catch {}
  renderListsBar();
  document.getElementById('listHeading').textContent = name;
  renderTodos();
}

async function renameList(oldName) {
  const newName = (prompt(t('gm.rename_prompt'), oldName) || '').trim();
  if (!newName || newName === oldName) return;
  if (lists.includes(newName)) { toast(t('gm.list_exists'), 'err'); return; }
  const { error } = await db.from('todos').update({ list_name: newName }).eq('list_name', oldName);
  if (error) { toast(t('gm.save_error'), 'err'); return; }
  // Hvis en default-liste døpes om, skjul den så den ikke re-injiseres ved neste lasting
  if (['Generelt','Trening','Skole'].includes(oldName)) {
    const hidden = JSON.parse(localStorage.getItem('gm_hidden_defaults') || '[]');
    if (!hidden.includes(oldName)) { hidden.push(oldName); localStorage.setItem('gm_hidden_defaults', JSON.stringify(hidden)); }
  }
  lists = lists.map(l => l === oldName ? newName : l);
  allTodos.forEach(td => { if (td.list_name === oldName) td.list_name = newName; });
  if (activeList === oldName) { activeList = newName; try { localStorage.setItem('gjoremal_active_tab', newName); } catch {} }
  db.from('todo_lists').update({ name: newName }).eq('name', oldName);
  renderListsBar();
  const h = document.getElementById('listHeading'); if (h) h.textContent = activeList;
  renderTodos();
  toast(t('gm.list_renamed'));
}

async function addList(explicitName) {
  const inp = document.getElementById('newListName');
  const name = (explicitName != null ? explicitName : inp.value).trim();
  if (!name) return;
  if (lists.includes(name)) { toast(t('gm.list_exists'), 'err'); return; }
  const position = lists.length;
  lists.push(name);
  if (inp) inp.value = '';
  db.from('todo_lists').insert({ name, position });
  selectList(name);
}

function addListPrompt() {
  const name = (prompt(t('gm.new_list_prompt')) || '').trim();
  if (name) addList(name);
}

async function deleteList(name) {
  if (!confirm(t('gm.delete_list', {n: name}))) return;
  await db.from('todos').delete().eq('list_name', name);
  await db.from('todo_lists').delete().eq('name', name);
  localStorage.removeItem('gm_order_' + name);
  // If it's a hardcoded default, mark it hidden so loadLists() doesn't re-add it
  const defaults = ['Generelt', 'Trening', 'Skole'];
  if (defaults.includes(name)) {
    const hidden = JSON.parse(localStorage.getItem('gm_hidden_defaults') || '[]');
    if (!hidden.includes(name)) {
      hidden.push(name);
      localStorage.setItem('gm_hidden_defaults', JSON.stringify(hidden));
    }
  }
  lists = lists.filter(l => l !== name);
  if (activeList === name) activeList = lists[0] || 'Generelt';
  renderListsBar();
  await loadTodos();
  toast(t('gm.list_deleted', {n: name}));
}

// ── Todos ─────────────────────────────────────────────────────────────────
async function loadTodos() {
  let { data, error } = await db.from('todos')
    .select('*').order('important', { ascending: false })
    .order('sort_order', { ascending: true, nullsLast: true })
    .order('due_date', { ascending: true, nullsLast: true })
    .order('created_at', { ascending: false });
  if (error) {
    // sort_order column missing (migration 010 not yet run) — fall back
    const fb = await db.from('todos')
      .select('*').order('important', { ascending: false })
      .order('due_date', { ascending: true, nullsLast: true })
      .order('created_at', { ascending: false });
    data = fb.data;
  }
  allTodos = data || [];
  // Seed localStorage from DB sort_order so order works cross-device
  const byList = {};
  for (const td of allTodos) {
    (byList[td.list_name] = byList[td.list_name] || []).push(String(td.id));
  }
  for (const [ln, ids] of Object.entries(byList)) {
    localStorage.setItem('gm_order_' + ln, JSON.stringify(ids));
  }
  renderTodos();
}

function renderTodos() {
  const el   = document.getElementById('todoList');
  let items  = allTodos.filter(t => t.list_name === activeList);

  if (filter === 'active')    items = items.filter(t => !t.completed);
  else if (filter === 'done') items = items.filter(t => t.completed);
  else if (filter === 'important') items = items.filter(t => t.important && !t.completed);

  const activeCount = items.filter(t => !t.completed).length;
  document.getElementById('todoCount').textContent =
    items.length ? t('gm.active_count', {n: activeCount}) : '';

  if (!items.length) {
    el.innerHTML = `<div class="empty">${t('gm.no_todos')}</div>`;
  } else {
    el.innerHTML = items.map(todo => {
      const due = todo.due_date ? new Date(todo.due_date + 'T12:00:00') : null;
      const isOverdue = todo.due_date && todo.due_date < today() && !todo.completed;
      return `<div class="todo-item ${todo.important?'important':''} ${todo.completed?'done':''}"
          data-id="${todo.id}" draggable="true"
          ondragstart="onDragStart(event,'${todo.id}')" ondragend="onDragEnd()">
        <span class="drag-handle">⠿</span>
        <div class="todo-cb ${todo.completed?'checked':''}" onclick="toggleTodo('${todo.id}',${todo.completed})"></div>
        <div class="todo-body">
          <div class="todo-text ${todo.completed?'done-text':''}" onclick="openDetail('${todo.id}')" title="${t('gm.detail')}">${escHtml(todo.title)}</div>
          <div class="todo-meta">
            ${todo.due_date
              ? `<span class="todo-due ${isOverdue?'overdue':''}" onclick="startEditDue('${todo.id}')" title="${t('gm.change_date')}">${isOverdue?t('gm.overdue_prefix'):''}${fmtDate(todo.due_date)}${!todo.completed?`<button class="todo-remind-x" onclick="event.stopPropagation();clearDue('${todo.id}')" title="${t('gm.clear_date')}" aria-label="${t('gm.clear_date')}">✕</button>`:''}</span>`
              : `<span class="todo-add-date" onclick="startEditDue('${todo.id}')">${t('gm.add_date')}</span>`
            }
            ${todo.remind_at
              ? `<span class="todo-remind" onclick="startEditRemind('${todo.id}')" title="${t('gm.reminder')}">⏰ ${fmtRemind(todo.remind_at)}<button class="todo-remind-x" onclick="event.stopPropagation();clearRemind('${todo.id}')" title="${t('gm.clear_reminder')}" aria-label="${t('gm.clear_reminder')}">✕</button></span>`
              : (!todo.completed ? `<span class="todo-add-remind" onclick="startEditRemind('${todo.id}')">⏰ ${t('gm.add_reminder')}</span>` : '')
            }
            ${!todo.completed ? `
              <span class="todo-quick ${todo.due_date===_dayStr(0)?'on':''}" onclick="quickDue('${todo.id}','today')" title="${t('gm.quick_today_title')}">${t('dash.move_today')}</span>
              <span class="todo-quick ${todo.due_date===_dayStr(1)?'on':''}" onclick="quickDue('${todo.id}','tomorrow')" title="${t('gm.quick_tomorrow_title')}">${t('dash.move_tomorrow')}</span>
            ` : ''}
          </div>
        </div>
        <div class="todo-actions">
          <button class="star-btn ${todo.important?'active':''}" onclick="toggleImportant('${todo.id}',${todo.important})" title="${t('gm.important_btn')}">
            ${todo.important ? '★' : '☆'}
          </button>
          <button class="todo-del" onclick="deleteTodo('${todo.id}')">✕</button>
        </div>
      </div>`;
    }).join('');
    applyOrder(el, activeList);
  }

  renderListsBar();
  updateStats();
}

// ── Add todo ──────────────────────────────────────────────────────────────
function toggleNewImportant() {

  btn.textContent = newImportant ? '★' : '☆';
  btn.style.color = newImportant ? 'var(--warning)' : '';

// ── Add-form chips ─────────────────────────────────────────────────────────
function _dayStrLocal(offset) {
  const d = new Date();
  d.setDate(d.getDate() + offset);
  return d.toISOString().slice(0, 10);
}
function updateAddChips() {
  const due    = document.getElementById('todoDue').value;
  const remind = document.getElementById('todoRemind').value;
  const today  = _dayStrLocal(0), tomorrow = _dayStrLocal(1);
  document.getElementById('chipToday').classList.toggle('active', due === today);
  document.getElementById('chipTomorrow').classList.toggle('active', due === tomorrow);
  const dueChip = document.getElementById('chipDue');
  if (due && due !== today && due !== tomorrow) {
    const [y,m,d2] = due.split('-');
    dueChip.textContent = `📅 ${d2}.${m}.${y}`;
    dueChip.classList.add('active');
  } else {
    dueChip.textContent = t('gm.chip_due');
    dueChip.classList.remove('active');
  }
  const remChip = document.getElementById('chipRemind');
  if (remind) {
    remChip.textContent = `⏰ ${fmtRemind(new Date(remind).toISOString())}`;
    remChip.classList.add('active');
  } else {
    remChip.textContent = t('gm.chip_reminder');
    remChip.classList.remove('active');
  }
}
function setQuickDue(offset) {
  const el  = document.getElementById('todoDue');
  const val = _dayStrLocal(offset);
  el.value  = el.value === val ? '' : val;  // toggle off if already set
  updateAddChips();
}
function openChipPicker(id) {
  const el = document.getElementById(id);
  // toggle clear if chip is already active
  if (el.value) {
    if (id === 'todoDue') {
      const today = _dayStrLocal(0), tomorrow = _dayStrLocal(1);
      if (el.value !== today && el.value !== tomorrow) { el.value = ''; updateAddChips(); return; }
    } else {
      el.value = ''; updateAddChips(); return;
    }
  }
  try { el.showPicker(); } catch(e) { el.focus(); }
  el.addEventListener('change', updateAddChips, { once: true });
}

async function addTodo() {
  const title = document.getElementById('todoTitle').value.trim();
  const due   = document.getElementById('todoDue').value || null;
  const remindRaw = document.getElementById('todoRemind').value || null; // "YYYY-MM-DDTHH:mm" (lokal tid)
  if (!title) return;

  let remindIso = null;
  if (remindRaw) {
    const d = new Date(remindRaw);
    if (d <= new Date()) { toast(t('gm.reminder_past'), 'err'); return; }
    remindIso = d.toISOString();
    try { ensurePushReady(); } catch (e) {}   // bruker-gest: be om varseltillatelse nå
  }

  const payload = { title, list_name: activeList, due_date: due, important: newImportant };
  if (remindIso) payload.remind_at = remindIso;
  let { data, error } = await db.from('todos').insert(payload).select().single();
  if (error && remindIso) {                    // remind_at-kolonne mangler (migrasjon 044 ikke kjørt enda)
    delete payload.remind_at; remindIso = null;
    ({ data, error } = await db.from('todos').insert(payload).select().single());
  }
  if (error) { toast(t('gm.save_error'), 'err'); return; }

  allTodos.unshift(data);
  const _ord = getOrder(activeList) || [];
  saveOrder(activeList, [String(data.id), ..._ord]);
  document.getElementById('todoTitle').value  = '';
  document.getElementById('todoDue').value     = '';
  document.getElementById('todoRemind').value  = '';
  localStorage.removeItem('gm_draft_title');
  updateAddChips();
  newImportant = false;
  document.getElementById('newImportant').textContent = '☆';
  document.getElementById('newImportant').style.color = '';
  renderTodos();
  if (remindIso) scheduleTodoReminder(data);
  toast(remindIso ? t('gm.reminder_set') : t('gm.added'));
}

// ── Påminnelser (Web Push) ─────────────────────────────────────────────────
function fmtRemind(iso) {
  try {
    const d = new Date(iso);
    const isToday = d.toDateString() === new Date().toDateString();
    if (isToday) return d.toLocaleTimeString(fmtLocale(), { hour: '2-digit', minute: '2-digit' });
    const datePart = d.toLocaleDateString(fmtLocale(), { day: '2-digit', month: '2-digit' });
    const timePart = d.toLocaleTimeString(fmtLocale(), { hour: '2-digit', minute: '2-digit' });
    return `${datePart} ${timePart}`;
  } catch { return iso; }
}
async function scheduleTodoReminder(todo) {
  if (!todo?.remind_at) return;
  await schedulePush({
    kind: 'todo', todoId: todo.id, fireAt: todo.remind_at,
    title: '⏰ ' + t('gm.reminder_body'), body: todo.title,
    tag: 'todo-' + todo.id, url: '/gjoremal.html',
  });
}
async function cancelTodoReminder(todoId) {
  if (typeof cancelPush === 'function') { try { await cancelPush({ todoId }); } catch (e) {} }
}
// Fjern påminnelse direkte fra ⏰-brikka (uten å åpne datovelgeren).
async function clearRemind(todoId) {
  const todo = allTodos.find(x => String(x.id) === String(todoId));
  if (!todo || !todo.remind_at) return;
  const { error } = await db.from('todos').update({ remind_at: null }).eq('id', todoId);
  if (error) { toast(t('gm.save_error'), 'err'); return; }
  todo.remind_at = null;
  cancelTodoReminder(todoId);
  toast(t('gm.reminder_cleared'));
  renderTodos();
}
// Fjern forfallsdato direkte fra dato-brikka (uten å åpne datovelgeren).
async function clearDue(todoId) {
  const todo = allTodos.find(x => String(x.id) === String(todoId));
  if (!todo || !todo.due_date) return;
  const { error } = await db.from('todos').update({ due_date: null }).eq('id', todoId);
  if (error) { toast(t('gm.save_error'), 'err'); return; }
  todo.due_date = null;
  toast(t('gm.date_removed'));
  updateStats();
  renderTodos();
}

// ── Toggle complete ───────────────────────────────────────────────────────
async function toggleTodo(id, isDone) {
  const newDone = !isDone;
  const { error } = await db.from('todos').update({
    completed: newDone,
    completed_at: newDone ? new Date().toISOString() : null,
  }).eq('id', id);
  if (error) { toast(t('gm.update_error'), 'err'); return; }
  const td = allTodos.find(x => x.id === id);
  if (td) { td.completed = newDone; td.completed_at = newDone ? new Date().toISOString() : null; }
  // Fullført → kanseller påminnelse. Angret → planlegg på nytt hvis fortsatt i fremtiden.
  if (newDone) cancelTodoReminder(id);
  else if (td?.remind_at && new Date(td.remind_at) > new Date()) scheduleTodoReminder(td);
  // Fullført mens «Aktive»-filteret er på → fade ut i stedet for å forsvinne brått
  if (newDone && filter === 'active') {
    const item = document.querySelector(`.todo-item[data-id="${id}"]`);
    if (item) {
      item.classList.add('completing');
      toast(t('gm.completed'), 'ok', { label: t('gm.undo'), fn: () => toggleTodo(id, true) });
      setTimeout(renderTodos, 300);
      return;
    }
  }
  renderTodos();
}

// ── Toggle important ──────────────────────────────────────────────────────
async function toggleImportant(id, isImportant) {
  const { error } = await db.from('todos').update({ important: !isImportant }).eq('id', id);
  if (error) { toast(t('gm.update_error'), 'err'); return; }
  const td = allTodos.find(x => x.id === id);
  if (td) td.important = !isImportant;
  renderTodos();
}

// ── Hurtig sett forfallsdato til i dag / i morgen (toggle av ved nytt klikk) ──
function _dayStr(offset) {
  const d = new Date();
  d.setDate(d.getDate() + offset);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
async function quickDue(id, when) {
  const td = allTodos.find(x => String(x.id) === String(id));
  if (!td) return;
  const target = _dayStr(when === 'tomorrow' ? 1 : 0);
  const newDue = td.due_date === target ? null : target;   // klikk på aktiv dag → fjern dato
  const { error } = await db.from('todos').update({ due_date: newDue }).eq('id', id);
  if (error) { toast(t('dash.move_err'), 'err'); return; }
  td.due_date = newDue;
  renderTodos();
  toast(newDue ? t('dash.moved') : t('gm.date_removed'));
}

// ── Delete ────────────────────────────────────────────────────────────────
async function deleteTodo(id) {
  const { error } = await db.from('todos').delete().eq('id', id);
  if (error) { toast(t('gm.delete_error'), 'err'); return; }
  cancelTodoReminder(id);
  allTodos = allTodos.filter(x => x.id !== id);
  renderTodos();
  toast(t('gm.deleted'));
}

// ── Inline edit: title ────────────────────────────────────────────────────
function startEditTitle(todoId) {
  const item = document.querySelector(`.todo-item[data-id="${todoId}"]`);
  if (!item) return;
  const textEl = item.querySelector('.todo-text');
  const todo = allTodos.find(t => String(t.id) === String(todoId));
  if (!todo || todo.completed || !textEl) return;

  item.setAttribute('draggable', 'false');
  const input = document.createElement('input');
  input.type = 'text';
  input.value = todo.title;
  input.className = 'todo-edit-input';

  let saved = false;
  const save = async () => {
    if (saved) return;
    saved = true;
    const newTitle = input.value.trim();
    if (newTitle && newTitle !== todo.title) {
      const { error } = await db.from('todos').update({ title: newTitle }).eq('id', todoId);
      if (!error) { todo.title = newTitle; toast(t('gm.saved')); }
      else toast(t('gm.save_error'), 'err');
    }
    renderTodos();
  };

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter')  { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') { saved = true; renderTodos(); }
  });
  input.addEventListener('blur', save);

  textEl.replaceWith(input);
  input.focus();
  input.select();
}

// ── Inline edit: due date ─────────────────────────────────────────────────
function startEditDue(todoId) {
  const item = document.querySelector(`.todo-item[data-id="${todoId}"]`);
  if (!item) return;
  const todo = allTodos.find(t => String(t.id) === String(todoId));
  if (!todo) return;

  item.setAttribute('draggable', 'false');
  const input = document.createElement('input');
  input.type = 'date';
  input.value = todo.due_date || '';
  input.className = 'todo-edit-date';

  let saved = false;
  const save = async () => {
    if (saved) return;
    saved = true;
    const newDate = input.value || null;
    if (newDate !== todo.due_date) {
      const { error } = await db.from('todos').update({ due_date: newDate }).eq('id', todoId);
      if (!error) { todo.due_date = newDate; toast(t('gm.saved')); }
      else toast(t('gm.save_error'), 'err');
    }
    renderTodos();
  };

  input.addEventListener('change', () => { input.blur(); });
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter')  { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') { saved = true; renderTodos(); }
  });
  input.addEventListener('blur', save);

  const target = item.querySelector('.todo-due') || item.querySelector('.todo-add-date');
  if (target) target.replaceWith(input);
  input.focus();
  try { input.showPicker(); } catch(e) {}
}

// ── Inline edit: påminnelse (Web Push) ─────────────────────────────────────
function startEditRemind(todoId) {
  const item = document.querySelector(`.todo-item[data-id="${todoId}"]`);
  if (!item) return;
  const todo = allTodos.find(t => String(t.id) === String(todoId));
  if (!todo) return;

  item.setAttribute('draggable', 'false');
  const input = document.createElement('input');
  input.type = 'datetime-local';
  input.className = 'todo-edit-date';
  if (todo.remind_at) {
    const d = new Date(todo.remind_at), p = n => String(n).padStart(2, '0');
    input.value = `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`;
  }

  let saved = false;
  const save = async () => {
    if (saved) return;
    saved = true;
    const raw = input.value || null;
    let newIso = null;
    if (raw) {
      const d = new Date(raw);
      if (d <= new Date()) { toast(t('gm.reminder_past'), 'err'); renderTodos(); return; }
      newIso = d.toISOString();
      try { ensurePushReady(); } catch (e) {}   // bruker-gest
    }
    if (newIso !== (todo.remind_at || null)) {
      const { error } = await db.from('todos').update({ remind_at: newIso }).eq('id', todoId);
      if (!error) {
        todo.remind_at = newIso;
        if (newIso) { scheduleTodoReminder(todo); toast(t('gm.reminder_set')); }
        else { cancelTodoReminder(todoId); toast(t('gm.reminder_cleared')); }
      } else toast(t('gm.save_error'), 'err');
    }
    renderTodos();
  };

  input.addEventListener('change', () => { input.blur(); });
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter')  { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') { saved = true; renderTodos(); }
  });
  input.addEventListener('blur', save);

  const target = item.querySelector('.todo-remind') || item.querySelector('.todo-add-remind');
  if (target) target.replaceWith(input);
  input.focus();
  try { input.showPicker(); } catch(e) {}
}

// ── Detalj-modal ──────────────────────────────────────────────────────────
let _detailId = null;

function _toLocalDT(iso) {
  const d = new Date(iso), p = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`;
}

function openDetail(id) {
  _detailId = String(id);
  renderDetail();
  document.getElementById('detailModal').classList.remove('hidden');
}
function closeDetail() {
  _detailId = null;
  document.getElementById('detailModal').classList.add('hidden');
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && !document.getElementById('detailModal').classList.contains('hidden')) closeDetail();
});

function renderDetail() {
  const todo = allTodos.find(t => String(t.id) === _detailId);
  if (!todo) { closeDetail(); return; }
  const body = document.getElementById('detailBody');
  body.innerHTML = `
    <div class="dt-hd">
      <div class="dt-hd-left">
        <div class="dt-cb ${todo.completed?'checked':''}" onclick="dtToggleDone()"></div>
        <span class="dt-eyebrow">${escHtml(todo.list_name)} · ${t('gm.detail')}</span>
      </div>
      <button class="dt-close" onclick="closeDetail()" aria-label="${t('close')}">✕</button>
    </div>

    <textarea class="dt-title ${todo.completed?'done':''}" id="dtTitle" rows="2"
      onchange="dtSaveTitle(this.value)">${escHtml(todo.title)}</textarea>

    <div class="dt-row">
      <div class="dt-field">
        <div class="dt-field-hd">
          <label class="dt-field-lbl">${t('gm.detail_due_label')}</label>
          ${todo.due_date ? `<button class="dt-field-clear" onclick="dtClearDue()">${t('delete')}</button>` : ''}
        </div>
        <input type="date" value="${todo.due_date||''}" onchange="dtSaveDue(this.value)">
      </div>
    </div>

    <div class="dt-field">
      <div class="dt-field-hd">
        <label class="dt-field-lbl">⏰ ${t('gm.detail_remind_label')}</label>
        ${todo.remind_at ? `<button class="dt-field-clear" onclick="dtClearRemind()">${t('delete')}</button>` : ''}
      </div>
      <input type="datetime-local" value="${todo.remind_at?_toLocalDT(todo.remind_at):''}" onchange="dtSaveRemind(this.value)">
    </div>

    <div class="dt-toggle-imp ${todo.important?'on':''}" onclick="dtToggleImportant()">
      <span class="dt-star">${todo.important?'★':'☆'}</span>
      <span>${todo.important?t('gm.detail_important_on'):t('gm.detail_important_off')}</span>
    </div>

    <div class="dt-footer">
      <button class="btn btn-primary btn-sm" onclick="dtToggleDone()">${todo.completed?t('gm.mark_active'):t('gm.mark_done')}</button>
      <div class="dt-spacer"></div>
      <button class="dt-del" onclick="dtDelete()">${t('delete')}</button>
    </div>`;
}

async function dtSaveTitle(value) {
  const todo = allTodos.find(t => String(t.id) === _detailId); if (!todo) return;
  const v = value.trim();
  if (!v || v === todo.title) return;
  const { error } = await db.from('todos').update({ title: v }).eq('id', todo.id);
  if (error) { toast(t('gm.save_error'), 'err'); return; }
  todo.title = v; renderTodos(); toast(t('gm.saved'));
}
async function dtSaveDue(value) {
  const todo = allTodos.find(t => String(t.id) === _detailId); if (!todo) return;
  const v = value || null;
  if (v === (todo.due_date || null)) return;
  const { error } = await db.from('todos').update({ due_date: v }).eq('id', todo.id);
  if (error) { toast(t('gm.save_error'), 'err'); return; }
  todo.due_date = v; renderTodos(); renderDetail(); toast(t('gm.saved'));
}
async function dtClearDue() {
  const todo = allTodos.find(t => String(t.id) === _detailId); if (!todo || !todo.due_date) return;
  const { error } = await db.from('todos').update({ due_date: null }).eq('id', todo.id);
  if (error) { toast(t('gm.save_error'), 'err'); return; }
  todo.due_date = null; renderTodos(); renderDetail(); toast(t('gm.date_removed'));
}
async function dtSaveRemind(value) {
  const todo = allTodos.find(t => String(t.id) === _detailId); if (!todo) return;
  let newIso = null;
  if (value) {
    const d = new Date(value);
    if (d <= new Date()) { toast(t('gm.reminder_past'), 'err'); renderDetail(); return; }
    newIso = d.toISOString();
    try { ensurePushReady(); } catch (e) {}
  }
  if (newIso === (todo.remind_at || null)) return;
  const { error } = await db.from('todos').update({ remind_at: newIso }).eq('id', todo.id);
  if (error) { toast(t('gm.save_error'), 'err'); return; }
  todo.remind_at = newIso;
  if (newIso) { scheduleTodoReminder(todo); toast(t('gm.reminder_set')); }
  else { cancelTodoReminder(todo.id); toast(t('gm.reminder_cleared')); }
  renderTodos(); renderDetail();
}
async function dtClearRemind() {
  const todo = allTodos.find(t => String(t.id) === _detailId); if (!todo || !todo.remind_at) return;
  const { error } = await db.from('todos').update({ remind_at: null }).eq('id', todo.id);
  if (error) { toast(t('gm.save_error'), 'err'); return; }
  todo.remind_at = null; cancelTodoReminder(todo.id);
  renderTodos(); renderDetail(); toast(t('gm.reminder_cleared'));
}
async function dtToggleImportant() {
  const todo = allTodos.find(t => String(t.id) === _detailId); if (!todo) return;
  const { error } = await db.from('todos').update({ important: !todo.important }).eq('id', todo.id);
  if (error) { toast(t('gm.update_error'), 'err'); return; }
  todo.important = !todo.important; renderTodos(); renderDetail();
}
async function dtToggleDone() {
  const todo = allTodos.find(t => String(t.id) === _detailId); if (!todo) return;
  const newDone = !todo.completed;
  const { error } = await db.from('todos').update({
    completed: newDone, completed_at: newDone ? new Date().toISOString() : null,
  }).eq('id', todo.id);
  if (error) { toast(t('gm.update_error'), 'err'); return; }
  todo.completed = newDone;
  todo.completed_at = newDone ? new Date().toISOString() : null;
  if (newDone) cancelTodoReminder(todo.id);
  else if (todo.remind_at && new Date(todo.remind_at) > new Date()) scheduleTodoReminder(todo);
  renderTodos();
  if (newDone) { toast(t('gm.completed')); closeDetail(); }
  else renderDetail();
}
async function dtDelete() {
  const todo = allTodos.find(t => String(t.id) === _detailId); if (!todo) return;
  const { error } = await db.from('todos').delete().eq('id', todo.id);
  if (error) { toast(t('gm.delete_error'), 'err'); return; }
  cancelTodoReminder(todo.id);
  allTodos = allTodos.filter(x => x.id !== todo.id);
  renderTodos(); closeDetail(); toast(t('gm.deleted'));
}

// ── Touch: åpne detalj ved trykk på raden (unntatt handlingsknapper og drag-handle) ──
(function() {
  const list = document.getElementById('todoList');
  let sx = 0, sy = 0, moved = false;
  list.addEventListener('touchstart', e => {
    const item = e.target.closest('.todo-item[data-id]');
    if (!item) return;
    const t = e.touches[0]; sx = t.clientX; sy = t.clientY; moved = false;
  }, { passive: true });
  list.addEventListener('touchmove', e => {
    const t = e.touches[0];
    if (Math.abs(t.clientX - sx) > 10 || Math.abs(t.clientY - sy) > 10) moved = true;
  }, { passive: true });
  list.addEventListener('touchend', e => {
    if (moved) return;
    // Ikke åpne modal på handlingsknapper eller drag-handle
    if (e.target.closest('.todo-cb, .star-btn, .todo-del, .todo-remind-x, .drag-handle')) return;
    const item = e.target.closest('.todo-item[data-id]');
    if (!item) return;
    e.preventDefault();
    openDetail(item.dataset.id);
  });
})();

// ── Touch drag-to-reorder (iOS har ikke HTML5 dnd) ────────────────────────
(function() {
  const container = document.getElementById('todoList');
  let tdEl = null, tdMoved = false, tdSx = 0, tdSy = 0;

  container.addEventListener('touchstart', e => {
    if (!e.target.closest('.drag-handle')) return;
    const item = e.target.closest('.todo-item[data-id]');
    if (!item) return;
    tdEl = item; tdMoved = false;
    const t = e.touches[0]; tdSx = t.clientX; tdSy = t.clientY;
    setTimeout(() => { if (tdEl) tdEl.classList.add('dragging'); }, 60);
  }, { passive: true });

  container.addEventListener('touchmove', e => {
    if (!tdEl) return;
    const t = e.touches[0];
    if (!tdMoved && (Math.abs(t.clientX - tdSx) > 5 || Math.abs(t.clientY - tdSy) > 5)) {
      tdMoved = true;
      try { navigator.vibrate && navigator.vibrate(10); } catch(_) {}
    }
    if (!tdMoved) return;
    e.preventDefault(); // stopp scroll mens vi drar
    const pt = document.elementFromPoint(t.clientX, t.clientY);
    const over = pt ? pt.closest('.todo-item[data-id]') : null;
    clearDragClasses();
    if (over && over !== tdEl) {
      const r = over.getBoundingClientRect();
      over.classList.add(t.clientY < r.top + r.height / 2 ? 'drag-before' : 'drag-after');
    }
  }, { passive: false });

  function tdEnd(e) {
    if (!tdEl) return;
    if (tdMoved) {
      const t = (e.changedTouches || [])[0];
      if (t) {
        const pt = document.elementFromPoint(t.clientX, t.clientY);
        const over = pt ? pt.closest('.todo-item[data-id]') : null;
        if (over && over !== tdEl) {
          const r = over.getBoundingClientRect();
          container.insertBefore(tdEl, t.clientY < r.top + r.height / 2 ? over : over.nextSibling);
        }
        const ids = [...container.querySelectorAll('.todo-item[data-id]')].map(el => el.dataset.id);
        if (ids.length > 0) saveOrder(activeList, ids);
      }
    }
    clearDragClasses();
    tdEl.classList.remove('dragging');
    tdEl = null; tdMoved = false;
  }
  container.addEventListener('touchend', tdEnd);
  container.addEventListener('touchcancel', tdEnd);
})();

// ── Container drag listeners ──────────────────────────────────────────────
(function() {
  const container = document.getElementById('todoList');
  container.addEventListener('dragover', e => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    const target = e.target.closest('.todo-item[data-id]');
    clearDragClasses();
    if (!target || target === _dragEl) return;
    const r = target.getBoundingClientRect();
    target.classList.add(e.clientY < r.top + r.height / 2 ? 'drag-before' : 'drag-after');
  });
  container.addEventListener('dragleave', e => {
    if (!container.contains(e.relatedTarget)) clearDragClasses();
  });
  container.addEventListener('drop', e => {
    e.preventDefault();
    const target = e.target.closest('.todo-item[data-id]');
    clearDragClasses();
    if (!target || !_dragEl || target === _dragEl) return;
    const r = target.getBoundingClientRect();
    if (e.clientY < r.top + r.height / 2) container.insertBefore(_dragEl, target);
    else container.insertBefore(_dragEl, target.nextSibling);
    const ids = [...container.querySelectorAll('.todo-item[data-id]')].map(el => el.dataset.id);
    if (ids.length > 0) saveOrder(activeList, ids);
  });
})();


// ── #listsBar drag container listeners ───────────────────────────────────
(function() {
  const bar = document.getElementById('listsBar');
  bar.addEventListener('dragover', e => {
    if (!_listDragEl) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    const target = e.target.closest('.gm-li');
    clearDragClasses();
    if (!target || target === _listDragEl) return;
    const r = target.getBoundingClientRect();
    target.classList.add(e.clientY < r.top + r.height / 2 ? 'drag-before' : 'drag-after');
  });
  bar.addEventListener('dragleave', e => {
    if (!bar.contains(e.relatedTarget)) clearDragClasses();
  });
  bar.addEventListener('drop', e => {
    e.preventDefault();
    const target = e.target.closest('.gm-li');
    clearDragClasses();
    if (!target || !_listDragEl || target === _listDragEl) return;
    const r = target.getBoundingClientRect();
    if (e.clientY < r.top + r.height / 2) bar.insertBefore(_listDragEl, target);
    else bar.insertBefore(_listDragEl, target.nextSibling);
    // Sync lists array from DOM order, then persist
    lists = [...bar.querySelectorAll('.gm-li[data-list]')].map(el => el.dataset.list);
    saveListOrder();
  });
})();

// ── #listsBar touch: long-press → rediger-modus + touch-drag reorder (mobil) ──
(function() {
  const bar = document.getElementById('listsBar');
  let cand = null, timer = null, sx = 0, sy = 0, dragging = false;

  bar.addEventListener('touchstart', e => {
    // ignorer trykk direkte på slett/endre-knappene
    if (e.target.closest('.gm-li-del, .gm-li-edit')) return;
    const li = e.target.closest('.gm-li[data-list]');
    if (!li) return;
    const name = li.dataset.list;
    cand = li; dragging = false;
    const t = e.touches[0]; sx = t.clientX; sy = t.clientY;
    if (!listEditMode) {
      timer = setTimeout(() => {
        timer = null;
        enterListEdit();   // re-renderer baren → finn ny node for samme liste
        cand = [...bar.querySelectorAll('.gm-li[data-list]')].find(el => el.dataset.list === name) || null;
      }, 450);
    }
  }, { passive: true });

  bar.addEventListener('touchmove', e => {
    if (!cand) return;
    const t = e.touches[0];
    const dist = Math.abs(t.clientX - sx) + Math.abs(t.clientY - sy);
    if (!listEditMode) {
      if (dist > 10 && timer) { clearTimeout(timer); timer = null; cand = null; } // scroll → avbryt hold
      return;
    }
    if (!dragging) {
      if (dist < 8) return;
      dragging = true;
      cand.classList.add('dragging');
    }
    e.preventDefault();   // stopp scroll mens vi drar
    const pt = document.elementFromPoint(t.clientX, t.clientY);
    const overLi = pt ? pt.closest('.gm-li[data-list]') : null;
    clearDragClasses();
    if (overLi && overLi !== cand) {
      const r = overLi.getBoundingClientRect();
      bar.insertBefore(cand, t.clientX < r.left + r.width / 2 ? overLi : overLi.nextSibling);
    }
  }, { passive: false });

  function end() {
    if (timer) { clearTimeout(timer); timer = null; }
    if (dragging && cand) {
      cand.classList.remove('dragging');
      clearDragClasses();
      lists = [...bar.querySelectorAll('.gm-li[data-list]')].map(el => el.dataset.list);
      saveListOrder();
    }
    cand = null; dragging = false;
  }
  bar.addEventListener('touchend', end);
  bar.addEventListener('touchcancel', end);

  // Trykk utenfor liste-baren avslutter rediger-modus
  document.addEventListener('touchstart', e => {
    if (!listEditMode) return;
    if (e.target.closest('#listsBar') || e.target.closest('#listEditBar')) return;
    exitListEdit();
  }, { passive: true });
})();

// ── Init ──────────────────────────────────────────────────────────────────
(async () => {
  try {
    const cfg = await getConfig();
    db = supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);
    const { data: { session } } = await db.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }
  } catch (err) {
    document.querySelector('.gm-shell').innerHTML =
      `<div class="card" style="text-align:center;padding:40px;grid-column:1/-1">
        <div style="color:var(--danger);font-family:var(--font-mono);font-size:13px">${err.message}</div>
        <div style="color:var(--text-tertiary);font-size:11px;margin-top:10px">
          Sett SUPABASE_URL og SUPABASE_ANON_KEY som miljøvariabler i Vercel.
        </div>
      </div>`;
    return;
  }
  applyLang();
  await Promise.all([autoClean(), loadLists()]);
  await loadTodos();

  // Gjenopprett draft-tekst (maks 24 timer gammel)
  try {
    const raw = localStorage.getItem('gm_draft_title');
    if (raw) {
      const { t, ts } = JSON.parse(raw);
      if (t && Date.now() - ts < 86400000) document.getElementById('todoTitle').value = t;
      else localStorage.removeItem('gm_draft_title');
    }
  } catch { localStorage.removeItem('gm_draft_title'); }
})();
</script>
