<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Søvn & Restitusjon</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .sovn-page {
      max-width: 1180px; margin: 0 auto;
      padding: 14px 16px 60px;
      display: flex; flex-direction: column; gap: 10px;
    }

    /* ── Hero ── */
    .hero-card {
      background: linear-gradient(135deg, rgba(124,111,212,0.07) 0%, rgba(74,158,232,0.05) 50%, rgba(107,227,164,0.04) 100%);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px; padding: 22px 26px;
      position: relative; overflow: hidden;
    }
    .hero-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, rgba(124,111,212,0.5), rgba(74,158,232,0.35), rgba(107,227,164,0.2), transparent);
    }
    .hero-inner { display: flex; align-items: center; gap: 26px; }
    .hero-score-box {
      width: 88px; height: 88px; border-radius: 18px; flex-shrink: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.09);
      transition: box-shadow 0.3s;
    }
    .hero-score-box.score-good { background: rgba(107,227,164,0.09); border-color: rgba(107,227,164,0.28); box-shadow: 0 0 32px rgba(107,227,164,0.12); }
    .hero-score-box.score-ok   { background: rgba(242,192,99,0.09);  border-color: rgba(242,192,99,0.28);  box-shadow: 0 0 32px rgba(242,192,99,0.12);  }
    .hero-score-box.score-bad  { background: rgba(255,107,107,0.09); border-color: rgba(255,107,107,0.28); box-shadow: 0 0 32px rgba(255,107,107,0.12); }
    .hero-score-num {
      font-size: 34px; font-weight: 800; font-family: var(--font-mono);
      line-height: 1; letter-spacing: -0.03em;
    }
    .hero-score-lbl {
      font-size: 7.5px; font-family: var(--font-mono); letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--text-tertiary); margin-top: 4px;
    }
    .hero-right { flex: 1; min-width: 0; }
    .hero-date {
      font-size: 9.5px; font-family: var(--font-mono); color: var(--text-tertiary);
      letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 5px;
    }
    .hero-status {
      font-size: 21px; font-weight: 700; line-height: 1.15;
      letter-spacing: -0.02em; margin-bottom: 3px;
    }
    .hero-tagline { font-size: 12px; color: var(--text-secondary); margin-bottom: 14px; }
    .hero-chips { display: flex; gap: 6px; flex-wrap: wrap; }
    .hero-chip {
      padding: 3px 9px; border-radius: 20px; font-size: 10.5px; font-family: var(--font-mono);
      background: rgba(255,255,255,0.045); border: 1px solid rgba(255,255,255,0.08);
      color: var(--text-secondary);
    }

    /* ── Metrics Grid ── */
    /* ── Warning bar ── */
    .warn-bar {
      border-radius: 12px; padding: 12px 16px;
      display: flex; flex-direction: column; gap: 7px;
    }
    .warn-bar.warn-red    { background: rgba(255,107,107,0.08); border: 1px solid rgba(255,107,107,0.25); }
    .warn-bar.warn-orange { background: rgba(242,192,99,0.08);  border: 1px solid rgba(242,192,99,0.25);  }
    .warn-bar.warn-ok     { background: rgba(107,227,164,0.06); border: 1px solid rgba(107,227,164,0.2);  }
    .warn-item { display: flex; align-items: flex-start; gap: 10px; }
    .warn-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
    .warn-text { font-size: 11.5px; line-height: 1.5; }
    .warn-title { font-weight: 600; color: var(--text-primary); }
    .warn-advice { color: var(--text-secondary); margin-top: 1px; font-size: 11px; }

    /* ── Metrics ── */
    .metrics-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; }
    .metric-card {
      background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.055);
      border-radius: 12px; padding: 14px 14px 12px; transition: all 0.14s;
      cursor: default; position: relative;
    }
    .metric-card:hover { background: rgba(255,255,255,0.04); }
    .mc-top-lbl {
      font-size: 9px; font-family: var(--font-mono); letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 8px;
    }
    .mc-val {
      font-size: 28px; font-weight: 700; font-family: var(--font-mono);
      line-height: 1; letter-spacing: -0.02em; color: var(--text-primary);
    }
    .mc-unit {
      font-size: 9.5px; font-family: var(--font-mono); color: var(--text-tertiary); margin-top: 4px;
    }
    .mc-status-badge {
      display: inline-flex; align-items: center; gap: 4px;
      margin-top: 8px; padding: 2px 7px; border-radius: 20px;
      font-size: 9px; font-family: var(--font-mono); letter-spacing: 0.06em;
      text-transform: uppercase; border: 1px solid currentColor;
    }
    .mc-advice {
      margin-top: 7px; padding-top: 7px;
      border-top: 1px solid rgba(255,255,255,0.06);
      font-size: 10px; color: var(--text-secondary); line-height: 1.55;
    }

    /* ── Mid Grid ── */
    .mid-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .mid-card {
      background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.055);
      border-radius: 14px; padding: 17px 18px;
    }
    .card-lbl {
      font-size: 9px; font-family: var(--font-mono); letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 12px;
      display: flex; align-items: center; gap: 6px;
    }
    .card-lbl::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(to right, rgba(255,255,255,0.07), transparent);
    }

    /* Sleep architecture */
    .arch-insight {
      font-size: 12px; font-weight: 600; font-family: var(--font-mono); margin-bottom: 12px;
    }
    .arch-bar-premium {
      height: 12px; border-radius: 6px; overflow: hidden; display: flex; gap: 2px;
      margin-bottom: 18px;
    }
    .arch-seg { border-radius: 2px; transition: width 0.5s ease; min-width: 2px; }
    .arch-stages { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 14px; }
    .arch-stage-item { display: flex; align-items: center; gap: 8px; }
    .arch-stage-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
    .arch-stage-name {
      font-size: 9px; font-family: var(--font-mono); color: var(--text-tertiary);
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .arch-stage-val {
      font-size: 14px; font-weight: 600; font-family: var(--font-mono); color: var(--text-primary);
    }
    .arch-times { display: flex; gap: 7px; margin-top: 14px; flex-wrap: wrap; }
    .time-badge {
      padding: 3px 9px; border-radius: 20px; font-size: 10.5px; font-family: var(--font-mono);
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      color: var(--text-secondary);
    }

    /* Readiness */
    .readiness-status {
      font-size: 17px; font-weight: 700; font-family: var(--font-mono); margin-bottom: 3px;
    }
    .readiness-desc { font-size: 11px; color: var(--text-tertiary); margin-bottom: 14px; line-height: 1.5; }
    .readiness-level {
      height: 4px; border-radius: 3px; background: rgba(255,255,255,0.07); margin-bottom: 16px; overflow: hidden;
    }
    .readiness-level-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
    .readiness-indicators { display: flex; flex-direction: column; gap: 7px; }
    .ri-row { display: flex; align-items: center; justify-content: space-between; }
    .ri-label { font-size: 10.5px; color: var(--text-tertiary); font-family: var(--font-mono); }
    .ri-val { font-size: 10.5px; font-family: var(--font-mono); color: var(--text-secondary); }

    /* ── Chart ── */
    .chart-card {
      background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.055);
      border-radius: 14px; padding: 17px 18px;
    }
    .chart-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px; gap: 10px; flex-wrap: wrap;
    }
    .chart-toggle-group { display: flex; gap: 6px; align-items: center; }
    .chart-pills {
      display: flex; background: rgba(255,255,255,0.04); border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.08); padding: 2px; gap: 2px;
    }
    .cm-btn, .cp-btn {
      padding: 4px 11px; border-radius: 6px; border: none; background: none;
      font-size: 10px; font-family: var(--font-mono); letter-spacing: 0.06em;
      text-transform: uppercase; color: var(--text-tertiary); cursor: pointer; transition: all 0.13s;
    }
    .cm-btn.active, .cp-btn.active { background: rgba(255,255,255,0.1); color: var(--text-primary); }
    .cm-btn:hover:not(.active), .cp-btn:hover:not(.active) { color: var(--text-secondary); }
    .chart-legend { display: flex; gap: 12px; margin-bottom: 11px; flex-wrap: wrap; }
    .chart-leg-item {
      display: flex; align-items: center; gap: 5px;
      font-size: 10px; font-family: var(--font-mono); color: var(--text-tertiary);
    }
    .chart-leg-dot  { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
    .chart-leg-line { width: 16px; height: 2px; border-top: 2px dashed rgba(255,255,255,0.22); flex-shrink: 0; }
    .chart-wrap { position: relative; height: 220px; }

    /* ── Misc ── */
    .empty-state {
      font-size: 11px; font-family: var(--font-mono);
      color: rgba(255,255,255,0.16); padding: 14px 0; text-align: center; line-height: 1.8;
    }

    /* ── Responsive ── */
    @media (max-width: 820px) { .mid-grid { grid-template-columns: 1fr; } }
    @media (max-width: 640px) {
      .metrics-grid { grid-template-columns: repeat(2,1fr); }
      .hero-inner { flex-direction: column; align-items: flex-start; gap: 16px; }
      .mood-card { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>

  <div class="nav-inner">

<main class="sovn-page">

  <!-- Hero -->
  <div class="hero-card">
    <div id="heroInner">
      <div class="hero-inner"><div class="empty-state">Laster…</div></div>
    </div>
  </div>

  <!-- Warning bar -->
  <div id="warnBar"></div>

  <!-- Metrics -->
  <div class="metrics-grid" id="metricsGrid"></div>

  <!-- Mid: Architecture + Readiness -->
  <div class="mid-grid">
    <div class="mid-card" id="archSection">
      <div class="card-lbl">Søvnarkitektur</div>
      <div class="empty-state">Laster…</div>
    </div>
    <div class="mid-card" id="readinessSection">
      <div class="card-lbl">Treningsberedskap</div>
      <div class="empty-state">Laster…</div>
    </div>
  </div>

  <!-- Chart -->
  <div class="chart-card">
    <div class="chart-header">
      <div class="chart-toggle-group">
        <div class="chart-pills">
          <button class="cm-btn active" data-metric="sleep"  onclick="setChartMetric('sleep')">Søvn</button>
          <button class="cm-btn"        data-metric="hrv"    onclick="setChartMetric('hrv')">HRV</button>
          <button class="cm-btn"        data-metric="rhr"    onclick="setChartMetric('rhr')">Puls</button>
          <button class="cm-btn"        data-metric="score"  onclick="setChartMetric('score')">Score</button>
        </div>
      </div>
      <div class="chart-toggle-group">
        <div class="chart-pills">
          <button class="cp-btn active" data-days="7"  onclick="setChartPeriod(7)">7d</button>
          <button class="cp-btn" data-days="14" onclick="setChartPeriod(14)">14d</button>
          <button class="cp-btn" data-days="30" onclick="setChartPeriod(30)">30d</button>
        </div>
      </div>
    </div>
    <div class="chart-legend" id="chartLegend"></div>
    <div class="chart-wrap">
      <canvas id="sleepChart"></canvas>
    </div>
  </div>

</main>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script>
let db;
document.querySelector('[data-p="sovn"]').classList.add('active');

let _tt;
function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `toast ${type} show`;
  clearTimeout(_tt); _tt = setTimeout(() => el.classList.remove('show'), 3000);
}
async function signOut() { if (db) await db.auth.signOut(); window.location.href = 'login.html'; }
function today() { return new Date().toISOString().slice(0, 10); }

let todayEntry   = null;
let chartData    = [];
let chartInstance = null;
let chartMetric  = 'sleep';
let chartDays    = 7;

function minToHM(min) {
  if (!min) return '–';
  const h = Math.floor(min / 60), m = min % 60;
  return h > 0 ? `${h}t${m > 0 ? ' ' + m + 'm' : ''}` : `${m}m`;
}
function minToH(min) { return min ? +(min / 60).toFixed(2) : null; }
function sleepHoursStr(h) {
  if (!h) return '–';
  return `${Math.floor(h)}t${Math.round((h % 1) * 60) > 0 ? ' ' + Math.round((h % 1) * 60) + 'm' : ''}`;
}

// ── Smart insights ─────────────────────────────────────────────────────────
function getHeroText(d) {
  if (!d) return { main:'Ingen søvndata', sub:'Synces kl. 07:00', color:'var(--text-tertiary)' };
  const sc = d.sleep_score;
  if (!sc) {
    return { main:'Sover videre?', sub: d.sleep_hours ? `Registrert ${sleepHoursStr(d.sleep_hours)}` : 'Venter på data', color:'var(--text-secondary)' };
  }
  if (sc >= 85) return { main:'God restitusjon', sub:'Bra grunnlag for sprint i dag', color:'#6BE3A4' };
  if (sc >= 70) return { main:'Solid søvnnatt', sub:'Klar for trening', color:'#6BE3A4' };
  if (sc >= 55) return { main:'Middels restitusjon', sub:'Lett økt kan være lurt', color:'#F2C063' };
  return { main:'Krevende natt', sub:'Prioriter hvile i dag', color:'#FF6B6B' };
}

function getArchInsight(d) {
  if (!d) return null;
  const total = (d.deep_sleep_minutes||0) + (d.rem_sleep_minutes||0) + (d.light_sleep_minutes||0);
  if (total < 10) return null;
  const deepPct = (d.deep_sleep_minutes||0) / total * 100;
  const remPct  = (d.rem_sleep_minutes||0)  / total * 100;
  if (deepPct < 10) return { text:'Lite dyp søvn i natt', color:'#F2C063' };
  if (remPct  < 14) return { text:'REM under normalen',   color:'#F2C063' };
  if (deepPct > 22 && remPct > 20) return { text:'Fremragende søvnkvalitet', color:'#6BE3A4' };
  if (deepPct > 18) return { text:'Dyp søvn solid i natt', color:'#6BE3A4' };
  if (remPct  > 22) return { text:'Bra REM-søvn i natt',   color:'#4A9EE8' };
  return { text:'Søvnkvalitet normal', color:'var(--text-tertiary)' };
}

function getReadinessInsight(d) {
  if (!d || !d.sleep_score) return { status:'Mangler data', desc:'', color:'var(--text-tertiary)', level:0 };
  const sc = d.sleep_score, hrv = d.hrv, rhr = d.rhr;
  if (sc >= 85 && rhr && rhr < 58)
    return { status:'Klar for høy intensitet', desc:'Score og hvilepuls er optimale', color:'#6BE3A4', level:100 };
  if (sc >= 70)
    return { status:'Bra grunnlag for trening', desc:'God restitusjon over natten', color:'#6BE3A4', level:72 };
  if (sc >= 55)
    return { status:'Moderat restitusjon', desc:'Vurder å holde intensiteten nede', color:'#F2C063', level:45 };
  return { status:'Vurder hvile i dag', desc:'Søvnkvalitet under normalen', color:'#FF6B6B', level:20 };
}

// ── Render: Hero ───────────────────────────────────────────────────────────
function renderHero(d) {
  const el  = document.getElementById('heroInner');
  const sc  = d?.sleep_score;
  const txt = getHeroText(d);
  const cls = !sc ? '' : sc >= 80 ? ' score-good' : sc >= 60 ? ' score-ok' : ' score-bad';

  const chips = [];
  if (d?.sleep_hours) chips.push(`🌙 ${sleepHoursStr(d.sleep_hours)}`);
  if (d?.rhr)         chips.push(`❤️ ${d.rhr} bpm`);
  if (d?.hrv)         chips.push(`⚡ HRV ${d.hrv}ms`);
  if (d?.sleep_start) chips.push(`🛌 ${d.sleep_start}`);
  if (d?.sleep_end)   chips.push(`⏰ ${d.sleep_end}`);

  el.innerHTML = `
    <div class="hero-inner">
      <div class="hero-score-box${cls}">
        <div class="hero-score-num" style="${sc && sc >= 80 ? 'color:#6BE3A4' : sc && sc >= 60 ? 'color:#F2C063' : sc && sc < 60 ? 'color:#FF6B6B' : ''}">${sc ?? '–'}</div>
        <div class="hero-score-lbl">Søvnscore</div>
      </div>
      <div class="hero-right">
        <div class="hero-date">${new Date().toLocaleDateString('no-NO', {weekday:'long',day:'numeric',month:'long'})}</div>
        <div class="hero-status" style="color:${txt.color}">${txt.main}</div>
        <div class="hero-tagline">${d?.sleep_hours ? 'Du sov ' + sleepHoursStr(d.sleep_hours) + (txt.sub ? ' · ' + txt.sub : '') : txt.sub}</div>
        ${chips.length ? `<div class="hero-chips">${chips.map(c => `<div class="hero-chip">${c}</div>`).join('')}</div>` : ''}
      </div>
    </div>`;
}

// ── Render: Metrics ────────────────────────────────────────────────────────
// ── Metric analysis engine ─────────────────────────────────────────────────
function analyzeMetrics(d) {
  const results = [];

  // HRV
  if (d?.hrv) {
    const v = d.hrv;
    if (v >= 60)      results.push({ key:'hrv', val:`${v}ms`, label:'HRV', level:'ok',     badge:'Optimal',  color:'#6BE3A4', glow:'rgba(107,227,164,0.14)', advice:'Nervesystemet er restituert. Grønt lys for sprint og høy intensitet i dag.' });
    else if (v >= 50) results.push({ key:'hrv', val:`${v}ms`, label:'HRV', level:'ok',     badge:'Bra',      color:'#6BE3A4', glow:'rgba(107,227,164,0.1)',  advice:'God restitusjon. Moderat til høy intensitet fungerer fint.' });
    else if (v >= 40) results.push({ key:'hrv', val:`${v}ms`, label:'HRV', level:'warn',   badge:'Lav',      color:'#F2C063', glow:'rgba(242,192,99,0.12)',   advice:'HRV under normalen. Hold intensiteten moderat — unngå maksøkter og rep til failure i dag.' });
    else if (v >= 30) results.push({ key:'hrv', val:`${v}ms`, label:'HRV', level:'danger', badge:'Kritisk',  color:'#FF6B6B', glow:'rgba(255,107,107,0.14)',  advice:'HRV svært lav. Kroppen er under stress. Lett aktivitet eller hviledag — ellers risikerer du overtrening.' });
    else              results.push({ key:'hrv', val:`${v}ms`, label:'HRV', level:'danger', badge:'Alarm',    color:'#FF6B6B', glow:'rgba(255,107,107,0.18)',  advice:'⚠️ Ekstremt lav HRV. Hvil i dag. Sjekk om du er syk, dehydrert eller sover for lite.' });
  }

  // RHR
  if (d?.rhr) {
    const v = d.rhr;
    if (v <= 50)      results.push({ key:'rhr', val:`${v}`, label:'Hvilepuls', unit:'bpm', level:'ok',     badge:'Excellent', color:'#6BE3A4', glow:'rgba(107,227,164,0.1)',  advice:'Optimal hvilepuls. Kroppen er godt restituert.' });
    else if (v <= 56) results.push({ key:'rhr', val:`${v}`, label:'Hvilepuls', unit:'bpm', level:'ok',     badge:'Normal',    color:'#6BE3A4', glow:'rgba(107,227,164,0.08)', advice:'Normal hvilepuls. Ingen grunn til bekymring.' });
    else if (v <= 63) results.push({ key:'rhr', val:`${v}`, label:'Hvilepuls', unit:'bpm', level:'warn',   badge:'Forhøyet',  color:'#F2C063', glow:'rgba(242,192,99,0.12)',   advice:'Lett forhøyet hvilepuls. Kan indikere stress, dehydrering eller tidlig sykdom. Moderer treningsmengden.' });
    else if (v <= 72) results.push({ key:'rhr', val:`${v}`, label:'Hvilepuls', unit:'bpm', level:'danger', badge:'Høy',       color:'#FF6B6B', glow:'rgba(255,107,107,0.14)',  advice:'Forhøyet hvilepuls. Kroppen er under press. Hvil eller lett økt — sjekk væskeinntak og søvn.' });
    else              results.push({ key:'rhr', val:`${v}`, label:'Hvilepuls', unit:'bpm', level:'danger', badge:'Alarm',     color:'#FF6B6B', glow:'rgba(255,107,107,0.18)',  advice:'⚠️ Høy hvilepuls. Tren ikke intensivt i dag. Kan indikere sykdom eller alvorlig underrestitusjon.' });
  }

  // Sleep hours
  if (d?.sleep_hours) {
    const v = d.sleep_hours;
    if (v >= 8)       results.push({ key:'sleep', val:sleepHoursStr(v), label:'Total søvn', level:'ok',     badge:'Optimal',  color:'#5BA4F5', glow:'rgba(91,164,245,0.12)',  advice:'Optimal søvnlengde. Kroppen har fått det den trenger for full restitusjon.' });
    else if (v >= 7)  results.push({ key:'sleep', val:sleepHoursStr(v), label:'Total søvn', level:'ok',     badge:'Bra',      color:'#5BA4F5', glow:'rgba(91,164,245,0.1)',   advice:'Tilstrekkelig søvn. Litt under idealet, men bra nok for de fleste dager.' });
    else if (v >= 6)  results.push({ key:'sleep', val:sleepHoursStr(v), label:'Total søvn', level:'warn',   badge:'For lite',  color:'#F2C063', glow:'rgba(242,192,99,0.12)',  advice:'Under anbefalt søvnmengde. Legg deg 30–60 min tidligere i kveld. Unngå hard trening sent på dagen.' });
    else              results.push({ key:'sleep', val:sleepHoursStr(v), label:'Total søvn', level:'danger', badge:'Kritisk',  color:'#FF6B6B', glow:'rgba(255,107,107,0.14)',  advice:'⚠️ Kritisk lite søvn. Ingen høyintensitetsøkt i dag. Prioriter søvn over alt annet i kveld.' });
  }

  // Sleep score
  if (d?.sleep_score) {
    const v = d.sleep_score;
    if (v >= 85)      results.push({ key:'score', val:`${v}`, label:'Søvnscore', unit:'/100', level:'ok',     badge:'Fremragende', color:'#6BE3A4', glow:'rgba(107,227,164,0.14)', advice:'Fremragende søvnkvalitet. Kroppen har restituert optimalt.' });
    else if (v >= 70) results.push({ key:'score', val:`${v}`, label:'Søvnscore', unit:'/100', level:'ok',     badge:'God',         color:'#6BE3A4', glow:'rgba(107,227,164,0.1)',  advice:'God søvnkvalitet. Du er godt restituert.' });
    else if (v >= 55) results.push({ key:'score', val:`${v}`, label:'Søvnscore', unit:'/100', level:'warn',   badge:'Akseptabel',  color:'#F2C063', glow:'rgba(242,192,99,0.12)',   advice:'Søvnkvaliteten kan forbedres. Unngå skjerm og koffein siste 2t før legging.' });
    else              results.push({ key:'score', val:`${v}`, label:'Søvnscore', unit:'/100', level:'danger', badge:'Dårlig',      color:'#FF6B6B', glow:'rgba(255,107,107,0.14)',  advice:'Dårlig søvnkvalitet. Prioriter søvnhygiene: fast leggetid, mørkt rom, ingen koffein etter kl 14.' });
  }

  return results;
}

function renderWarnings(metrics) {
  const el = document.getElementById('warnBar');
  const dangers = metrics.filter(m => m.level === 'danger');
  const warns   = metrics.filter(m => m.level === 'warn');

  if (!dangers.length && !warns.length) { el.innerHTML = ''; return; }

  const items = [...dangers, ...warns];
  const cls   = dangers.length ? 'warn-red' : 'warn-orange';
  const icon  = dangers.length ? '⚠️' : '💡';

  el.innerHTML = `<div class="warn-bar ${cls}">
    ${items.map(m => `
      <div class="warn-item">
        <div class="warn-icon">${icon}</div>
        <div class="warn-text">
          <div class="warn-title">${m.label}: ${m.badge}</div>
          <div class="warn-advice">${m.advice}</div>
        </div>
      </div>`).join('')}
  </div>`;
}

function renderMetrics(d) {
  const el = document.getElementById('metricsGrid');
  if (!d) { el.innerHTML = ''; renderWarnings([]); return; }

  const metrics = analyzeMetrics(d);
  renderWarnings(metrics);

  // Lag en map for rask oppslag
  const byKey = {};
  metrics.forEach(m => byKey[m.key] = m);

  // Alltid vis alle 4 kort i fast rekkefølge
  const cards = [
    byKey['score'] || { key:'score', val:'–', label:'Søvnscore', unit:'/100', level:'none', badge:'', color:'', glow:'', advice:'' },
    byKey['sleep'] || { key:'sleep', val:'–', label:'Total søvn', level:'none', badge:'', color:'#5BA4F5', glow:'', advice:'' },
    byKey['rhr']   || { key:'rhr',   val:'–', label:'Hvilepuls', unit:'bpm', level:'none', badge:'', color:'', glow:'', advice:'' },
    byKey['hrv']   || { key:'hrv',   val:'–', label:'HRV', unit:'ms', level:'none', badge:'', color:'', glow:'', advice:'' },
  ];

  el.innerHTML = cards.map(m => `
    <div class="metric-card" style="${m.glow ? `box-shadow:0 0 28px ${m.glow};border-color:${m.color}22` : ''}">
      <div class="mc-top-lbl">${m.label}</div>
      <div class="mc-val" style="${m.color ? `color:${m.color}` : ''}">${m.val}</div>
      ${m.unit ? `<div class="mc-unit">${m.unit}</div>` : ''}
      ${m.badge ? `<div class="mc-status-badge" style="color:${m.color};border-color:${m.color}55;background:${m.color}11">${m.badge}</div>` : ''}
      ${m.advice ? `<div class="mc-advice">${m.advice}</div>` : ''}
    </div>`
  ).join('');
}

// ── Render: Sleep Architecture ─────────────────────────────────────────────
function renderArch(d) {
  const el = document.getElementById('archSection');
  const hasFaser = d?.deep_sleep_minutes || d?.rem_sleep_minutes || d?.light_sleep_minutes;

  if (!d || !hasFaser) {
    el.innerHTML = `<div class="card-lbl">Søvnarkitektur</div><div class="empty-state">Ingen fasedata for i dag</div>`;
    return;
  }

  const total = (d.deep_sleep_minutes||0) + (d.rem_sleep_minutes||0) + (d.light_sleep_minutes||0) + (d.awake_minutes||0);
  const pct    = m => total > 0 ? ((m||0)/total*100).toFixed(1) : 0;
  const pctN   = m => total > 0 ? (m||0)/total*100 : 0;
  const insight = getArchInsight(d);

  const stages = [
    { name:'Dyp søvn',  mins:d.deep_sleep_minutes,  color:'#7C6FD4' },
    { name:'REM',       mins:d.rem_sleep_minutes,   color:'#4A9EE8' },
    { name:'Lett søvn', mins:d.light_sleep_minutes, color:'#6BE3A4' },
  ];
  if (d.awake_minutes) stages.push({ name:'Våken', mins:d.awake_minutes, color:'rgba(255,255,255,0.15)' });

  el.innerHTML = `
    <div class="card-lbl">Søvnarkitektur</div>
    ${insight ? `<div class="arch-insight" style="color:${insight.color}">${insight.text}</div>` : ''}
    <div class="arch-bar-premium">
      ${stages.map(s => pctN(s.mins) > 0.5 ? `<div class="arch-seg" style="width:${pctN(s.mins)}%;background:${s.color}" title="${s.name}: ${pct(s.mins)}%"></div>` : '').join('')}
    </div>
    <div class="arch-stages">
      ${stages.filter(s => s.mins).map(s => `
        <div class="arch-stage-item">
          <div class="arch-stage-dot" style="background:${s.color}"></div>
          <div>
            <div class="arch-stage-name">${s.name}</div>
            <div class="arch-stage-val">${minToHM(s.mins)} <span style="opacity:0.45;font-size:9px">${pct(s.mins)}%</span></div>
          </div>
        </div>`).join('')}
    </div>
    ${(d.sleep_start || d.sleep_end) ? `
    <div class="arch-times">
      ${d.sleep_start ? `<div class="time-badge">🛌 ${d.sleep_start}</div>` : ''}
      ${d.sleep_end   ? `<div class="time-badge">⏰ ${d.sleep_end}</div>`   : ''}
    </div>` : ''}`;
}

// ── Render: Readiness ──────────────────────────────────────────────────────
function renderReadiness(d) {
  const el = document.getElementById('readinessSection');
  const r  = getReadinessInsight(d);

  const indicators = [];
  if (d?.sleep_score) {
    const sc = d.sleep_score;
    indicators.push({ label:'Søvnscore', val:`${sc}/100`, status: sc >= 80 ? 'God' : sc >= 60 ? 'Ok' : 'Lav', color: sc >= 80 ? '#6BE3A4' : sc >= 60 ? '#F2C063' : '#FF6B6B' });
  }
  if (d?.hrv) {
    const hrv = d.hrv;
    indicators.push({ label:'HRV', val:`${hrv}ms`, status: hrv >= 50 ? 'Høy' : hrv >= 35 ? 'Normal' : 'Lav', color: hrv >= 50 ? '#6BE3A4' : hrv >= 35 ? 'var(--text-secondary)' : '#F2C063' });
  }
  if (d?.rhr) {
    const rhr = d.rhr;
    indicators.push({ label:'Hvilepuls', val:`${rhr} bpm`, status: rhr < 58 ? 'Lav ✓' : rhr < 68 ? 'Normal' : 'Høy', color: rhr < 58 ? '#6BE3A4' : rhr < 68 ? 'var(--text-secondary)' : '#FF6B6B' });
  }

  el.innerHTML = `
    <div class="card-lbl">Treningsberedskap</div>
    <div class="readiness-status" style="color:${r.color}">${r.status}</div>
    ${r.desc ? `<div class="readiness-desc">${r.desc}</div>` : ''}
    <div class="readiness-level">
      <div class="readiness-level-fill" style="width:${r.level}%;background:${r.color}"></div>
    </div>
    <div class="readiness-indicators">
      ${indicators.map(i => `
        <div class="ri-row">
          <span class="ri-label">${i.label}</span>
          <span style="font-size:10.5px;font-family:var(--font-mono);color:${i.color}">${i.status}</span>
        </div>`).join('')}
    </div>
    ${!d ? `<div class="empty-state" style="margin-top:8px">Ingen data for i dag</div>` : ''}`;
}

// ── Render: All ────────────────────────────────────────────────────────────
function renderStats(d) {
  renderHero(d);
  renderMetrics(d);
  renderArch(d);
  renderReadiness(d);
}

// ── Today ──────────────────────────────────────────────────────────────────
async function loadToday() {
  const { data } = await db.from('health_data')
    .select('*').eq('date', today()).order('timestamp', { ascending: false }).limit(1);
  todayEntry = data?.[0] || null;
  renderStats(todayEntry);
}

// ── Chart ──────────────────────────────────────────────────────────────────
function updateChartLegend(metric) {
  const el = document.getElementById('chartLegend');
  const legends = {
    sleep: `
      <div class="chart-leg-item"><div class="chart-leg-dot" style="background:#7C6FD4"></div>Dyp søvn</div>
      <div class="chart-leg-item"><div class="chart-leg-dot" style="background:#4A9EE8"></div>REM</div>
      <div class="chart-leg-item"><div class="chart-leg-dot" style="background:#6BE3A4"></div>Lett søvn</div>
      <div class="chart-leg-item"><div class="chart-leg-line"></div>8t mål</div>`,
    hrv:   `<div class="chart-leg-item"><div class="chart-leg-dot" style="background:#4A9EE8;border-radius:50%"></div>HRV (ms)</div>`,
    rhr:   `<div class="chart-leg-item"><div class="chart-leg-dot" style="background:#FF6B6B;border-radius:50%"></div>Hvilepuls (bpm)</div>`,
    score: `<div class="chart-leg-item"><div class="chart-leg-dot" style="background:#6BE3A4"></div>Søvnscore (0–100)</div>`,
  };
  el.innerHTML = legends[metric] || '';
}

function renderChart(metric, days) {
  const dayNames = ['søn','man','tir','ons','tor','fre','lør'];
  const labels = [], dates = [];
  for (let i = days - 1; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    labels.push(`${dayNames[d.getDay()]} ${d.getDate()}`);
    dates.push(d.toISOString().slice(0,10));
  }
  const find = ds => chartData.find(r => r.date === ds);

  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
  updateChartLegend(metric);

  // Fjern evt. gammel overlay
  const wrap = document.querySelector('.chart-wrap');
  const old = wrap.querySelector('.chart-overlay');
  if (old) old.remove();

  let datasets, isLine = false, yMax, yLabel;

  if (metric === 'sleep') {
    const deepV  = dates.map(ds => { const e=find(ds); return e?.deep_sleep_minutes  ? minToH(e.deep_sleep_minutes)  : null; });
    const remV   = dates.map(ds => { const e=find(ds); return e?.rem_sleep_minutes   ? minToH(e.rem_sleep_minutes)   : null; });
    const lightV = dates.map(ds => {
      const e = find(ds); if (!e) return null;
      if (e.light_sleep_minutes) return minToH(e.light_sleep_minutes);
      if (e.sleep_hours && !e.deep_sleep_minutes) return e.sleep_hours;
      return null;
    });
    datasets = [
      { label:'Dyp søvn',  data:deepV,  backgroundColor:'rgba(124,111,212,0.82)', borderColor:'#7C6FD4', borderWidth:1, stack:'s', borderRadius:{topLeft:0,topRight:0} },
      { label:'REM',       data:remV,   backgroundColor:'rgba(74,158,232,0.82)',  borderColor:'#4A9EE8', borderWidth:1, stack:'s', borderRadius:{topLeft:0,topRight:0} },
      { label:'Lett søvn', data:lightV, backgroundColor:'rgba(107,227,164,0.55)', borderColor:'#6BE3A4', borderWidth:1, stack:'s', borderRadius:{topLeft:4,topRight:4} },
      { label:'8t mål', data:Array(days).fill(8), type:'line', borderColor:'rgba(255,255,255,0.2)', borderDash:[5,4], borderWidth:1.5, pointRadius:0, fill:false, stack:undefined },
    ];
    yMax = 12; yLabel = 'timer';

  } else if (metric === 'hrv') {
    const vals = dates.map(ds => { const e=find(ds); return e?.hrv || null; });
    datasets = [{ label:'HRV', data:vals, borderColor:'#4A9EE8', backgroundColor:'rgba(74,158,232,0.09)', borderWidth:2, fill:true, tension:0.4, pointRadius:3, pointBackgroundColor:'#4A9EE8', pointHoverRadius:5, pointBorderColor:'transparent' }];
    isLine = true; yLabel = 'ms';

  } else if (metric === 'rhr') {
    const vals = dates.map(ds => { const e=find(ds); return e?.rhr || null; });
    datasets = [{ label:'Hvilepuls', data:vals, borderColor:'#FF6B6B', backgroundColor:'rgba(255,107,107,0.09)', borderWidth:2, fill:true, tension:0.4, pointRadius:3, pointBackgroundColor:'#FF6B6B', pointHoverRadius:5, pointBorderColor:'transparent' }];
    isLine = true; yLabel = 'bpm';

  } else if (metric === 'score') {
    const vals = dates.map(ds => { const e=find(ds); return e?.sleep_score || null; });
    datasets = [{
      label:'Søvnscore', data:vals,
      backgroundColor: vals.map(v => !v ? 'transparent' : v >= 80 ? 'rgba(107,227,164,0.75)' : v >= 60 ? 'rgba(242,192,99,0.75)' : 'rgba(255,107,107,0.75)'),
      borderColor:      vals.map(v => !v ? 'transparent' : v >= 80 ? '#6BE3A4' : v >= 60 ? '#F2C063' : '#FF6B6B'),
      borderWidth:1, borderRadius:4,
    }];
    yMax = 100; yLabel = 'score';
  }

  const ctx = document.getElementById('sleepChart').getContext('2d');
  chartInstance = new Chart(ctx, {
    type: isLine ? 'line' : 'bar',
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      animation: { duration: 380 },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor:'rgba(10,10,13,0.97)', titleColor:'#FAFAFA', bodyColor:'#B8B6B0',
          borderColor:'rgba(255,255,255,0.08)', borderWidth:1, padding:10, cornerRadius:8,
          filter: item => item.dataset.label !== '8t mål' && item.parsed.y > 0,
          callbacks: {
            label: ctx => {
              if (metric === 'sleep') return `${ctx.dataset.label}: ${ctx.parsed.y.toFixed(1)}t`;
              return `${ctx.dataset.label}: ${ctx.parsed.y}`;
            },
          },
        },
      },
      scales: {
        x: {
          stacked: metric === 'sleep',
          grid: { color:'rgba(255,255,255,0.04)', drawBorder:false },
          ticks: { color:'#6B6964', font:{family:'ui-monospace',size:9}, maxRotation:45, maxTicksLimit:days <= 14 ? 14 : 16 },
        },
        y: {
          stacked: metric === 'sleep',
          min: 0, ...(yMax ? { max:yMax } : {}),
          grid: { color:'rgba(255,255,255,0.05)', drawBorder:false },
          ticks: { color:'#6B6964', font:{family:'ui-monospace',size:9} },
          title: { display:true, text:yLabel, color:'rgba(255,255,255,0.18)', font:{size:9} },
        },
      },
    },
  });

  // Vis melding hvis lite historikk
  if (chartData.length < 3) {
    const ov = document.createElement('div');
    ov.className = 'chart-overlay';
    ov.style.cssText = 'position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none';
    ov.innerHTML = `<div style="font-size:11px;font-family:var(--font-mono);color:rgba(255,255,255,0.2);text-align:center;line-height:1.8">
      ${chartData.length === 1 ? '1 dag med data' : 'Ingen historikk ennå'}<br>
      <span style="font-size:10px;color:rgba(255,255,255,0.1)">Grafen fylles automatisk hver morgen kl 07:45</span>
    </div>`;
    wrap.appendChild(ov);
  }
}

async function loadChartData() {
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 29);
  const { data } = await db.from('health_data')
    .select('date,sleep_hours,deep_sleep_minutes,rem_sleep_minutes,light_sleep_minutes,hrv,rhr,sleep_score')
    .gte('date', cutoff.toISOString().slice(0,10)).order('date');
  chartData = data || [];
  renderChart(chartMetric, chartDays);
}

function setChartMetric(metric) {
  chartMetric = metric;
  document.querySelectorAll('.cm-btn').forEach(b => b.classList.toggle('active', b.dataset.metric === metric));
  renderChart(metric, chartDays);
}

function setChartPeriod(days) {
  chartDays = days;
  document.querySelectorAll('.cp-btn').forEach(b => b.classList.toggle('active', b.dataset.days === String(days)));
  renderChart(chartMetric, days);
}

// ── Init ───────────────────────────────────────────────────────────────────
(async () => {
  try {
    const r = await fetch('/api/config');
    if (!r.ok) throw new Error('Config-tjeneste svarte ' + r.status);
    const cfg = await r.json();
    if (cfg.error) throw new Error(cfg.error);
    db = supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);
    const { data: { session } } = await db.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }
  } catch (err) {
    document.querySelector('.sovn-page').innerHTML =
      `<div class="card" style="text-align:center;padding:40px">
        <div style="color:var(--danger);font-family:var(--font-mono);font-size:13px">${err.message}</div>
      </div>`;
    return;
  }
  await Promise.all([loadToday(), loadChartData()]);
})();
</script>
</body>
</html>
