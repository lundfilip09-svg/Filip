<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Søvn & Restitusjon</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .mood-btn {
      width: 36px; height: 36px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.04); font-size: 15px; cursor: pointer;
      transition: all 0.15s; display: flex; align-items: center; justify-content: center;
    }
    .mood-btn.selected { border-color: var(--warning); box-shadow: 0 0 10px rgba(242,192,99,0.3); }
    .mood-row { display: flex; gap: 8px; align-items: center; }
    .chart-wrap { position: relative; height: 260px; margin-top: 10px; }
    .stat-row { display: grid; grid-template-columns: repeat(5,1fr); gap: 8px; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .legend-row { display: flex; align-items: center; gap: 6px; font-size: 11px; font-family: var(--font-mono); color: var(--text-tertiary); }
    @media (max-width: 640px) { .stat-row { grid-template-columns: repeat(3,1fr); } }
    @media (max-width: 400px) { .stat-row { grid-template-columns: repeat(2,1fr); } }
  </style>
</head>
<body>

<nav class="main-nav">
  <div class="nav-inner">
    <div class="nav-tabs">
      <a href="dashboard.html" class="nav-tab" data-p="dashboard">Dashboard</a>
      <a href="gym.html"       class="nav-tab" data-p="gym">Gym</a>
      <a href="sprint.html"    class="nav-tab" data-p="sprint">Sprint</a>
      <a href="sovn.html"      class="nav-tab" data-p="sovn">Søvn</a>
      <a href="gjoremal.html"  class="nav-tab" data-p="gjoremal">Gjøremål</a>
    </div>
  </div>
</nav>

<main class="page">

  <!-- Today -->
  <div class="card">
    <div class="section-title">I dag — <span id="todayLabel" style="text-transform:none;letter-spacing:0;color:var(--text-secondary);font-weight:400"></span></div>
    <div class="stat-row" id="todayStats">
      <div class="loading" style="grid-column:1/-1">Laster…</div>
    </div>
  </div>

  <!-- Mood -->
  <div class="card">
    <div class="section-title">Humør i dag</div>
    <div class="mood-row" id="moodRow">
      <button class="mood-btn" data-mood="1" onclick="saveMood(1)" title="Dårlig">😔</button>
      <button class="mood-btn" data-mood="2" onclick="saveMood(2)" title="Ok">😐</button>
      <button class="mood-btn" data-mood="3" onclick="saveMood(3)" title="Bra">🙂</button>
      <button class="mood-btn" data-mood="4" onclick="saveMood(4)" title="Veldig bra">😊</button>
      <button class="mood-btn" data-mood="5" onclick="saveMood(5)" title="Utmerket">😄</button>
      <span id="moodSaved" style="font-size:11px;color:var(--text-tertiary);font-family:var(--font-mono);margin-left:8px"></span>
    </div>
  </div>

  <!-- 14-day chart -->
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div class="section-title" style="margin-bottom:0">Siste 14 dager</div>
      <div style="display:flex;gap:12px">
        <div class="legend-row"><div class="legend-dot" style="background:#6BE3A4"></div>Søvn (t)</div>
        <div class="legend-row"><div class="legend-dot" style="background:#F2C063"></div>Hvilepuls</div>
        <div class="legend-row"><div class="legend-dot" style="background:rgba(255,107,107,0.7)"></div>Humør</div>
      </div>
    </div>
    <div class="chart-wrap">
      <canvas id="sleepChart"></canvas>
    </div>
  </div>

</main>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script>
let db;
document.querySelector('[data-p="sovn"]').classList.add('active');

let _tt;
function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `toast ${type} show`;
  clearTimeout(_tt); _tt = setTimeout(() => el.classList.remove('show'), 3000);
}
function today() { return new Date().toISOString().slice(0, 10); }

// Date label
const now = new Date();
document.getElementById('todayLabel').textContent =
  now.toLocaleDateString('no-NO', { weekday:'long', day:'numeric', month:'long' });

let currentMood = null;
let todayEntry  = null;

// ── Today stats ───────────────────────────────────────────────────────────
async function loadToday() {
  const { data } = await db.from('health_data')
    .select('*').eq('date', today()).order('timestamp', { ascending: false }).limit(1);
  todayEntry = data?.[0] || null;
  renderStats(todayEntry);

  if (todayEntry?.mood) {
    currentMood = todayEntry.mood;
    highlightMood(currentMood);
    document.getElementById('moodSaved').textContent = 'Lagret';
  }
}

function renderStats(d) {
  const el = document.getElementById('todayStats');
  if (!d) {
    el.innerHTML = `<div class="empty" style="grid-column:1/-1">Ingen data for i dag — send via iPhone-snarvei</div>`;
    return;
  }
  const sc = d.sleep_score;
  const scColor = !sc ? '' : sc >= 80 ? 'success' : sc >= 60 ? 'warning' : 'danger';
  const stats = [
    { lbl:'Søvnscore',   val: sc ?? '–',   unit:'/ 100', cls: scColor },
    { lbl:'Søvntimer',   val: d.sleep_hours ?? '–', unit:'t' },
    { lbl:'Innsovning',  val: d.sleep_onset_minutes ?? '–', unit:'min' },
    { lbl:'Hvilepuls',   val: d.rhr ?? '–', unit:'bpm', cls: d.rhr > 65 ? 'danger' : '' },
  ];
  el.innerHTML = stats.map(s =>
    `<div class="metric-tile">
      <div class="metric-lbl">${s.lbl}</div>
      <div class="metric-val ${s.cls||''}">${s.val}</div>
      ${s.unit ? `<div class="metric-unit">${s.unit}</div>` : ''}
    </div>`
  ).join('');
}

// ── Mood ──────────────────────────────────────────────────────────────────
function highlightMood(mood) {
  document.querySelectorAll('.mood-btn').forEach(b => {
    b.classList.toggle('selected', parseInt(b.dataset.mood) === mood);
  });
}

async function saveMood(mood) {
  currentMood = mood;
  highlightMood(mood);
  document.getElementById('moodSaved').textContent = 'Lagrer…';

  if (todayEntry) {
    await db.from('health_data').update({ mood }).eq('id', todayEntry.id);
  } else {
    await db.from('health_data').insert({ date: today(), mood });
  }
  document.getElementById('moodSaved').textContent = 'Lagret';
  toast('Humør lagret');
}

// ── 14-day chart ──────────────────────────────────────────────────────────
async function loadChart() {
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - 13);
  const cutoffStr = cutoff.toISOString().slice(0,10);

  const { data } = await db.from('health_data')
    .select('date,sleep_hours,sleep_score,rhr,mood')
    .gte('date', cutoffStr).order('date');

  const labels = [];
  for (let i = 13; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    labels.push(d.toLocaleDateString('no-NO', { day:'numeric', month:'short' }));
  }
  const dates = [];
  for (let i = 13; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    dates.push(d.toISOString().slice(0,10));
  }

  function getVals(key) {
    return dates.map(ds => {
      const e = (data || []).find(r => r.date === ds);
      return e ? (e[key] ?? null) : null;
    });
  }

  const ctx = document.getElementById('sleepChart').getContext('2d');
  new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: 'Søvntimer',
          data: getVals('sleep_hours'),
          borderColor: '#6BE3A4', backgroundColor: 'rgba(107,227,164,0.08)',
          yAxisID: 'y', tension: 0.3, pointRadius: 4,
          pointBackgroundColor: '#6BE3A4', spanGaps: true,
        },
        {
          label: 'Hvilepuls',
          data: getVals('rhr'),
          borderColor: '#F2C063', backgroundColor: 'rgba(242,192,99,0.05)',
          yAxisID: 'y1', tension: 0.3, pointRadius: 4,
          pointBackgroundColor: '#F2C063', spanGaps: true, borderDash: [4,3],
        },
        {
          label: 'Humør (1–5)',
          data: getVals('mood'),
          borderColor: 'rgba(255,107,107,0.7)', backgroundColor: 'rgba(255,107,107,0.05)',
          yAxisID: 'y2', tension: 0.3, pointRadius: 5, pointStyle: 'rectRot',
          pointBackgroundColor: 'rgba(255,107,107,0.7)', spanGaps: true,
        },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(15,15,18,0.95)',
          titleColor: '#FAFAFA', bodyColor: '#B8B6B0',
          borderColor: 'rgba(255,255,255,0.08)', borderWidth: 1,
        },
      },
      scales: {
        x: {
          grid: { color: 'rgba(255,255,255,0.04)' },
          ticks: { color: '#76746E', font: { family: 'ui-monospace', size: 10 }, maxRotation: 45 },
        },
        y: {
          position: 'left', title: { display: true, text: 't', color: '#6BE3A4', font: { size: 10 } },
          grid: { color: 'rgba(255,255,255,0.04)' },
          ticks: { color: '#76746E', font: { family: 'ui-monospace', size: 10 } },
          min: 0, max: 12,
        },
        y1: {
          position: 'right', title: { display: true, text: 'bpm / ms', color: '#5BA4F5', font: { size: 10 } },
          grid: { drawOnChartArea: false },
          ticks: { color: '#76746E', font: { family: 'ui-monospace', size: 10 } },
          min: 0,
        },
        y2: {
          position: 'right', title: { display: false },
          grid: { drawOnChartArea: false },
          ticks: { display: false },
          min: 0, max: 5,
        },
      },
    },
  });
}

(async () => {
  try {
    const r = await fetch('/api/config');
    if (!r.ok) throw new Error('Config-tjeneste svarte ' + r.status);
    const cfg = await r.json();
    if (cfg.error) throw new Error(cfg.error);
    db = supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);
  } catch (err) {
    document.querySelector('.page').innerHTML =
      `<div class="card" style="text-align:center;padding:40px">
        <div style="color:var(--danger);font-family:var(--font-mono);font-size:13px">${err.message}</div>
        <div style="color:var(--text-tertiary);font-size:11px;margin-top:10px">
          Deploy til Netlify og sett SUPABASE_URL og SUPABASE_ANON_KEY som miljøvariabler.
        </div>
      </div>`;
    return;
  }
  await Promise.all([loadToday(), loadChart()]);
})();
</script>
</body>
</html>
