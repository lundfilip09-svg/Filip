<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gym — Styrketrening</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .add-ex-form {
      display: none; gap: 8px; margin-top: 8px; padding: 10px;
      background: rgba(255,255,255,0.03); border-radius: 8px;
    }
    .add-ex-form.open { display: flex; }
    .add-ex-form input { flex: 1; }
    .add-ex-form .w-sets, .add-ex-form .w-reps { width: 72px; flex: none; }
    .knee-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 16px; }
    .knee-phase-label { font-size: 11px; font-family: var(--font-mono); color: var(--text-secondary); margin-bottom: 6px; }
    .warmup-note { font-size: 11px; color: var(--text-tertiary); font-style: italic; margin-bottom: 10px; }
    @media (max-width: 600px) { .knee-grid { grid-template-columns: 1fr; } }
    .sort-btn { background: none; border: none; color: var(--text-tertiary); cursor: pointer; font-size: 13px; padding: 2px 3px; line-height: 1; }
    .sort-btn:hover { color: var(--text-secondary); }
    .edit-ex-btn { background: none; border: none; color: var(--text-tertiary); cursor: pointer; font-size: 13px; padding: 2px 3px; line-height: 1; }
    .edit-ex-btn:hover { color: var(--accent-blue); }
    .edit-ex-form { display: none; gap: 6px; align-items: center; padding: 6px 10px 8px; background: rgba(255,255,255,0.02); border-radius: 6px; margin: 2px 0 4px; }
    .edit-ex-form.open { display: flex; }
    .gym-hist-wrap { margin-bottom: 4px; }
    .gym-hist-row {
      display: flex; align-items: center; gap: 10px; padding: 8px 10px;
      background: rgba(255,255,255,0.02); border-radius: 8px;
      font-size: 12px; font-family: var(--font-mono);
    }
    .gym-hist-date { color: var(--text-tertiary); width: 100px; flex-shrink: 0; }
    .gym-hist-type { color: var(--text-primary); flex: 1; }
    .gym-hist-note { color: var(--text-tertiary); font-size: 10px; }
    .gym-hist-knee { font-size: 10px; font-family: var(--font-mono); color: var(--text-tertiary); padding: 2px 10px 4px; }
    .edit-knee-btn { background: none; border: none; color: var(--text-tertiary); cursor: pointer; font-size: 13px; padding: 2px 3px; margin-left: auto; flex-shrink: 0; }
    .edit-knee-btn:hover { color: var(--accent-blue); }
    .knee-edit-panel { display: none; padding: 10px; background: rgba(255,255,255,0.03); border-radius: 8px; margin-bottom: 2px; }
    .knee-edit-panel.open { display: block; }
    .knee-edit-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .knee-edit-label { font-size: 10px; font-family: var(--font-mono); color: var(--text-tertiary); }
  </style>
</head>
<body>

<nav class="main-nav">
  <div class="nav-inner">
    <div class="nav-tabs">
      <a href="dashboard.html" class="nav-tab" data-p="dashboard">Dashboard</a>
      <a href="gym.html"       class="nav-tab" data-p="gym">Gym</a>
      <a href="sprint.html"    class="nav-tab" data-p="sprint">Sprint</a>
      <a href="sovn.html"      class="nav-tab" data-p="sovn">Søvn</a>
      <a href="gjoremal.html"  class="nav-tab" data-p="gjoremal">Gjøremål</a>
      <a href="treningsplan.html" class="nav-tab" data-p="treningsplan">Treningsplan</a>
    </div>
    <button onclick="signOut()" class="btn btn-ghost btn-sm" style="font-size:11px;flex-shrink:0;margin-left:8px">Logg ut</button>
  </div>
</nav>

<main class="page">

  <!-- Day tabs -->
  <div class="day-tabs">
    <button class="day-tab" data-day="monday"    onclick="setDay('monday')">Mandag</button>
    <button class="day-tab" data-day="wednesday" onclick="setDay('wednesday')">Onsdag</button>
    <button class="day-tab" data-day="friday"    onclick="setDay('friday')">Fredag</button>
  </div>

  <!-- Warmup -->
  <div class="card">
    <div class="section-title">Oppvarming</div>
    <div id="warmupContent"><div class="loading">Laster…</div></div>
  </div>

  <!-- Main workout -->
  <div class="card">
    <div class="section-title" id="workoutTitle">Økt</div>
    <div id="workoutContent"><div class="loading">Laster…</div></div>
  </div>

  <!-- Knee pain log -->
  <div class="card">
    <div class="section-title">Knesmerte — logg</div>
    <div class="knee-grid">
      <div>
        <div class="knee-phase-label">Før økt</div>
        <div class="pain-row" id="knee-before"></div>
      </div>
      <div>
        <div class="knee-phase-label">Under økt</div>
        <div class="pain-row" id="knee-during"></div>
      </div>
      <div>
        <div class="knee-phase-label">Etter økt</div>
        <div class="pain-row" id="knee-after"></div>
      </div>
      <div>
        <div class="knee-phase-label">Dagen etter</div>
        <div class="pain-row" id="knee-day-after"></div>
      </div>
    </div>
    <div class="divider"></div>
    <div class="form-group">
      <label class="form-label">Dato for økt</label>
      <input type="date" id="logDate">
    </div>
    <div class="form-group">
      <label class="form-label">Notater</label>
      <textarea id="sessionNotes" placeholder="Hvordan gikk økten?"></textarea>
    </div>
    <div style="margin-top:10px;display:flex;gap:8px">
      <button class="btn btn-success" onclick="saveLog()">Lagre økt</button>
      <button class="btn btn-ghost" onclick="clearLog()">Nullstill</button>
    </div>
  </div>

  <!-- Gym history -->
  <div class="card">
    <div class="section-title">Økthistorikk</div>
    <div id="gymHistory"><div class="loading">Laster…</div></div>
  </div>

</main>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
let db;
document.querySelector('[data-p="gym"]').classList.add('active');

let _tt;
function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `toast ${type} show`;
  clearTimeout(_tt); _tt = setTimeout(() => el.classList.remove('show'), 3000);
}
async function signOut() {
  if (db) await db.auth.signOut();
  window.location.href = 'login.html';
}
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function today() { return new Date().toISOString().slice(0,10); }

// ── State ───────────────────────────────────────────────────────────────
let activeDay   = detectDay();
let allExercises = {};   // day -> section -> [{id,exercise_name,sets,reps}]
let weights      = {};   // exercise_name -> weight_kg
const kneePain   = { before: null, during: null, after: null, 'day-after': null };

function detectDay() {
  const d = new Date().getDay();
  if (d === 1) return 'monday';
  if (d === 3) return 'wednesday';
  if (d === 5) return 'friday';
  return 'monday';
}

// ── Init ─────────────────────────────────────────────────────────────────
async function init() {
  document.getElementById('logDate').value = today();
  setDay(activeDay);
  await loadData();
  renderAll();
  buildPainButtons();
  await loadGymHistory();
}

async function loadData() {
  const [prog, wts] = await Promise.all([
    db.from('workout_program').select('*').order('sort_order'),
    db.from('exercise_weights').select('*'),
  ]);

  allExercises = {};
  (prog.data || []).forEach(ex => {
    if (!allExercises[ex.day]) allExercises[ex.day] = {};
    if (!allExercises[ex.day][ex.section]) allExercises[ex.day][ex.section] = [];
    allExercises[ex.day][ex.section].push(ex);
  });

  weights = {};
  (wts.data || []).forEach(w => { weights[w.exercise_name] = w.weight_kg; });
}

// ── Day tab ──────────────────────────────────────────────────────────────
function setDay(day) {
  activeDay = day;
  document.querySelectorAll('.day-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.day === day);
  });
  const titles = { monday: 'Styrke Kapasitet', wednesday: 'Sirkulasjon & Mobilitet', friday: 'Styrke Power' };
  document.getElementById('workoutTitle').textContent = titles[day] || 'Økt';
  renderAll();
}

function renderAll() {
  renderWarmup();
  renderWorkout();
}

// ── Warmup ───────────────────────────────────────────────────────────────
function renderWarmup() {
  const el  = document.getElementById('warmupContent');
  const isFriday = activeDay === 'friday';
  const base = allExercises['warmup'] || {};
  const fri  = allExercises['friday_warmup'] || {};

  const sykkelSection = isFriday ? fri['Sykkel'] : base['Sykkel'];
  const extraSection  = isFriday ? fri['Ekstra'] : null;
  const hoftSection   = base['Hofteaktivering'] || [];
  const knaerSection  = base['Knær'] || [];

  let html = '';
  if (sykkelSection) html += renderSection('Sykkel', sykkelSection, isFriday ? 'friday_warmup' : 'warmup', true);
  if (extraSection)  html += renderSection('Ekstra', extraSection, 'friday_warmup', true);
  if (hoftSection.length) html += renderSection('Hofteaktivering', hoftSection, 'warmup', true);
  if (knaerSection.length) html += renderSection('Knær', knaerSection, 'warmup', true);

  el.innerHTML = html || '<div class="empty">Ingen oppvarmingsdata</div>';
}

// ── Workout ───────────────────────────────────────────────────────────────
function renderWorkout() {
  const el  = document.getElementById('workoutContent');
  const day = allExercises[activeDay] || {};
  if (!Object.keys(day).length) {
    el.innerHTML = '<div class="loading">Laster øvelser…</div>'; return;
  }
  el.innerHTML = Object.entries(day).map(([section, exs]) =>
    renderSection(section, exs, activeDay, true)
  ).join('');
}

function renderSection(label, exs, day, editable) {
  const addId = `add-${day}-${label.replace(/\s/g,'_')}`;
  return `<div class="exercise-section">
    <div class="exercise-section-label">${escHtml(label)}</div>
    ${exs.map(ex => renderExRow(ex, day)).join('')}
    ${editable ? `
    <div class="add-ex-form" id="${addId}">
      <input class="input-sm" placeholder="Øvelse" id="${addId}-name">
      <input class="input-sm w-sets" type="number" placeholder="Sett" id="${addId}-sets" style="width:60px">
      <input class="input-sm w-reps" placeholder="Reps" id="${addId}-reps" style="width:70px">
      <button class="btn btn-success btn-sm" onclick="addExercise('${day}','${escHtml(label)}','${addId}')">+</button>
      <button class="btn btn-ghost btn-sm" onclick="document.getElementById('${addId}').classList.remove('open')">✕</button>
    </div>
    <button class="btn btn-ghost btn-xs" style="margin-top:4px" onclick="document.getElementById('${addId}').classList.toggle('open')">+ Øvelse</button>
    ` : ''}
  </div>`;
}

function renderExRow(ex, day) {
  const w = weights[ex.exercise_name];
  const wVal = w !== undefined && w !== null ? w : '';
  const isWarmup = day === 'warmup' || day === 'friday_warmup';
  return `<div id="exrow-wrap-${ex.id}">
    <div class="exercise-row" id="exrow-${ex.id}">
      <div class="exercise-info">
        <div class="exercise-name">${escHtml(ex.exercise_name)}</div>
        <div class="exercise-meta">${ex.sets} × ${ex.reps}</div>
      </div>
      ${!isWarmup ? `
      <input class="weight-inp" type="number" step="0.5" value="${wVal}" placeholder="—"
        title="Vekt (kg)" onblur="saveWeight('${escHtml(ex.exercise_name)}', this.value)">
      <span class="weight-unit">kg</span>
      ` : ''}
      <button class="sort-btn" onclick="moveExercise('${ex.id}','${day}','${escHtml(ex.section)}',-1)" title="Flytt opp">↑</button>
      <button class="sort-btn" onclick="moveExercise('${ex.id}','${day}','${escHtml(ex.section)}',1)" title="Flytt ned">↓</button>
      <button class="edit-ex-btn" onclick="toggleEditEx('${ex.id}')" title="Rediger sett/reps">✎</button>
      <button class="btn btn-danger btn-icon btn-xs" onclick="deleteExercise('${ex.id}')" title="Slett">✕</button>
    </div>
    <div class="edit-ex-form" id="edit-form-${ex.id}">
      <input class="input-sm" type="number" id="edit-sets-${ex.id}" value="${ex.sets}" style="width:52px" placeholder="Sett">
      <span style="color:var(--text-tertiary);font-size:11px;font-family:var(--font-mono)">×</span>
      <input class="input-sm" id="edit-reps-${ex.id}" value="${escHtml(ex.reps)}" style="width:80px" placeholder="Reps">
      <button class="btn btn-success btn-sm" onclick="saveExMeta('${ex.id}')">✓</button>
      <button class="btn btn-ghost btn-sm" onclick="toggleEditEx('${ex.id}')">✕</button>
    </div>
  </div>`;
}

// ── Weight save ───────────────────────────────────────────────────────────
async function saveWeight(name, val) {
  if (val === '' || val === null) return;
  const kg = parseFloat(val);
  if (isNaN(kg)) return;
  weights[name] = kg;
  const { error } = await db.from('exercise_weights').upsert(
    { exercise_name: name, weight_kg: kg, updated_at: new Date().toISOString() },
    { onConflict: 'exercise_name' }
  );
  if (!error) toast(`${name}: ${kg} kg lagret`);
}

// ── Add exercise ──────────────────────────────────────────────────────────
async function addExercise(day, section, formId) {
  const name = document.getElementById(`${formId}-name`).value.trim();
  const sets = parseInt(document.getElementById(`${formId}-sets`).value) || 3;
  const reps = document.getElementById(`${formId}-reps`).value.trim() || '8–10';
  if (!name) return;

  const maxSort = Math.max(0, ...((allExercises[day]?.[section] || []).map(e => e.sort_order)));
  const { data, error } = await db.from('workout_program').insert({
    day, section, exercise_name: name, sets, reps, sort_order: maxSort + 1,
  }).select().single();
  if (error) { toast('Feil ved lagring', 'err'); return; }

  if (!allExercises[day]) allExercises[day] = {};
  if (!allExercises[day][section]) allExercises[day][section] = [];
  allExercises[day][section].push(data);
  document.getElementById(formId).classList.remove('open');
  document.getElementById(`${formId}-name`).value = '';
  renderAll();
  toast(`${name} lagt til`);
}

// ── Move exercise (sort order) ────────────────────────────────────────────
async function moveExercise(id, day, section, dir) {
  const list = allExercises[day]?.[section] || [];
  const idx = list.findIndex(e => e.id === id);
  const newIdx = idx + dir;
  if (idx < 0 || newIdx < 0 || newIdx >= list.length) return;

  const a = list[idx], b = list[newIdx];
  const sortA = a.sort_order, sortB = b.sort_order;

  await Promise.all([
    db.from('workout_program').update({ sort_order: sortB }).eq('id', a.id),
    db.from('workout_program').update({ sort_order: sortA }).eq('id', b.id),
  ]);

  a.sort_order = sortB; b.sort_order = sortA;
  list[idx] = b; list[newIdx] = a;
  renderAll();
}

// ── Delete exercise ───────────────────────────────────────────────────────
async function deleteExercise(id) {
  if (!confirm('Slett øvelse?')) return;
  await db.from('workout_program').delete().eq('id', id);
  // Remove from local state
  for (const day of Object.keys(allExercises)) {
    for (const sec of Object.keys(allExercises[day])) {
      allExercises[day][sec] = allExercises[day][sec].filter(e => e.id !== id);
    }
  }
  renderAll();
  toast('Øvelse slettet');
}

// ── Exercise inline edit ──────────────────────────────────────────────────
function toggleEditEx(id) {
  document.getElementById(`edit-form-${id}`).classList.toggle('open');
}

async function saveExMeta(id) {
  const sets = parseInt(document.getElementById(`edit-sets-${id}`).value);
  const reps = document.getElementById(`edit-reps-${id}`).value.trim();
  if (!sets || !reps) { toast('Fyll inn sett og reps', 'err'); return; }
  await db.from('workout_program').update({ sets, reps }).eq('id', id);
  for (const d of Object.keys(allExercises)) {
    for (const sec of Object.keys(allExercises[d])) {
      const ex = allExercises[d][sec].find(e => e.id === id);
      if (ex) { ex.sets = sets; ex.reps = reps; }
    }
  }
  renderAll();
  toast('Oppdatert');
}

// ── Knee pain buttons ─────────────────────────────────────────────────────
function painClass(score) {
  if (score <= 3) return 'sel-green';
  if (score <= 5) return 'sel-yellow';
  if (score <= 7) return 'sel-orange';
  return 'sel-red';
}

function buildPainButtons() {
  ['before','during','after','day-after'].forEach(phase => {
    const el = document.getElementById(`knee-${phase}`);
    el.innerHTML = [...Array(11)].map((_,i) => `
      <button class="pain-btn" data-phase="${phase}" data-score="${i}" onclick="selectPain('${phase}',${i})">${i}</button>
    `).join('');
  });
}

function selectPain(phase, score) {
  kneePain[phase] = score;
  document.querySelectorAll(`[data-phase="${phase}"]`).forEach(b => {
    b.className = 'pain-btn' + (parseInt(b.dataset.score) === score ? ' ' + painClass(score) : '');
  });
}

// ── Save log ──────────────────────────────────────────────────────────────
async function saveLog() {
  const dayLabels = { monday:'Styrke Kapasitet', wednesday:'Sirkulasjon & Mobilitet', friday:'Styrke Power' };
  const notes = document.getElementById('sessionNotes').value.trim();
  const date  = document.getElementById('logDate').value || today();

  const [kRes, gRes] = await Promise.all([
    db.from('knee_pain').insert({
      date,
      session_type: dayLabels[activeDay] || activeDay,
      before_score:    kneePain['before'],
      during_score:    kneePain['during'],
      after_score:     kneePain['after'],
      day_after_score: kneePain['day-after'],
      notes,
    }),
    db.from('gym_log').insert({
      date,
      session_type: dayLabels[activeDay] || activeDay,
      session_notes: notes,
    }),
  ]);

  if (kRes.error || gRes.error) { toast('Feil ved lagring', 'err'); return; }
  toast('Økt lagret!');
  await loadGymHistory();
}

function clearLog() {
  ['before','during','after','day-after'].forEach(p => {
    kneePain[p] = null;
    document.querySelectorAll(`[data-phase="${p}"]`).forEach(b => b.className = 'pain-btn');
  });
  document.getElementById('sessionNotes').value = '';
  document.getElementById('logDate').value = today();
}

// ── Gym history ───────────────────────────────────────────────────────────
async function loadGymHistory() {
  const { data: gymData } = await db.from('gym_log')
    .select('*').order('date', { ascending: false }).limit(20);
  const el = document.getElementById('gymHistory');
  if (!gymData?.length) { el.innerHTML = '<div class="empty">Ingen loggede økter ennå</div>'; return; }

  const dates = [...new Set(gymData.map(g => g.date))];
  const { data: kneeData } = await db.from('knee_pain').select('*').in('date', dates);
  const kneeMap = {};
  (kneeData || []).forEach(k => { kneeMap[k.date + '|' + (k.session_type || '')] = k; });

  const kn = v => (v !== null && v !== undefined) ? v : '—';

  el.innerHTML = gymData.map(g => {
    const knee = kneeMap[g.date + '|' + (g.session_type || '')] || null;
    const d = new Date(g.date + 'T12:00:00');
    const dateStr = d.toLocaleDateString('no-NO', { weekday:'short', day:'numeric', month:'short' });
    const kneeStr = knee
      ? `Før: ${kn(knee.before_score)} · Under: ${kn(knee.during_score)} · Etter: ${kn(knee.after_score)} · Dagen etter: ${kn(knee.day_after_score)}`
      : '';
    const kneeId = knee?.id || '';
    return `<div class="gym-hist-wrap" id="hist-wrap-${g.id}">
      <div class="gym-hist-row">
        <span class="gym-hist-date">${dateStr}</span>
        <span class="gym-hist-type">${escHtml(g.session_type || '')}</span>
        ${g.session_notes ? `<span class="gym-hist-note">${escHtml(g.session_notes.slice(0,40))}</span>` : ''}
        <button class="edit-knee-btn" onclick="toggleKneeEdit('${g.id}')" title="Rediger knesmerte">✎</button>
      </div>
      ${kneeStr ? `<div class="gym-hist-knee">${kneeStr}</div>` : ''}
      <div class="knee-edit-panel" id="knee-edit-${g.id}">
        <div class="knee-edit-row">
          <span class="knee-edit-label">Før</span>
          <input class="input-sm" type="number" min="0" max="10" id="ke-before-${g.id}" value="${knee?.before_score ?? ''}" style="width:52px">
          <span class="knee-edit-label">Under</span>
          <input class="input-sm" type="number" min="0" max="10" id="ke-during-${g.id}" value="${knee?.during_score ?? ''}" style="width:52px">
          <span class="knee-edit-label">Etter</span>
          <input class="input-sm" type="number" min="0" max="10" id="ke-after-${g.id}" value="${knee?.after_score ?? ''}" style="width:52px">
          <span class="knee-edit-label">Dagen etter</span>
          <input class="input-sm" type="number" min="0" max="10" id="ke-dayafter-${g.id}" value="${knee?.day_after_score ?? ''}" style="width:52px">
        </div>
        <div style="margin-top:6px;display:flex;gap:6px">
          <button class="btn btn-success btn-sm" onclick="saveKneeEdit('${g.id}','${kneeId}','${g.date}','${escHtml(g.session_type || '')}')">Lagre</button>
          <button class="btn btn-ghost btn-sm" onclick="toggleKneeEdit('${g.id}')">Avbryt</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleKneeEdit(gymId) {
  document.getElementById(`knee-edit-${gymId}`).classList.toggle('open');
}

async function saveKneeEdit(gymId, kneeId, date, sessionType) {
  const before   = parseInt(document.getElementById(`ke-before-${gymId}`).value);
  const during   = parseInt(document.getElementById(`ke-during-${gymId}`).value);
  const after    = parseInt(document.getElementById(`ke-after-${gymId}`).value);
  const dayAfter = parseInt(document.getElementById(`ke-dayafter-${gymId}`).value);
  const payload  = {
    before_score:    isNaN(before)   ? null : before,
    during_score:    isNaN(during)   ? null : during,
    after_score:     isNaN(after)    ? null : after,
    day_after_score: isNaN(dayAfter) ? null : dayAfter,
  };
  if (kneeId) {
    await db.from('knee_pain').update(payload).eq('id', kneeId);
  } else {
    await db.from('knee_pain').insert({ date, session_type: sessionType, ...payload });
  }
  toast('Knesmerte oppdatert');
  await loadGymHistory();
}

(async () => {
  try {
    const r = await fetch('/api/config');
    if (!r.ok) throw new Error('Config-tjeneste svarte ' + r.status);
    const cfg = await r.json();
    if (cfg.error) throw new Error(cfg.error);
    db = supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);
    const { data: { session } } = await db.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }
  } catch (err) {
    document.querySelector('.page').innerHTML =
      `<div class="card" style="text-align:center;padding:40px">
        <div style="color:var(--danger);font-family:var(--font-mono);font-size:13px">${err.message}</div>
        <div style="color:var(--text-tertiary);font-size:11px;margin-top:10px">
          Deploy til Netlify og sett SUPABASE_URL og SUPABASE_ANON_KEY som miljøvariabler.
        </div>
      </div>`;
    return;
  }
  await init();
})();
</script>
</body>
</html>
