<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kalender</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    /* ── Layout ──────────────────────────────────────────────────── */
    .kal-page {
      max-width: 1200px; margin: 0 auto;
      padding: 20px 16px 60px;
      position: relative; z-index: 1;
      display: flex; flex-direction: column; gap: 0;
    }

    /* ── Header ──────────────────────────────────────────────────── */
    .kal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 0 16px;
    }
    .kal-month-label {
      font-size: 22px; font-weight: 700; font-family: var(--font-mono);
      color: var(--text-primary); letter-spacing: -0.02em;
    }
    .kal-month-label span { color: var(--text-tertiary); font-weight: 400; font-size: 16px; margin-left: 6px; }
    .kal-nav { display: flex; align-items: center; gap: 8px; }
    .kal-nav-btn {
      width: 32px; height: 32px; border-radius: 8px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.09);
      color: var(--text-secondary); cursor: pointer; font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, border-color 0.15s;
    }
    .kal-nav-btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.18); }
    .kal-today-btn {
      padding: 0 12px; height: 32px; border-radius: 8px;
      background: rgba(91,164,245,0.12); border: 1px solid rgba(91,164,245,0.25);
      color: #5BA4F5; cursor: pointer; font-size: 11px; font-family: var(--font-mono);
      letter-spacing: 0.06em; text-transform: uppercase; transition: background 0.15s;
    }
    .kal-today-btn:hover { background: rgba(91,164,245,0.22); }

    /* ── Week Strip ──────────────────────────────────────────────── */
    .week-strip-wrap {
      overflow-x: auto; -webkit-overflow-scrolling: touch;
      scrollbar-width: none; padding-bottom: 4px;
      margin-bottom: 24px;
    }
    .week-strip-wrap::-webkit-scrollbar { display: none; }
    .week-strip {
      display: grid; grid-template-columns: repeat(7, 1fr);
      gap: 6px; min-width: 560px;
    }
    .week-day {
      display: flex; flex-direction: column; align-items: center;
      padding: 14px 8px 12px; border-radius: 14px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.055);
      cursor: pointer; transition: all 0.18s; position: relative; overflow: hidden;
      user-select: none;
    }
    .week-day:hover {
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.11);
      transform: translateY(-2px);
    }
    .week-day.today {
      background: rgba(91,164,245,0.07);
      border-color: rgba(91,164,245,0.2);
    }
    .week-day.today::before {
      content: ''; position: absolute; top: 0; left: 20%; right: 20%;
      height: 2px; background: linear-gradient(to right, transparent, rgba(91,164,245,0.7), transparent);
    }
    .week-day.selected {
      background: rgba(255,255,255,0.07);
      border-color: rgba(255,255,255,0.18);
      box-shadow: 0 0 24px rgba(255,255,255,0.04), inset 0 0 16px rgba(255,255,255,0.02);
    }
    .week-day.selected.today {
      background: rgba(91,164,245,0.1);
      border-color: rgba(91,164,245,0.35);
      box-shadow: 0 0 24px rgba(91,164,245,0.1);
    }
    .wd-name {
      font-size: 8px; font-family: var(--font-mono); letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 6px;
    }
    .week-day.today .wd-name, .week-day.selected .wd-name { color: rgba(91,164,245,0.8); }
    .wd-num {
      font-size: 26px; font-weight: 700; font-family: var(--font-mono);
      color: var(--text-tertiary); line-height: 1; margin-bottom: 8px;
    }
    .week-day.today .wd-num { color: var(--text-secondary); }
    .week-day.selected .wd-num { color: var(--text-primary); }
    .wd-dots { display: flex; gap: 3px; justify-content: center; min-height: 6px; flex-wrap: wrap; max-width: 40px; }
    .wd-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
    .wd-preview {
      font-size: 8.5px; font-family: var(--font-mono); color: var(--text-tertiary);
      margin-top: 6px; text-align: center; line-height: 1.3;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 80px;
    }

    /* ── Main content area ───────────────────────────────────────── */
    .kal-main {
      display: grid; grid-template-columns: 1fr 340px; gap: 16px;
      align-items: start; margin-bottom: 20px;
    }
    @media (max-width: 900px) { .kal-main { grid-template-columns: 1fr; } }

    /* ── Timeline ────────────────────────────────────────────────── */
    .timeline-card {
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(255,255,255,0.055);
      border-radius: 16px; overflow: hidden;
    }
    .tl-header {
      padding: 14px 18px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex; align-items: baseline; gap: 10px;
    }
    .tl-date-big {
      font-size: 16px; font-weight: 700; font-family: var(--font-mono);
      color: var(--text-primary); letter-spacing: -0.01em;
    }
    .tl-date-sub {
      font-size: 10px; font-family: var(--font-mono); color: var(--text-tertiary);
      text-transform: uppercase; letter-spacing: 0.1em;
    }

    /* All-day events strip */
    .allday-strip {
      padding: 10px 18px; border-bottom: 1px solid rgba(255,255,255,0.05);
      display: flex; flex-wrap: wrap; gap: 5px; min-height: 36px;
      align-items: center;
    }
    .allday-strip:empty::before {
      content: 'Ingen heldagshendelser'; font-size: 10px;
      font-family: var(--font-mono); color: rgba(255,255,255,0.12);
    }
    .allday-pill {
      padding: 3px 10px; border-radius: 20px;
      font-size: 11px; font-family: var(--font-mono);
      cursor: pointer; transition: opacity 0.15s; white-space: nowrap;
    }
    .allday-pill:hover { opacity: 0.85; }

    /* Hour grid */
    .tl-grid {
      position: relative;
      padding: 0 18px 18px;
      overflow-y: auto; max-height: 540px;
    }
    .tl-grid::-webkit-scrollbar { width: 3px; }
    .tl-grid::-webkit-scrollbar-track { background: transparent; }
    .tl-grid::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    .tl-inner { position: relative; }
    .tl-hour-row {
      display: flex; align-items: flex-start;
      position: relative; height: 60px;
    }
    .tl-hour-row::after {
      content: ''; position: absolute;
      left: 42px; right: 0; top: 0;
      height: 1px; background: rgba(255,255,255,0.04);
    }
    .tl-hour-label {
      font-size: 9px; font-family: var(--font-mono); color: rgba(255,255,255,0.2);
      width: 36px; flex-shrink: 0; padding-top: 0; line-height: 1;
      text-align: right; padding-right: 6px; position: relative; top: -1px;
    }
    .tl-col { flex: 1; position: relative; }

    /* Events absolutely positioned in tl-inner */
    .tl-events-layer {
      position: absolute;
      top: 0; left: 42px; right: 0; pointer-events: none;
    }
    .tl-event {
      position: absolute; left: 0; right: 0;
      border-radius: 8px; padding: 6px 10px;
      cursor: pointer; pointer-events: all;
      transition: opacity 0.15s, transform 0.15s;
      border-left: 3px solid;
      box-sizing: border-box; overflow: hidden;
      min-height: 26px;
    }
    .tl-event:hover { opacity: 0.88; transform: translateX(2px); }
    .tl-event.active { box-shadow: 0 0 0 1px currentColor; }
    .tl-event-title {
      font-size: 12px; font-family: var(--font-mono); font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      line-height: 1.2;
    }
    .tl-event-time {
      font-size: 9.5px; font-family: var(--font-mono); opacity: 0.65;
      margin-top: 2px; white-space: nowrap;
    }

    /* Current time line */
    .tl-now-line {
      position: absolute; left: 0; right: 0;
      height: 1px; pointer-events: none; z-index: 10;
    }
    .tl-now-line::before {
      content: ''; position: absolute; right: 0; left: -2px;
      top: -1px; height: 3px;
      background: linear-gradient(to right, rgba(255,107,107,0.7), rgba(255,107,107,0.15));
    }
    .tl-now-dot {
      position: absolute; left: -5px; top: -4px;
      width: 9px; height: 9px; border-radius: 50%;
      background: #FF6B6B; box-shadow: 0 0 6px rgba(255,107,107,0.8);
    }

    /* ── Right Panel ─────────────────────────────────────────────── */
    .right-panel {
      display: flex; flex-direction: column; gap: 14px;
      position: sticky; top: 64px;
    }
    .rp-card {
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(255,255,255,0.055);
      border-radius: 16px; padding: 18px;
    }
    .rp-label {
      font-size: 9px; font-family: var(--font-mono); letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--text-tertiary);
      margin-bottom: 12px; display: flex; align-items: center; gap: 6px;
    }
    .rp-label::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(to right, rgba(255,255,255,0.07), transparent);
    }

    /* Quick add */
    .qa-input-wrap { position: relative; }
    .qa-input {
      width: 100%; background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px; padding: 11px 40px 11px 14px;
      font-size: 13px; font-family: var(--font-sans);
      color: var(--text-primary); outline: none;
      transition: border-color 0.18s, background 0.18s;
    }
    .qa-input:focus { border-color: rgba(255,255,255,0.25); background: rgba(255,255,255,0.07); }
    .qa-input::placeholder { color: rgba(255,255,255,0.2); font-size: 12px; }
    .qa-send {
      position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      width: 26px; height: 26px; border-radius: 7px;
      background: rgba(91,164,245,0.2); border: 1px solid rgba(91,164,245,0.3);
      color: #5BA4F5; cursor: pointer; font-size: 12px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .qa-send:hover { background: rgba(91,164,245,0.35); }
    .qa-preview {
      margin-top: 8px; padding: 8px 12px; border-radius: 8px;
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
      font-size: 11px; font-family: var(--font-mono); color: var(--text-tertiary);
      display: none; gap: 6px; align-items: center;
    }
    .qa-preview.show { display: flex; }
    .qa-preview-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

    /* Event detail */
    .ev-detail { display: flex; flex-direction: column; gap: 10px; }
    .ev-field { display: flex; flex-direction: column; gap: 4px; }
    .ev-field-label {
      font-size: 9px; font-family: var(--font-mono); color: var(--text-tertiary);
      text-transform: uppercase; letter-spacing: 0.1em;
    }
    .ev-input {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; padding: 8px 11px; font-size: 13px;
      color: var(--text-primary); font-family: var(--font-sans); outline: none;
      transition: border-color 0.15s; width: 100%;
    }
    .ev-input:focus { border-color: rgba(255,255,255,0.25); background: rgba(255,255,255,0.07); }
    .ev-input-sm { padding: 6px 10px; font-size: 12px; }
    .ev-row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .ev-cat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
    .ev-cat-btn {
      padding: 6px 4px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03); cursor: pointer;
      font-size: 9.5px; font-family: var(--font-mono); color: var(--text-tertiary);
      text-align: center; transition: all 0.15s; line-height: 1.3;
    }
    .ev-cat-btn:hover { border-color: rgba(255,255,255,0.18); color: var(--text-secondary); }
    .ev-cat-btn.active { color: var(--text-primary); }
    .ev-actions { display: flex; gap: 8px; margin-top: 4px; }
    .ev-save-btn {
      flex: 1; padding: 9px; border-radius: 9px;
      background: rgba(107,227,164,0.12); border: 1px solid rgba(107,227,164,0.25);
      color: #6BE3A4; cursor: pointer; font-size: 12px; font-family: var(--font-mono);
      letter-spacing: 0.04em; transition: background 0.15s;
    }
    .ev-save-btn:hover { background: rgba(107,227,164,0.22); }
    .ev-del-btn {
      width: 36px; padding: 9px; border-radius: 9px;
      background: rgba(160,40,40,0.08); border: 1px solid rgba(160,40,40,0.2);
      color: rgba(200,80,80,0.7); cursor: pointer; font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .ev-del-btn:hover { background: rgba(160,40,40,0.18); color: rgba(220,100,100,0.9); }
    .ev-gcal-notice {
      font-size: 9.5px; font-family: var(--font-mono); color: var(--text-tertiary);
      padding: 6px 10px; border-radius: 7px;
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
      text-align: center;
    }
    .ev-empty-state {
      text-align: center; padding: 20px 0;
      font-size: 11px; font-family: var(--font-mono); color: rgba(255,255,255,0.18);
      line-height: 1.8;
    }

    /* Daily stats */
    .dp-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; }
    .dp-stat {
      background: rgba(255,255,255,0.025); border-radius: 10px;
      padding: 10px 8px; text-align: center;
    }
    .dp-stat-val {
      font-size: 18px; font-weight: 700; font-family: var(--font-mono);
      color: var(--text-primary); line-height: 1.1;
    }
    .dp-stat-lbl {
      font-size: 8px; font-family: var(--font-mono); color: var(--text-tertiary);
      text-transform: uppercase; letter-spacing: 0.1em; margin-top: 2px;
    }

    /* ── Bottom section ──────────────────────────────────────────── */
    .kal-bottom {
      display: grid; grid-template-columns: 1fr 280px;
      gap: 16px; align-items: start;
    }
    @media (max-width: 760px) { .kal-bottom { grid-template-columns: 1fr; } }

    /* Upcoming */
    .upcoming-card {
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(255,255,255,0.055);
      border-radius: 16px; padding: 18px;
    }
    .upcoming-day-group { margin-bottom: 20px; }
    .upcoming-day-group:last-child { margin-bottom: 0; }
    .upcoming-day-label {
      font-size: 9px; font-family: var(--font-mono); letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--text-tertiary);
      padding-bottom: 8px; margin-bottom: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .upcoming-event {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
      cursor: pointer; transition: background 0.15s;
    }
    .upcoming-event:last-child { border-bottom: none; }
    .upcoming-event:hover { opacity: 0.85; }
    .up-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .up-title { font-size: 13px; color: var(--text-secondary); flex: 1; font-weight: 500; }
    .up-time { font-size: 10px; font-family: var(--font-mono); color: var(--text-tertiary); flex-shrink: 0; }

    /* Mini month */
    .mini-month-card {
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(255,255,255,0.055);
      border-radius: 16px; padding: 18px;
    }
    .mm-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .mm-title {
      font-size: 12px; font-family: var(--font-mono); font-weight: 700;
      color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.08em;
    }
    .mm-nav-btn {
      width: 24px; height: 24px; border-radius: 6px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
      color: var(--text-tertiary); cursor: pointer; font-size: 11px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .mm-nav-btn:hover { background: rgba(255,255,255,0.1); color: var(--text-secondary); }
    .mm-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
    .mm-dow {
      font-size: 8px; font-family: var(--font-mono); color: var(--text-tertiary);
      text-align: center; padding: 0 0 6px; letter-spacing: 0.08em;
    }
    .mm-cell {
      aspect-ratio: 1; border-radius: 6px; cursor: pointer;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; position: relative; transition: background 0.15s;
    }
    .mm-cell:hover { background: rgba(255,255,255,0.07); }
    .mm-cell.other-month { opacity: 0.25; cursor: default; }
    .mm-cell.today { background: rgba(91,164,245,0.12); }
    .mm-cell.selected { background: rgba(255,255,255,0.1); box-shadow: inset 0 0 0 1px rgba(255,255,255,0.14); }
    .mm-cell.selected.today { background: rgba(91,164,245,0.18); box-shadow: inset 0 0 0 1px rgba(91,164,245,0.35); }
    .mm-num {
      font-size: 11px; font-family: var(--font-mono);
      color: var(--text-tertiary); line-height: 1;
    }
    .mm-cell.today .mm-num { color: #5BA4F5; font-weight: 700; }
    .mm-cell.selected .mm-num { color: var(--text-primary); }
    .mm-evdot {
      width: 3px; height: 3px; border-radius: 50%;
      position: absolute; bottom: 3px;
    }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; right: 24px; z-index: 9999;
      padding: 10px 16px; border-radius: 10px;
      background: rgba(20,20,22,0.95); border: 1px solid rgba(255,255,255,0.12);
      font-size: 12px; font-family: var(--font-mono); color: var(--text-primary);
      backdrop-filter: blur(16px); transform: translateY(8px); opacity: 0;
      transition: opacity 0.25s, transform 0.25s; pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.err { border-color: rgba(255,107,107,0.3); color: #FF6B6B; }

    /* Category color variables */
    .cat-styrke  { --cat: #FFB84D; }
    .cat-stevne  { --cat: #F6C453; }
    .cat-kirke   { --cat: #EFD97A; }
    .cat-fridag  { --cat: #66C7A3; }
    .cat-other   { --cat: #B197FC; }
    .cat-gcal    { --cat: #5BA4F5; }
  </style>
</head>
<body>

<nav class="main-nav">
  <div class="nav-inner">
    <div class="nav-tabs">
      <a href="dashboard.html" class="nav-tab" data-p="dashboard">Dashboard</a>
      <a href="gym.html"       class="nav-tab" data-p="gym">Gym</a>
      <a href="sprint.html"    class="nav-tab" data-p="sprint">Sprint</a>
      <a href="sovn.html"      class="nav-tab" data-p="sovn">Søvn</a>
      <a href="gjoremal.html"  class="nav-tab" data-p="gjoremal">Gjøremål</a>
      <a href="kalender.html"  class="nav-tab" data-p="kalender">Kalender</a>
      <a href="treningsplan.html" class="nav-tab" data-p="treningsplan">Treningsoversikt</a>
    </div>
    <button onclick="signOut()" class="btn btn-ghost btn-sm" style="font-size:11px;flex-shrink:0;margin-left:8px">Logg ut</button>
  </div>
</nav>

<main class="kal-page">

  <!-- Header -->
  <div class="kal-header">
    <div>
      <div class="kal-month-label" id="headerLabel">
        Mai<span>2026</span>
      </div>
    </div>
    <div class="kal-nav">
      <button class="kal-nav-btn" onclick="shiftWeek(-1)" title="Forrige uke">‹</button>
      <button class="kal-today-btn" onclick="goToday()">I dag</button>
      <button class="kal-nav-btn" onclick="shiftWeek(1)" title="Neste uke">›</button>
    </div>
  </div>

  <!-- Week Strip -->
  <div class="week-strip-wrap">
    <div class="week-strip" id="weekStrip"></div>
  </div>

  <!-- Main: Timeline + Right Panel -->
  <div class="kal-main">

    <!-- Timeline -->
    <div class="timeline-card">
      <div class="tl-header">
        <div class="tl-date-big" id="tlDateBig">–</div>
        <div class="tl-date-sub" id="tlDateSub">–</div>
      </div>
      <div class="allday-strip" id="alldayStrip"></div>
      <div class="tl-grid" id="tlGrid">
        <div class="loading" style="padding:30px;color:var(--text-tertiary);font-family:var(--font-mono);font-size:12px;text-align:center">Laster…</div>
      </div>
    </div>

    <!-- Right Panel -->
    <div class="right-panel">

      <!-- Quick Add -->
      <div class="rp-card">
        <div class="rp-label">Rask legg til</div>
        <div class="qa-input-wrap">
          <input class="qa-input" id="qaInput" type="text"
            placeholder="Sprint torsdag 17:00…"
            oninput="onQaInput()" onkeydown="onQaKey(event)">
          <button class="qa-send" onclick="qaSubmit()">↵</button>
        </div>
        <div class="qa-preview" id="qaPreview">

<script>
const SUPABASE_CDN = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js';

// ── Constants ──────────────────────────────────────────────────────────────
const TL_START_H = 6;   // timeline start hour
const TL_END_H   = 23;  // timeline end hour
const HOUR_PX    = 62;  // pixels per hour

const CAT_COLORS = {
  styrke: '#FFB84D',
  stevne: '#F6C453',
  kirke:  '#EFD97A',
  fridag: '#66C7A3',
  other:  '#B197FC',
  gcal:   '#5BA4F5',
};
const CAT_LABELS = {
  styrke: 'Styrke', stevne: 'Stevne', kirke: 'Kirke',
  fridag: 'Fridag', other: 'Annet',
};
const NO_DAYS_SHORT = ['Søn','Man','Tir','Ons','Tor','Fre','Lør'];
const NO_DAYS_FULL  = ['søndag','mandag','tirsdag','onsdag','torsdag','fredag','lørdag'];
const NO_MONTHS_SHORT = ['jan','feb','mar','apr','mai','jun','jul','aug','sep','okt','nov','des'];
const NO_MONTHS_FULL  = ['januar','februar','mars','april','mai','juni','juli','august','september','oktober','november','desember'];

// ── State ──────────────────────────────────────────────────────────────────
let db          = null;
let selectedDate = new Date();
let weekStart    = getMonday(new Date());
let miniMonth    = { year: new Date().getFullYear(), month: new Date().getMonth() };
let gcalEvents   = [];   // from /api/kalender
let customEvents = [];   // from Supabase
let activeEventId = null;
let activeEventSource = null; // 'gcal' or 'custom'

// ── Helpers ────────────────────────────────────────────────────────────────
function today() {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function pad(n) { return String(n).padStart(2, '0'); }
function toLocalStr(d) {
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function getMonday(d) {
  const m = new Date(d);
  m.setDate(d.getDate() - ((d.getDay() + 6) % 7));
  m.setHours(0, 0, 0, 0);
  return m;
}
function addDays(d, n) {
  const r = new Date(d);
  r.setDate(r.getDate() + n);
  return r;
}
function fmtTime(d) {
  return `${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function fmtDateLong(d) {
  return `${NO_DAYS_FULL[d.getDay()].charAt(0).toUpperCase() + NO_DAYS_FULL[d.getDay()].slice(1)} ${d.getDate()}. ${NO_MONTHS_FULL[d.getMonth()]}`;
}
function isSameDay(a, b) {
  return a.getFullYear() === b.getFullYear()
    && a.getMonth() === b.getMonth()
    && a.getDate() === b.getDate();
}

function getEventColor(ev) {
  if (ev.source === 'gcal') {
    const t = (ev.title || '').toLowerCase();
    if (/styrke|friidrett|sprint|leg|back|chest|gym/.test(t)) return CAT_COLORS.styrke;
    if (/stevne|konkurranse|competition|race/.test(t))        return CAT_COLORS.stevne;
    if (/gudstjeneste|salhus|salt|kirke|church/.test(t))      return CAT_COLORS.kirke;
    if (/helligdag|ferie|fridag|holiday/.test(t))             return CAT_COLORS.fridag;
    return CAT_COLORS.gcal;
  }
  return CAT_COLORS[ev.category] || CAT_COLORS.other;
}
function hexAlpha(hex, a) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

// ── Category detection ─────────────────────────────────────────────────────
function detectCategory(title) {
  const t = (title || '').toLowerCase();
  if (/sprint|styrke|gym|løp|bein|overkropp|kjerne|friidrett|trening|training|leg|back|chest|squat/.test(t)) return 'styrke';
  if (/stevne|konkurranse|competition|meet|race|norgescup|nm|em|vm/.test(t)) return 'stevne';
  if (/gudstjeneste|salhus|salt|kirke|church/.test(t)) return 'kirke';
  if (/helligdag|ferie|fridag|holiday|jul|påske|pinse/.test(t)) return 'fridag';
  return 'other';
}

// ── Natural language parser ────────────────────────────────────────────────
function parseQuickAdd(text) {
  if (!text.trim()) return null;
  const lower = text.toLowerCase().trim();
  let date   = toLocalStr(selectedDate);
  let time   = null;
  let endTime = null;
  let remaining = text.trim();

  // Extract time (HH:MM or HH)
  const timeMatch = remaining.match(/\b(\d{1,2}):(\d{2})\b/);
  const timeMatchH = !timeMatch && remaining.match(/\b(\d{1,2})\b(?=\s*$|\s+[a-z])/);
  if (timeMatch) {
    time = `${pad(+timeMatch[1])}:${pad(+timeMatch[2])}`;
    remaining = remaining.replace(timeMatch[0], '').trim();
  } else if (timeMatchH && +timeMatchH[1] >= 6 && +timeMatchH[1] <= 23) {
    time = `${pad(+timeMatchH[1])}:00`;
    remaining = remaining.replace(timeMatchH[0], '').trim();
  }

  // Extract duration like "2t" or "1.5t"
  const durMatch = remaining.match(/\b(\d+(?:[.,]\d+)?)\s*t(?:imer?)?\b/i);
  if (durMatch && time) {
    const hrs = parseFloat(durMatch[1].replace(',','.'));
    const [hh, mm] = time.split(':').map(Number);
    const endMins = hh * 60 + mm + hrs * 60;
    endTime = `${pad(Math.floor(endMins / 60))}:${pad(endMins % 60)}`;
    remaining = remaining.replace(durMatch[0], '').trim();
  }

  // Extract day reference
  const dayNames = [
    ['mandag','monday','man','mon'],
    ['tirsdag','tuesday','tir','tue'],
    ['onsdag','wednesday','ons','wed'],
    ['torsdag','thursday','tor','thu'],
    ['fredag','friday','fre','fri'],
    ['lørdag','saturday','lør','sat'],
    ['søndag','sunday','søn','sun'],
  ];
  const relDay = { 'i dag': 0, 'idag': 0, 'i morgen': 1, 'imorgen': 1, 'tomorrow': 1 };

  let foundDay = false;
  for (const [rel, shift] of Object.entries(relDay)) {
    if (lower.includes(rel)) {
      const d = addDays(new Date(), shift);
      date = toLocalStr(d);
      remaining = remaining.replace(new RegExp(rel, 'gi'), '').trim();
      foundDay = true; break;
    }
  }
  if (!foundDay) {
    for (let wi = 0; wi < dayNames.length; wi++) {
      for (const alias of dayNames[wi]) {
        const re = new RegExp(`\\b${alias}\\b`, 'i');
        if (re.test(remaining)) {
          const now     = new Date();
          const nowDow  = (now.getDay() + 6) % 7; // 0=Mon
          let diff = wi - nowDow;
          if (diff <= 0) diff += 7;
          const d = addDays(now, diff);
          date = toLocalStr(d);
          remaining = remaining.replace(re, '').trim();
          foundDay = true; break;
        }
      }
      if (foundDay) break;
    }
  }

  const title = remaining.replace(/\s+/g, ' ').trim() || text.trim();
  const category = detectCategory(title);

  return { title, date, startTime: time, endTime, category, allDay: !time };
}

// ── Data loading ───────────────────────────────────────────────────────────
async function loadGCalRange() {
  const start = toLocalStr(addDays(weekStart, -7));
  const end   = toLocalStr(addDays(weekStart, 35));
  try {
    const r = await fetch(`/api/kalender?start=${start}&end=${end}`);
    if (!r.ok) throw new Error('API error ' + r.status);
    const { events = [] } = await r.json();
    gcalEvents = events.map(e => ({
      id: 'gcal-' + e.id,
      source: 'gcal',
      title: e.summary || '(uten tittel)',
      date: (e.start?.date || e.start?.dateTime || '').slice(0, 10),
      startTime: e.start?.dateTime ? fmtTime(new Date(e.start.dateTime)) : null,
      endTime:   e.end?.dateTime   ? fmtTime(new Date(e.end.dateTime))   : null,
      allDay: !!e.start?.date,
      gcalId: e.id,
    }));
  } catch { gcalEvents = []; }
}

async function loadCustomEvents() {
  if (!db) return;
  const { data } = await db.from('calendar_events').select('*');
  customEvents = (data || []).map(e => ({
    id: 'custom-' + e.id,
    dbId: e.id,
    source: 'custom',
    title: e.title,
    date: e.date,
    startTime: e.start_time ? e.start_time.slice(0, 5) : null,
    endTime:   e.end_time   ? e.end_time.slice(0, 5)   : null,
    allDay: e.all_day,
    category: e.category || 'other',
    notes: e.notes || '',
  }));
}

function allEvents() {
  return [...gcalEvents, ...customEvents].sort((a, b) => {
    if (a.date < b.date) return -1;
    if (a.date > b.date) return 1;
    const at = a.startTime || '00:00', bt = b.startTime || '00:00';
    return at.localeCompare(bt);
  });
}

function eventsForDate(dateStr) {
  return allEvents().filter(e => e.date === dateStr);
}

// ── Rendering ──────────────────────────────────────────────────────────────
function renderWeekStrip() {
  const el = document.getElementById('weekStrip');
  const todayStr = today();
  const selStr   = toLocalStr(selectedDate);
  const evts     = allEvents();

  el.innerHTML = Array.from({length: 7}, (_, i) => {
    const d     = addDays(weekStart, i);
    const dStr  = toLocalStr(d);
    const isToday    = dStr === todayStr;
    const isSelected = dStr === selStr;
    const dayEvts = evts.filter(e => e.date === dStr);

    const dots = dayEvts.slice(0, 4).map(e => {
      const c = getEventColor(e);
      return `<div class="wd-dot" style="background:${c}"></div>`;
    }).join('');

    const firstEv = dayEvts.find(e => !e.allDay && e.startTime);
    const preview = firstEv
      ? `${firstEv.startTime} ${firstEv.title.slice(0, 12)}${firstEv.title.length > 12 ? '…' : ''}`
      : (dayEvts.length > 0 ? dayEvts[0].title.slice(0, 14) : '');

    return `<div class="week-day${isToday ? ' today' : ''}${isSelected ? ' selected' : ''}"
      onclick="selectDay('${dStr}')">
      <div class="wd-name">${['Man','Tir','Ons','Tor','Fre','Lør','Søn'][i]}</div>
      <div class="wd-num">${d.getDate()}</div>
      <div class="wd-dots">${dots}</div>
      ${preview ? `<div class="wd-preview">${escHtml(preview)}</div>` : ''}
    </div>`;
  }).join('');

  // Update header
  const mid = addDays(weekStart, 3);
  document.getElementById('headerLabel').innerHTML =
    `${NO_MONTHS_FULL[mid.getMonth()].charAt(0).toUpperCase() + NO_MONTHS_FULL[mid.getMonth()].slice(1)}<span>${mid.getFullYear()}</span>`;
}

function renderTimeline(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  document.getElementById('tlDateBig').textContent = fmtDateLong(d);
  document.getElementById('tlDateSub').textContent = `Uke ${getISOWeek(d)}`;

  const evts    = eventsForDate(dateStr);
  const allDay  = evts.filter(e => e.allDay);
  const timed   = evts.filter(e => !e.allDay && e.startTime);

  // All-day strip
  const adEl = document.getElementById('alldayStrip');
  adEl.innerHTML = allDay.map(e => {
    const c = getEventColor(e);
    return `<div class="allday-pill cat-${e.source === 'gcal' ? 'gcal' : e.category}"
      style="background:${hexAlpha(c,0.15)};color:${c};border:1px solid ${hexAlpha(c,0.25)}"
      onclick="openEvent('${e.id}')">${escHtml(e.title)}</div>`;
  }).join('');

  // Build grid
  const totalH  = TL_END_H - TL_START_H;
  const gridH   = totalH * HOUR_PX;
  const hours   = Array.from({length: totalH}, (_, i) => TL_START_H + i);

  const hourRows = hours.map(h =>
    `<div class="tl-hour-row">
      <div class="tl-hour-label">${pad(h)}:00</div>
      <div class="tl-col"></div>
    </div>`
  ).join('');

  // Event blocks
  const eventBlocks = timed.map(e => {
    const [sh, sm] = e.startTime.split(':').map(Number);
    const startMins = sh * 60 + sm;
    const startClipped = Math.max(TL_START_H * 60, startMins);
    const top = (startClipped - TL_START_H * 60) / 60 * HOUR_PX;

    let height = HOUR_PX; // default 1 hour
    if (e.endTime) {
      const [eh, em] = e.endTime.split(':').map(Number);
      const endMins  = eh * 60 + em;
      const dur      = (endMins - startMins) / 60 * HOUR_PX;
      height = Math.max(26, dur);
    }

    const c = getEventColor(e);
    const isActive = e.id === activeEventId;
    const timeLabel = e.endTime ? `${e.startTime} – ${e.endTime}` : e.startTime;

    return `<div class="tl-event ${isActive ? 'active' : ''}"
      style="top:${top}px;height:${height}px;
             background:${hexAlpha(c, 0.1)};
             border-left-color:${c};color:${c}"
      onclick="openEvent('${e.id}')">
      <div class="tl-event-title" style="color:var(--text-primary)">${escHtml(e.title)}</div>
      ${height > 36 ? `<div class="tl-event-time">${timeLabel}</div>` : ''}
    </div>`;
  }).join('');

  // Current time indicator
  const nowLine = (() => {
    if (dateStr !== today()) return '';
    const now  = new Date();
    const mins = now.getHours() * 60 + now.getMinutes();
    const top  = (mins - TL_START_H * 60) / 60 * HOUR_PX;
    if (top < 0 || top > gridH) return '';
    return `<div class="tl-now-line" style="top:${top}px">
      <div class="tl-now-dot"></div>
    </div>`;
  })();

  document.getElementById('tlGrid').innerHTML =
    `<div class="tl-inner" style="height:${gridH}px">
      ${hourRows}
      <div class="tl-events-layer" style="height:${gridH}px">${eventBlocks}${nowLine}</div>
    </div>`;

  // Auto-scroll to 7am or first event or current time
  const grid = document.getElementById('tlGrid');
  const scrollToH = dateStr === today() ? new Date().getHours() - 1 : 7;
  const scrollTop = Math.max(0, (scrollToH - TL_START_H) * HOUR_PX - 20);
  grid.scrollTop = scrollTop;

  // Update event count in daily stats
  document.getElementById('ds-events').textContent = evts.length || '0';
}

function renderEventDetail() {
  const el = document.getElementById('evDetailContent');
  if (!activeEventId) {
    el.innerHTML = '<div class="ev-empty-state">Velg en hendelse<br>fra tidslinjen</div>';
    return;
  }
  const ev = allEvents().find(e => e.id === activeEventId);
  if (!ev) { el.innerHTML = '<div class="ev-empty-state">Hendelse ikke funnet</div>'; return; }

  if (ev.source === 'gcal') {
    const c = getEventColor(ev);
    el.innerHTML = `
      <div class="ev-detail">
        <div style="font-size:15px;font-weight:700;color:var(--text-primary);margin-bottom:4px">${escHtml(ev.title)}</div>
        <div style="font-size:11px;font-family:var(--font-mono);color:var(--text-tertiary);margin-bottom:12px">
          ${ev.allDay ? 'Heldagsarrangement' : (ev.startTime + (ev.endTime ? ' – ' + ev.endTime : ''))} · ${ev.date}
        </div>
        <div class="ev-gcal-notice">Google Calendar-hendelse · skrivebeskyttet</div>
      </div>`;
    return;
  }

  // Editable custom event
  const c = CAT_COLORS[ev.category] || CAT_COLORS.other;
  const catBtns = Object.entries(CAT_LABELS).map(([k,v]) =>
    `<button class="ev-cat-btn${ev.category === k ? ' active' : ''}"
      style="${ev.category === k ? `background:${hexAlpha(CAT_COLORS[k],0.15)};border-color:${hexAlpha(CAT_COLORS[k],0.3)};color:${CAT_COLORS[k]}` : ''}"
      onclick="evSetCat('${k}')">${v}</button>`
  ).join('');

  el.innerHTML = `
    <div class="ev-detail" id="evDetailFields">
      <div class="ev-field">
        <div class="ev-field-label">Tittel</div>
        <input class="ev-input" id="ef-title" value="${escHtml(ev.title)}">
      </div>
      <div class="ev-field">
        <div class="ev-field-label">Dato</div>
        <input class="ev-input ev-input-sm" id="ef-date" type="date" value="${ev.date}">
      </div>
      <div class="ev-row2">
        <div class="ev-field">
          <div class="ev-field-label">Start</div>
          <input class="ev-input ev-input-sm" id="ef-start" type="time" value="${ev.startTime || ''}">
        </div>
        <div class="ev-field">
          <div class="ev-field-label">Slutt</div>
          <input class="ev-input ev-input-sm" id="ef-end" type="time" value="${ev.endTime || ''}">
        </div>
      </div>
      <div class="ev-field">
        <div class="ev-field-label">Kategori</div>
        <div class="ev-cat-grid">${catBtns}</div>
      </div>
      <div class="ev-field">
        <div class="ev-field-label">Notater</div>
        <textarea class="ev-input ev-input-sm" id="ef-notes" style="min-height:54px;resize:vertical">${escHtml(ev.notes || '')}</textarea>
      </div>
      <div class="ev-actions">
        <button class="ev-save-btn" onclick="saveActiveEvent()">Lagre</button>
        <button class="ev-del-btn" onclick="deleteActiveEvent()" title="Slett">🗑</button>
      </div>
    </div>`;
}

function renderMiniMonth() {
  const { year, month } = miniMonth;
  const months = ['Jan','Feb','Mar','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Des'];
  document.getElementById('mmTitle').textContent = `${months[month]} ${year}`;

  const firstDay = new Date(year, month, 1);
  const startDow = (firstDay.getDay() + 6) % 7; // 0=Mon
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const prevMonthDays = new Date(year, month, 0).getDate();

  const todayStr = today();
  const selStr   = toLocalStr(selectedDate);
  const evDates  = new Set(allEvents().map(e => e.date));

  const dowHeaders = ['M','T','O','T','F','L','S'].map(d =>
    `<div class="mm-dow">${d}</div>`).join('');

  let cells = '';
  // Previous month fill
  for (let i = startDow - 1; i >= 0; i--) {
    const day = prevMonthDays - i;
    cells += `<div class="mm-cell other-month"><div class="mm-num">${day}</div></div>`;
  }
  // Current month
  for (let d = 1; d <= daysInMonth; d++) {
    const dStr    = `${year}-${pad(month+1)}-${pad(d)}`;
    const isToday = dStr === todayStr;
    const isSel   = dStr === selStr;
    const hasEv   = evDates.has(dStr);
    const ev      = hasEv ? allEvents().find(e => e.date === dStr) : null;
    const dotColor = ev ? getEventColor(ev) : '';
    cells += `<div class="mm-cell${isToday ? ' today' : ''}${isSel ? ' selected' : ''}"
      onclick="selectDay('${dStr}')">
      <div class="mm-num">${d}</div>
      ${hasEv ? `<div class="mm-evdot" style="background:${dotColor}"></div>` : ''}
    </div>`;
  }
  // Next month fill
  const total = startDow + daysInMonth;
  const remaining = (7 - (total % 7)) % 7;
  for (let d = 1; d <= remaining; d++) {
    cells += `<div class="mm-cell other-month"><div class="mm-num">${d}</div></div>`;
  }

  document.getElementById('mmGrid').innerHTML = dowHeaders + cells;
}

function renderUpcoming() {
  const el      = document.getElementById('upcomingList');
  const todayD  = today();
  const upcoming = allEvents()
    .filter(e => e.date >= todayD)
    .slice(0, 30);

  if (!upcoming.length) {
    el.innerHTML = '<div style="font-size:12px;font-family:var(--font-mono);color:var(--text-tertiary);padding:8px 0">Ingen kommende hendelser</div>';
    return;
  }

  const groups = {};
  for (const e of upcoming) {
    if (!groups[e.date]) groups[e.date] = [];
    groups[e.date].push(e);
  }

  el.innerHTML = Object.entries(groups).slice(0, 7).map(([dateStr, evts]) => {
    const d = new Date(dateStr + 'T12:00:00');
    const isToday  = dateStr === todayD;
    const isSel    = dateStr === toLocalStr(selectedDate);
    const dayLabel = isToday ? 'I dag' :
      `${NO_DAYS_SHORT[(d.getDay()+6)%7+1 > 6 ? 0 : (d.getDay()+6)%7]} ${d.getDate()}. ${NO_MONTHS_SHORT[d.getMonth()]}`;

    const rows = evts.map(e => {
      const c = getEventColor(e);
      return `<div class="upcoming-event" onclick="selectDay('${dateStr}');openEvent('${e.id}')">
        <div class="up-dot" style="background:${c}"></div>
        <div class="up-title">${escHtml(e.title)}</div>
        <div class="up-time">${e.allDay ? 'Hele dagen' : (e.startTime || '')}</div>
      </div>`;
    }).join('');

    return `<div class="upcoming-day-group">
      <div class="upcoming-day-label"${isToday ? ' style="color:rgba(91,164,245,0.8)"' : ''}>${dayLabel}</div>
      ${rows}
    </div>`;
  }).join('');
}

// ── User actions ───────────────────────────────────────────────────────────
function selectDay(dateStr) {
  selectedDate = new Date(dateStr + 'T12:00:00');
  // If the selected day is outside the current week strip, shift the week
  const selMon = getMonday(selectedDate);
  if (toLocalStr(selMon) !== toLocalStr(weekStart)) {
    weekStart = selMon;
  }
  renderWeekStrip();
  renderTimeline(dateStr);
  renderMiniMonth();
  // Sync mini month
  miniMonth = { year: selectedDate.getFullYear(), month: selectedDate.getMonth() };
  renderMiniMonth();
}

function openEvent(id) {
  activeEventId = id;
  renderTimeline(toLocalStr(selectedDate));
  renderEventDetail();
}

function evSetCat(cat) {
  if (!activeEventId) return;
  const ev = customEvents.find(e => e.id === activeEventId);
  if (!ev) return;
  ev.category = cat;
  renderEventDetail();
}

async function saveActiveEvent() {
  const ev = customEvents.find(e => e.id === activeEventId);
  if (!ev) return;

  const title    = document.getElementById('ef-title')?.value.trim();
  const date     = document.getElementById('ef-date')?.value;
  const startTime = document.getElementById('ef-start')?.value || null;
  const endTime   = document.getElementById('ef-end')?.value || null;
  const notes    = document.getElementById('ef-notes')?.value.trim() || null;
  if (!title) { toast('Tittel er påkrevd', 'err'); return; }

  const payload = {
    title, date, start_time: startTime, end_time: endTime,
    all_day: !startTime, category: ev.category, notes,
  };

  const { error } = await db.from('calendar_events').update(payload).eq('id', ev.dbId);
  if (error) { toast('Feil ved lagring', 'err'); return; }

  Object.assign(ev, { title, date, startTime, endTime, notes, allDay: !startTime });
  toast('Lagret');
  renderAll();
}

async function deleteActiveEvent() {
  const ev = customEvents.find(e => e.id === activeEventId);
  if (!ev) return;
  if (!confirm(`Slett "${ev.title}"?`)) return;

  const { error } = await db.from('calendar_events').delete().eq('id', ev.dbId);
  if (error) { toast('Feil ved sletting', 'err'); return; }

  customEvents = customEvents.filter(e => e.id !== activeEventId);
  activeEventId = null;
  toast('Slettet');
  renderAll();
}

async function createEvent(data) {
  const { title, date, startTime, endTime, category, allDay, notes = null } = data;
  if (!title || !date) return;

  const payload = {
    title, date,
    start_time: startTime || null,
    end_time:   endTime || null,
    all_day:    allDay || !startTime,
    category:   category || 'other',
    notes,
  };

  const { data: rows, error } = await db.from('calendar_events').insert(payload).select();
  if (error) { toast('Feil: ' + error.message, 'err'); return; }

  const row = rows[0];
  const ev = {
    id: 'custom-' + row.id, dbId: row.id, source: 'custom',
    title: row.title, date: row.date,
    startTime: row.start_time?.slice(0, 5) || null,
    endTime:   row.end_time?.slice(0, 5)   || null,
    allDay:    row.all_day,
    category:  row.category || 'other',
    notes:     row.notes || '',
  };
  customEvents.push(ev);
  activeEventId = ev.id;

  // Navigate to the event's date
  if (ev.date !== toLocalStr(selectedDate)) selectDay(ev.date);
  else renderAll();

  toast('Lagt til: ' + ev.title);
}

// ── Quick Add ──────────────────────────────────────────────────────────────
function onQaInput() {
  const val = document.getElementById('qaInput').value;
  const parsed = parseQuickAdd(val);
  const preview = document.getElementById('qaPreview');
  const dot     = document.getElementById('qaPreviewDot');
  const txt     = document.getElementById('qaPreviewText');

  if (parsed && val.length > 2) {
    const c = CAT_COLORS[parsed.category] || CAT_COLORS.other;
    dot.style.background = c;
    const timeStr = parsed.allDay ? 'Hele dagen' : (parsed.startTime + (parsed.endTime ? ' – ' + parsed.endTime : ''));
    txt.textContent = `${parsed.title} · ${parsed.date} · ${timeStr}`;
    preview.classList.add('show');
  } else {
    preview.classList.remove('show');
  }
}

function onQaKey(e) {
  if (e.key === 'Enter') { e.preventDefault(); qaSubmit(); }
  if (e.key === 'Escape') { document.getElementById('qaInput').value = ''; document.getElementById('qaPreview').classList.remove('show'); }
}

async function qaSubmit() {
  const val = document.getElementById('qaInput').value.trim();
  if (!val) return;
  const parsed = parseQuickAdd(val);
  if (!parsed) return;
  await createEvent(parsed);
  document.getElementById('qaInput').value = '';
  document.getElementById('qaPreview').classList.remove('show');
}

// ── Navigation ─────────────────────────────────────────────────────────────
function shiftWeek(dir) {
  weekStart = addDays(weekStart, dir * 7);
  // Keep selected day in view
  const selStr = toLocalStr(selectedDate);
  const weekEnd = addDays(weekStart, 6);
  const ws = toLocalStr(weekStart), we = toLocalStr(weekEnd);
  if (selStr < ws || selStr > we) {
    selectedDate = new Date(weekStart);
    selectedDate.setHours(12,0,0,0);
    renderTimeline(toLocalStr(selectedDate));
  }
  renderWeekStrip();
  renderMiniMonth();
}

function goToday() {
  selectedDate = new Date();
  weekStart    = getMonday(new Date());
  miniMonth    = { year: selectedDate.getFullYear(), month: selectedDate.getMonth() };
  renderAll();
}

function shiftMiniMonth(dir) {
  miniMonth.month += dir;
  if (miniMonth.month < 0)  { miniMonth.month = 11; miniMonth.year--; }
  if (miniMonth.month > 11) { miniMonth.month = 0;  miniMonth.year++; }
  renderMiniMonth();
}

// ── Render all ─────────────────────────────────────────────────────────────
function renderAll() {
  renderWeekStrip();
  renderTimeline(toLocalStr(selectedDate));
  renderEventDetail();
  renderMiniMonth();
  renderUpcoming();
}

// ── Helpers ────────────────────────────────────────────────────────────────
function getISOWeek(d) {
  const tmp = new Date(d); tmp.setHours(0,0,0,0);
  tmp.setDate(tmp.getDate() + 3 - (tmp.getDay()+6)%7);
  const w1 = new Date(tmp.getFullYear(), 0, 4);
  return 1 + Math.round(((tmp-w1)/86400000 - 3 + (w1.getDay()+6)%7)/7);
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function toast(msg, type = 'ok') {
  const el = document.getElementById('toastEl');
  el.textContent = msg;
  el.className = `toast${type === 'err' ? ' err' : ''}`;
  el.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => el.classList.remove('show'), 2800);
}
async function signOut() {
  if (db) await db.auth.signOut();
  window.location.href = 'login.html';
}

// ── Daily stats ────────────────────────────────────────────────────────────
async function loadDailyStats() {
  if (!db) return;
  const [sleepRes, kneeRes] = await Promise.all([
    db.from('sleep_log').select('sleep_hours').order('date', {ascending:false}).limit(1),
    db.from('knee_pain').select('after_score').order('date',{ascending:false}).order('id',{ascending:false}).limit(1),
  ]);
  const sleep = sleepRes.data?.[0]?.sleep_hours;
  const knee  = kneeRes.data?.[0]?.after_score;
  document.getElementById('ds-sleep').textContent = sleep != null ? sleep + 't' : '–';
  document.getElementById('ds-knee').textContent  = knee  != null ? knee        : '–';
}

// ── Init ───────────────────────────────────────────────────────────────────
(async () => {
  document.querySelector('[data-p="kalender"]').classList.add('active');

  // Auth
  try {
    const r = await fetch('/api/config');
    if (!r.ok) throw new Error('Config error');
    const cfg = await r.json();
    if (cfg.error) throw new Error(cfg.error);
    db = supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);
    const { data: { session } } = await db.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }
  } catch (err) {
    document.querySelector('.kal-page').innerHTML =
      `<div class="card" style="text-align:center;padding:40px;margin-top:40px">
        <div style="color:var(--danger);font-family:var(--font-mono);font-size:13px">${err.message}</div>
      </div>`;
    return;
  }

  // Load data in parallel
  await Promise.all([loadGCalRange(), loadCustomEvents(), loadDailyStats()]);

  // Initial render
  renderAll();

  // Auto-refresh current time indicator every minute
  setInterval(() => {
    if (toLocalStr(selectedDate) === today()) {
      renderTimeline(today());
    }
  }, 60_000);
})();
</script>
