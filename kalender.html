<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="icon" href="/favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="/favicon.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#050506">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Dashboard">
  <title>Dashboard</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    .kal-page {
      max-width: 1280px; margin: 0 auto;
      padding: 14px 16px 60px;
      display: flex; flex-direction: column; gap: 0;
    }

    /* ── Header ── */
    .kal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 0 12px;
    }
    .kal-month-label {
      font-size: 20px; font-weight: 700; font-family: var(--font-mono);
      color: var(--text-primary); letter-spacing: -0.02em;
    }
    .kal-month-label span { color: var(--text-tertiary); font-weight: 400; font-size: 14px; margin-left: 6px; }
    .kal-header-right { display: flex; align-items: center; gap: 8px; }

    .view-toggle {
      display: flex; background: rgba(255,255,255,0.04); border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.08); padding: 2px; gap: 2px;
    }
    .vt-btn {
      padding: 4px 11px; border-radius: 6px; border: none; background: none;
      font-size: 10px; font-family: var(--font-mono); letter-spacing: 0.06em;
      text-transform: uppercase; color: rgba(255,255,255,0.38); cursor: pointer;
      transition: all 0.14s; font-weight: 500;
    }
    .vt-btn.active {
      background: rgba(255,255,255,0.13); color: var(--text-primary); font-weight: 700;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06);
    }
    .vt-btn:hover:not(.active) { color: var(--text-secondary); }

    .kal-nav { display: flex; align-items: center; gap: 5px; }
    .kal-nav-btn {
      width: 30px; height: 30px; border-radius: 7px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      color: var(--text-secondary); cursor: pointer; font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.14s;
    }
    .kal-nav-btn:hover { background: rgba(255,255,255,0.09); }
    .kal-today-btn {
      padding: 0 10px; height: 30px; border-radius: 7px;
      background: rgba(91,164,245,0.1); border: 1px solid rgba(91,164,245,0.22);
      color: #5BA4F5; cursor: pointer; font-size: 10px; font-family: var(--font-mono);
      letter-spacing: 0.06em; text-transform: uppercase; transition: background 0.14s;
    }
    .kal-today-btn:hover { background: rgba(91,164,245,0.2); }

    /* ── Week Strip ── */
    .week-strip-wrap {
      overflow-x: auto; scrollbar-width: none; margin-bottom: 12px;
    }
    .week-strip-wrap::-webkit-scrollbar { display: none; }
    .week-strip { display: flex; gap: 4px; min-width: 480px; }
    /* Mobil: alle 7 dager skal få plass uten å bla horisontalt */
    @media (max-width: 560px) {
      .week-strip-wrap { overflow-x: visible; margin-bottom: 10px; }
      .week-strip { min-width: 0; gap: 3px; }
      .week-day { padding: 5px 4px; border-radius: 7px; gap: 3px; align-items: center; text-align: center; }
      .wd-top { flex-direction: column; align-items: center; gap: 1px; }
      .wd-name { font-size: 7px; letter-spacing: 0.08em; }
      .wd-num { font-size: 14px; }
      .wd-ev { display: none; }
      .wd-dots { justify-content: center; gap: 2px; }
    }

    .week-day {
      flex: 1; padding: 6px 8px; border-radius: 8px;
      background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.05);
      cursor: pointer; transition: all 0.14s; position: relative;
      display: flex; flex-direction: column; gap: 2px; overflow: hidden; min-width: 0;
    }
    .week-day:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1); }
    .week-day.today { border-color: rgba(91,164,245,0.22); }
    .week-day.today::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, rgba(91,164,245,0.65), rgba(91,164,245,0.1));
    }
    .week-day.selected { background: rgba(255,255,255,0.065); border-color: rgba(255,255,255,0.18); }
    .week-day.selected.today { background: rgba(91,164,245,0.08); border-color: rgba(91,164,245,0.32); }

    .wd-top { display: flex; align-items: baseline; gap: 5px; }
    .wd-name {
      font-size: 8px; font-family: var(--font-mono); letter-spacing: 0.12em;
      text-transform: uppercase; color: rgba(255,255,255,0.32); line-height: 1;
    }
    .week-day.today .wd-name, .week-day.selected .wd-name { color: rgba(91,164,245,0.75); }
    .wd-num {
      font-size: 16px; font-weight: 700; font-family: var(--font-mono);
      color: var(--text-secondary); line-height: 1; letter-spacing: -0.01em;
    }
    .week-day.today .wd-num { color: var(--text-primary); }
    .week-day.selected .wd-num { color: var(--text-primary); }
    .wd-ev {
      display: flex; align-items: center; gap: 4px;
      font-size: 8.5px; font-family: var(--font-mono); color: rgba(255,255,255,0.3);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; line-height: 1;
    }
    .wd-ev-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
    .wd-dots { display: flex; gap: 3px; margin-top: 0; }
    .wd-dot { width: 4px; height: 4px; border-radius: 50%; }

    /* ── Body layout ── */
    .kal-body { display: flex; gap: 12px; align-items: flex-start; }
    .kal-left { flex: 1; display: flex; flex-direction: column; gap: 12px; min-width: 0; }
    .kal-right {
      width: 268px; flex-shrink: 0; display: flex; flex-direction: column;
      gap: 8px; position: sticky; top: 64px;
    }
    @media (max-width: 840px) {
      .kal-body { flex-direction: column; align-items: stretch; }
      .kal-left { width: 100%; }
      .kal-right { width: 100%; position: static; }
    }

    /* ── Day View Card ── */
    .day-view-card {
      background: rgba(255,255,255,0.022); border: 1px solid rgba(255,255,255,0.055);
      border-radius: 13px; overflow: hidden;
    }
    .dv-header {
      padding: 11px 16px 9px; border-bottom: 1px solid rgba(255,255,255,0.05);
      display: flex; align-items: baseline; gap: 10px;
    }
    .dv-date-big {
      font-size: 14px; font-weight: 700; font-family: var(--font-mono);
      color: var(--text-primary); letter-spacing: -0.01em;
    }
    .dv-meta {
      font-size: 9.5px; font-family: var(--font-mono); color: var(--text-tertiary);
      text-transform: uppercase; letter-spacing: 0.08em;
    }

    /* ── Agenda View ── */
    .agenda-empty {
      padding: 40px 24px; text-align: center;
      display: flex; flex-direction: column; align-items: center; gap: 6px;
    }
    .ae-title {
      font-size: 13px; font-weight: 600; color: var(--text-secondary);
      letter-spacing: -0.01em;
    }
    .ae-sub {
      font-size: 10.5px; font-family: var(--font-mono); color: rgba(255,255,255,0.28);
      letter-spacing: 0.02em; line-height: 1.5;
    }
    .ag-allday-strip {
      padding: 7px 16px 8px; border-bottom: 1px solid rgba(255,255,255,0.045);
      display: flex; flex-wrap: wrap; gap: 5px;
    }
    .ag-allday-pill {
      padding: 3px 9px; border-radius: 20px; font-size: 10.5px;
      font-family: var(--font-mono); cursor: pointer; transition: opacity 0.14s; white-space: nowrap;
    }
    .ag-allday-pill:hover { opacity: 0.78; }
    .agenda-section-label {
      font-size: 8px; font-family: var(--font-mono); letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--text-tertiary);
      padding: 8px 16px 2px; opacity: 0.5;
    }
    .agenda-row {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 14px 8px 16px; cursor: pointer; transition: background 0.12s;
      border-left: 2px solid transparent; margin: 1px 0;
    }
    .agenda-row:hover { background: rgba(255,255,255,0.03); }
    .agenda-row.active { background: rgba(255,255,255,0.04); }
    .ag-time {
      font-size: 11px; font-family: var(--font-mono); color: var(--text-tertiary);
      width: 40px; flex-shrink: 0; text-align: right;
    }
    .ag-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .ag-title {
      flex: 1; font-size: 13px; color: var(--text-secondary); font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .agenda-row.active .ag-title { color: var(--text-primary); }
    .ag-badge {
      font-size: 8px; font-family: var(--font-mono); letter-spacing: 0.07em;
      text-transform: uppercase; padding: 2px 6px; border-radius: 4px; flex-shrink: 0;
    }

    /* ── Timeline ── */
    .allday-strip {
      padding: 7px 16px; border-bottom: 1px solid rgba(255,255,255,0.045);
      display: flex; flex-wrap: wrap; gap: 5px; min-height: 32px; align-items: center;
    }
    .allday-strip:empty::before {
      content: 'Ingen heldagshendelser'; font-size: 10px;
      font-family: var(--font-mono); color: rgba(255,255,255,0.35);
    }
    .allday-pill {
      padding: 3px 9px; border-radius: 20px; font-size: 11px;
      font-family: var(--font-mono); cursor: pointer; transition: opacity 0.14s; white-space: nowrap;
    }
    .allday-pill:hover { opacity: 0.82; }
    .tl-grid {
      position: relative; padding: 0 16px 14px;
      overflow-y: auto; max-height: 460px;
    }
    .tl-grid::-webkit-scrollbar { width: 3px; }
    .tl-grid::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.09); border-radius: 2px; }
    .tl-inner { position: relative; }
    .tl-hour-row { display: flex; align-items: flex-start; position: relative; height: 60px; }
    .tl-hour-row::after {
      content: ''; position: absolute; left: 38px; right: 0; top: 0;
      height: 1px; background: rgba(255,255,255,0.04);
    }
    .tl-hour-label {
      font-size: 9px; font-family: var(--font-mono); color: rgba(255,255,255,0.18);
      width: 32px; flex-shrink: 0; text-align: right; padding-right: 6px;
      position: relative; top: -1px;
    }
    .tl-col { flex: 1; }
    .tl-events-layer { position: absolute; top: 0; left: 38px; right: 0; pointer-events: none; }
    .tl-event {
      position: absolute; left: 0; right: 0; border-radius: 7px; padding: 5px 9px;
      cursor: pointer; pointer-events: all; transition: opacity 0.14s, transform 0.13s;
      border-left: 3px solid; box-sizing: border-box; overflow: hidden; min-height: 24px;
    }
    .tl-event:hover { opacity: 0.85; transform: translateX(2px); }
    .tl-event.active { box-shadow: 0 0 0 1px currentColor; }
    .tl-event-title {
      font-size: 11px; font-family: var(--font-mono); font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.2;
    }
    .tl-event-time { font-size: 9px; font-family: var(--font-mono); opacity: 0.6; margin-top: 2px; }
    .tl-now-line { position: absolute; left: 0; right: 0; height: 1px; pointer-events: none; z-index: 10; }
    .tl-now-line::before {
      content: ''; position: absolute; right: 0; left: -2px; top: -1px; height: 3px;
      background: linear-gradient(to right, rgba(255,107,107,0.7), rgba(255,107,107,0.1));
    }
    .tl-now-dot {
      position: absolute; left: -5px; top: -4px; width: 8px; height: 8px; border-radius: 50%;
      background: #FF6B6B; box-shadow: 0 0 5px rgba(255,107,107,0.65);
    }

    /* ── Right panel ── */
    .rp-card {
      background: rgba(255,255,255,0.022); border: 1px solid rgba(255,255,255,0.055);
      border-radius: 11px; padding: 13px;
    }
    .rp-label {
      font-size: 9px; font-family: var(--font-mono); letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--text-tertiary);
      margin-bottom: 9px; display: flex; align-items: center; gap: 6px;
    }
    .rp-label::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(to right, rgba(255,255,255,0.06), transparent);
    }

    /* Quick add */
    .qa-input-wrap { position: relative; }
    .qa-input {
      width: 100%; background: rgba(255,255,255,0.045);
      border: 1px solid rgba(255,255,255,0.09); border-radius: 8px;
      padding: 9px 36px 9px 11px; font-size: 12px; font-family: var(--font-sans);
      color: var(--text-primary); outline: none; transition: border-color 0.15s, background 0.15s;
      box-sizing: border-box;
    }
    .qa-input:focus { border-color: rgba(255,255,255,0.22); background: rgba(255,255,255,0.06); }
    .qa-input::placeholder { color: rgba(255,255,255,0.2); font-size: 11px; }
    .qa-send {
      position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
      width: 24px; height: 24px; border-radius: 6px;
      background: rgba(91,164,245,0.16); border: 1px solid rgba(91,164,245,0.26);
      color: #5BA4F5; cursor: pointer; font-size: 11px;
      display: flex; align-items: center; justify-content: center; transition: background 0.13s;
    }
    .qa-send:hover { background: rgba(91,164,245,0.3); }
    .qa-preview {
      margin-top: 8px; padding: 6px 10px; border-radius: 7px;
      background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.055);
      font-size: 10px; font-family: var(--font-mono); color: var(--text-tertiary);
      display: none; gap: 5px; align-items: center;
    }
    .qa-preview.show { display: flex; }
    .qa-preview-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .qa-dest { display: flex; gap: 6px; margin-top: 8px; }
    .qa-dest-btn { flex: 1; padding: 4px 6px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 6px; cursor: pointer; font-size: 10px; font-family: var(--font-mono); color: var(--text-secondary); transition: background 0.12s, border-color 0.12s; }
    .qa-dest-btn:hover { background: rgba(255,255,255,0.08); }
    .qa-dest-btn.selected { background: rgba(91,164,245,0.12); border-color: rgba(91,164,245,0.4); color: #5BA4F5; }

    /* Event detail */
    .ev-detail-close {
      position: absolute; top: 13px; right: 13px; width: 20px; height: 20px;
      border-radius: 5px; background: rgba(255,255,255,0.06); border: none;
      color: var(--text-tertiary); cursor: pointer; font-size: 11px;
      display: flex; align-items: center; justify-content: center; transition: background 0.13s;
    }
    .ev-detail-close:hover { background: rgba(255,255,255,0.12); color: var(--text-secondary); }
    .ev-detail { display: flex; flex-direction: column; gap: 9px; }
    .ev-field { display: flex; flex-direction: column; gap: 3px; }
    .ev-field-label {
      font-size: 8.5px; font-family: var(--font-mono); color: var(--text-tertiary);
      text-transform: uppercase; letter-spacing: 0.1em;
    }
    .ev-input {
      background: rgba(255,255,255,0.045); border: 1px solid rgba(255,255,255,0.09);
      border-radius: 7px; padding: 7px 10px; font-size: 12px;
      color: var(--text-primary); font-family: var(--font-sans); outline: none;
      transition: border-color 0.14s; width: 100%; box-sizing: border-box;
    }
    .ev-input:focus { border-color: rgba(255,255,255,0.22); }
    .ev-input-sm { padding: 5px 9px; font-size: 11px; }
    .ev-row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .ev-cat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; }
    .ev-cat-btn {
      padding: 5px 3px; border-radius: 7px; border: 1px solid rgba(255,255,255,0.07);
      background: rgba(255,255,255,0.025); cursor: pointer;
      font-size: 9px; font-family: var(--font-mono); color: var(--text-tertiary);
      text-align: center; transition: all 0.13s; line-height: 1.3;
    }
    .ev-cat-btn:hover { border-color: rgba(255,255,255,0.15); color: var(--text-secondary); }
    .ev-cat-btn.active { color: var(--text-primary); }
    .ev-actions { display: flex; gap: 7px; margin-top: 3px; }
    .ev-save-btn {
      flex: 1; padding: 8px; border-radius: 8px;
      background: rgba(107,227,164,0.1); border: 1px solid rgba(107,227,164,0.22);
      color: #6BE3A4; cursor: pointer; font-size: 11px; font-family: var(--font-mono);
      letter-spacing: 0.04em; transition: background 0.13s;
    }
    .ev-save-btn:hover { background: rgba(107,227,164,0.2); }
    .ev-del-btn {
      width: 34px; border-radius: 8px;
      background: rgba(160,40,40,0.07); border: 1px solid rgba(160,40,40,0.18);
      color: rgba(200,80,80,0.7); cursor: pointer; font-size: 13px;
      display: flex; align-items: center; justify-content: center; transition: background 0.13s;
    }
    .ev-del-btn:hover { background: rgba(160,40,40,0.16); }
    .ev-gcal-notice {
      font-size: 9.5px; font-family: var(--font-mono); color: var(--text-tertiary);
      padding: 5px 9px; border-radius: 6px;
      background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.055);
      text-align: center;
    }

    /* Focus stats */
    .focus-stats { display: flex; gap: 5px; }
    .focus-stat {
      flex: 1; background: rgba(255,255,255,0.02); border-radius: 7px; padding: 8px 5px; text-align: center;
    }
    .focus-stat-val {
      font-size: 17px; font-weight: 700; font-family: var(--font-mono);
      color: var(--text-primary); line-height: 1.1; white-space: nowrap;
    }
    .focus-stat-lbl {
      font-size: 7.5px; font-family: var(--font-mono); color: var(--text-tertiary);
      text-transform: uppercase; letter-spacing: 0.09em; margin-top: 2px;
    }

    /* Next event */
    .next-ev-row { display: flex; align-items: center; gap: 12px; }
    .next-ev-bar { width: 3px; border-radius: 2px; flex-shrink: 0; align-self: stretch; min-height: 40px; }
    .next-ev-title { font-size: 16px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.01em; line-height: 1.2; }
    .next-ev-meta { font-size: 10px; font-family: var(--font-mono); color: var(--text-tertiary); margin-top: 4px; letter-spacing: 0.02em; }
    #nextEventCard {
      padding: 16px; background: rgba(255,255,255,0.032);
      border-color: rgba(255,255,255,0.08);
    }
    #nextEventCard .rp-label { margin-bottom: 12px; }

    /* Mini month */
    .mm-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 9px;
    }
    .mm-title {
      font-size: 10px; font-family: var(--font-mono); font-weight: 700;
      color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.08em;
    }
    .mm-nav-btn {
      width: 22px; height: 22px; border-radius: 5px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07);
      color: var(--text-tertiary); cursor: pointer; font-size: 10px;
      display: flex; align-items: center; justify-content: center; transition: background 0.13s;
    }
    .mm-nav-btn:hover { background: rgba(255,255,255,0.09); }
    .mm-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; }
    .mm-dow {
      font-size: 7.5px; font-family: var(--font-mono); color: var(--text-tertiary);
      text-align: center; padding: 0 0 5px; letter-spacing: 0.07em;
    }
    .mm-cell {
      aspect-ratio: 1; border-radius: 5px; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      position: relative; transition: background 0.12s;
    }
    .mm-cell:hover { background: rgba(255,255,255,0.05); }
    .mm-cell.other-month { opacity: 0.15; cursor: default; }
    .mm-cell.today { background: rgba(91,164,245,0.1); }
    .mm-cell.selected { background: rgba(255,255,255,0.09); box-shadow: inset 0 0 0 1px rgba(255,255,255,0.14); }
    .mm-cell.selected.today { background: rgba(91,164,245,0.15); box-shadow: inset 0 0 0 1px rgba(91,164,245,0.32); }
    .mm-num { font-size: 10px; font-family: var(--font-mono); color: rgba(255,255,255,0.4); }
    .mm-cell.today .mm-num { color: #5BA4F5; font-weight: 700; }
    .mm-cell.selected .mm-num { color: var(--text-primary); }
    .mm-evdot { width: 3px; height: 3px; border-radius: 50%; position: absolute; bottom: 2px; }

    /* ── Upcoming ── */
    .upcoming-card {
      background: rgba(255,255,255,0.022); border: 1px solid rgba(255,255,255,0.055);
      border-radius: 13px; padding: 16px;
    }
    .upcoming-day-group { margin-bottom: 16px; }
    .upcoming-day-group:last-child { margin-bottom: 0; }
    .upcoming-day-label {
      font-size: 8.5px; font-family: var(--font-mono); letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--text-secondary);
      padding-bottom: 6px; margin-bottom: 4px;
      border-bottom: 1px solid rgba(255,255,255,0.06);

    .mv-cell.today { background: rgba(91,164,245,0.07); border-color: rgba(91,164,245,0.2); }

    .mv-cell.selected.today { background: rgba(91,164,245,0.1); border-color: rgba(91,164,245,0.3); }
    .mv-num {
      font-size: 11px; font-family: var(--font-mono); font-weight: 600;

    .mv-chip {

      font-size: 12px; font-weight: 700; font-family: var(--font-mono);

    /* Category colors */

  </style>

<script src="utils.js"></script>
<script>
// ── Constants ──────────────────────────────────────────────────────────────
const TL_START_H = 6;
const TL_END_H   = 23;
const HOUR_PX    = 60;

const CAT_COLORS = {
  styrke: '#FFB84D',
  stevne: '#F6C453',
  kirke:  '#EFD97A',
  fridag: '#66C7A3',
  other:  '#B197FC',
  gcal:   '#5BA4F5',
};
// Locale-aware category labels — follow the 🇳🇴/🇺🇸 toggle.
function CAT_LABELS() {
  return {
    styrke: t('kal.cat_styrke'), stevne: t('kal.cat_stevne'), kirke: t('kal.cat_kirke'),
    fridag: t('kal.cat_fridag'), other: t('kal.cat_other'),
  };
}
// Locale-aware day/month names — follow the 🇳🇴/🇺🇸 toggle via fmtLocale().
// Reference dates: 2024-01 starts on a Monday; Jan..Dec are months 0..11.
function _names(opt, count, base) {
  const fmt = new Intl.DateTimeFormat(fmtLocale(), opt);
  return Array.from({ length: count }, (_, i) => fmt.format(base(i)));
}
// Sunday-first to match getDay() (0=Sun): 2023-12-31 is a Sunday.
function DAYS_SHORT()  { return _names({ weekday: 'short' }, 7, i => new Date(2023, 11, 31 + i)); }
function DAYS_FULL()   { return _names({ weekday: 'long'  }, 7, i => new Date(2023, 11, 31 + i)); }
function MONTHS_SHORT() { return _names({ month: 'short' }, 12, i => new Date(2024, i, 1)); }
function MONTHS_FULL()  { return _names({ month: 'long'  }, 12, i => new Date(2024, i, 1)); }
function _cap(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : s; }

applyLang();

// ── State ──────────────────────────────────────────────────────────────────
let db             = null;
let selectedDate   = new Date();
let weekStart      = getMonday(new Date());
let miniMonth      = { year: new Date().getFullYear(), month: new Date().getMonth() };
let gcalEvents     = [];
let customEvents   = [];
let activeEventId  = null;
let gcalScope      = 'this';   // 'this' = kun denne forekomsten, 'series' = hele gjentakende serien
let viewMode       = localStorage.getItem('kal_view') || 'agenda';
let _qaDest        = 'gcal';   // 'gcal' | 'local'
let _gcalRangeStart = '';
let _gcalRangeEnd   = '';

// ── Auth helper ────────────────────────────────────────────────────────────
async function authHeaders() {
  const { data: { session } } = await db.auth.getSession();
  if (!session) { window.location.href = 'login.html'; throw new Error('not_auth'); }
  return { Authorization: `Bearer ${session.access_token}` };
}

function handle401() {
  toast(t('kal.unauthorized'), 'err');
  setTimeout(() => { window.location.href = 'login.html'; }, 1500);
}

// ── Helpers ────────────────────────────────────────────────────────────────
function pad(n) { return String(n).padStart(2, '0'); }
function toLocalStr(d) { return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function getMonday(d) {
  const m = new Date(d);
  m.setDate(d.getDate() - ((d.getDay() + 6) % 7));
  m.setHours(0,0,0,0);
  return m;
}
function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate() + n); return r; }
function fmtTime(d) { return `${pad(d.getHours())}:${pad(d.getMinutes())}`; }
function fmtDateLong(d) {
  const name = DAYS_FULL()[d.getDay()];
  return `${_cap(name)} ${d.getDate()}. ${MONTHS_FULL()[d.getMonth()]}`;
}

function getEventColor(ev) {
  if (ev.source === 'gcal') {
    const t = (ev.title || '').toLowerCase();
    if (/styrke|friidrett|sprint|leg|back|chest|gym/.test(t)) return CAT_COLORS.styrke;
    if (/stevne|konkurranse|competition|race/.test(t))        return CAT_COLORS.stevne;
    if (/gudstjeneste|salhus|salt|kirke|church/.test(t))      return CAT_COLORS.kirke;
    if (/helligdag|ferie|fridag|holiday/.test(t))             return CAT_COLORS.fridag;
    return CAT_COLORS.gcal;
  }
  return CAT_COLORS[ev.category] || CAT_COLORS.other;
}
function hexAlpha(hex, a) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

// ── Category detection ─────────────────────────────────────────────────────
function detectCategory(title) {
  const t = (title || '').toLowerCase();
  if (/sprint|styrke|gym|løp|bein|overkropp|kjerne|friidrett|trening|training|leg|back|chest|squat/.test(t)) return 'styrke';
  if (/stevne|konkurranse|competition|meet|race|norgescup|nm|em|vm/.test(t)) return 'stevne';
  if (/gudstjeneste|salhus|salt|kirke|church/.test(t)) return 'kirke';
  if (/helligdag|ferie|fridag|holiday|jul|påske|pinse/.test(t)) return 'fridag';
  return 'other';
}

// ── Natural language parser ────────────────────────────────────────────────
function parseQuickAdd(text) {
  if (!text.trim()) return null;
  const lower = text.toLowerCase().trim();
  let date = toLocalStr(selectedDate), time = null, endTime = null, remaining = text.trim();

  // ISO date: YYYY-MM-DD (strip before time matching to avoid digits interfering)
  const isoDateMatch = remaining.match(/\b(\d{4}-\d{2}-\d{2})\b/);
  if (isoDateMatch) {
    date = isoDateMatch[1];
    remaining = remaining.replace(isoDateMatch[0], '').trim();
  }

  // First HH:MM → startTime
  const timeMatch  = remaining.match(/\b(\d{1,2}):(\d{2})\b/);
  const timeMatchH = !timeMatch && remaining.match(/\b(\d{1,2})\b(?=\s*$|\s+[a-z])/);
  if (timeMatch) {
    time = `${pad(+timeMatch[1])}:${pad(+timeMatch[2])}`;
    remaining = remaining.replace(timeMatch[0], '').trim();
  } else if (timeMatchH && +timeMatchH[1] >= 6 && +timeMatchH[1] <= 23) {
    time = `${pad(+timeMatchH[1])}:00`;
    remaining = remaining.replace(timeMatchH[0], '').trim();
  }

  // Second HH:MM → endTime (must come before duration check so explicit end wins)
  if (time) {
    const endTimeMatch = remaining.match(/\b(\d{1,2}):(\d{2})\b/);
    if (endTimeMatch) {
      endTime = `${pad(+endTimeMatch[1])}:${pad(+endTimeMatch[2])}`;
      remaining = remaining.replace(endTimeMatch[0], '').trim();
    }
  }

  // Duration fallback: "2t" / "1,5t" etc. — only if no explicit endTime yet
  const durMatch = !endTime && remaining.match(/\b(\d+(?:[.,]\d+)?)\s*t(?:imer?)?\b/i);
  if (durMatch && time) {
    const hrs = parseFloat(durMatch[1].replace(',','.'));
    const [hh, mm] = time.split(':').map(Number);
    const endMins = hh * 60 + mm + hrs * 60;
    endTime = `${pad(Math.floor(endMins / 60))}:${pad(endMins % 60)}`;
    remaining = remaining.replace(durMatch[0], '').trim();
  }

  const dayNames = [
    ['mandag','monday','man','mon'],['tirsdag','tuesday','tir','tue'],
    ['onsdag','wednesday','ons','wed'],['torsdag','thursday','tor','thu'],
    ['fredag','friday','fre','fri'],['lørdag','saturday','lør','sat'],
    ['søndag','sunday','søn','sun'],
  ];
  const relDay = { 'i dag': 0, 'idag': 0, 'i morgen': 1, 'imorgen': 1, 'tomorrow': 1 };

  let foundDay = false;
  for (const [rel, shift] of Object.entries(relDay)) {
    if (lower.includes(rel)) {
      date = toLocalStr(addDays(new Date(), shift));
      remaining = remaining.replace(new RegExp(rel, 'gi'), '').trim();
      foundDay = true; break;
    }
  }
  if (!foundDay) {
    for (let wi = 0; wi < dayNames.length; wi++) {
      for (const alias of dayNames[wi]) {
        const re = new RegExp(`\\b${alias}\\b`, 'i');
        if (re.test(remaining)) {
          const nowDow = (new Date().getDay() + 6) % 7;
          let diff = wi - nowDow;
          if (diff <= 0) diff += 7;
          date = toLocalStr(addDays(new Date(), diff));
          remaining = remaining.replace(re, '').trim();
          foundDay = true; break;
        }
      }
      if (foundDay) break;
    }
  }

  const title = remaining.replace(/\s+/g, ' ').trim() || text.trim();
  return { title, date, startTime: time, endTime, category: detectCategory(title), allDay: !time };
}

// ── Data loading ───────────────────────────────────────────────────────────
async function loadGCalRange(anchorDate) {
  const anchor = anchorDate || new Date();
  const start  = toLocalStr(new Date(anchor.getFullYear(), anchor.getMonth() - 4, 1));
  const end    = toLocalStr(new Date(anchor.getFullYear(), anchor.getMonth() + 8, 0));
  _gcalRangeStart = start;
  _gcalRangeEnd   = end;
  try {
    const hdrs = await authHeaders();
    const r = await fetch(`/api/kalender?start=${start}&end=${end}`, { headers: hdrs });
    if (r.status === 401) { handle401(); return; }
    if (!r.ok) throw new Error('API ' + r.status);
    const { events = [] } = await r.json();
    gcalEvents = events.map(e => ({
      id: 'gcal-' + e.id, source: 'gcal',
      title: e.summary || '(uten tittel)',
      date: (e.start?.date || e.start?.dateTime || '').slice(0, 10),
      startTime: e.start?.dateTime ? fmtTime(new Date(e.start.dateTime)) : null,
      endTime:   e.end?.dateTime   ? fmtTime(new Date(e.end.dateTime))   : null,
      allDay: !!e.start?.date, gcalId: e.id,
      recurringEventId: e.recurringEventId || null,
    }));
  } catch { gcalEvents = []; }
}

async function ensureGCalRange(dateStr) {
  if (dateStr >= _gcalRangeStart && dateStr <= _gcalRangeEnd) return false;
  await loadGCalRange(new Date(dateStr + 'T12:00:00'));
  return true;
}

async function loadCustomEvents() {
  if (!db) return;
  const { data, error } = await db.from('calendar_events').select('*');
  if (error) {
    if (error.message && error.message.includes('calendar_events')) {
      toast(t('kal.table_missing'), 'err');
    }
    customEvents = []; return;
  }
  customEvents = (data || []).map(e => ({
    id: 'custom-' + e.id, dbId: e.id, source: 'custom',
    title: e.title, date: e.date,
    startTime: e.start_time ? e.start_time.slice(0, 5) : null,
    endTime:   e.end_time   ? e.end_time.slice(0, 5)   : null,
    allDay: e.all_day, category: e.category || 'other', notes: e.notes || '',
  }));
}

function allEvents() {
  return [...gcalEvents, ...customEvents].sort((a, b) => {
    if (a.date < b.date) return -1;
    if (a.date > b.date) return 1;
    return (a.startTime || '00:00').localeCompare(b.startTime || '00:00');
  });
}

function eventsForDate(dateStr) { return allEvents().filter(e => e.date === dateStr); }

// ── Week strip ─────────────────────────────────────────────────────────────
function renderWeekStrip() {
  const el = document.getElementById('weekStrip');
  const todayStr = today(), selStr = toLocalStr(selectedDate);
  const evts = allEvents();

  el.innerHTML = Array.from({length: 7}, (_, i) => {
    const d    = addDays(weekStart, i);
    const dStr = toLocalStr(d);
    const isToday    = dStr === todayStr;
    const isSelected = dStr === selStr;
    const dayEvts = evts.filter(e => e.date === dStr);

    const firstEv  = dayEvts.find(e => !e.allDay && e.startTime) || dayEvts[0];
    const evColor  = firstEv ? getEventColor(firstEv) : null;
    const evTitle  = firstEv
      ? firstEv.title.slice(0, 9) + (firstEv.title.length > 9 ? '…' : '')
      : null;
    const extraDots = dayEvts.length > 1
      ? `<div class="wd-dots">${dayEvts.slice(1, 4).map(e =>
          `<div class="wd-dot" style="background:${getEventColor(e)}"></div>`).join('')}</div>`
      : '';

    return `<div class="week-day${isToday ? ' today' : ''}${isSelected ? ' selected' : ''}" onclick="selectDay('${dStr}')">
      <div class="wd-top">
        <span class="wd-name">${_cap(DAYS_SHORT()[(i + 1) % 7])}</span>
        <span class="wd-num">${d.getDate()}</span>
      </div>
      ${evTitle ? `<div class="wd-ev"><div class="wd-ev-dot" style="background:${evColor}"></div>${escHtml(evTitle)}</div>` : ''}
      ${extraDots}
    </div>`;
  }).join('');

  const mid = addDays(weekStart, 3);
  document.getElementById('headerLabel').innerHTML =
    `${_cap(MONTHS_FULL()[mid.getMonth()])}<span>${mid.getFullYear()}</span>`;
}

// ── Day view dispatcher ────────────────────────────────────────────────────
function renderDayView(dateStr) {
  const d    = new Date(dateStr + 'T12:00:00');
  const evts = eventsForDate(dateStr);
  document.getElementById('dvDateBig').textContent = fmtDateLong(d);
  document.getElementById('dvMeta').textContent =
    `Uke ${getISOWeek(d)} · ${evts.length} hendelse${evts.length !== 1 ? 'r' : ''}`;
  if (viewMode === 'agenda') renderAgenda(dateStr);
  else renderTimeline(dateStr);

  renderNextCard();
}

// ── Agenda view ────────────────────────────────────────────────────────────
function renderAgenda(dateStr) {
  const el   = document.getElementById('dayViewContent');
  const evts = eventsForDate(dateStr);

  if (!evts.length) {
    el.innerHTML = `<div class="agenda-empty">${t('kal.no_events_use_quick')}</div>`;
    return;
  }

  const allDay = evts.filter(e => e.allDay);
  const timed  = evts.filter(e => !e.allDay && e.startTime)
                     .sort((a,b) => a.startTime.localeCompare(b.startTime));
  const noTime = evts.filter(e => !e.allDay && !e.startTime);

  let html = '';

  if (allDay.length) {
    html += `<div class="ag-allday-strip">`;
    html += allDay.map(e => {
      const c = getEventColor(e);
      return `<div class="ag-allday-pill" style="background:${hexAlpha(c,0.14)};color:${c};border:1px solid ${hexAlpha(c,0.24)}"
        onclick="openEvent('${e.id}')">${escHtml(e.title)}</div>`;
    }).join('');
    html += `</div>`;
  }

  if (timed.length) {
    html += `<div class="agenda-list">`;
    html += timed.map(e => agRow(e)).join('');
    html += `</div>`;
  }

  if (noTime.length) {
    if (timed.length || allDay.length) html += `<div class="agenda-section-label">${t('kal.no_time')}</div>`;
    html += `<div class="agenda-list">`;
    html += noTime.map(e => agRow(e)).join('');
    html += `</div>`;
  }

  el.innerHTML = html;
}

function agRow(e) {
  const c        = getEventColor(e);
  const isActive = e.id === activeEventId;
  const catLabel = e.source === 'gcal' ? 'GCal' : (CAT_LABELS()[e.category] || t('kal.cat_other'));
  const timeStr  = e.allDay ? t('kal.whole_day') : (e.startTime || '–');
  const style    = isActive ? `background:${hexAlpha(c,0.07)};border-left-color:${c}` : '';

  return `<div class="agenda-row${isActive ? ' active' : ''}" style="${style}" onclick="openEvent('${e.id}')">
    <div class="ag-time">${timeStr}</div>
    <div class="ag-dot" style="background:${c}"></div>
    <div class="ag-title">${escHtml(e.title)}</div>
    <div class="ag-badge" style="background:${hexAlpha(c,0.14)};color:${c}">${catLabel}</div>
  </div>`;
}

// ── Timeline view ──────────────────────────────────────────────────────────
function renderTimeline(dateStr) {
  const evts   = eventsForDate(dateStr);
  const allDay = evts.filter(e => e.allDay);
  const timed  = evts.filter(e => !e.allDay && e.startTime);

  const adHtml = allDay.map(e => {
    const c = getEventColor(e);
    return `<div class="allday-pill" style="background:${hexAlpha(c,0.14)};color:${c};border:1px solid ${hexAlpha(c,0.24)}"
      onclick="openEvent('${e.id}')">${escHtml(e.title)}</div>`;
  }).join('');

  const totalH  = TL_END_H - TL_START_H;
  const gridH   = totalH * HOUR_PX;

  const hourRows = Array.from({length: totalH}, (_, i) => TL_START_H + i).map(h =>
    `<div class="tl-hour-row">
      <div class="tl-hour-label">${pad(h)}:00</div>
      <div class="tl-col"></div>
    </div>`
  ).join('');

  const eventBlocks = timed.map(e => {
    const [sh, sm]  = e.startTime.split(':').map(Number);
    const startMins = sh * 60 + sm;
    const top       = (Math.max(TL_START_H * 60, startMins) - TL_START_H * 60) / 60 * HOUR_PX;
    let height      = HOUR_PX;
    if (e.endTime) {
      const [eh, em] = e.endTime.split(':').map(Number);
      height = Math.max(24, (eh * 60 + em - startMins) / 60 * HOUR_PX);
    }
    const c        = getEventColor(e);
    const isActive = e.id === activeEventId;
    const timeLabel = e.endTime ? `${e.startTime} – ${e.endTime}` : e.startTime;
    return `<div class="tl-event${isActive ? ' active' : ''}"
      style="top:${top}px;height:${height}px;background:${hexAlpha(c,0.1)};border-left-color:${c};color:${c}"
      onclick="openEvent('${e.id}')">
      <div class="tl-event-title" style="color:var(--text-primary)">${escHtml(e.title)}</div>
      ${height > 34 ? `<div class="tl-event-time">${timeLabel}</div>` : ''}
    </div>`;
  }).join('');

  const nowLine = (() => {
    if (dateStr !== today()) return '';
    const now  = new Date();
    const mins = now.getHours() * 60 + now.getMinutes();
    const top  = (mins - TL_START_H * 60) / 60 * HOUR_PX;
    if (top < 0 || top > gridH) return '';
    return `<div class="tl-now-line" style="top:${top}px"><div class="tl-now-dot"></div></div>`;
  })();

  document.getElementById('dayViewContent').innerHTML =
    `${adHtml ? `<div class="allday-strip">${adHtml}</div>` : ''}
    <div class="tl-grid" id="tlGrid">
      <div class="tl-inner" style="height:${gridH}px">
        ${hourRows}
        <div class="tl-events-layer" style="height:${gridH}px">${eventBlocks}${nowLine}</div>
      </div>
    </div>`;

  const scrollToH = dateStr === today() ? new Date().getHours() - 1 : 7;
  setTimeout(() => {
    const g = document.getElementById('tlGrid');
    if (g) g.scrollTop = Math.max(0, (scrollToH - TL_START_H) * HOUR_PX - 20);
  }, 10);
}

// ── Mini month ─────────────────────────────────────────────────────────────
function renderMiniMonth() {
  const { year, month } = miniMonth;
  document.getElementById('mmTitle').textContent = `${_cap(MONTHS_SHORT()[month])} ${year}`;

  const firstDay      = new Date(year, month, 1);
  const startDow      = (firstDay.getDay() + 6) % 7;
  const daysInMonth   = new Date(year, month + 1, 0).getDate();
  const prevMonthDays = new Date(year, month, 0).getDate();
  const todayStr      = today(), selStr = toLocalStr(selectedDate);
  const evDates       = new Set(allEvents().map(e => e.date));

  const dowHeaders = ['M','T','O','T','F','L','S'].map(d => `<div class="mm-dow">${d}</div>`).join('');
  let cells = '';
  for (let i = startDow - 1; i >= 0; i--)
    cells += `<div class="mm-cell other-month"><div class="mm-num">${prevMonthDays - i}</div></div>`;
  for (let d = 1; d <= daysInMonth; d++) {
    const dStr    = `${year}-${pad(month+1)}-${pad(d)}`;
    const isToday = dStr === todayStr, isSel = dStr === selStr;
    const ev      = evDates.has(dStr) ? allEvents().find(e => e.date === dStr) : null;
    cells += `<div class="mm-cell${isToday ? ' today' : ''}${isSel ? ' selected' : ''}" onclick="selectDay('${dStr}')">
      <div class="mm-num">${d}</div>
      ${ev ? `<div class="mm-evdot" style="background:${getEventColor(ev)}"></div>` : ''}
    </div>`;
  }
  const total = startDow + daysInMonth;
  const rem   = (7 - (total % 7)) % 7;
  for (let d = 1; d <= rem; d++)
    cells += `<div class="mm-cell other-month"><div class="mm-num">${d}</div></div>`;

  document.getElementById('mmGrid').innerHTML = dowHeaders + cells;
}

// ── Month View ────────────────────────────────────────────────────────────
function renderMonthView() {
  const gridEl    = document.getElementById('mvGrid');
  const panelEl   = document.getElementById('mvDayPanel');
  if (!gridEl) return;

  const { year, month } = miniMonth;
  const firstDay      = new Date(year, month, 1);
  const startDow      = (firstDay.getDay() + 6) % 7;   // 0=Mon
  const daysInMonth   = new Date(year, month + 1, 0).getDate();
  const prevMonthDays = new Date(year, month, 0).getDate();
  const todayStr      = today(), selStr = toLocalStr(selectedDate);

  // Day-of-week headers (Mon–Sun)
  const dsArr = DAYS_SHORT(); // 0=Sun
  const dowHeaders = [1,2,3,4,5,6,0].map(i =>
    `<div class="mv-dow">${_cap(dsArr[i]).slice(0,2)}</div>`
  ).join('');

  let cells = '';
  // Prev-month overflow
  for (let i = startDow - 1; i >= 0; i--)
    cells += `<div class="mv-cell other-month"><div class="mv-num">${prevMonthDays - i}</div></div>`;

  // Current month
  for (let d = 1; d <= daysInMonth; d++) {
    const dStr     = `${year}-${pad(month+1)}-${pad(d)}`;
    const isToday  = dStr === todayStr;
    const isSel    = dStr === selStr;
    const dayEvts  = eventsForDate(dStr);

    const chips = dayEvts.slice(0, 3).map(e => {
      const c = getEventColor(e);
      return `<div class="mv-chip" style="background:${hexAlpha(c,0.18)};color:${c}">${escHtml(e.title.slice(0,13))}${e.title.length>13?'…':''}</div>`;
    }).join('');
    const more = dayEvts.length > 3
      ? `<div class="mv-more">+${dayEvts.length - 3}</div>` : '';

    cells += `<div class="mv-cell${isToday?' today':''}${isSel?' selected':''}" onclick="selectDay('${dStr}')">
      <div class="mv-num">${d}</div>${chips}${more}
    </div>`;
  }

  // Next-month filler
  const total = startDow + daysInMonth;
  const rem   = (7 - (total % 7)) % 7;
  for (let d = 1; d <= rem; d++)
    cells += `<div class="mv-cell other-month"><div class="mv-num">${d}</div></div>`;

  gridEl.innerHTML = `<div class="mv-grid-wrap"><div class="mv-grid">${dowHeaders}${cells}</div></div>`;

  // Update header
  document.getElementById('headerLabel').innerHTML =
    `${_cap(MONTHS_FULL()[month])}<span>${year}</span>`;

  // Render selected day panel
  renderMvDayPanel(toLocalStr(selectedDate));
}

function renderMvDayPanel(dateStr) {
  const el = document.getElementById('mvDayPanel');
  if (!el) return;
  const evts = eventsForDate(dateStr);
  if (!evts.length) { el.style.display = 'none'; return; }
  el.style.display = 'block';
  const d = new Date(dateStr + 'T12:00:00');
  const timed  = evts.filter(e => !e.allDay && e.startTime).sort((a,b)=>a.startTime.localeCompare(b.startTime));
  const allDay = evts.filter(e => e.allDay);
  const noTime = evts.filter(e => !e.allDay && !e.startTime);
  const all    = [...allDay, ...timed, ...noTime];
  const rows   = all.map(e => {
    const c = getEventColor(e);
    const timeStr = e.allDay ? t('kal.whole_day') : (e.startTime || '–');
    return `<div class="agenda-row" onclick="openEvent('${e.id}')">
      <div class="ag-time">${timeStr}</div>
      <div class="ag-dot" style="background:${c}"></div>
      <div class="ag-title">${escHtml(e.title)}</div>
    </div>`;
  }).join('');
  el.innerHTML = `<div class="mv-day-panel">
    <div class="mv-day-panel-title">${fmtDateLong(d)}</div>
    ${rows}
  </div>`;
}

// ── Upcoming ───────────────────────────────────────────────────────────────
function renderUpcoming() {
  const el      = document.getElementById('upcomingList');
  const todayD  = today();
  const upcoming = allEvents().filter(e => e.date >= todayD).slice(0, 28);

  if (!upcoming.length) {
    el.innerHTML = `<div style="font-size:11px;font-family:var(--font-mono);color:var(--text-tertiary);padding:4px 0">${t('dash.no_events')}</div>`;
    return;
  }

  const groups = {};
  for (const e of upcoming) {
    if (!groups[e.date]) groups[e.date] = [];
    groups[e.date].push(e);
  }

  el.innerHTML = Object.entries(groups).slice(0, 8).map(([dateStr, evts]) => {
    const d        = new Date(dateStr + 'T12:00:00');
    const isToday  = dateStr === todayD;
    const dow      = (d.getDay() + 6) % 7;
    const dayLabel = isToday ? t('kal.today')
      : `${_cap(DAYS_SHORT()[dow === 6 ? 0 : dow + 1] || DAYS_SHORT()[dow])} ${d.getDate()}. ${MONTHS_SHORT()[d.getMonth()]}`;

    const rows = evts.map(e => {
      const c        = getEventColor(e);
      const catLabel = e.source === 'gcal' ? '' : (CAT_LABELS()[e.category] || '');
      return `<div class="upcoming-event" onclick="selectDay('${dateStr}');openEvent('${e.id}')">
        <div class="up-dot" style="background:${c}"></div>
        <div class="up-title">${escHtml(e.title)}</div>
        ${catLabel ? `<div class="up-badge" style="background:${hexAlpha(c,0.13)};color:${c}">${catLabel}</div>` : ''}
        <div class="up-time">${e.allDay ? 'Heldags' : (e.startTime || '')}</div>
      </div>`;
    }).join('');

    return `<div class="upcoming-day-group">
      <div class="upcoming-day-label"${isToday ? ' style="color:rgba(91,164,245,0.75)"' : ''}>
        <span>${dayLabel}</span>
        <span style="opacity:0.45">${evts.length} hend.</span>
      </div>
      ${rows}
    </div>`;
  }).join('');
}

// ── Next event card ────────────────────────────────────────────────────────
function renderNextCard() {
  const el = document.getElementById('nextEvContent');
  if (!el) return;
  const todayStr = today();
  const now      = new Date();
  const nowStr   = `${pad(now.getHours())}:${pad(now.getMinutes())}`;

  const next = allEvents().filter(e =>
    !e.allDay && e.startTime && (
      e.date > todayStr || (e.date === todayStr && e.startTime >= nowStr)
    )
  ).sort((a,b) => (a.date + a.startTime).localeCompare(b.date + b.startTime))[0];

  if (!next) {
    el.innerHTML = `<div style="font-size:11px;font-family:var(--font-mono);color:var(--text-tertiary)">${t('kal.no_upcoming')}</div>`;
    return;
  }

  const d        = new Date(next.date + 'T12:00:00');
  const c        = getEventColor(next);
  const isToday  = next.date === todayStr;
  const dow      = (d.getDay() + 6) % 7;
  const ds = DAYS_SHORT(), ms = MONTHS_SHORT();
  const dateLabel = isToday ? t('kal.today')
    : `${_cap(ds[(dow + 1) % 7])} ${d.getDate()}. ${_cap(ms[d.getMonth()])}`;

  el.innerHTML = `
    <div class="next-ev-bar" style="background:${c}"></div>
    <div style="min-width:0">
      <div class="next-ev-title" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escHtml(next.title)}</div>
      <div class="next-ev-meta">${dateLabel} · ${next.startTime}</div>
    </div>`;
}

// ── User actions ───────────────────────────────────────────────────────────
function selectDay(dateStr) {
  selectedDate = new Date(dateStr + 'T12:00:00');
  if (viewMode === 'month') {
    renderMonthView();
    renderMiniMonth();
    renderNextCard();
    return;
  }
  const selMon = getMonday(selectedDate);
  if (toLocalStr(selMon) !== toLocalStr(weekStart)) weekStart = selMon;
  miniMonth = { year: selectedDate.getFullYear(), month: selectedDate.getMonth() };
  renderWeekStrip();
  renderDayView(dateStr);
  renderMiniMonth();
}

function openEvent(id) {
  activeEventId = id;
  gcalScope = 'this';
  renderDayView(toLocalStr(selectedDate));
  renderEventDetail();
}

function closeEvent() {
  activeEventId = null;
  const card = document.getElementById('evDetailCard');
  if (card) card.style.display = 'none';
  renderDayView(toLocalStr(selectedDate));
}

function evSetCat(cat) {
  if (!activeEventId) return;
  const ev = customEvents.find(e => e.id === activeEventId);
  if (!ev) return;
  ev.category = cat;
  renderEventDetail();
}

async function saveActiveEvent() {
  const ev = customEvents.find(e => e.id === activeEventId);
  if (!ev) return;
  const title     = document.getElementById('ef-title')?.value.trim();
  const date      = document.getElementById('ef-date')?.value;
  const startTime = document.getElementById('ef-start')?.value || null;
  const endTime   = document.getElementById('ef-end')?.value   || null;
  const notes     = document.getElementById('ef-notes')?.value.trim() || null;
  if (!title) { toast(t('gm.save_error'), 'err'); return; }

  const payload = { title, date, start_time: startTime, end_time: endTime, all_day: !startTime, category: ev.category, notes };
  const { error } = await db.from('calendar_events').update(payload).eq('id', ev.dbId);
  if (error) { toast(t('kal.save_error'), 'err'); return; }

  Object.assign(ev, { title, date, startTime, endTime, notes, allDay: !startTime });
  toast(t('kal.updated'));
  renderAll();
}

async function deleteActiveEvent() {
  const ev = customEvents.find(e => e.id === activeEventId);
  if (!ev) return;
  if (!confirm(`${t('kal.del_confirm')} "${ev.title}"`)) return;
  const { error } = await db.from('calendar_events').delete().eq('id', ev.dbId);
  if (error) { toast(t('kal.del_error'), 'err'); return; }
  customEvents = customEvents.filter(e => e.id !== activeEventId);
  activeEventId = null;
  toast(t('kal.deleted'));
  renderAll();
}

// ── Google Calendar: rediger / slett ───────────────────────────────────────
function setGcalScope(s) { gcalScope = s; renderEventDetail(); }

function gcalTimeObjs(date, startTime, endTime) {
  const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || 'Europe/Oslo';
  if (!startTime) { // heldags: Google sin sluttdato er eksklusiv (+1 dag)
    const nd = new Date(date + 'T00:00:00'); nd.setDate(nd.getDate() + 1);
    return { start: { date }, end: { date: toLocalStr(nd) } };
  }
  return {
    start: { dateTime: `${date}T${startTime}:00`, timeZone: tz },
    end:   { dateTime: `${date}T${(endTime || startTime)}:00`, timeZone: tz },
  };
}

// 'this' → instans-id (kun den dagen), 'series' → master-id (hele serien)
function gcalTargetId(ev) {
  return (ev.recurringEventId && gcalScope === 'series') ? ev.recurringEventId : ev.gcalId;
}

async function saveActiveGcalEvent() {
  const ev = gcalEvents.find(e => e.id === activeEventId);
  if (!ev) return;
  const title = document.getElementById('gf-title')?.value.trim();
  const date  = document.getElementById('gf-date')?.value;
  const start = document.getElementById('gf-start')?.value || null;
  const end   = document.getElementById('gf-end')?.value   || null;
  if (!title || !date) { toast(t('kal.save_error'), 'err'); return; }

  const times = gcalTimeObjs(date, start, end);
  const hdrs = { ...await authHeaders(), 'Content-Type': 'application/json' };
  const r = await fetch('/api/kalender', {
    method: 'PATCH',
    headers: hdrs,
    body: JSON.stringify({ eventId: gcalTargetId(ev), summary: title, start: times.start, end: times.end }),
  });
  if (r.status === 401) { handle401(); return; }
  if (!r.ok) { toast(r.status === 403 ? t('kal.gcal_err_scope') : t('kal.save_error'), 'err'); return; }
  toast(t('kal.updated'));
  await loadGCalRange();
  renderAll();
}

async function deleteActiveGcalEvent() {
  const ev = gcalEvents.find(e => e.id === activeEventId);
  if (!ev) return;
  const series = ev.recurringEventId && gcalScope === 'series';
  const msg = series ? t('kal.gcal_del_series_confirm') : t('kal.gcal_del_confirm');
  if (!confirm(`${msg} "${ev.title}"`)) return;
  const hdrs = { ...await authHeaders(), 'Content-Type': 'application/json' };
  const r = await fetch('/api/kalender', {
    method: 'DELETE',
    headers: hdrs,
    body: JSON.stringify({ eventId: gcalTargetId(ev) }),
  });
  if (r.status === 401) { handle401(); return; }
  if (!r.ok) { toast(r.status === 403 ? t('kal.gcal_err_scope') : t('kal.del_error'), 'err'); return; }
  activeEventId = null;
  toast(t('kal.deleted'));
  await loadGCalRange();
  renderAll();
}

async function createEvent(data) {
  const { title, date, startTime, endTime, category, allDay, notes = null } = data;
  if (!title || !date) return;
  const payload = {
    title, date,
    start_time: startTime || null,
    end_time:   endTime   || null,
    all_day:    allDay || !startTime,
    category:   category || 'other',
    notes,
  };
  const { data: rows, error } = await db.from('calendar_events').insert(payload).select();
  if (error) {
    const msg = error.message?.includes('calendar_events')
      ? t('kal.table_missing')
      : t('kal.error_prefix') + error.message;
    toast(msg, 'err'); return;
  }
  const row = rows[0];
  const ev  = {
    id: 'custom-' + row.id, dbId: row.id, source: 'custom',
    title: row.title, date: row.date,
    startTime: row.start_time?.slice(0,5) || null,
    endTime:   row.end_time?.slice(0,5)   || null,
    allDay: row.all_day, category: row.category || 'other', notes: row.notes || '',
  };
  customEvents.push(ev);
  activeEventId = ev.id;
  if (ev.date !== toLocalStr(selectedDate)) selectDay(ev.date);
  else renderAll();
  toast(t('kal.added') + ': ' + ev.title);
}

// ── Quick add ──────────────────────────────────────────────────────────────
function onQaInput() {
  const val     = document.getElementById('qaInput').value;
  const parsed  = parseQuickAdd(val);
  const preview = document.getElementById('qaPreview');
  const dot     = document.getElementById('qaPreviewDot');
  const txt     = document.getElementById('qaPreviewText');

  if (parsed && val.length > 2) {
    const c = CAT_COLORS[parsed.category] || CAT_COLORS.other;
    dot.style.background = c;
    const timeStr = parsed.allDay ? 'Hele dagen' : (parsed.startTime + (parsed.endTime ? ' – ' + parsed.endTime : ''));
    txt.textContent = `${parsed.title} · ${timeStr} · ${parsed.date}`;
    preview.classList.add('show');
  } else {
    preview.classList.remove('show');
  }
}

function onQaKey(e) { if (e.key === 'Enter') qaSubmit(); }

function setQaDest(dest) {
  _qaDest = dest;
  document.getElementById('qaDestGcal').classList.toggle('selected', dest === 'gcal');
  document.getElementById('qaDestLocal').classList.toggle('selected', dest === 'local');
}

async function createGcalEvent(data) {
  const { title, date, startTime, endTime } = data;
  if (!title || !date) return;
  const times = gcalTimeObjs(date, startTime, endTime);
  const hdrs = { ...await authHeaders(), 'Content-Type': 'application/json' };
  const r = await fetch('/api/kalender', {
    method: 'POST',
    headers: hdrs,
    body: JSON.stringify({ summary: title, start: times.start, end: times.end }),
  });
  if (r.status === 401) { handle401(); return; }
  if (!r.ok) { toast(t('kal.save_error'), 'err'); return; }
  toast(t('kal.added') + ': ' + title);
  await loadGCalRange();
  renderAll();
}

async function qaSubmit() {
  const val = document.getElementById('qaInput').value.trim();
  if (!val) return;
  const parsed = parseQuickAdd(val);
  if (!parsed) return;
  if (_qaDest === 'gcal') {
    await createGcalEvent(parsed);
  } else {
    await createEvent(parsed);
  }
  document.getElementById('qaInput').value = '';
  document.getElementById('qaPreview').classList.remove('show');
}

// ── Navigation ─────────────────────────────────────────────────────────────
async function shiftWeek(dir) {
  if (viewMode === 'month') {
    miniMonth.month += dir;
    if (miniMonth.month < 0)  { miniMonth.month = 11; miniMonth.year--; }
    if (miniMonth.month > 11) { miniMonth.month = 0;  miniMonth.year++; }
    const checkDate = `${miniMonth.year}-${pad(miniMonth.month+1)}-15`;
    const reloaded  = await ensureGCalRange(checkDate);
    if (!reloaded) { renderMonthView(); renderMiniMonth(); }
    else { renderAll(); }
    return;
  }
  weekStart = addDays(weekStart, dir * 7);
  const weekEnd = addDays(weekStart, 6);
  const ws = toLocalStr(weekStart), we = toLocalStr(weekEnd);
  const selStr = toLocalStr(selectedDate);
  if (selStr < ws || selStr > we) {
    selectedDate = new Date(weekStart); selectedDate.setHours(12,0,0,0);
  }
  const reloaded = await ensureGCalRange(ws);
  if (!reloaded) {
    renderWeekStrip();
    renderDayView(toLocalStr(selectedDate));
    renderMiniMonth();
  } else {
    renderAll();
  }
}

function goToday() {
  selectedDate = new Date();
  weekStart    = getMonday(new Date());
  miniMonth    = { year: selectedDate.getFullYear(), month: selectedDate.getMonth() };
  renderAll();
}

async function shiftMiniMonth(dir) {
  miniMonth.month += dir;
  if (miniMonth.month < 0)  { miniMonth.month = 11; miniMonth.year--; }
  if (miniMonth.month > 11) { miniMonth.month = 0;  miniMonth.year++; }
  const checkDate = `${miniMonth.year}-${pad(miniMonth.month+1)}-15`;
  const reloaded  = await ensureGCalRange(checkDate);
  if (!reloaded) renderMiniMonth();
  else renderAll();
}

// ── View toggle ────────────────────────────────────────────────────────────
function setView(mode) {
  viewMode = mode;
  localStorage.setItem('kal_view', mode);
  document.getElementById('vtAgenda').classList.toggle('active', mode === 'agenda');
  document.getElementById('vtTimeline').classList.toggle('active', mode === 'timeline');
  document.getElementById('vtMonth').classList.toggle('active', mode === 'month');

  const dayCard   = document.getElementById('dayViewCard');
  const monthCard = document.getElementById('monthViewCard');
  const stripWrap = document.querySelector('.week-strip-wrap');

  if (mode === 'month') {
    if (dayCard)   dayCard.style.display   = 'none';
    if (monthCard) monthCard.style.display = 'block';
    if (stripWrap) stripWrap.style.display = 'none';
    miniMonth = { year: selectedDate.getFullYear(), month: selectedDate.getMonth() };
    renderMonthView();
  } else {
    if (dayCard)   dayCard.style.display   = 'block';
    if (monthCard) monthCard.style.display = 'none';
    if (stripWrap) stripWrap.style.display = '';
    renderDayView(toLocalStr(selectedDate));
  }
}

// ── Render all ─────────────────────────────────────────────────────────────
function renderAll() {
  if (viewMode === 'month') {
    renderMonthView();
  } else {
    renderWeekStrip();
    renderDayView(toLocalStr(selectedDate));
    renderEventDetail();
  }
  renderMiniMonth();
  renderUpcoming();
}

// ── Utilities ──────────────────────────────────────────────────────────────
function getISOWeek(d) {
  const tmp = new Date(d); tmp.setHours(0,0,0,0);
  tmp.setDate(tmp.getDate() + 3 - (tmp.getDay()+6)%7);
  const w1 = new Date(tmp.getFullYear(), 0, 4);
  return 1 + Math.round(((tmp-w1)/86400000 - 3 + (w1.getDay()+6)%7)/7);
}
// ── Init ───────────────────────────────────────────────────────────────────
(async () => {
  document.querySelector('[data-p="kalender"]').classList.add('active');

  try {
    const cfg = await getConfig();
    db = supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);
    const { data: { session } } = await db.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }
  } catch (err) {
    document.querySelector('.kal-page').innerHTML =
      `<div class="card" style="text-align:center;padding:40px;margin-top:40px">
        <div style="color:var(--danger);font-family:var(--font-mono);font-size:13px">${err.message}</div>
      </div>`;
    return;
  }

  applyLang();
  await Promise.all([loadGCalRange(), loadCustomEvents()]);
  renderAll();

  setInterval(() => {
    if (viewMode === 'timeline' && toLocalStr(selectedDate) === today()) {
      renderTimeline(today());
    }
  }, 60_000);
})();

// Re-render everything (day/month names, cards) when language toggles
onLangChange = () => { applyLang(); renderAll(); };
</script>
