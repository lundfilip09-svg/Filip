<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treningsdagbok — Eksport</title>
<!--
  B7: Treningsdagbok / PDF-eksport.
  Selvstendig side (egne stiler + egne oversettelser) for å unngå kollisjon med
  andre filer. Ren HVIT PDF via window.print() — ingen eksterne bibliotek.
  Innhold: økter (gym_log) + sprintøkter (sprint_log) + knesmerte + RPE +
  notater + dato, for valgt periode (default siste 4 uker). Norsk/engelsk-switch.
-->
<style>
  :root { --ink:#1a1a1a; --muted:#666; --line:#ddd; --accent:#2b5fb0; --bg:#fff; }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: #f2f3f5; color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 14px; line-height: 1.5;
  }
  /* Kontrollpanel (skjules ved print) */
  .controls {
    position: sticky; top: 0; z-index: 10; background: #fff; border-bottom: 1px solid var(--line);
    padding: 14px 20px; display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end;
  }
  .controls .field { display: flex; flex-direction: column; gap: 3px; }
  .controls label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .controls input, .controls select {
    padding: 7px 9px; border: 1px solid var(--line); border-radius: 7px; font-size: 13px; background: #fff; color: var(--ink);
  }
  .btn {
    padding: 8px 16px; border-radius: 7px; border: 1px solid var(--accent); background: var(--accent);
    color: #fff; font-size: 13px; cursor: pointer; font-weight: 600;
  }
  .btn.ghost { background: #fff; color: var(--accent); }
  .btn.link { background: none; border: none; color: var(--muted); text-decoration: underline; padding: 8px 4px; }
  /* Selve dokumentet */
  .page {
    background: var(--bg); max-width: 800px; margin: 22px auto; padding: 40px 44px;
    box-shadow: 0 1px 8px rgba(0,0,0,0.08);
  }
  .doc-head { border-bottom: 2px solid var(--ink); padding-bottom: 14px; margin-bottom: 22px; }
  .doc-title { font-size: 24px; font-weight: 700; margin: 0; }
  .doc-sub { color: var(--muted); margin-top: 4px; font-size: 13px; }
  .doc-meta { margin-top: 10px; font-size: 12px; color: var(--muted); }
  h2.sec { font-size: 16px; margin: 26px 0 10px; border-bottom: 1px solid var(--line); padding-bottom: 5px; }
  table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  th { text-align: left; color: var(--muted); font-weight: 600; font-size: 11px;
       text-transform: uppercase; letter-spacing: 0.04em; padding: 6px 8px; border-bottom: 1px solid var(--line); }
  td { padding: 7px 8px; border-bottom: 1px solid #eee; vertical-align: top; }
  tr:last-child td { border-bottom: none; }
  .num { font-variant-numeric: tabular-nums; white-space: nowrap; }
  .pain { font-weight: 700; }
  .pain.lo { color: #2e9e5b; } .pain.mid { color: #c79a2e; } .pain.hi { color: #c0392b; }
  .notes { color: #444; font-style: italic; }
  .empty { color: var(--muted); padding: 8px; }
  .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 8px; }
  .sum-box { border: 1px solid var(--line); border-radius: 8px; padding: 10px 12px; }
  .sum-num { font-size: 22px; font-weight: 700; }
  .sum-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .loading { text-align: center; padding: 40px; color: var(--muted); }
  .ai-summary {
    border-left: 3px solid var(--accent); border-radius: 0 6px 6px 0;
    background: #f0f4ff; padding: 14px 16px; margin-bottom: 20px; line-height: 1.65;
    font-size: 13px;
  }
  .ai-summary h2.sec { color: var(--accent); border-bottom-color: rgba(43,95,176,0.25); margin-top: 0; }
  @media print {
    body { background: #fff; }
    .controls { display: none !important; }
    .page { box-shadow: none; margin: 0; max-width: none; padding: 0 6mm; }
    h2.sec { break-after: avoid; }
    tr { break-inside: avoid; }
    @page { margin: 14mm; }
  }
</style>
</head>
<body>

<div class="controls">
  <div class="field">
    <label data-i18n="from">Fra</label>
    <input type="date" id="fromDate">
  </div>
  <div class="field">
    <label data-i18n="to">Til</label>
    <input type="date" id="toDate">
  </div>
  <button class="btn ghost" onclick="loadReport()" data-i18n="update">Oppdater</button>
  <button class="btn" onclick="window.print()" data-i18n="save_pdf">Lagre som PDF</button>
  <button class="btn ghost" onclick="genAiSummary()" data-i18n="gen_ai_btn">Generer AI-oppsummering</button>
  <button class="btn link" onclick="setLang(_lang==='no'?'en':'no')" id="langBtn" data-i18n="langBtn">🇺🇸 English</button>
  <button class="btn link" onclick="location.href='sprint.html'" data-i18n="back">← Tilbake</button>
</div>

<div class="page">
  <div id="aiSummary" class="ai-summary" style="display:none">
    <h2 class="sec" data-i18n="ai_title">AI-oppsummering</h2>
    <div id="aiSummaryText"></div>
  </div>
  <div id="doc">
    <div class="loading" data-i18n="loading">Laster…</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
// ── Egne oversettelser (selvstendig side) ──────────────────────────
const TR = {
  no: {
    from:'Fra', to:'Til', update:'Oppdater', save_pdf:'Lagre som PDF', back:'← Tilbake',
    loading:'Laster…', title:'Treningsdagbok', subtitle:'Filip Lund — sprinter (100/200m) & styrke',
    period:'Periode', generated:'Generert', athlete:'Utøver',
    sec_summary:'Sammendrag', sec_gym:'Styrke- & treningsøkter', sec_sprint:'Sprintøkter',
    s_sessions:'Økter', s_sprints:'Sprintløp', s_avg_rpe:'Snitt RPE', s_pain_free:'Smertefrie dager',
    th_date:'Dato', th_type:'Type', th_notes:'Notater', th_pain:'Knesmerte (f/u/e/d.e.)',
    th_dist:'Distanse', th_kind:'Type', th_time:'Tid', th_rpe:'RPE', th_dur:'Varighet',
    none_gym:'Ingen økter i perioden.', none_sprint:'Ingen sprintøkter i perioden.',
    sec_act:'Aktiviteter (fotball, basket m.m.)', none_act:'Ingen aktiviteter i perioden.',
    s_acts:'Aktiviteter', s_load:'Total belastning (sRPE)',
    langBtn:'🇺🇸 English', rpe_scale:'(RPE 1–100)', config_err:'Konfig-feil',
    sec_injuries:'Skader & status', none_injuries:'Ingen aktive plager registrert.',
    sec_pain_trend:'Knesmerte-trend', none_pain:'Ingen knesmerte registrert i perioden.',
    th_part:'Kroppsdel', th_side:'Side', th_sev:'Alvorlighet', th_status:'Status', th_since:'Siden',
    pt_current:'Nåværende', pt_avg:'Snitt', pt_max:'Maks',
    side_left:'venstre', side_right:'høyre', side_both:'begge',
    sev_mild:'mild', sev_moderate:'moderat', sev_severe:'alvorlig',
    st_active:'aktiv', st_improving:'bedring', st_archived:'arkivert',
    bp_knee:'Kne', bp_hamstring:'Hamstring', bp_glute:'Glute', bp_hipflexor:'Hoftebøyer', bp_hip:'Hofte',
    bp_shoulder:'Skulder', bp_back:'Rygg', bp_neck:'Nakke', bp_ankle:'Ankel', bp_calf:'Legg',
    bp_achilles:'Akilles', bp_foot:'Fot', bp_other:'Annet',
    gen_ai_btn:'Generer AI-oppsummering', ai_title:'AI-oppsummering',
    ai_generating:'Genererer oppsummering…', ai_error:'Feil ved generering — prøv igjen.'
  },
  en: {
    from:'From', to:'To', update:'Update', save_pdf:'Save as PDF', back:'← Back',
    loading:'Loading…', title:'Training Diary', subtitle:'Filip Lund — sprinter (100/200m) & strength',
    period:'Period', generated:'Generated', athlete:'Athlete',
    sec_summary:'Summary', sec_gym:'Strength & training sessions', sec_sprint:'Sprint sessions',
    s_sessions:'Sessions', s_sprints:'Sprint runs', s_avg_rpe:'Avg RPE', s_pain_free:'Pain-free days',
    th_date:'Date', th_type:'Type', th_notes:'Notes', th_pain:'Knee pain (b/d/a/d.a.)',
    th_dist:'Distance', th_kind:'Type', th_time:'Time', th_rpe:'RPE', th_dur:'Duration',
    none_gym:'No sessions in this period.', none_sprint:'No sprint sessions in this period.',
    sec_act:'Activities (soccer, basketball etc.)', none_act:'No activities in this period.',
    s_acts:'Activities', s_load:'Total load (sRPE)',
    langBtn:'🇳🇴 Norsk', rpe_scale:'(RPE 1–100)', config_err:'Config error',
    sec_injuries:'Injuries & status', none_injuries:'No active issues recorded.',
    sec_pain_trend:'Knee pain trend', none_pain:'No knee pain recorded in this period.',
    th_part:'Body part', th_side:'Side', th_sev:'Severity', th_status:'Status', th_since:'Since',
    pt_current:'Current', pt_avg:'Avg', pt_max:'Max',
    side_left:'left', side_right:'right', side_both:'both',
    sev_mild:'mild', sev_moderate:'moderate', sev_severe:'severe',
    st_active:'active', st_improving:'improving', st_archived:'archived',
    bp_knee:'Knee', bp_hamstring:'Hamstring', bp_glute:'Glute', bp_hipflexor:'Hip flexor', bp_hip:'Hip',
    bp_shoulder:'Shoulder', bp_back:'Back', bp_neck:'Neck', bp_ankle:'Ankle', bp_calf:'Calf',
    bp_achilles:'Achilles', bp_foot:'Foot', bp_other:'Other',
    gen_ai_btn:'Generate AI summary', ai_title:'AI Summary',
    ai_generating:'Generating summary…', ai_error:'Error generating summary — please try again.'
  }
};
let _lang = localStorage.getItem('lang') || 'no';
function t(k){ return (TR[_lang] && TR[_lang][k]) || TR.no[k] || k; }
function setLang(l){ _lang = l; localStorage.setItem('lang', l); applyLang(); loadReport(); }
function applyLang(){
  document.documentElement.lang = _lang;
  document.querySelectorAll('[data-i18n]').forEach(el => el.textContent = t(el.dataset.i18n));
}

let db, _data = null;

// ── Oversettelse av lagrede typenavn ────────────────────────────────
// session_type lagres på språket som var aktivt ved lagring («Mandag · Styrke
// Kapasitet» eller «Monday · Strength Capacity»). Oversett del for del slik at
// rapporten er konsistent på valgt språk — viktig når US-trenere skal lese den.
const _WORD_MAP = [
  // [norsk, engelsk] — sammenlignes lowercase
  ['mandag','Monday'], ['tirsdag','Tuesday'], ['onsdag','Wednesday'], ['torsdag','Thursday'],
  ['fredag','Friday'], ['lørdag','Saturday'], ['søndag','Sunday'],
  ['styrke kapasitet','Strength Capacity'], ['styrke power','Strength Power'],
  ['styrke','Strength'], ['sirkulasjon & mobilitet','Mobility & Conditioning'],
  ['daglig rehab','Daily Rehab'], ['rehab','Rehab'], ['hvile','Rest'],
  ['fotball','Soccer'], ['amerikansk fotball','American football'], ['svømming','Swimming'],
  ['sykling','Cycling'], ['turgåing','Walking'], ['rolig dag','Easy day'], ['annet','Other'],
  ['trening','Training'], ['stevne','Competition'],
  ['lav','low'], ['middels','medium'], ['høy','high'],
];
function trWord(raw){
  const s = String(raw || '').trim();
  if(!s) return s;
  const lo = s.toLowerCase();
  for(const [no, en] of _WORD_MAP){
    if(lo === no)              return _lang === 'en' ? en : s;
    if(lo === en.toLowerCase()) return _lang === 'en' ? s : no.replace(/(^|\s|&\s)\S/g, c => c.toUpperCase());
  }
  return s;
}
function trType(raw){
  return String(raw || '').split('·').map(p =>
    p.split(':').map(q => trWord(q)).join(':')
  ).join(' · ');
}

// sRPE: varighet × RPE/10 — manglende varighet får nøkterne defaults
const _SRPE_DEF = { gym: 60, sprint: 75, act: 60 };
function srpe(dur, def, rpe){ return (dur ?? def) * ((rpe || 0) / 10); }

function fmtD(ds){
  if(!ds) return '';
  const d = new Date(ds+'T12:00:00');
  const loc = _lang==='en' ? 'en-GB' : 'nb-NO';
  return d.toLocaleDateString(loc, { day:'2-digit', month:'short', year:'numeric' });
}
function painCls(s){ if(s==null) return ''; return s<=3?'lo':s<=5?'mid':'hi'; }
function painCell(b,d,a,da){
  const fmt = v => v==null ? '–' : `<span class="pain ${painCls(v)}">${v}</span>`;
  return `${fmt(b)} / ${fmt(d)} / ${fmt(a)} / ${fmt(da)}`;
}

function trBody(bp){ if(bp && bp.startsWith('body.')){ const k='bp_'+bp.slice(5), v=t(k); return v===k?bp:v; } return bp||''; }
function trSide(s){ return s ? t('side_'+s) : ''; }
function trSev(s){ return s ? t('sev_'+s) : ''; }
function trStatus(s){ return s ? t('st_'+s) : ''; }

async function init(){
  try {
    const r = await fetch('/api/config');
    const cfg = await r.json();
    db = supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);
  } catch(e){
    document.getElementById('doc').innerHTML = `<div class="empty">${t('config_err')}: ${e.message}</div>`;
    return;
  }
  // Default: siste 4 uker
  const to = new Date(); const from = new Date(); from.setDate(from.getDate()-28);
  document.getElementById('toDate').value   = to.toISOString().slice(0,10);
  document.getElementById('fromDate').value = from.toISOString().slice(0,10);
  applyLang();
  await loadReport();
}

async function loadReport(){
  const from = document.getElementById('fromDate').value;
  const to   = document.getElementById('toDate').value;
  if(!from || !to) return;
  const aiEl = document.getElementById('aiSummary');
  if (aiEl) { aiEl.style.display = 'none'; document.getElementById('aiSummaryText').innerHTML = ''; }
  document.getElementById('doc').innerHTML = `<div class="loading">${t('loading')}</div>`;
  const [gym, knee, sprint, acts, inj] = await Promise.all([
    db.from('gym_log').select('*').gte('date', from).lte('date', to).order('date', {ascending:false}),
    db.from('knee_pain').select('*').gte('date', from).lte('date', to),
    db.from('sprint_log').select('*').gte('date', from).lte('date', to).order('date', {ascending:false}),
    db.from('activity_log').select('*').gte('date', from).lte('date', to).order('date', {ascending:false}),
    db.from('injuries').select('*').in('status', ['active','improving']).order('updated_at', {ascending:false}),
  ]);
  _data = { gym: gym.data||[], knee: knee.data||[], sprint: sprint.data||[], acts: acts.data||[], injuries: inj.data||[], from, to };
  render();
}

function render(){
  const { gym, knee, sprint, acts, injuries, from, to } = _data;
  // Knesmerte koblet til dato (for gym-rader)
  const kneeByDate = {};
  knee.forEach(k => { if(!kneeByDate[k.date]) kneeByDate[k.date] = k; });

  // Sammendrag — gym-RPE og aktivitets-RPE teller nå med i snittet
  const sprintDates = [...new Set(sprint.map(s=>s.date))];
  const sprintRpeByDate = {}; sprint.forEach(s => { if(sprintRpeByDate[s.date]==null && s.rpe!=null) sprintRpeByDate[s.date]=s.rpe; });
  const allRpe = [...gym.map(g=>g.rpe), ...sprintDates.map(d=>sprintRpeByDate[d]), ...acts.map(a=>a.rpe)].filter(v=>v!=null);
  const avgRpe = allRpe.length ? Math.round(allRpe.reduce((a,b)=>a+b,0)/allRpe.length) : null;
  const painFree = knee.filter(k => [k.before_score,k.during_score,k.after_score].every(v=>v==null||v<=2)).length;

  // Total sRPE-belastning (min × RPE/10); sprint telles per økt (dato)
  let totLoad = 0;
  gym.forEach(g => totLoad += srpe(g.duration_min, _SRPE_DEF.gym, g.rpe));
  acts.forEach(a => totLoad += srpe(a.duration_min, _SRPE_DEF.act, a.rpe));
  sprintDates.forEach(d => {
    const durRow = sprint.find(s => s.date===d && s.duration_min!=null);
    totLoad += srpe(durRow?.duration_min, _SRPE_DEF.sprint, sprintRpeByDate[d]);
  });
  totLoad = Math.round(totLoad);

  let html = `
    <div class="doc-head">
      <h1 class="doc-title">${t('title')}</h1>
      <div class="doc-sub">${t('subtitle')}</div>
      <div class="doc-meta">${t('period')}: ${fmtD(from)} – ${fmtD(to)} · ${t('generated')}: ${fmtD(new Date().toISOString().slice(0,10))}</div>
    </div>

    <h2 class="sec">${t('sec_summary')}</h2>
    <div class="summary-grid">
      <div class="sum-box"><div class="sum-num">${gym.length}</div><div class="sum-lbl">${t('s_sessions')}</div></div>
      <div class="sum-box"><div class="sum-num">${sprint.length}</div><div class="sum-lbl">${t('s_sprints')}</div></div>
      <div class="sum-box"><div class="sum-num">${acts.length}</div><div class="sum-lbl">${t('s_acts')}</div></div>
      <div class="sum-box"><div class="sum-num">${avgRpe ?? '–'}</div><div class="sum-lbl">${t('s_avg_rpe')} ${t('rpe_scale')}</div></div>
      <div class="sum-box"><div class="sum-num">${totLoad || '–'}</div><div class="sum-lbl">${t('s_load')}</div></div>
      <div class="sum-box"><div class="sum-num">${painFree}</div><div class="sum-lbl">${t('s_pain_free')}</div></div>
    </div>`;

  // ── Skader & status (aktive + bedring) ───────────────────────
  html += `<h2 class="sec">${t('sec_injuries')}</h2>`;
  if (injuries.length) {
    html += `<table><thead><tr>
      <th>${t('th_part')}</th><th>${t('th_side')}</th><th>${t('th_sev')}</th><th>${t('th_status')}</th><th>${t('th_since')}</th><th>${t('th_notes')}</th>
    </tr></thead><tbody>`;
    injuries.forEach(i => {
      html += `<tr>
        <td>${esc(trBody(i.body_part))}</td>
        <td>${esc(trSide(i.side))}</td>
        <td>${esc(trSev(i.severity))}</td>
        <td>${esc(trStatus(i.status))}</td>
        <td class="num">${i.start_date ? fmtD(i.start_date) : '–'}</td>
        <td class="notes">${esc(i.note||'')}</td>
      </tr>`;
    });
    html += `</tbody></table>`;
  } else html += `<div class="empty">${t('none_injuries')}</div>`;

  // ── Knesmerte-trend: maks smerte per dag (sparkline, ingen eksterne bibliotek) ──
  const painByDate = {};
  knee.forEach(k => {
    const vals = [k.before_score, k.during_score, k.after_score, k.day_after_score].filter(v => v != null);
    if (vals.length) { const m = Math.max(...vals); if (painByDate[k.date] == null || m > painByDate[k.date]) painByDate[k.date] = m; }
  });
  const painDates = Object.keys(painByDate).sort();
  html += `<h2 class="sec">${t('sec_pain_trend')}</h2>`;
  if (painDates.length) {
    const series = painDates.map(d => painByDate[d]);
    const cur = series[series.length - 1];
    const avg = Math.round(series.reduce((a, b) => a + b, 0) / series.length * 10) / 10;
    const mx  = Math.max(...series);
    const W = 600, H = 60, pad = 4, n = series.length;
    const X = i => n <= 1 ? W / 2 : pad + i * (W - 2 * pad) / (n - 1);
    const Y = v => H - pad - (v / 10) * (H - 2 * pad);
    const pts = series.map((v, i) => `${X(i).toFixed(1)},${Y(v).toFixed(1)}`).join(' ');
    html += `<div class="summary-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:10px">
      <div class="sum-box"><div class="sum-num">${cur}</div><div class="sum-lbl">${t('pt_current')}</div></div>
      <div class="sum-box"><div class="sum-num">${avg}</div><div class="sum-lbl">${t('pt_avg')}</div></div>
      <div class="sum-box"><div class="sum-num">${mx}</div><div class="sum-lbl">${t('pt_max')}</div></div>
    </div>
    <svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" preserveAspectRatio="none" style="display:block;border:1px solid #eee;border-radius:6px">
      <polyline fill="none" stroke="#2b5fb0" stroke-width="2" points="${pts}"/>
    </svg>`;
  } else html += `<div class="empty">${t('none_pain')}</div>`;

  html += `<h2 class="sec">${t('sec_gym')}</h2>`;

  if(gym.length){
    html += `<table><thead><tr>
      <th>${t('th_date')}</th><th>${t('th_type')}</th><th>${t('th_dur')}</th><th>${t('th_rpe')}</th><th>${t('th_pain')}</th><th>${t('th_notes')}</th>
    </tr></thead><tbody>`;
    gym.forEach(g => {
      const k = kneeByDate[g.date];
      html += `<tr>
        <td class="num">${fmtD(g.date)}</td>
        <td>${esc(trType(g.session_type||''))}</td>
        <td class="num">${g.duration_min!=null ? g.duration_min+' min' : '–'}</td>
        <td class="num">${g.rpe!=null ? g.rpe : '–'}</td>
        <td class="num">${k ? painCell(k.before_score,k.during_score,k.after_score,k.day_after_score) : '–'}</td>
        <td class="notes">${esc(g.session_notes || k?.notes || '')}</td>
      </tr>`;
    });
    html += `</tbody></table>`;
  } else html += `<div class="empty">${t('none_gym')}</div>`;

  html += `<h2 class="sec">${t('sec_sprint')}</h2>`;
  if(sprint.length){
    html += `<table><thead><tr>
      <th>${t('th_date')}</th><th>${t('th_dist')}</th><th>${t('th_kind')}</th>
      <th>${t('th_time')}</th><th>${t('th_rpe')}</th><th>${t('th_pain')}</th><th>${t('th_notes')}</th>
    </tr></thead><tbody>`;
    sprint.forEach(s => {
      html += `<tr>
        <td class="num">${fmtD(s.date)}</td>
        <td>${esc(s.distance||'')}</td>
        <td>${esc(trType(s.type||''))}</td>
        <td class="num">${s.time_seconds!=null ? (+s.time_seconds).toFixed(2)+'s' : '–'}</td>
        <td class="num">${s.rpe!=null ? s.rpe : '–'}</td>
        <td class="num">${painCell(s.knee_before,s.knee_during,s.knee_after,s.knee_day_after)}</td>
        <td class="notes">${esc(s.notes||'')}</td>
      </tr>`;
    });
    html += `</tbody></table>`;
  } else html += `<div class="empty">${t('none_sprint')}</div>`;

  // Aktiviteter (soccer/basket m.m.) — kjernen i USA-loggen
  html += `<h2 class="sec">${t('sec_act')}</h2>`;
  if(acts.length){
    html += `<table><thead><tr>
      <th>${t('th_date')}</th><th>${t('th_type')}</th><th>${t('th_dur')}</th><th>${t('th_rpe')}</th><th>${t('th_pain')}</th><th>${t('th_notes')}</th>
    </tr></thead><tbody>`;
    acts.forEach(a => {
      const label = a.activity_type === 'Annet' && a.activity_label
        ? a.activity_label
        : trType(a.activity_type||'') + (a.activity_label && a.activity_type !== 'Annet' ? ` (${a.activity_label})` : '');
      html += `<tr>
        <td class="num">${fmtD(a.date)}</td>
        <td>${esc(label)}</td>
        <td class="num">${a.duration_min!=null ? a.duration_min+' min' : '–'}</td>
        <td class="num">${a.rpe!=null ? a.rpe : '–'}</td>
        <td class="num">${painCell(a.knee_before,a.knee_during,a.knee_after,a.knee_day_after)}</td>
        <td class="notes">${esc(a.notes||'')}</td>
      </tr>`;
    });
    html += `</tbody></table>`;
  } else html += `<div class="empty">${t('none_act')}</div>`;

  document.getElementById('doc').innerHTML = html;
}

async function genAiSummary() {
  if (!_data) return;
  const summaryEl = document.getElementById('aiSummary');
  const textEl    = document.getElementById('aiSummaryText');
  summaryEl.style.display = 'block';
  textEl.innerHTML = `<em>${t('ai_generating')}</em>`;

  const { gym, knee, sprint, acts, from, to } = _data;
  const sprintDates = [...new Set(sprint.map(s => s.date))];
  const sprintRpeByDate = {};
  sprint.forEach(s => { if (sprintRpeByDate[s.date] == null && s.rpe != null) sprintRpeByDate[s.date] = s.rpe; });
  const allRpe = [...gym.map(g => g.rpe), ...sprintDates.map(d => sprintRpeByDate[d]), ...acts.map(a => a.rpe)].filter(v => v != null);
  const avgRpe = allRpe.length ? Math.round(allRpe.reduce((a, b) => a + b, 0) / allRpe.length) : null;
  let totLoad = 0;
  gym.forEach(g  => totLoad += srpe(g.duration_min, _SRPE_DEF.gym,    g.rpe));
  acts.forEach(a => totLoad += srpe(a.duration_min, _SRPE_DEF.act,    a.rpe));
  sprintDates.forEach(d => {
    const durRow = sprint.find(s => s.date === d && s.duration_min != null);
    totLoad += srpe(durRow?.duration_min, _SRPE_DEF.sprint, sprintRpeByDate[d]);
  });

  const painByDate = {};
  knee.forEach(k => {
    const vals = [k.before_score, k.during_score, k.after_score, k.day_after_score].filter(v => v != null);
    if (vals.length) { const m = Math.max(...vals); if (painByDate[k.date] == null || m > painByDate[k.date]) painByDate[k.date] = m; }
  });
  const kneeStr = Object.entries(painByDate).sort(([a],[b]) => a.localeCompare(b))
    .map(([d,v]) => `${d}:${v}/10`).join(', ') || 'none recorded';

  const gymStr = gym.length
    ? gym.map(g => `${g.date} ${g.session_type||''} ${g.duration_min != null ? g.duration_min+'min' : ''} RPE=${g.rpe??'–'}`).join('; ')
    : 'none';

  const sprintStr = sprintDates.length
    ? sprintDates.map(d => {
        const rows = sprint.filter(s => s.date === d);
        const runs = rows.map(s => `${s.distance} ${(s.type||'').split(':')[0]}`).join(', ');
        return `${d} [${runs}] RPE=${sprintRpeByDate[d]??'–'}`;
      }).join('; ')
    : 'none';

  const actStr = acts.length
    ? acts.map(a => `${a.date} ${a.activity_type} ${a.duration_min != null ? a.duration_min+'min' : ''} RPE=${a.rpe??'–'}`).join('; ')
    : 'none';

  const prompt =
`Training period report for Filip Lund (17yo, sprinter 100/200m, left knee patellar tendinopathy):

Period: ${from} – ${to}
Stats: ${gym.length} gym sessions, ${sprintDates.length} sprint sessions (${sprint.length} runs), ${acts.length} activities. Avg RPE: ${avgRpe??'n/a'}/100. Total sRPE load: ${Math.round(totLoad)}.

Knee pain (max per day, scale 0–10): ${kneeStr}

Gym sessions: ${gymStr}

Sprint sessions: ${sprintStr}

Other activities: ${actStr}

Write:
1. A 3–4 sentence summary of this training period: load balance, knee pain trend, rest vs. training distribution.
2. 1–2 specific actionable recommendations for the upcoming week.
Be concise and factual. Answer in English.`;

  try {
    const { data: { session } } = await db.auth.getSession();
    if (!session) { textEl.innerHTML = `<em style="color:#c0392b">${t('ai_error')}</em>`; return; }
    const res = await fetch('/api/ai-chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session.access_token}` },
      body: JSON.stringify({ message: prompt, history: [], localDate: new Date().toISOString().slice(0,10), tz: Intl.DateTimeFormat().resolvedOptions().timeZone }),
    });
    if (!res.ok) throw new Error(res.status);
    const { reply } = await res.json();
    textEl.innerHTML = '<p>' + esc(reply).replace(/\n\n+/g, '</p><p>').replace(/\n/g, '<br>') + '</p>';
  } catch {
    textEl.innerHTML = `<em style="color:#c0392b">${t('ai_error')}</em>`;
  }
}

function esc(s){ return String(s??'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

init();
</script>
</body>
</html>
