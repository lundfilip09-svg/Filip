<!-- business.html -->
<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Business</title>
<link rel="stylesheet" href="styles.css">
<style>
.table-wrap{overflow:auto}
.biz-table{width:100%;border-collapse:collapse}
.biz-table th,.biz-table td{padding:10px;border-bottom:1px solid rgba(255,255,255,.08);white-space:nowrap}
.biz-table input,.biz-table select,.biz-table textarea{width:100%}
.maps-paste{min-height:190px;resize:vertical}
.warning{background:rgba(255,196,0,.12);border:1px solid rgba(255,196,0,.3)}
.biz-toast{position:fixed;right:18px;bottom:18px;z-index:9999;padding:10px 14px;border-radius:8px;background:rgba(24,24,27,.96);border:1px solid rgba(255,255,255,.14);box-shadow:0 12px 34px rgba(0,0,0,.35);color:var(--text-primary);font-size:13px;font-weight:700;opacity:0;transform:translateY(8px);pointer-events:none;transition:opacity .18s ease,transform .18s ease}
.biz-toast.show{opacity:1;transform:translateY(0)}
@media(max-width:768px){.grid-3,.grid-2{grid-template-columns:1fr!important}}
</style>
</head>
<body>
<nav class="main-nav" data-nav></nav>
<div class="page">

<div class="card">
<div class="section-title" data-i18n="biz.accounting">Business Command Center</div>

<div class="grid-3">
<div class="metric-tile">
<div data-i18n="biz.revenue">Revenue</div>
<h2 id="revMetric">0 NOK</h2>
</div>

<div class="metric-tile">
<div data-i18n="biz.expense">Expense</div>
<h2 id="expMetric">0 NOK</h2>
</div>

<div class="metric-tile">
<div data-i18n="biz.profit">Profit</div>
<h2 id="profitMetric">0 NOK</h2>
</div>
</div>

<div id="lowTierWarning" class="badge warning" hidden data-i18n="biz.lowtier">
Too many low-tier clients
</div>

<div class="table-wrap">
<table class="biz-table">
<thead>
<tr>
<th data-i18n="biz.customer">Customer</th>
<th data-i18n="biz.contact">Contact</th>
<th data-i18n="biz.tier">Tier</th>
<th data-i18n="biz.price">Price</th>
<th data-i18n="biz.start">Start</th>
<th data-i18n="biz.status">Status</th>
<th></th>
</tr>
</thead>
<tbody id="customerRows"></tbody>
</table>
</div>

<button id="addCustomer" class="btn btn-primary" data-i18n="add">Add</button>

<div class="card" style="margin-top:20px">
<div class="section-title" data-i18n="biz.lovable">Lovable</div>

<div class="form-group">
<label class="form-label">Plan</label>
<select id="lovablePlan">
<option value="10">100 credits (€10)</option>
<option value="25">200 credits (€25)</option>
<option value="45">400 credits (€45)</option>
<option value="85">800 credits (€85)</option>
<option value="120">1200 credits (€120)</option>
</select>
</div>

<div id="fxInfo"></div>
</div>
</div>

<div class="grid-2">

<div class="card">
<div class="section-title">Research Prompt</div>

<div class="form-group">
<label class="form-label">Sted</label>
<input id="city">
</div>

<div class="form-group">
<label class="form-label">Bransje</label>
<input id="industry">
</div>

<button class="btn btn-primary copy-btn" data-prompt="research">Copy</button>
</div>

<div class="card">
<div class="section-title">Lovable Meta Prompt</div>

<div class="form-group"><label class="form-label">Google Maps Paste</label><textarea id="lbMapsPaste" class="maps-paste" placeholder="Paste everything copied from Google Maps..."></textarea></div>
<div class="form-group"><label class="form-label">Brand colors (optional)</label><input id="lbBrandColors" placeholder="e.g. black, white, warm gold"></div>

<button class="btn btn-primary copy-btn" data-prompt="lovable">Copy</button>
</div>

</div>

<div class="card">
<div class="section-title">Sales Meta Prompt</div>

<div class="form-group"><label class="form-label">Google Maps Paste</label><textarea id="salesMapsPaste" class="maps-paste" placeholder="Paste everything copied from Google Maps..."></textarea></div>
<div class="form-group"><label class="form-label">Brand colors (optional)</label><input id="salesBrandColors" placeholder="e.g. navy, cream, fresh green"></div>

<button class="btn btn-primary copy-btn" data-prompt="sales">Copy</button>
</div>

</div>
<div id="bizToast" class="biz-toast" role="status" aria-live="polite"></div>

<script src="utils.js"></script>
<script>
(() => {
  "use strict";

  const STORAGE_KEY = "business_state";
  const LEGACY_CUSTOMERS_KEY = "business_customers";
  const LEGACY_FX_KEY = "business_fx";
  const FALLBACK_FX = 11.5;

  const TIER_PRICES = {
    Lav: 490,
    Medium: 790,
    "Høy": 1490
  };

  const DEFAULT_STATE = {
    customers: [],
    fx: {
      rate: FALLBACK_FX,
      updatedAt: null
    },
    lovablePlan: "10",
    inputs: {
      city: "",
      industry: "",
      lbMapsPaste: "",
      lbBrandColors: "",
      salesMapsPaste: "",
      salesBrandColors: ""
    }
  };

  const $ = (selector, root = document) => root.querySelector(selector);

  const el = {
    customerRows: $("#customerRows"),
    addCustomer: $("#addCustomer"),
    revMetric: $("#revMetric"),
    expMetric: $("#expMetric"),
    profitMetric: $("#profitMetric"),
    warning: $("#tier-warning") || $("#lowTierWarning"),
    lovablePlan: $("#lovablePlan"),
    fxInfo: $("#fxInfo"),
    toast: $("#bizToast"),
    city: $("#city"),
    industry: $("#industry"),
    lbMapsPaste: $("#lbMapsPaste"),
    lbBrandColors: $("#lbBrandColors"),
    salesMapsPaste: $("#salesMapsPaste"),
    salesBrandColors: $("#salesBrandColors")
  };

  function cloneDefaultState() {
    return JSON.parse(JSON.stringify(DEFAULT_STATE));
  }

  function safeJsonParse(value, fallback) {
    try {
      return value ? JSON.parse(value) : fallback;
    } catch {
      return fallback;
    }
  }

  function loadState() {
    const stored = safeJsonParse(localStorage.getItem(STORAGE_KEY), null);
    const base = cloneDefaultState();

    if (stored && typeof stored === "object") {
      return {
        ...base,
        ...stored,
        fx: { ...base.fx, ...(stored.fx || {}) },
        inputs: { ...base.inputs, ...(stored.inputs || {}) },
        customers: Array.isArray(stored.customers) ? stored.customers : []
      };
    }

    const legacyCustomers = safeJsonParse(localStorage.getItem(LEGACY_CUSTOMERS_KEY), []);
    const legacyFx = Number(localStorage.getItem(LEGACY_FX_KEY));

    return {
      ...base,
      customers: Array.isArray(legacyCustomers) ? legacyCustomers : [],
      fx: {
        rate: Number.isFinite(legacyFx) && legacyFx > 0 ? legacyFx : FALLBACK_FX,
        updatedAt: null
      }
    };
  }

  const state = loadState();

  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    localStorage.setItem(LEGACY_CUSTOMERS_KEY, JSON.stringify(state.customers));
    localStorage.setItem(LEGACY_FX_KEY, String(state.fx.rate || FALLBACK_FX));
  }

  function moneyNok(value) {
    return new Intl.NumberFormat("nb-NO", {
      style: "currency",
      currency: "NOK",
      minimumFractionDigits: 2,
      maximumFractionDigits: 2
    }).format(Number(value) || 0);
  }

  function escapeHtml(value) {
    return String(value ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function normalizeCustomer(customer = {}) {
    const tier = customer.tier || "Lav";
    const isStandardTier = Object.prototype.hasOwnProperty.call(TIER_PRICES, tier);

    return {
      name: customer.name || "",
      contact: customer.contact || "",
      tier,
      price: Number(customer.price || (isStandardTier ? TIER_PRICES[tier] : 0)),
      start: customer.start || "",
      status: customer.status || "Aktiv"
    };
  }

  function activeCustomers() {
    return state.customers.filter(customer => customer.status === "Aktiv");
  }

  function revenueNok() {
    return activeCustomers().reduce((sum, customer) => sum + Number(customer.price || 0), 0);
  }

  function expenseNok() {
    return Number(state.lovablePlan || 10) * Number(state.fx.rate || FALLBACK_FX);
  }

  function renderCustomers() {
    if (!el.customerRows) return;

    el.customerRows.innerHTML = state.customers.map((rawCustomer, index) => {
      const customer = normalizeCustomer(rawCustomer);
      state.customers[index] = customer;

      return `
        <tr data-id="${index}">
          <td><input class="cust-name" value="${escapeHtml(customer.name)}" autocomplete="off"></td>
          <td><input class="cust-contact" value="${escapeHtml(customer.contact)}" autocomplete="off"></td>
          <td>
            <select class="cust-tier">
              ${["Lav", "Medium", "Høy", "Custom"].map(tier => (
                `<option value="${escapeHtml(tier)}" ${customer.tier === tier ? "selected" : ""}>${escapeHtml(tier)}</option>`
              )).join("")}
            </select>
          </td>
          <td><input type="number" min="0" step="1" class="cust-price" value="${Number(customer.price || 0)}"></td>
          <td><input type="date" class="cust-date" value="${escapeHtml(customer.start)}"></td>
          <td>
            <select class="cust-status">
              ${["Aktiv", "Pauset", "Avsluttet"].map(status => (
                `<option value="${escapeHtml(status)}" ${customer.status === status ? "selected" : ""}>${escapeHtml(status)}</option>`
              )).join("")}
            </select>
          </td>
          <td><button type="button" class="btn delete-row" aria-label="Delete customer">x</button></td>
        </tr>
      `;
    }).join("");

    saveState();
    renderMetrics();
  }

  function renderFxInfo() {
    if (!el.fxInfo) return;

    const eur = Number(state.lovablePlan || 10);
    const rate = Number(state.fx.rate || FALLBACK_FX);
    const nokValue = eur * rate;

    el.fxInfo.innerHTML = `
      <div>EUR: €${eur}</div>
      <div>Rate: ${rate.toFixed(2)}</div>
      <div>NOK: ${moneyNok(nokValue)}</div>
    `;
  }

  function renderMetrics() {
    const revenue = revenueNok();
    const expense = expenseNok();
    const profit = revenue - expense;

    if (el.revMetric) el.revMetric.textContent = moneyNok(revenue);
    if (el.expMetric) el.expMetric.textContent = moneyNok(expense);
    if (el.profitMetric) el.profitMetric.textContent = moneyNok(profit);

    const active = activeCustomers();
    const lowTierCount = active.filter(customer => customer.tier === "Lav").length;
    const lowTierRatio = active.length ? lowTierCount / active.length : 0;

    if (el.warning) {
      el.warning.hidden = !(active.length > 0 && lowTierRatio > 0.4);
      el.warning.textContent = "Too many low-tier clients";
    }

    renderFxInfo();
  }

  async function loadFxRate() {
    const cachedRate = Number(state.fx.rate || localStorage.getItem(LEGACY_FX_KEY) || FALLBACK_FX);
    state.fx.rate = Number.isFinite(cachedRate) && cachedRate > 0 ? cachedRate : FALLBACK_FX;
    renderMetrics();

    try {
      const response = await fetch("https://frankfurter.app/latest?from=EUR&to=NOK", {
        cache: "no-store"
      });

      if (!response.ok) throw new Error(`FX request failed: ${response.status}`);

      const data = await response.json();
      const liveRate = Number(data?.rates?.NOK);

      if (!Number.isFinite(liveRate) || liveRate <= 0) {
        throw new Error("Invalid NOK rate");
      }

      state.fx.rate = liveRate;
      state.fx.updatedAt = new Date().toISOString();
      saveState();
    } catch {
      state.fx.rate = Number.isFinite(cachedRate) && cachedRate > 0 ? cachedRate : FALLBACK_FX;
      saveState();
    }

    renderMetrics();
  }

  function readCustomerRow(row) {
    const index = Number(row.dataset.id);
    const existing = normalizeCustomer(state.customers[index]);

    existing.name = $(".cust-name", row)?.value || "";
    existing.contact = $(".cust-contact", row)?.value || "";
    existing.tier = $(".cust-tier", row)?.value || "Lav";
    existing.start = $(".cust-date", row)?.value || "";
    existing.status = $(".cust-status", row)?.value || "Aktiv";

    const priceInput = $(".cust-price", row);

    if (Object.prototype.hasOwnProperty.call(TIER_PRICES, existing.tier)) {
      existing.price = TIER_PRICES[existing.tier];
      if (priceInput) priceInput.value = String(existing.price);
    } else {
      existing.price = Number(priceInput?.value || 0);
    }

    state.customers[index] = existing;
    saveState();
    renderMetrics();
  }

  function cssId(id) {
    if (window.CSS && typeof window.CSS.escape === "function") return CSS.escape(id);
    return String(id).replace(/[^a-zA-Z0-9_-]/g, "\\$&");
  }

  function syncInputsFromState() {
    Object.entries(state.inputs).forEach(([id, value]) => {
      const node = $(`#${cssId(id)}`);
      if (node) node.value = value || "";
    });

    if (el.lovablePlan) {
      el.lovablePlan.value = state.lovablePlan || "10";
    }
  }

  function saveInputsToState() {
    Object.keys(state.inputs).forEach(id => {
      const node = $(`#${cssId(id)}`);
      if (node) state.inputs[id] = node.value || "";
    });

    if (el.lovablePlan) {
      state.lovablePlan = el.lovablePlan.value || "10";
    }

    saveState();
  }

  function buildResearchPrompt() {
    const city = el.city?.value.trim() || "[STED]";
    const industry = el.industry?.value.trim() || "[BRANSJE]";

    return `You are an expert market researcher.

Find 10 local businesses in ${city} within the ${industry} industry.

Prioritize businesses that:
• have no website
• have an outdated website
• have a weak mobile experience
• have strong Google Reviews but weak digital presence
• would benefit from a modern, conversion-focused website

For each business, provide:
* Business name
* Location
* Website or "No website found"
* Google rating
* Review count
* Short summary of what they do
* Main digital weakness
* Reason this business is a good prospect
* Suggested outreach angle

Return the result as a clean, scannable list.`;
  }

  function buildLovablePrompt() {
    const mapsPaste = el.lbMapsPaste?.value.trim() || "[GOOGLE MAPS PASTE]";
    const brandColors = el.lbBrandColors?.value.trim() || "Infer suitable brand colors from the business type, photos/reviews if mentioned, and local positioning.";

    return `Create a premium, modern website from this Google Maps business data.

Google Maps paste:
${mapsPaste}

Brand colors:
${brandColors}

First, infer and structure everything possible from the pasted Google Maps content:
- Business name
- Business category / industry
- Phone number
- Website URL
- Address and local area
- Opening hours
- Reviews, rating, review count, and repeated customer themes
- Description, services, products, treatments, or specialties
- Tone, positioning, trust signals, and likely target customers

Extract recurring themes from the reviews, such as service quality, speed, trust, friendliness, expertise, atmosphere, results, convenience, pricing, location, and reliability. Use those recurring themes throughout the website copy, especially in the hero, about section, service descriptions, testimonials, CTA, and SEO copy.

If some details are missing, make sensible assumptions from context, but do not invent specific facts like phone numbers, addresses, ratings, awards, or opening hours.

The website must be written in Norwegian.

Build a complete premium modern website with these sections:

1. Hero
- Strong Norwegian headline
- Short value proposition
- Clear call-to-action
- Trust signal based on reviews, service quality, location, opening hours, or category

2. About
- Explain who the business is
- Make the copy warm, credible, and local.
- Use only details that can be inferred from the Google Maps paste.

3. Services
- Infer the main services from the pasted content.
- Present them clearly with cards or structured blocks.
- Explain customer benefits, not only features.

4. Testimonials
- Turn review content into natural testimonial-style copy.
- Keep it believable and grounded in the pasted reviews.

5. Galleri
- Add a gallery section suitable for this business type.
- Use realistic image prompts/placeholders based on what the business likely does.

6. CTA
- Add a strong conversion-focused call-to-action section.
- Make the next step obvious and low-friction.

7. Contact
- Include address, phone, website link, and opening hours if available.
- Add clear contact buttons.

8. Google Maps
- Add an embedded Google Maps section or clear map placeholder using the inferred address.
- Include local area context if available.

9. SEO
- Create SEO-friendly page title, meta description, H1/H2 structure, and local search copy.
- Include relevant local keywords inferred from the business, category, services, and location.

Design requirements:
- Premium but clean
- Mobile-first and fully responsive
- Fast loading
- SEO-friendly structure
- Accessible contrast and readable typography
- No generic filler text
- No visible explanations of what the website is doing
- Make it feel like a real local Norwegian business website, not a template.`;
  }

  function buildSalesPrompt() {
    const mapsPaste = el.salesMapsPaste?.value.trim() || "[GOOGLE MAPS PASTE]";
    const brandColors = el.salesBrandColors?.value.trim() || "Infer if useful; do not force color references into the outreach.";

    return `You are an expert outreach copywriter helping me contact a local business using Google Maps research.

Google Maps paste:
${mapsPaste}

Optional brand colors / visual clues:
${brandColors}

First, infer everything possible from the pasted Google Maps content:
- Business name
- Industry/category
- Phone number
- Website status or lack of website
- Address / local area
- Opening hours
- Reviews, rating, review count, and customer praise
- Services, specialties, description, and positioning
- Any weak points, missed opportunities, or signs of strong reputation

Do not invent specific facts. If website status is unclear, phrase it carefully.

Write 3 unique outreach message angles for this exact business:

1. Website weakness
- Mention a clear digital presence or website weakness only if it can be inferred.
- Keep it helpful, not critical or rude.

2. Opportunity angle
- Focus on bookings, trust, visibility, mobile experience, local search, or conversion.
- Make the upside feel concrete and relevant to their category.

3. Praise angle
- Start from something positive in their reviews, rating, service, or local presence.
- Then naturally connect it to how a better website could support that strength.

For each angle, write:
- One Facebook Messenger version
- One Instagram DM version
- One email version

Tone requirements:
- Norwegian
- Informal but professional
- Short and natural
- Friendly and low-pressure
- No hype
- No fake claims
- No pushy sales language
- Make each message feel written specifically for this business

Format the answer with clear headings:
Website weakness
Facebook Messenger:
Instagram DM:
Email:

Opportunity
Facebook Messenger:
Instagram DM:
Email:

Praise
Facebook Messenger:
Instagram DM:
Email:`;
  }

  function buildPrompt(kind) {
    if (kind === "research") return buildResearchPrompt();
    if (kind === "lovable") return buildLovablePrompt();
    if (kind === "sales") return buildSalesPrompt();
    return "";
  }

  function showToast(message) {
    if (!el.toast) return;
    el.toast.textContent = message;
    el.toast.classList.add("show");
    window.clearTimeout(showToast.timer);
    showToast.timer = window.setTimeout(() => {
      el.toast.classList.remove("show");
    }, 2200);
  }

  function addCustomer() {
    state.customers.push({
      name: "",
      contact: "",
      tier: "Lav",
      price: TIER_PRICES.Lav,
      start: "",
      status: "Aktiv"
    });

    saveState();
    renderCustomers();
  }

  function deleteCustomer(button) {
    const row = button.closest("tr");
    if (!row) return;

    const index = Number(row.dataset.id);
    if (!Number.isInteger(index)) return;

    state.customers.splice(index, 1);
    saveState();
    renderCustomers();
  }

  async function copyFromButton(button) {
    const originalText = button.textContent;
    const text = buildPrompt(button.dataset.prompt);
    if (!text) return;

    try {
      await navigator.clipboard.writeText(text);
      button.textContent = "Copied!";
      button.disabled = true;
      showToast("Prompt copied");

      window.setTimeout(() => {
        button.textContent = originalText || "Copy";
        button.disabled = false;
      }, 2000);
    } catch {
      button.textContent = "Copy failed";

      window.setTimeout(() => {
        button.textContent = originalText || "Copy";
      }, 2000);
    }
  }

  function handleDocumentInput(event) {
    const row = event.target.closest("#customerRows tr");
    if (row) {
      readCustomerRow(row);
      return;
    }

    saveInputsToState();
  }

  function handleDocumentChange(event) {
    const row = event.target.closest("#customerRows tr");
    if (row) {
      readCustomerRow(row);
      return;
    }

    if (event.target === el.lovablePlan) {
      saveInputsToState();
      renderMetrics();
      return;
    }

    saveInputsToState();
  }

  function handleDocumentClick(event) {
    const deleteButton = event.target.closest(".delete-row");
    if (deleteButton) {
      deleteCustomer(deleteButton);
      return;
    }

    const copyButton = event.target.closest(".copy-btn");
    if (copyButton) {
      copyFromButton(copyButton);
    }
  }

  function init() {
    state.customers = state.customers.map(normalizeCustomer);
    syncInputsFromState();

    if (el.addCustomer) {
      el.addCustomer.addEventListener("click", addCustomer);
    }

    document.addEventListener("input", handleDocumentInput);
    document.addEventListener("change", handleDocumentChange);
    document.addEventListener("click", handleDocumentClick);

    renderCustomers();
    renderMetrics();
    loadFxRate();

    document.querySelector('[data-p="business"]')?.classList.add("active");
  }

  init();
})();
</script>
</body>
</html>
