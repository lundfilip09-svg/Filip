<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sprint — Rekorder & logg</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .knee-log-row { display: flex; flex-direction: column; gap: 6px; }
    .knee-row-item { display: flex; align-items: center; gap: 10px; }
    .knee-row-label { font-size: 11px; font-family: var(--font-mono); color: var(--text-tertiary); width: 90px; flex-shrink: 0; }
    .add-run-row { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 10px; }
    .add-run-row .form-group { margin: 0; flex: 1; min-width: 80px; }
    .run-row {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 10px; background: rgba(255,255,255,0.03); border-radius: 8px;
      margin-bottom: 4px; font-size: 12px; font-family: var(--font-mono);
    }
    .run-num  { color: var(--text-tertiary); width: 46px; flex-shrink: 0; }
    .run-dist { color: var(--accent-blue); width: 82px; font-weight: 600; flex-shrink: 0; }
    .run-time { color: var(--text-primary); font-weight: 700; flex: 1; }
    .run-type { color: var(--text-tertiary); font-size: 10px; }
    .run-del  { background: none; border: none; color: var(--text-tertiary); cursor: pointer; font-size: 13px; opacity: 0; transition: opacity 0.15s; margin-left: auto; }
    .run-row:hover .run-del { opacity: 1; }
    .run-del:hover { color: var(--danger); }
    .session-divider { border: none; border-top: 1px solid rgba(255,255,255,0.06); margin: 18px 0 14px; }
    .eval-label { font-size: 9px; font-family: var(--font-mono); color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 12px; }
    .hist-session {
      margin-bottom: 14px; padding: 11px 13px;
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(255,255,255,0.055); border-radius: 10px;
    }
    .hist-date-header {
      font-size: 10px; font-family: var(--font-mono); color: var(--text-tertiary);
      text-transform: uppercase; letter-spacing: 0.12em;
      padding-bottom: 7px; margin-bottom: 7px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .history-row {
      display: flex; align-items: center; gap: 10px;
      padding: 5px 0; font-size: 12px; font-family: var(--font-mono);
    }
    .history-dist { color: var(--accent-blue); min-width: 90px; flex-shrink: 0; white-space: nowrap; }
    .history-time { color: var(--text-primary); font-weight: 700; font-size: 13px; flex: 1; }
    .history-type { color: var(--text-tertiary); font-size: 10px; }
    .hist-chips { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 9px; }
    .hist-chip {
      font-size: 9px; font-family: var(--font-mono);
      padding: 2px 7px; border-radius: 4px; white-space: nowrap;
    }
    .hist-chip--rpe { background: rgba(255,255,255,0.07); color: var(--text-secondary); }
    .hist-chip--knee {
      background: rgba(255,255,255,0.04); color: var(--text-tertiary);
      border: 1px solid rgba(255,255,255,0.06);
    }
    .hist-notes {
      font-size: 10px; color: var(--text-tertiary); margin-top: 8px;
      line-height: 1.55; padding-top: 7px; border-top: 1px solid rgba(255,255,255,0.04);
    }
    .hist-footer { display: flex; justify-content: flex-end; margin-top: 8px; }
    .btn-del-session {
      background: rgba(160,40,40,0.07); border: 1px solid rgba(160,40,40,0.18);
      color: rgba(200,80,80,0.65); border-radius: 5px;
      font-size: 9px; font-family: var(--font-mono);
      padding: 3px 9px; cursor: pointer; letter-spacing: 0.04em;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .btn-del-session:hover, .btn-del-session:focus {
      background: rgba(160,40,40,0.15); border-color: rgba(200,80,80,0.35);
      color: rgba(220,100,100,0.9); outline: none;
    }
    .trend-row { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
    .trend-label-sm { font-size: 10px; font-family: var(--font-mono); color: var(--text-tertiary); width: 90px; flex-shrink: 0; }
    @media (max-width: 600px) { .log-grid { grid-template-columns: 1fr 1fr; } }
    .goal-row { margin-bottom: 18px; }
    .goal-row:last-child { margin-bottom: 0; }
    .goal-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; flex-wrap: wrap; gap: 6px; }
    .goal-name { font-size: 14px; font-family: var(--font-mono); color: var(--text-secondary); font-weight: 600; }
    .goal-vals { font-size: 11px; font-family: var(--font-mono); color: var(--text-tertiary); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .goal-vals span { color: var(--text-primary); }
    .goal-bar-bg { height: 8px; background: rgba(255,255,255,0.06); border-radius: 4px; overflow: hidden; }
    .goal-bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
  </style>
</head>
<body>

<nav class="main-nav">
  <div class="nav-inner">
    <div class="nav-tabs">
      <a href="dashboard.html" class="nav-tab" data-p="dashboard">Dashboard</a>
      <a href="gym.html"       class="nav-tab" data-p="gym">Gym</a>
      <a href="sprint.html"    class="nav-tab" data-p="sprint">Sprint</a>
      <a href="sovn.html"      class="nav-tab" data-p="sovn">Søvn</a>
      <a href="gjoremal.html"  class="nav-tab" data-p="gjoremal">Gjøremål</a>
      <a href="treningsplan.html" class="nav-tab" data-p="treningsplan">Treningsoversikt</a>
    </div>
    <button onclick="signOut()" class="btn btn-ghost btn-sm" style="font-size:11px;flex-shrink:0;margin-left:8px">Logg ut</button>
  </div>
</nav>

<main class="page">

  <!-- PB Board -->
  <div class="card">
    <div class="section-title">Personlige rekorder</div>
    <div class="grid-4" id="pbGrid"><div class="loading">Laster…</div></div>
  </div>

  <!-- Sprint goals -->
  <div class="card">
    <div class="section-title">Sprintmål</div>
    <div id="sprintGoals"><div class="loading">Laster…</div></div>
  </div>

  <!-- Log form -->
  <div class="card">
    <div class="section-title">Logg økt</div>

    <!-- Dato (felles for hele økten) -->
    <div class="form-group" style="max-width:180px;margin-bottom:18px">
      <label class="form-label">Dato</label>
      <input type="date" id="logDate">
    </div>

    <!-- Legg til løp -->
    <div class="eval-label">Løp</div>
    <div class="add-run-row">
      <div class="form-group">
        <label class="form-label">Distanse</label>
        <select id="logDist">
          <option value="60m">60m</option>
          <option value="60m_celler">60m (celler)</option>
          <option value="60m_flying">60m (flying)</option>
          <option value="80m">80m</option>
          <option value="100m" selected>100m</option>
          <option value="120m">120m</option>
          <option value="150m">150m</option>
          <option value="180m">180m</option>
          <option value="200m">200m</option>
          <option value="220m">220m</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Type</label>
        <select id="logType">
          <option value="Trening">Trening</option>
          <option value="Stevne">Stevne</option>
          <option value="Trening (ute)">Trening (ute)</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Tid (sek)</label>
        <input type="number" id="logTime" step="0.01" placeholder="11.52"
          onkeydown="if(event.key==='Enter')addRun()">
      </div>
      <div style="padding-bottom:1px">
        <button class="btn btn-ghost btn-sm" onclick="addRun()" style="white-space:nowrap">+ Legg til løp</button>
      </div>
    </div>

    <!-- Runs list -->
    <div id="runsList"></div>

    <!-- Evaluering -->
    <hr class="session-divider">
    <div class="eval-label">Evaluering</div>

    <div class="form-group" style="max-width:180px;margin-bottom:14px">
      <label class="form-label">RPE (1–10)</label>
      <input type="number" id="logRpe" min="1" max="10" placeholder="7">
    </div>

    <div style="margin-bottom:12px">
      <div class="form-label" style="margin-bottom:8px">Knesmerte (0–10)</div>
      <div class="knee-log-row">
        <div class="knee-row-item">
          <span class="knee-row-label">Før økt</span>
          <div class="pain-row" id="sk-before"></div>
        </div>
        <div class="knee-row-item">
          <span class="knee-row-label">Under økt</span>
          <div class="pain-row" id="sk-during"></div>
        </div>
        <div class="knee-row-item">
          <span class="knee-row-label">Etter økt</span>
          <div class="pain-row" id="sk-after"></div>
        </div>
        <div class="knee-row-item">
          <span class="knee-row-label">Dagen etter</span>
          <div class="pain-row" id="sk-dayafter"></div>
        </div>
      </div>
    </div>

    <div class="form-group" style="margin-bottom:14px">
      <label class="form-label">Notater</label>
      <textarea id="logNotes" placeholder="Løpsforhold, teknikk, annet…"></textarea>
    </div>
    <button class="btn btn-success" onclick="logSession()">Logg økt</button>
  </div>

  <!-- Knee trend -->
  <div class="card">
    <div class="section-title">Knesmerte — siste 5 økter</div>
    <div id="kneeTrend"><div class="loading">Laster…</div></div>
    <div id="kneeEditPanel" style="display:none;margin-top:12px;padding:12px;
      background:rgba(255,255,255,0.04);border-radius:8px;border:1px solid rgba(255,255,255,0.07)">
      <div style="font-size:9px;font-family:var(--font-mono);color:var(--text-tertiary);
        text-transform:uppercase;letter-spacing:0.12em;margin-bottom:10px">
        Rediger knesmerte — <span id="kneeEditDate"></span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px">
        <div>
          <div style="font-size:9px;font-family:var(--font-mono);color:var(--text-tertiary);margin-bottom:4px">FØR</div>
          <input type="number" id="kneeEditBefore" min="0" max="10" class="input-sm" style="width:100%">
        </div>
        <div>
          <div style="font-size:9px;font-family:var(--font-mono);color:var(--text-tertiary);margin-bottom:4px">UNDER</div>
          <input type="number" id="kneeEditDuring" min="0" max="10" class="input-sm" style="width:100%">
        </div>
        <div>
          <div style="font-size:9px;font-family:var(--font-mono);color:var(--text-tertiary);margin-bottom:4px">ETTER</div>
          <input type="number" id="kneeEditAfter" min="0" max="10" class="input-sm" style="width:100%">
        </div>
        <div>
          <div style="font-size:9px;font-family:var(--font-mono);color:var(--text-tertiary);margin-bottom:4px">DAGEN ETTER</div>
          <input type="number" id="kneeEditDayAfter" min="0" max="10" class="input-sm" style="width:100%">
        </div>
      </div>
      <div style="display:flex;gap:6px">
        <button class="btn btn-success btn-sm" onclick="saveKneeInline()">Lagre</button>
        <button class="btn btn-ghost btn-sm" onclick="closeKneeEdit()">Avbryt</button>
      </div>
    </div>
  </div>

  <!-- History -->
  <div class="card">
    <div class="section-title">Økthistorikk</div>
    <div id="historyList"><div class="loading">Laster…</div></div>
  </div>

</main>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
let db;
document.querySelector('[data-p="sprint"]').classList.add('active');

let _tt;
function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `toast ${type} show`;
  clearTimeout(_tt); _tt = setTimeout(() => el.classList.remove('show'), 3000);
}
async function signOut() {
  if (db) await db.auth.signOut();
  window.location.href = 'login.html';
}
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function distLabel(d) {
  const map = { '60m_celler': '60m (celler)', '60m_flying': '60m (flying)' };
  return map[d] || d;
}
function today() { return new Date().toISOString().slice(0,10); }
function fmtDate(ds) {
  if (!ds) return '';
  const d = new Date(ds + 'T12:00:00');
  return `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getFullYear()).slice(2)}`;
}

const skKnee = { before: null, during: null, after: null, dayafter: null };
let runs     = [];   // [{ distance, type, time }]
let sprintLog = [];

// Date default
document.getElementById('logDate').value = today();

// ── Pain buttons ──────────────────────────────────────────────────────────
function painClass(s) {
  return s <= 3 ? 'sel-green' : s <= 5 ? 'sel-yellow' : s <= 7 ? 'sel-orange' : 'sel-red';
}
function buildPainRow(phase) {
  const el = document.getElementById(`sk-${phase}`);
  el.innerHTML = [...Array(11)].map((_,i) =>
    `<button class="pain-btn" data-phase="${phase}" data-s="${i}" onclick="selPain('${phase}',${i})">${i}</button>`
  ).join('');
}
function selPain(phase, score) {
  skKnee[phase] = score;
  document.querySelectorAll(`[data-phase="${phase}"]`).forEach(b => {
    b.className = 'pain-btn' + (parseInt(b.dataset.s) === score ? ' ' + painClass(score) : '');
  });
}
['before','during','after','dayafter'].forEach(buildPainRow);

// ── Runs list ─────────────────────────────────────────────────────────────
function addRun() {
  const dist = document.getElementById('logDist').value;
  const type = document.getElementById('logType').value;
  const time = parseFloat(document.getElementById('logTime').value);
  if (!dist || isNaN(time) || time <= 0) { toast('Fyll inn distanse og tid', 'err'); return; }
  runs.push({ distance: dist, type, time });
  document.getElementById('logTime').value = '';
  document.getElementById('logTime').focus();
  renderRuns();
}

function removeRun(i) {
  runs.splice(i, 1);
  renderRuns();
}

function renderRuns() {
  const el = document.getElementById('runsList');
  if (!runs.length) {
    el.innerHTML = '<div style="font-size:11px;font-family:var(--font-mono);color:var(--text-tertiary);padding:6px 2px 10px">Ingen løp lagt til ennå</div>';
    return;
  }
  el.innerHTML = runs.map((r, i) => `
    <div class="run-row">
      <span class="run-num">Løp ${i + 1}</span>
      <span class="run-dist">${escHtml(distLabel(r.distance))}</span>
      <span class="run-time">${r.time.toFixed(2)}s</span>
      <span class="run-type">${escHtml(r.type)}</span>
      <button class="run-del" onclick="removeRun(${i})" title="Fjern">✕</button>
    </div>`).join('');
}

// ── PB Board ──────────────────────────────────────────────────────────────
async function loadPBs() {
  const [{ data: recData }, { data: cellerData }] = await Promise.all([
    db.from('sprint_records').select('*').order('distance'),
    db.from('sprint_log')
      .select('time_seconds,date')
      .eq('distance', '60m_celler')
      .eq('type', 'Trening')
      .not('time_seconds', 'is', null)
      .order('time_seconds', { ascending: true })
      .limit(1),
  ]);

  const el = document.getElementById('pbGrid');
  const dOrder = ['60m','60m_celler','100m','200m'];
  const byDist = {};
  (recData || []).forEach(r => { byDist[r.distance] = r; });

  // 60m_celler PB is computed live from sprint_log, type='Trening' only
  if (cellerData?.length) {
    byDist['60m_celler'] = { best_time: cellerData[0].time_seconds, date: cellerData[0].date };
  } else {
    delete byDist['60m_celler'];
  }

  el.innerHTML = dOrder.map(d => {
    const r = byDist[d];
    const days   = r?.date ? Math.floor((Date.now() - new Date(r.date + 'T12:00:00').getTime()) / 86400000) : null;
    const barClr = days === null ? 'rgba(255,255,255,0.06)' : days < 30 ? '#6BE3A4' : days < 90 ? '#F2C063' : 'rgba(255,255,255,0.1)';
    return `<div class="pb-cell" id="pb-${d}">
      <div class="pb-dist">${distLabel(d)}</div>
      <div class="pb-time">${r?.best_time != null ? r.best_time.toFixed(2) : '–'}</div>
      <div class="pb-date">${r?.date ? fmtDate(r.date) : '—'}</div>
      <div class="pb-bar" style="background:${barClr}"></div>
    </div>`;
  }).join('');
}

// ── Sprint goals ──────────────────────────────────────────────────────────
const GOALS = [
  { dist: '100m', goal: 11.10, start: 11.52, color: '#5BA4F5' },
  { dist: '200m', goal: 22.30, start: 23.11, color: '#6BE3A4' },
];

async function loadSprintGoals() {
  const { data } = await db.from('sprint_records')
    .select('distance,best_time')
    .in('distance', ['100m','200m']);
  const best = {};
  (data || []).forEach(r => { best[r.distance] = r.best_time; });
  renderSprintGoals(best);
}

function renderSprintGoals(best) {
  const el = document.getElementById('sprintGoals');
  el.innerHTML = GOALS.map(g => {
    const pb  = best[g.dist] ?? g.start;
    const pct = Math.min(100, Math.max(0, (g.start - pb) / (g.start - g.goal) * 100));
    const delta    = pb - g.goal;
    const deltaStr = delta <= 0 ? '✓ Mål nådd!' : `${delta.toFixed(2)}s fra mål`;
    const deltaColor = delta <= 0 ? 'var(--success)' : 'var(--text-tertiary)';
    return `<div class="goal-row">
      <div class="goal-header">
        <span class="goal-name">${g.dist}</span>
        <div class="goal-vals">
          PB: <span>${pb.toFixed(2)}s</span>
          &nbsp;·&nbsp; Mål: <span>${g.goal.toFixed(2)}s</span>
          &nbsp;·&nbsp; <span style="color:${deltaColor}">${deltaStr}</span>
        </div>
      </div>
      <div class="goal-bar-bg">
        <div class="goal-bar-fill" style="width:${pct.toFixed(1)}%;background:${g.color}"></div>
      </div>
    </div>`;
  }).join('');
}

// ── Log session ───────────────────────────────────────────────────────────
async function logSession() {
  if (!runs.length) { toast('Legg til minst ett løp før du lagrer', 'err'); return; }

  const date  = document.getElementById('logDate').value || today();
  const rpe   = parseInt(document.getElementById('logRpe').value) || null;
  const notes = document.getElementById('logNotes').value.trim();

  const inserts = runs.map(r => ({
    date, distance: r.distance, type: r.type, time_seconds: r.time,
    rpe, notes,
    knee_before:    skKnee.before,
    knee_during:    skKnee.during,
    knee_after:     skKnee.after,
    knee_day_after: skKnee.dayafter,
  }));

  const distList = [...new Set(runs.map(r => r.distance))].join('/');
  const [logRes, kneeRes] = await Promise.all([
    db.from('sprint_log').insert(inserts).select(),
    db.from('knee_pain').insert({
      date, session_type: `Sprint ${distList} ${runs[0].type}`,
      before_score:    skKnee.before,
      during_score:    skKnee.during,
      after_score:     skKnee.after,
      day_after_score: skKnee.dayafter,
      notes,
    }),
  ]);

  if (logRes.error)  { toast('Feil ved lagring av økt: ' + logRes.error.message, 'err'); return; }
  if (kneeRes.error) { toast('Knesmerte ikke lagret: '  + kneeRes.error.message, 'err'); console.error('knee_pain insert:', kneeRes.error); }

  // Check / update PB — Stevne only, except 60m_celler counts type 'Trening' only
  const newPBs = [];
  for (const r of runs) {
    if (r.distance === '60m_flying') continue;
    const countsForPB = r.distance === '60m_celler'
      ? r.type === 'Trening'
      : r.type === 'Stevne';
    if (!countsForPB) continue;
    const { data: rec } = await db.from('sprint_records')
      .select('best_time').eq('distance', r.distance).single();
    if (!rec || r.time < rec.best_time) {
      await db.from('sprint_records').upsert(
        { distance: r.distance, best_time: r.time, date },
        { onConflict: 'distance' }
      );
      newPBs.push(`${r.distance} ${r.time.toFixed(2)}s`);
      const cell = document.getElementById(`pb-${r.distance}`);
      if (cell) { cell.classList.add('pb-pulse'); setTimeout(() => cell.classList.remove('pb-pulse'), 600); }
    }
  }

  toast(newPBs.length ? `Ny PB! ${newPBs.join(', ')}` : `${runs.length} løp lagret!`);

  // Reset
  runs = [];
  renderRuns();
  document.getElementById('logRpe').value   = '';
  document.getElementById('logNotes').value = '';
  Object.keys(skKnee).forEach(k => { skKnee[k] = null; });
  ['before','during','after','dayafter'].forEach(p =>
    document.querySelectorAll(`[data-phase="${p}"]`).forEach(b => b.className = 'pain-btn')
  );

  await Promise.all([loadPBs(), loadSprintGoals(), loadHistory()]);
}

// ── History ───────────────────────────────────────────────────────────────
async function loadHistory() {
  const { data, error } = await db.from('sprint_log').select('*')
    .order('date', { ascending: false })
    .limit(60);
  console.log('[sprintHistory] sprint_log →', data, error);
  sprintLog = data || [];
  renderHistory();
  await loadKneeTrend();
}

function renderHistory() {
  const el = document.getElementById('historyList');
  if (!sprintLog.length) { el.innerHTML = '<div class="empty">Ingen loggede økter</div>'; return; }

  const groups = new Map();
  for (const s of sprintLog) {
    if (!groups.has(s.date)) groups.set(s.date, []);
    groups.get(s.date).push(s);
  }

  el.innerHTML = [...groups.entries()].map(([date, runs]) => {
    const d       = new Date(date + 'T12:00:00');
    const dateStr = d.toLocaleDateString('no-NO', { weekday:'short', day:'numeric', month:'long' });

    const runRows = runs.map(r => `
      <div class="history-row">
        <span class="history-dist">${escHtml(distLabel(r.distance))}</span>
        <span class="history-time">${r.time_seconds != null ? r.time_seconds.toFixed(2) + 's' : '–'}</span>
        <span class="history-type">${escHtml(r.type || '')}</span>
      </div>`).join('');

    const rpe          = runs.find(r => r.rpe           != null)?.rpe;
    const kneeBefore   = runs.find(r => r.knee_before   != null)?.knee_before;
    const kneeDuring   = runs.find(r => r.knee_during   != null)?.knee_during;
    const kneeAfter    = runs.find(r => r.knee_after    != null)?.knee_after;
    const kneeDayAfter = runs.find(r => r.knee_day_after != null)?.knee_day_after;
    const notes        = runs.find(r => r.notes)?.notes;

    const chips = [
      rpe          != null ? `<span class="hist-chip hist-chip--rpe">RPE ${rpe}</span>` : '',
      kneeBefore   != null ? `<span class="hist-chip hist-chip--knee">Før ${kneeBefore}</span>` : '',
      kneeDuring   != null ? `<span class="hist-chip hist-chip--knee">Under ${kneeDuring}</span>` : '',
      kneeAfter    != null ? `<span class="hist-chip hist-chip--knee">Etter ${kneeAfter}</span>` : '',
      kneeDayAfter != null ? `<span class="hist-chip hist-chip--knee">D.etter ${kneeDayAfter}</span>` : '',
    ].filter(Boolean).join('');

    return `<div class="hist-session">
      <div class="hist-date-header">${dateStr}</div>
      ${runRows}
      ${chips ? `<div class="hist-chips">${chips}</div>` : ''}
      ${notes ? `<div class="hist-notes">${escHtml(notes)}</div>` : ''}
      <div class="hist-footer">
        <button class="btn-del-session" onclick="deleteSprintDate('${date}')">Slett økt</button>
      </div>
    </div>`;
  }).join('');
}

async function deleteSprintDate(date) {
  if (!confirm('Slett alle løp fra ' + date + '?')) return;
  await db.from('sprint_log').delete().eq('date', date);
  await loadHistory();
  toast('Økt slettet');
}

// ── Knee trend — reads from knee_pain (before_score/during_score/...) ─────
async function loadKneeTrend() {
  // Order by created_at (newest first), fall back to date if column missing
  let { data, error } = await db.from('knee_pain')
    .select('id,date,before_score,during_score,after_score,day_after_score')
    .ilike('session_type', 'Sprint%')
    .order('created_at', { ascending: false, nullsLast: true })
    .order('date',       { ascending: false })
    .limit(5);
  if (error) {
    ({ data } = await db.from('knee_pain')
      .select('id,date,before_score,during_score,after_score,day_after_score')
      .ilike('session_type', 'Sprint%')
      .order('date', { ascending: false })
      .limit(5));
  }
  renderKneeTrend(data || []);
}

let _kneeTrendData = [];
let _editingKneeIdx = null;

function renderKneeTrend(data) {
  _kneeTrendData = data;
  const el = document.getElementById('kneeTrend');
  if (!data.length) { el.innerHTML = '<div class="empty">Ingen data ennå</div>'; return; }

  const phases = [
    { key: 'before_score',    label: 'Før' },
    { key: 'during_score',    label: 'Under' },
    { key: 'after_score',     label: 'Etter' },
    { key: 'day_after_score', label: 'Dagen etter' },
  ];

  function painClr(v) {
    if (v === null || v === undefined) return 'rgba(255,255,255,0.08)';
    if (v <= 3) return '#6BE3A4'; if (v <= 5) return '#F2C063';
    if (v <= 7) return 'rgba(242,130,60,1)'; return '#FF6B6B';
  }

  el.innerHTML = `
    <div style="display:flex;gap:6px;margin-bottom:6px;align-items:flex-end">
      <div style="width:90px;flex-shrink:0"></div>
      <div style="display:flex;gap:4px;flex:1">
        ${data.map((d, i) => `
          <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px">
            <div style="font-size:12px;font-family:var(--font-mono);color:var(--text-secondary);
              font-weight:600;white-space:nowrap">${fmtDate(d.date)}</div>
            <button onclick="openKneeEdit(${i})" title="Rediger" style="background:none;border:none;
              color:var(--text-tertiary);cursor:pointer;font-size:11px;padding:1px 4px;line-height:1;
              opacity:0.6;transition:opacity 0.15s" onmouseover="this.style.opacity=1"
              onmouseout="this.style.opacity=0.6">✎</button>
          </div>`).join('')}
      </div>
    </div>
    ${phases.map(ph => `
      <div class="trend-row">
        <span class="trend-label-sm">${ph.label}</span>
        <div style="display:flex;gap:4px;flex:1">
          ${data.map(d => {
            const v = d[ph.key];
            return `<div style="flex:1;height:28px;border-radius:4px;background:${painClr(v)};
              display:flex;align-items:center;justify-content:center;font-size:11px;
              font-family:var(--font-mono);color:${v !== null ? '#050506' : 'var(--text-tertiary)'}">
              ${v ?? '–'}</div>`;
          }).join('')}
        </div>
      </div>`).join('')}`;
}

function openKneeEdit(idx) {
  _editingKneeIdx = idx;
  const d = _kneeTrendData[idx];
  document.getElementById('kneeEditDate').textContent    = fmtDate(d.date);
  document.getElementById('kneeEditBefore').value        = d.before_score   ?? '';
  document.getElementById('kneeEditDuring').value        = d.during_score   ?? '';
  document.getElementById('kneeEditAfter').value         = d.after_score    ?? '';
  document.getElementById('kneeEditDayAfter').value      = d.day_after_score ?? '';
  document.getElementById('kneeEditPanel').style.display = 'block';
}

function closeKneeEdit() {
  _editingKneeIdx = null;
  document.getElementById('kneeEditPanel').style.display = 'none';
}

async function saveKneeInline() {
  if (_editingKneeIdx === null) return;
  const d        = _kneeTrendData[_editingKneeIdx];
  const before   = document.getElementById('kneeEditBefore').value;
  const during   = document.getElementById('kneeEditDuring').value;
  const after    = document.getElementById('kneeEditAfter').value;
  const dayafter = document.getElementById('kneeEditDayAfter').value;

  const { error } = await db.from('knee_pain').update({
    before_score:    before   !== '' ? Number(before)   : null,
    during_score:    during   !== '' ? Number(during)   : null,
    after_score:     after    !== '' ? Number(after)    : null,
    day_after_score: dayafter !== '' ? Number(dayafter) : null,
  }).eq('id', d.id);

  if (error) { toast('Feil ved lagring: ' + error.message, 'err'); return; }
  closeKneeEdit();
  await loadKneeTrend();
  toast('Knesmerte oppdatert');
}


// ── Init ──────────────────────────────────────────────────────────────────
(async () => {
  try {
    const r = await fetch('/api/config');
    if (!r.ok) throw new Error('Config-tjeneste svarte ' + r.status);
    const cfg = await r.json();
    if (cfg.error) throw new Error(cfg.error);
    db = supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);
    const { data: { session } } = await db.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }
  } catch (err) {
    document.querySelector('.page').innerHTML =
      `<div class="card" style="text-align:center;padding:40px">
        <div style="color:var(--danger);font-family:var(--font-mono);font-size:13px">${err.message}</div>
        <div style="color:var(--text-tertiary);font-size:11px;margin-top:10px">
          Deploy til Netlify og sett SUPABASE_URL og SUPABASE_ANON_KEY som miljøvariabler.
        </div>
      </div>`;
    return;
  }
  await Promise.all([loadPBs(), loadSprintGoals(), loadHistory()]);
})();
</script>
