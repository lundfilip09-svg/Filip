<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="/favicon.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#050506">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Dashboard">
  <title>Dashboard</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .knee-log-row { display: flex; flex-direction: column; gap: 6px; }
    .knee-row-item { display: flex; align-items: center; gap: 10px; }
    .knee-row-label { font-size: 11px; font-family: var(--font-mono); color: var(--text-tertiary); width: 90px; flex-shrink: 0; }
    .add-run-row { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 10px; }
    .add-run-row .form-group { margin: 0; flex: 1; min-width: 80px; }
    .run-row {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 10px; background: rgba(255,255,255,0.03); border-radius: 8px;
      margin-bottom: 4px; font-size: 12px; font-family: var(--font-mono);
    }
    .run-num  { color: var(--text-tertiary); width: 46px; flex-shrink: 0; }
    .run-dist { color: var(--accent-blue); width: 82px; font-weight: 600; flex-shrink: 0; }
    .run-time { color: var(--text-primary); font-weight: 700; flex: 1; }
    .run-type { color: var(--text-tertiary); font-size: 10px; }
    .run-del  { background: none; border: none; color: var(--text-tertiary); cursor: pointer; font-size: 13px; opacity: 0; transition: opacity 0.15s; margin-left: auto; }
    .run-row:hover .run-del { opacity: 1; }
    .run-del:hover { color: var(--danger); }
    .session-divider { border: none; border-top: 1px solid rgba(255,255,255,0.06); margin: 18px 0 14px; }
    .eval-label { font-size: 9px; font-family: var(--font-mono); color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 12px; }
    /* ── History — same mechanics as treningsplan ── */
    #historyList { display: flex; flex-direction: column; gap: 0; }
    .hist-date-group { margin-bottom: 20px; }
    .hist-date-label {
      font-size: 10px; font-family: var(--font-mono); color: var(--text-tertiary);
      text-transform: uppercase; letter-spacing: 0.12em;
      padding-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.06); margin-bottom: 8px;
    }
    .hist-sessions { display: flex; flex-direction: column; gap: 4px; }
    .sess-card {
      background: var(--card-bg); border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px; padding: 14px 16px;
      cursor: pointer; transition: background 0.15s, border-color 0.15s;
    }
    .sess-card:hover { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.12); }
    .sess-card.expanded { border-color: rgba(91,164,245,0.3); }
    .sess-meta { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-top: 6px; }
    .sess-tag {
      font-size: 9px; font-family: var(--font-mono); padding: 2px 7px; border-radius: 10px;
      background: rgba(107,227,164,0.1); color: #6BE3A4; border: 1px solid rgba(107,227,164,0.2);
    }
    .sess-rpe-tag {
      font-size: 9px; font-family: var(--font-mono); padding: 2px 7px; border-radius: 10px;
      background: rgba(255,255,255,0.06); color: var(--text-secondary);
    }
    .sess-pain {
      font-size: 10px; font-family: var(--font-mono); color: var(--text-tertiary);
    }
    .sess-pain-val { font-weight: 600; }
    .sess-pain-val.pain-low  { color: #6BE3A4; }
    .sess-pain-val.pain-mid  { color: var(--warning); }
    .sess-pain-val.pain-high { color: #FF6B6B; }
    .sess-notes-preview {
      font-size: 10px; color: var(--text-tertiary); margin-top: 7px; line-height: 1.5;
      overflow: hidden; text-overflow: ellipsis;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }
    .history-row {
      display: flex; align-items: center; gap: 12px;
      padding: 6px 0; font-size: 13px; font-family: var(--font-mono);
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .history-row:last-child { border-bottom: none; }
    .history-dist { color: var(--accent-blue); min-width: 100px; flex-shrink: 0; white-space: nowrap; font-weight: 600; }
    .history-time { color: var(--text-primary); font-weight: 700; font-size: 16px; flex: 1; letter-spacing: -0.01em; }
    .history-type { color: var(--text-tertiary); font-size: 10px; flex-shrink: 0; }
    /* Detail drawer */
    .sess-detail {
      display: none; background: rgba(91,164,245,0.04);
      border: 1px solid rgba(91,164,245,0.15); border-radius: 10px;
      padding: 16px 20px; margin-top: 4px;
    }
    .sess-detail.open { display: block; }
    .sess-detail-hd {
      display: flex; align-items: baseline;
      justify-content: space-between; margin-bottom: 14px;
    }
    .sess-detail-title { font-size: 15px; font-weight: 700; color: var(--text-primary); }
    .sess-detail-date  { font-size: 10px; font-family: var(--font-mono); color: var(--text-tertiary); margin-top: 2px; }
    .sess-detail-close {
      background: none; border: none; color: var(--text-tertiary);
      cursor: pointer; font-size: 14px; padding: 2px 4px;
    }
    .sess-edit-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 12px; }
    .sess-edit-lbl { font-size: 9px; font-family: var(--font-mono); color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4px; }
    .sess-edit-input {
      width: 100%; box-sizing: border-box; background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 5px;
      color: var(--text-primary); font-family: var(--font-mono); font-size: 12px;
      padding: 4px 6px; text-align: center;
    }
    .sess-edit-input:focus { outline: none; border-color: rgba(91,164,245,0.4); }
    .sess-edit-textarea {
      width: 100%; box-sizing: border-box; background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08); border-radius: 5px;
      color: var(--text-secondary); font-family: inherit; font-size: 11px;
      padding: 6px 8px; line-height: 1.5; resize: vertical; min-height: 52px;
    }
    .sess-edit-textarea:focus { outline: none; border-color: rgba(91,164,245,0.4); }
    .btn-del-session {
      background: rgba(160,40,40,0.07); border: 1px solid rgba(160,40,40,0.18);
      color: rgba(200,80,80,0.65); border-radius: 5px;
      font-size: 10px; font-family: var(--font-mono);
      padding: 4px 11px; cursor: pointer; letter-spacing: 0.04em;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .btn-del-session:hover { background: rgba(160,40,40,0.15); border-color: rgba(200,80,80,0.35); color: rgba(220,100,100,0.9); }
    .trend-row { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
    .trend-label-sm { font-size: 10px; font-family: var(--font-mono); color: var(--text-tertiary); width: 90px; flex-shrink: 0; }
    @media (max-width: 600px) { .log-grid { grid-template-columns: 1fr 1fr; } }
    .goal-row { margin-bottom: 18px; }
    .goal-row:last-child { margin-bottom: 0; }
    .goal-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; flex-wrap: wrap; gap: 6px; }
    .goal-name { font-size: 14px; font-family: var(--font-mono); color: var(--text-secondary); font-weight: 600; }
    .goal-vals { font-size: 11px; font-family: var(--font-mono); color: var(--text-tertiary); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .goal-vals span { color: var(--text-primary); }
    .goal-bar-bg { height: 8px; background: rgba(255,255,255,0.06); border-radius: 4px; overflow: hidden; }
    .goal-bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
    .btn-reset-baseline { background: none; border: 1px solid rgba(255,255,255,0.1); border-radius: 5px; color: var(--text-tertiary); cursor: pointer; font-size: 9px; font-family: var(--font-mono); padding: 2px 8px; letter-spacing: 0.05em; text-transform: uppercase; transition: color 0.15s, border-color 0.15s; white-space: nowrap; }
    .btn-reset-baseline:hover { color: var(--text-primary); border-color: rgba(255,255,255,0.25); }
    .pb-edit-btn { background: none; border: none; color: var(--text-tertiary); cursor: pointer; font-size: 9px; font-family: var(--font-mono); padding: 0; letter-spacing: 0.05em; text-transform: uppercase; transition: color 0.15s; line-height: 1; }
    .pb-edit-btn:hover { color: var(--text-primary); }
    .pb-edit-wrap { margin-top: 6px; display: flex; flex-direction: column; gap: 5px; }
    .pb-edit-inp { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 5px; color: var(--text-primary); font-family: var(--font-mono); font-size: 12px; padding: 3px 6px; width: 100%; box-sizing: border-box; text-align: center; }
    .pb-edit-inp:focus { outline: none; border-color: rgba(91,164,245,0.4); }
    .pb-edit-actions { display: flex; gap: 4px; }
  </style>
</head>

<main class="page">

  <!-- PB Board -->
  <div class="card">
    <div class="section-title" data-i18n="sprint.personal_records">Personlige rekorder</div>
    <div class="grid-4" id="pbGrid"><div class="loading" data-i18n="loading">Laster…</div></div>
  </div>

  <!-- Sprint goals -->
  <div class="card">
    <div class="section-title" data-i18n="sprint.goals">Sprintmål</div>
    <div id="sprintGoals"><div class="loading" data-i18n="loading">Laster…</div></div>
  </div>

  <!-- Log form -->
  <div class="card">
    <div class="section-title" data-i18n="sprint.log">Logg økt</div>

    <!-- Dato (felles for hele økten) -->
    <div class="form-group" style="max-width:180px;margin-bottom:18px">
      <label class="form-label" data-i18n="date">Dato</label>
      <input type="date" id="logDate">
    </div>

    <!-- Legg til løp -->
    <div class="eval-label" data-i18n="sprint.runs">Løp</div>
    <div class="add-run-row">
      <div class="form-group">
        <label class="form-label" data-i18n="sprint.distance">Distanse</label>
        <select id="logDist">
          <option value="60m">60m</option>
          <option value="60m_celler">60m (celler)</option>
          <option value="60m_flying">60m (flying)</option>
          <option value="80m">80m</option>
          <option value="100m" selected>100m</option>
          <option value="120m">120m</option>
          <option value="150m">150m</option>
          <option value="180m">180m</option>
          <option value="200m">200m</option>
          <option value="220m">220m</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label" data-i18n="sprint.type">Type</label>
        <select id="logType">
          <option value="Trening" data-i18n="sprint.training">Trening</option>
          <option value="Stevne" data-i18n="sprint.competition">Stevne</option>
          <option value="Trening (ute)" data-i18n="sprint.training_outdoor">Trening (ute)</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label" data-i18n="sprint.time">Tid (sek)</label>
        <input type="number" id="logTime" step="0.01" placeholder="11.52"
          onkeydown="if(event.key==='Enter')addRun()">
      </div>
      <div style="padding-bottom:1px">
        <button class="btn btn-ghost btn-sm" onclick="addRun()" style="white-space:nowrap" data-i18n="sprint.add_run">+ Legg til løp</button>
      </div>
    </div>

    <!-- Runs list -->
    <div id="runsList"></div>

    <!-- Evaluering -->
    <hr class="session-divider">
    <div class="eval-label" data-i18n="sprint.evaluation">Evaluering</div>

    <div class="form-group" style="max-width:260px;margin-bottom:14px" id="logRpeHost"></div>

    <div style="margin-bottom:12px">
      <div class="form-label" style="margin-bottom:8px" data-i18n="knee.pain_0_10">Knesmerte (0–10)</div>
      <div class="knee-log-row">
        <div class="knee-row-item">
          <span class="knee-row-label" data-i18n="knee.before_session">Før økt</span>
          <div class="pain-row" id="sk-before"></div>
        </div>
        <div class="knee-row-item">
          <span class="knee-row-label" data-i18n="knee.during_session">Under økt</span>
          <div class="pain-row" id="sk-during"></div>
        </div>
        <div class="knee-row-item">
          <span class="knee-row-label" data-i18n="knee.after_session">Etter økt</span>
          <div class="pain-row" id="sk-after"></div>
        </div>
        <div class="knee-row-item">
          <span class="knee-row-label" data-i18n="knee.dayafter">Dagen etter</span>
          <div class="pain-row" id="sk-dayafter"></div>
        </div>
      </div>
    </div>

    <div class="form-group" style="margin-bottom:14px">
      <label class="form-label" data-i18n="notes">Notater</label>
      <textarea id="logNotes" placeholder="Løpsforhold, teknikk, annet…" data-i18n-placeholder="sprint.notes_ph"></textarea>
    </div>
    <button id="sprintSaveBtn" class="btn btn-success" onclick="logSession()" data-i18n="sprint.log_btn">Logg økt</button>
  </div>

  <!-- Knee trend -->
  <div class="card">
    <div class="section-title" data-i18n="sprint.history">Knesmerte — siste 5 økter</div>
    <div id="kneeTrend"><div class="loading" data-i18n="loading">Laster…</div></div>
    <div id="kneeEditPanel" style="display:none;margin-top:12px;padding:12px;
      background:rgba(255,255,255,0.04);border-radius:8px;border:1px solid rgba(255,255,255,0.07)">
      <div style="font-size:9px;font-family:var(--font-mono);color:var(--text-tertiary);
        text-transform:uppercase;letter-spacing:0.12em;margin-bottom:10px">
        <span data-i18n="sprint.edit_knee">Rediger knesmerte — </span><span id="kneeEditDate"></span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px">
        <div>
          <div style="font-size:9px;font-family:var(--font-mono);color:var(--text-tertiary);margin-bottom:4px" data-i18n="knee.before_short">FØR</div>
          <input type="number" id="kneeEditBefore" min="0" max="10" class="input-sm" style="width:100%">
        </div>
        <div>
          <div style="font-size:9px;font-family:var(--font-mono);color:var(--text-tertiary);margin-bottom:4px" data-i18n="knee.during_short">UNDER</div>
          <input type="number" id="kneeEditDuring" min="0" max="10" class="input-sm" style="width:100%">
        </div>
        <div>
          <div style="font-size:9px;font-family:var(--font-mono);color:var(--text-tertiary);margin-bottom:4px" data-i18n="knee.after_short">ETTER</div>
          <input type="number" id="kneeEditAfter" min="0" max="10" class="input-sm" style="width:100%">
        </div>
        <div>
          <div style="font-size:9px;font-family:var(--font-mono);color:var(--text-tertiary);margin-bottom:4px" data-i18n="knee.dayafter_short">DAGEN ETTER</div>
          <input type="number" id="kneeEditDayAfter" min="0" max="10" class="input-sm" style="width:100%">
        </div>
      </div>
      <div style="display:flex;gap:6px">
        <button class="btn btn-success btn-sm" onclick="saveKneeInline()" data-i18n="save">Lagre</button>
        <button class="btn btn-ghost btn-sm" onclick="closeKneeEdit()" data-i18n="cancel">Avbryt</button>
      </div>
    </div>
  </div>

  <!-- History -->
  <div class="card">
    <div class="section-title" data-i18n="tp.history">Økthistorikk</div>
    <div id="historyList"><div class="loading" data-i18n="loading">Laster…</div></div>
  </div>

</main>

<script>
let db;
document.querySelector('[data-p="sprint"]').classList.add('active');
applyLang();

function distLabel(d) {
  const map = { '60m_celler': '60m (celler)', '60m_flying': '60m (flying)' };
  return map[d] || d;
}

const skKnee = { before: null, during: null, after: null, dayafter: null };
let _isSavingLog = false;
let runs     = [];   // [{ distance, type, time }]
let sprintLog = [];
let _pbData = {};          // distance → { best_time, date }
let _lastGoalBest = {};    // distance → best_time (for re-render on lang change)
let _goalBaselines = {};   // distance → baseline_time (override from sprint_records)

const DRAFT_KEY = 'sprint_form_draft';

function saveDraft() {
  const draft = {
    date:    document.getElementById('logDate').value,
    dist:    document.getElementById('logDist').value,
    type:    document.getElementById('logType').value,
    rpe:     rpeValue('logRpe'),
    notes:   document.getElementById('logNotes').value,
    runs:    runs,
    skKnee:  { ...skKnee },
  };
  localStorage.setItem(DRAFT_KEY, JSON.stringify(draft));
}

function clearDraft() {
  localStorage.removeItem(DRAFT_KEY);
}

function restoreDraft() {
  const raw = localStorage.getItem(DRAFT_KEY);
  if (!raw) return;
  try {
    const d = JSON.parse(raw);
    if (d.date)  document.getElementById('logDate').value = d.date;
    if (d.dist)  document.getElementById('logDist').value = d.dist;
    if (d.type)  document.getElementById('logType').value = d.type;
    if (d.rpe != null) renderLogRpe(d.rpe);
    if (d.notes) document.getElementById('logNotes').value = d.notes;
    if (Array.isArray(d.runs)) { runs = d.runs; renderRuns(); }
    if (d.skKnee) {
      ['before','during','after','dayafter'].forEach(p => {
        if (d.skKnee[p] !== null && d.skKnee[p] !== undefined) {
          selPain(p, d.skKnee[p]);
        }
      });
    }
  } catch (e) { /* ugyldig draft, ignorer */ }
}

// Date default
document.getElementById('logDate').value = today();

// ── Pain buttons ──────────────────────────────────────────────────────────
function painClass(s) {
  return s <= 3 ? 'sel-green' : s <= 5 ? 'sel-yellow' : s <= 7 ? 'sel-orange' : 'sel-red';
}
function painHint(i) {
  // Ingen farge-antydning før valg — alle knapper nøytrale, så det er tydelig
  // hvilke faser som IKKE er fylt ut (ingen 0 ser ut som "valgt").
  return '';
}
function buildPainRow(phase) {
  const el = document.getElementById(`sk-${phase}`);
  el.innerHTML = [...Array(11)].map((_,i) =>
    `<button type="button" class="pain-btn" data-phase="${phase}" data-s="${i}" onclick="selPain('${phase}',${i});this.blur()">${i}</button>`
  ).join('');
}
function selPain(phase, score) {
  skKnee[phase] = score;
  document.querySelectorAll(`[data-phase="${phase}"]`).forEach(b => {
    b.className = 'pain-btn' + (parseInt(b.dataset.s) === score ? ' ' + painClass(score) : '');
  });
  saveDraft();
}
['before','during','after','dayafter'].forEach(buildPainRow);
restoreDraft();

// Lagre draft ved endringer i tekstfelt/select
['logDate','logDist','logType','logNotes'].forEach(id => {
  const el = document.getElementById(id);
  if (el) el.addEventListener('input', saveDraft);
  if (el) el.addEventListener('change', saveDraft);
});

// RPE-slider (injiseres i #logRpeHost). renderLogRpe(value) tegner den på nytt.
function renderLogRpe(value = null) {
  const host = document.getElementById('logRpeHost');
  if (!host) return;
  host.innerHTML = rpeSliderHTML('logRpe', value);
  const el = document.getElementById('logRpe');
  if (el) el.addEventListener('change', saveDraft);
}
renderLogRpe();

// ── Runs list ─────────────────────────────────────────────────────────────
function addRun() {
  const dist = document.getElementById('logDist').value;
  const type = document.getElementById('logType').value;
  const time = parseFloat(document.getElementById('logTime').value);
  if (!dist || isNaN(time) || time <= 0) { toast(t('sprint.fill_fields'), 'err'); return; }
  runs.push({ distance: dist, type, time });
  document.getElementById('logTime').value = '';
  document.getElementById('logTime').focus();
  renderRuns();
  saveDraft();
}

function removeRun(i) {
  runs.splice(i, 1);
  renderRuns();
  saveDraft();
}

function renderRuns() {
  const el = document.getElementById('runsList');
  if (!runs.length) {
    el.innerHTML = `<div style="font-size:11px;font-family:var(--font-mono);color:var(--text-tertiary);padding:6px 2px 10px">${t('sprint.no_runs_yet')}</div>`;
    return;
  }
  el.innerHTML = runs.map((r, i) => `
    <div class="run-row">
      <span class="run-num">${t('sprint.run_num', { n: i + 1 })}</span>
      <span class="run-dist">${escHtml(distLabel(r.distance))}</span>
      <span class="run-time">${r.time.toFixed(2)}s</span>
      <span class="run-type">${escHtml(r.type)}</span>
      <button class="run-del" onclick="removeRun(${i})" title="${t('delete')}">✕</button>
    </div>`).join('');
}

// ── PB Board ──────────────────────────────────────────────────────────────
async function loadPBs() {
  const [{ data: recData }, { data: cellerData }] = await Promise.all([
    db.from('sprint_records').select('*').order('distance'),
    db.from('sprint_log')
      .select('time_seconds,date')
      .eq('distance', '60m_celler')
      .eq('type', 'Trening')
      .not('time_seconds', 'is', null)
      .order('time_seconds', { ascending: true })
      .limit(1),
  ]);

  const el = document.getElementById('pbGrid');
  const dOrder = ['60m','60m_celler','100m','200m'];
  const byDist = {};
  (recData || []).forEach(r => { byDist[r.distance] = r; });

  // 60m_celler PB is computed live from sprint_log, type='Trening' only
  if (cellerData?.length) {
    byDist['60m_celler'] = { best_time: cellerData[0].time_seconds, date: cellerData[0].date };
  } else {
    delete byDist['60m_celler'];
  }

  _pbData = byDist;

  el.innerHTML = dOrder.map(d => {
    const r = byDist[d];
    const days   = r?.date ? Math.floor((Date.now() - new Date(r.date + 'T12:00:00').getTime()) / 86400000) : null;
    const barClr = days === null ? 'rgba(255,255,255,0.06)' : days < 30 ? '#6BE3A4' : days < 90 ? '#F2C063' : 'rgba(255,255,255,0.1)';
    const editable = d !== '60m_celler';
    const editBtn  = editable ? `<button class="pb-edit-btn" onclick="editPB('${d}')">${t('sprint.edit_pb')}</button>` : '';
    return `<div class="pb-cell" id="pb-${d}">
      <div class="pb-dist" style="display:flex;align-items:center;justify-content:space-between;gap:4px">${distLabel(d)}${editBtn}</div>
      <div id="pb-display-${d}">
        <div class="pb-time">${r?.best_time != null ? (+r.best_time).toFixed(2) : '–'}</div>
        <div class="pb-date">${r?.date ? fmtDate(r.date) : '—'}</div>
      </div>
      ${editable ? `<div id="pb-edit-${d}" style="display:none" class="pb-edit-wrap">
        <input class="pb-edit-inp" id="pb-inp-time-${d}" type="number" step="0.01" min="0.01" placeholder="sek" value="${r?.best_time != null ? (+r.best_time).toFixed(2) : ''}">
        <input class="pb-edit-inp" id="pb-inp-date-${d}" type="date" value="${r?.date || ''}">
        <div class="pb-edit-actions">
          <button class="btn btn-primary btn-sm" style="flex:1;font-size:10px" onclick="savePB('${d}')">${t('save')}</button>
          <button class="btn btn-ghost btn-sm" style="flex:1;font-size:10px" onclick="cancelPBEdit('${d}')">${t('cancel')}</button>
        </div>
      </div>` : ''}
      <div class="pb-bar" style="background:${barClr}"></div>
    </div>`;
  }).join('');
}

function editPB(dist) {
  document.getElementById(`pb-display-${dist}`).style.display = 'none';
  document.getElementById(`pb-edit-${dist}`).style.display = '';
}

function cancelPBEdit(dist) {
  document.getElementById(`pb-edit-${dist}`).style.display = 'none';
  document.getElementById(`pb-display-${dist}`).style.display = '';
}

async function savePB(dist) {
  const timeVal = parseFloat(document.getElementById(`pb-inp-time-${dist}`).value);
  const dateVal = document.getElementById(`pb-inp-date-${dist}`).value;
  if (!timeVal || timeVal <= 0 || isNaN(timeVal)) { toast(t('sprint.pb_invalid'), 'err'); return; }
  const rec = { distance: dist, best_time: timeVal };
  if (dateVal) rec.date = dateVal;
  const { error } = await db.from('sprint_records').upsert(rec, { onConflict: 'distance' });
  if (error) { toast(error.message, 'err'); return; }
  toast(t('sprint.pb_saved'));
  await Promise.all([loadPBs(), loadSprintGoals()]);
}

// ── Sprint goals ──────────────────────────────────────────────────────────
const GOALS = [
  { dist: '100m', goal: 11.10, start: 11.52, color: '#5BA4F5' },
  { dist: '200m', goal: 22.30, start: 23.11, color: '#6BE3A4' },
];

async function loadSprintGoals() {
  const { data } = await db.from('sprint_records')
    .select('distance,best_time,baseline_time')
    .in('distance', ['100m','200m']);
  const best = {};
  (data || []).forEach(r => {
    // Supabase numeric leses som string → tving til tall så .toFixed/matte funker.
    best[r.distance] = r.best_time != null ? +r.best_time : r.best_time;
    if (r.baseline_time != null) _goalBaselines[r.distance] = +r.baseline_time;
  });
  _lastGoalBest = best;
  renderSprintGoals(best);
}

function renderSprintGoals(best) {
  _lastGoalBest = best;
  const el = document.getElementById('sprintGoals');
  el.innerHTML = GOALS.map(g => {
    const pb    = best[g.dist] ?? g.start;
    const start = _goalBaselines[g.dist] ?? g.start;
    const pct   = Math.min(100, Math.max(0, (start - pb) / (start - g.goal) * 100));
    const delta = pb - g.goal;
    const deltaStr  = delta <= 0 ? t('sprint.goal_reached') : t('sprint.from_goal', { n: delta.toFixed(2) });
    const deltaColor = delta <= 0 ? 'var(--success)' : 'var(--text-tertiary)';
    return `<div class="goal-row">
      <div class="goal-header">
        <span class="goal-name">${g.dist}</span>
        <div class="goal-vals">
          PB: <span>${pb.toFixed(2)}s</span>
          &nbsp;·&nbsp; ${t('sprint.goal')}: <span>${g.goal.toFixed(2)}s</span>
          &nbsp;·&nbsp; <span style="color:${deltaColor}">${deltaStr}</span>
        </div>
        <button class="btn-reset-baseline" onclick="resetBaseline('${g.dist}')">${t('sprint.reset_baseline')}</button>
      </div>
      <div class="goal-bar-bg">
        <div class="goal-bar-fill" style="width:${pct.toFixed(1)}%;background:${g.color}"></div>
      </div>
    </div>`;
  }).join('');
}

async function resetBaseline(dist) {
  const pb = _lastGoalBest?.[dist];
  if (pb == null) return;
  const { error } = await db.from('sprint_records').upsert({ distance: dist, baseline_time: pb }, { onConflict: 'distance' });
  if (error) { toast(error.message, 'err'); return; }
  _goalBaselines[dist] = pb;
  renderSprintGoals(_lastGoalBest);
  toast(t('sprint.baseline_reset', { time: pb.toFixed(2) }));
}

// ── Log session ───────────────────────────────────────────────────────────
async function logSession() {
  if (_isSavingLog) return;
  if (!runs.length) { toast(t('sprint.add_first'), 'err'); return; }
  _isSavingLog = true;
  const btn = document.getElementById('sprintSaveBtn');
  if (btn) btn.disabled = true;
  try {
    const date  = document.getElementById('logDate').value || today();
    const rpe   = rpeValue('logRpe');
    const notes = document.getElementById('logNotes').value.trim();

    const inserts = runs.map(r => ({
      date, distance: r.distance, type: r.type, time_seconds: r.time,
      rpe, notes,
      knee_before:    skKnee.before,
      knee_during:    skKnee.during,
      knee_after:     skKnee.after,
      knee_day_after: skKnee.dayafter,
    }));

    const distList = [...new Set(runs.map(r => r.distance))].join('/');
    const [logRes, kneeRes] = await Promise.all([
      db.from('sprint_log').insert(inserts).select(),
      db.from('knee_pain').insert({
        date, session_type: `Sprint ${distList} ${runs[0].type}`,
        before_score:    skKnee.before,
        during_score:    skKnee.during,
        after_score:     skKnee.after,
        day_after_score: skKnee.dayafter,
        notes,
      }),
    ]);

    if (logRes.error)  { toast(t('sprint.save_error', {msg: logRes.error.message}), 'err'); return; }
    if (kneeRes.error) { toast(t('sprint.knee_error', {msg: kneeRes.error.message}), 'err'); }

    // Check / update PB — Stevne only, except 60m_celler counts type 'Trening' only
    const newPBs = [];
    for (const r of runs) {
      if (r.distance === '60m_flying') continue;
      const countsForPB = r.distance === '60m_celler'
        ? r.type === 'Trening'
        : r.type === 'Stevne';
      if (!countsForPB) continue;
      const { data: rec } = await db.from('sprint_records')
        .select('best_time').eq('distance', r.distance).maybeSingle();
      if (!rec || r.time < rec.best_time) {
        await db.from('sprint_records').upsert(
          { distance: r.distance, best_time: r.time, date },
          { onConflict: 'distance' }
        );
        newPBs.push(`${r.distance} ${r.time.toFixed(2)}s`);
        const cell = document.getElementById(`pb-${r.distance}`);
        if (cell) { cell.classList.add('pb-pulse'); setTimeout(() => cell.classList.remove('pb-pulse'), 600); }
      }
    }

    toast(newPBs.length ? t('sprint.new_pb', {pbs: newPBs.join(', ')}) : t('sprint.runs_saved', {n: runs.length}));
    clearDraft();

    // Reset
    runs = [];
    renderRuns();
    renderLogRpe();
    document.getElementById('logNotes').value = '';
    Object.keys(skKnee).forEach(k => { skKnee[k] = null; });
    ['before','during','after','dayafter'].forEach(p =>
      document.querySelectorAll(`[data-phase="${p}"]`).forEach(b => b.className = 'pain-btn')
    );

    await Promise.all([loadPBs(), loadSprintGoals(), loadHistory()]);
  } finally {
    _isSavingLog = false;
    if (btn) btn.disabled = false;
  }
}

// ── History ───────────────────────────────────────────────────────────────
async function loadHistory() {
  const { data, error } = await db.from('sprint_log').select('*')
    .order('date', { ascending: false })
    .limit(60);
  sprintLog = data || [];
  renderHistory();
  await loadKneeTrend();
}

let _openDetail = null;

function _painColorClass(s) {
  if (s == null) return '';
  if (s <= 3) return 'pain-low';
  if (s <= 6) return 'pain-mid';
  return 'pain-high';
}

function _buildSessCard(date, runs, isOpen) {
  const rpe          = runs.find(r => r.rpe           != null)?.rpe;
  const kneeBefore   = runs.find(r => r.knee_before   != null)?.knee_before;
  const kneeDuring   = runs.find(r => r.knee_during   != null)?.knee_during;
  const kneeAfter    = runs.find(r => r.knee_after    != null)?.knee_after;
  const kneeDayAfter = runs.find(r => r.knee_day_after != null)?.knee_day_after;
  const notes        = runs.find(r => r.notes)?.notes;

  const runRows = runs.map(r => `
    <div class="history-row">
      <span class="history-dist">${escHtml(distLabel(r.distance))}</span>
      <span class="history-time">${r.time_seconds != null ? (+r.time_seconds).toFixed(2) + 's' : '–'}</span>
      <span class="history-type">${escHtml(r.type || '')}</span>
    </div>`).join('');

  const painVals = [
    { l: t('knee.before'), v: kneeBefore }, { l: t('knee.during'), v: kneeDuring },
    { l: t('knee.after'), v: kneeAfter }, { l: t('tp.knee_dayafter'), v: kneeDayAfter },
  ];
  const hasPain = painVals.some(x => x.v != null);
  const painSummary = hasPain
    ? `<span class="sess-pain">${painVals.map(x => `${x.l}: <span class="sess-pain-val ${_painColorClass(x.v)}">${x.v ?? '—'}</span>`).join(' · ')}</span>`
    : '';

  const card = `<div class="sess-card${isOpen ? ' expanded' : ''}" id="sess-card-${date}"
    onclick="toggleSprintDetail('${date}')">
    <div style="margin-bottom:8px">${runRows}</div>
    <div class="sess-meta">
      ${rpe != null ? `<span class="sess-rpe-tag">RPE ${rpe}</span>` : ''}
      ${painSummary}
    </div>
    ${notes ? `<div class="sess-notes-preview">${escHtml(notes)}</div>` : ''}
  </div>`;

  const d       = new Date(date + 'T12:00:00');
  const dateStr = d.toLocaleDateString(fmtLocale(), { weekday:'long', day:'numeric', month:'long', year:'numeric' });

  const detail = isOpen ? `<div class="sess-detail open" id="sess-detail-${date}" onclick="event.stopPropagation()">
    <div class="sess-detail-hd">
      <div>
        <div class="sess-detail-title">${runs.length} løp</div>
        <div class="sess-detail-date">${dateStr}</div>
      </div>
      <button class="sess-detail-close" onclick="event.stopPropagation();toggleSprintDetail('${date}')">✕</button>
    </div>
    <div style="margin-bottom:14px">
      <div style="font-size:9px;font-family:var(--font-mono);color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px">RPE</div>
      <div style="display:flex;gap:8px;align-items:center">
        <input type="number" min="1" max="100" class="sess-edit-input" style="max-width:60px"
          value="${rpe ?? ''}" placeholder="–"
          onblur="saveHistField('${date}','rpe',this.value)"
          onkeydown="if(event.key==='Enter')this.blur()">
        <span style="font-size:10px;font-family:var(--font-mono);color:var(--text-tertiary)">1–100</span>
      </div>
    </div>
    <div style="margin-bottom:14px">
      <div style="font-size:9px;font-family:var(--font-mono);color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px">${t('knee.pain')}</div>
      <div class="sess-edit-row">
        ${[[t('knee.before'),'knee_before',kneeBefore],[t('knee.during'),'knee_during',kneeDuring],[t('knee.after'),'knee_after',kneeAfter],[t('tp.knee_dayafter'),'knee_day_after',kneeDayAfter]].map(([lbl,field,val]) => `
          <div>
            <div class="sess-edit-lbl">${lbl}</div>
            <input type="number" min="0" max="10" class="sess-edit-input"
              value="${val ?? ''}" placeholder="–"
              onblur="saveHistField('${date}','${field}',this.value)"
              onkeydown="if(event.key==='Enter')this.blur()">
          </div>`).join('')}
      </div>
    </div>
    <div style="margin-bottom:14px">
      <div style="font-size:9px;font-family:var(--font-mono);color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:5px">${t('notes')}</div>
      <textarea class="sess-edit-textarea"
        onblur="saveHistField('${date}','notes',this.value)"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();this.blur()}"
      >${notes ? escHtml(notes) : ''}</textarea>
    </div>
    <div style="display:flex;justify-content:flex-end">
      <button class="btn-del-session" onclick="event.stopPropagation();deleteSprintDate('${date}')">${t('sprint.delete_session')}</button>
    </div>
  </div>` : `<div class="sess-detail" id="sess-detail-${date}"></div>`;

  return card + detail;
}

function renderHistory() {
  const el = document.getElementById('historyList');
  if (!sprintLog.length) { el.innerHTML = `<div class="empty">${t('sprint.no_sessions')}</div>`; return; }

  const groups = new Map();
  for (const s of sprintLog) {
    if (!groups.has(s.date)) groups.set(s.date, []);
    groups.get(s.date).push(s);
  }

  el.innerHTML = [...groups.entries()].map(([date, runs]) => {
    const d       = new Date(date + 'T12:00:00');
    const dateStr = d.toLocaleDateString(fmtLocale(), { weekday:'long', day:'numeric', month:'long' });
    return `<div class="hist-date-group">
      <div class="hist-date-label">${dateStr}</div>
      <div class="hist-sessions">${_buildSessCard(date, runs, _openDetail === date)}</div>
    </div>`;
  }).join('');
}

function toggleSprintDetail(date) {
  _openDetail = _openDetail === date ? null : date;
  renderHistory();
}

async function saveHistField(date, field, valueStr) {
  let value;
  if (field === 'notes') {
    value = valueStr.trim() || null;
  } else {
    const s = valueStr.trim();
    if (s === '') { value = null; }
    else {
      const n = Number(s);
      if (isNaN(n)) { toast(t('sprint.invalid'), 'err'); return; }
      if (field === 'rpe' && (n < 1 || n > 100)) { toast(t('sprint.rpe_range'), 'err'); return; }
      if (field !== 'rpe' && (n < 0 || n > 10)) { toast(t('sprint.pain_range'), 'err'); return; }
      value = n;
    }
  }
  const ids = sprintLog.filter(r => r.date === date).map(r => r.id);
  if (!ids.length) return;
  // Informer bruker om at kne-verdier gjelder alle løp på denne datoen
  const kneeFields = ['knee_before','knee_during','knee_after','knee_day_after'];
  if (kneeFields.includes(field) && ids.length > 1 && value !== null) {
    toast(t('sprint.updating', {n: ids.length}), 'ok');
  }
  const { error } = await db.from('sprint_log').update({ [field]: value }).in('id', ids);
  if (error) { toast(t('sprint.save_fail'), 'err'); return; }
  sprintLog.filter(r => r.date === date).forEach(r => { r[field] = value; });
  refreshHistCard(date);
  if (['knee_before','knee_during','knee_after','knee_day_after'].includes(field)) {
    loadKneeTrend();
  }
}

function refreshHistCard(date) {
  const runs = sprintLog.filter(r => r.date === date);
  const container = document.querySelector(`#sess-card-${date}`)?.closest('.hist-sessions');
  if (!container) return;
  container.innerHTML = _buildSessCard(date, runs, _openDetail === date);
}

async function deleteSprintDate(date) {
  if (!confirm(t('confirm.delete_runs', { date }))) return;
  await db.from('sprint_log').delete().eq('date', date);
  await loadHistory();
  toast(t('sprint.deleted'));
}

// ── Knee trend — reads from knee_pain (before_score/during_score/...) ─────
async function loadKneeTrend() {
  // Order by created_at (newest first), fall back to date if column missing
  let { data, error } = await db.from('knee_pain')
    .select('id,date,before_score,during_score,after_score,day_after_score')
    .ilike('session_type', 'Sprint%')
    .order('created_at', { ascending: false, nullsLast: true })
    .order('date',       { ascending: false })
    .limit(5);
  if (error) {
    ({ data } = await db.from('knee_pain')
      .select('id,date,before_score,during_score,after_score,day_after_score')
      .ilike('session_type', 'Sprint%')
      .order('date', { ascending: false })
      .limit(5));
  }
  renderKneeTrend(data || []);
}

let _kneeTrendData = [];
let _editingKneeIdx = null;

function renderKneeTrend(data) {
  _kneeTrendData = data;
  const el = document.getElementById('kneeTrend');
  if (!data.length) { el.innerHTML = `<div class="empty">${t('sprint.no_data_yet')}</div>`; return; }

  const phases = [
    { key: 'before_score',    label: t('knee.before') },
    { key: 'during_score',    label: t('knee.during') },
    { key: 'after_score',     label: t('knee.after') },
    { key: 'day_after_score', label: t('knee.dayafter') },
  ];

  function painClr(v) {
    if (v === null || v === undefined) return 'rgba(255,255,255,0.08)';
    if (v <= 3) return '#6BE3A4'; if (v <= 5) return '#F2C063';
    if (v <= 7) return 'rgba(242,130,60,1)'; return '#FF6B6B';
  }

  el.innerHTML = `
    <div style="display:flex;gap:6px;margin-bottom:6px;align-items:flex-end">
      <div style="width:90px;flex-shrink:0"></div>
      <div style="display:flex;gap:4px;flex:1">
        ${data.map((d, i) => `
          <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px">
            <div style="font-size:12px;font-family:var(--font-mono);color:var(--text-secondary);
              font-weight:600;white-space:nowrap">${fmtDate(d.date)}</div>
            <button onclick="openKneeEdit(${i})" title="${t('edit')}" style="background:none;border:none;
              color:var(--text-tertiary);cursor:pointer;font-size:11px;padding:1px 4px;line-height:1;
              opacity:0.6;transition:opacity 0.15s" onmouseover="this.style.opacity=1"
              onmouseout="this.style.opacity=0.6">✎</button>
          </div>`).join('')}
      </div>
    </div>
    ${phases.map(ph => `
      <div class="trend-row">
        <span class="trend-label-sm">${ph.label}</span>
        <div style="display:flex;gap:4px;flex:1">
          ${data.map(d => {
            const v = d[ph.key];
            return `<div style="flex:1;height:28px;border-radius:4px;background:${painClr(v)};
              display:flex;align-items:center;justify-content:center;font-size:11px;
              font-family:var(--font-mono);color:${v !== null ? '#050506' : 'var(--text-tertiary)'}">
              ${v ?? '–'}</div>`;
          }).join('')}
        </div>
      </div>`).join('')}`;
}

function openKneeEdit(idx) {
  _editingKneeIdx = idx;
  const d = _kneeTrendData[idx];
  document.getElementById('kneeEditDate').textContent    = fmtDate(d.date);
  document.getElementById('kneeEditBefore').value        = d.before_score   ?? '';
  document.getElementById('kneeEditDuring').value        = d.during_score   ?? '';
  document.getElementById('kneeEditAfter').value         = d.after_score    ?? '';
  document.getElementById('kneeEditDayAfter').value      = d.day_after_score ?? '';
  document.getElementById('kneeEditPanel').style.display = 'block';
}

function closeKneeEdit() {
  _editingKneeIdx = null;
  document.getElementById('kneeEditPanel').style.display = 'none';
}

async function saveKneeInline() {
  if (_editingKneeIdx === null) return;
  const d        = _kneeTrendData[_editingKneeIdx];
  const before   = document.getElementById('kneeEditBefore').value;
  const during   = document.getElementById('kneeEditDuring').value;
  const after    = document.getElementById('kneeEditAfter').value;
  const dayafter = document.getElementById('kneeEditDayAfter').value;

  const { error } = await db.from('knee_pain').update({
    before_score:    before   !== '' ? Number(before)   : null,
    during_score:    during   !== '' ? Number(during)   : null,
    after_score:     after    !== '' ? Number(after)    : null,
    day_after_score: dayafter !== '' ? Number(dayafter) : null,
  }).eq('id', d.id);

  if (error) { toast(t('sprint.knee_save_error', {msg: error.message}), 'err'); return; }
  closeKneeEdit();
  await loadKneeTrend();
  toast(t('sprint.knee_updated'));
}



// ── Init ──────────────────────────────────────────────────────────────────
(async () => {
  try {
    const cfg = await getConfig();
    db = supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);
    const { data: { session } } = await db.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }
  } catch (err) {
    document.querySelector('.page').innerHTML =
      `<div class="card" style="text-align:center;padding:40px">
        <div style="color:var(--danger);font-family:var(--font-mono);font-size:13px">${err.message}</div>
        <div style="color:var(--text-tertiary);font-size:11px;margin-top:10px">
          Sett SUPABASE_URL og SUPABASE_ANON_KEY som miljøvariabler i Vercel.
        </div>
      </div>`;
    return;
  }
  onLangChange = () => { renderHistory(); renderSprintGoals(_lastGoalBest); loadPBs(); loadKneeTrend(); renderLogRpe(rpeValue('logRpe')); applyLang(); };
  applyLang();
  await Promise.all([loadPBs(), loadSprintGoals(), loadHistory()]);
})();
</script>
</body>
