<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="icon" href="/favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="/favicon.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#050506">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Dashboard">
  <title>Dashboard</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* ── Sprint page — premium redesign ── */

    :root {
      --gym-s1: #0d0d10;
      --gym-s2: #111115;
      --gym-s3: #16161b;
      --gym-b0: rgba(255,255,255,0.07);
      --gym-b1: rgba(255,255,255,0.04);
      --sp-blue: #5BA4F5;
      --sp-blue-dim: rgba(91,164,245,0.12);
      --sp-blue-border: rgba(91,164,245,0.20);
    }

    .page { max-width: 1280px; gap: 10px; }

    /* ══════════════════════════════════════
       PB BOARD — hero section
    ══════════════════════════════════════ */
    .pb-board-section {
      background: var(--gym-s1);
      border: 1px solid var(--gym-b0);
      border-radius: 12px;
      padding: 20px 22px 2px;
      overflow: hidden;
    }
    .pb-board-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .pb-board-title {
      font-size: 10px; font-family: var(--font-mono);
      text-transform: uppercase; letter-spacing: 0.10em;
      color: var(--text-tertiary); opacity: 0.6;
    }
    .grid-4 {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
    }
    .pb-cell {
      padding: 16px 20px 18px;
      position: relative;
      background: transparent;
      border: none;
      border-left: 1px solid var(--gym-b1);
      border-radius: 0;
      transition: background 0.15s;
    }
    .pb-cell:first-child { border-left: none; }
    .pb-cell:hover { background: rgba(255,255,255,0.015); }
    .pb-dist {
      font-size: 10px; font-family: var(--font-mono);
      text-transform: uppercase; color: var(--text-tertiary);
      letter-spacing: 0.10em; margin-bottom: 10px; display: block;
    }
    .pb-time {
      font-size: 36px; font-weight: 700; font-family: var(--font-mono);
      letter-spacing: -0.04em; line-height: 1; color: var(--text-primary);
      display: block; margin-bottom: 6px;
    }
    .pb-date {
      font-size: 10px; font-family: var(--font-mono);
      color: var(--text-tertiary); opacity: 0.5; letter-spacing: 0.04em;
    }
    /* Fersk-indikator: liten prikk ved datoen i stedet for den brede
       fargestripa som lå her før (den leste som pynt, ikke som data). */
    .pb-fresh {
      display: inline-block; width: 5px; height: 5px; border-radius: 50%;
      margin-right: 6px; vertical-align: middle;
    }
    @media (max-width: 640px) {
      .grid-4 { grid-template-columns: repeat(2, 1fr); }
      .pb-cell:nth-child(2) { border-top: none; }
      .pb-cell:nth-child(3),
      .pb-cell:nth-child(4) { border-top: 1px solid var(--gym-b1); }
    }

    /* ══════════════════════════════════════
       SPRINT GOALS — progress-oriented
    ══════════════════════════════════════ */
    .goals-section {
      background: var(--gym-s1);
      border: 1px solid var(--gym-b0);
      border-radius: 12px;
      padding: 16px 20px;
    }
    .goals-section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .goals-section-title {
      font-size: 10px; font-family: var(--font-mono);
      text-transform: uppercase; letter-spacing: 0.10em;
      color: var(--text-tertiary); opacity: 0.6;
    }
    .goal-row { margin-bottom: 14px; }
    .goal-row:last-child { margin-bottom: 0; }
    /* Kompakte ikonknapper — de tre fullbreddeknappene som lå her før tok
       mer plass enn selve måldataene. Tittel/aria bærer teksten. */
    .goal-actions { display: flex; gap: 4px; flex-shrink: 0; }
    .goal-act {
      width: 24px; height: 24px; padding: 0; flex-shrink: 0;
      display: inline-flex; align-items: center; justify-content: center;
      background: transparent; border: 1px solid var(--gym-b1);
      border-radius: 6px; cursor: pointer;
      color: var(--text-tertiary); font-size: 11px; line-height: 1;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }
    .goal-act:hover {
      color: var(--text-primary); border-color: rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.04);
    }
    .goal-act--danger:hover {
      color: #FF6B6B; border-color: rgba(255,107,107,0.35);
      background: rgba(255,107,107,0.07);
    }
    .goal-header {
      display: grid;
      grid-template-columns: 60px 1fr auto;
      align-items: center;
      gap: 14px;
      margin-bottom: 7px;
    }
    .goal-name {
      font-size: 13px; font-family: var(--font-mono);
      color: var(--text-primary); font-weight: 700;
      letter-spacing: -0.01em;
    }
    .goal-vals {
      display: flex; align-items: center; gap: 10px;
      font-size: 11px; font-family: var(--font-mono); color: var(--text-tertiary);
    }
    .goal-vals span { color: var(--text-secondary); }
    @media (max-width: 560px) {
      /* Navn + knapper på rad 1, verdiene på rad 2 — ellers klemmes
         «PB · Mål · fra mål» sammen til uleselighet på telefon. */
      .goal-header {
        grid-template-columns: 1fr auto;
        gap: 6px 10px;
      }
      .goal-vals {
        grid-column: 1 / -1; grid-row: 2;
        flex-wrap: wrap; gap: 6px; font-size: 10px;
      }
    }
    .goal-vals .goal-delta {
      margin-left: auto; font-weight: 600;
    }
    .goal-actions { display: flex; gap: 4px; }
    .goal-bar-bg {
      height: 3px; background: rgba(255,255,255,0.05);
      border-radius: 2px; overflow: hidden;
    }
    .goal-bar-fill { height: 100%; border-radius: 2px; transition: width 0.6s cubic-bezier(0.16,1,0.3,1); }
    .btn-reset-baseline {
      background: none; border: 1px solid rgba(255,255,255,0.07); border-radius: 4px;
      color: var(--text-tertiary); cursor: pointer; font-size: 9px; font-family: var(--font-mono);
      padding: 2px 7px; letter-spacing: 0.05em; text-transform: uppercase;
      transition: color 0.12s, border-color 0.12s; white-space: nowrap;
    }
    .btn-reset-baseline:hover { color: var(--text-secondary); border-color: rgba(255,255,255,0.14); }

    /* ══════════════════════════════════════
       LOG FORM — compact
    ══════════════════════════════════════ */
    .log-section {
      background: var(--gym-s1);
      border: 1px solid var(--gym-b0);
      border-radius: 12px;
      overflow: hidden;
    }
    .log-section-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 13px 18px;
      border-bottom: 1px solid var(--gym-b1);
      cursor: pointer; user-select: none;
    }
    .log-section-header:hover { background: rgba(255,255,255,0.015); }
    .log-section-title {
      font-size: 10px; font-family: var(--font-mono);
      text-transform: uppercase; letter-spacing: 0.10em;
      color: var(--text-tertiary); opacity: 0.6;
    }
    .log-section-date {
      font-size: 11px; font-family: var(--font-mono);
      color: var(--text-tertiary);
    }
    .log-section-body { padding: 16px 18px; }

    /* ── Duration input ── */
    .sess-dur-wrap {
      display: flex; align-items: center; gap: 4px;
      font-size: 10px; font-family: var(--font-mono); color: var(--text-tertiary);
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .sess-dur-input {
      width: 44px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.10);
      border-radius: 5px; color: var(--text-primary); font-family: var(--font-mono);
      font-size: 11px; text-align: center; padding: 2px 4px;
    }
    .sess-dur-input:focus { outline: none; border-color: var(--sp-blue); }

    /* ── Misc layout ── */
    .knee-log-row { display: flex; flex-direction: column; gap: 6px; }
    .knee-row-item { display: flex; align-items: center; gap: 10px; }
    .knee-row-label { font-size: 11px; font-family: var(--font-mono); color: var(--text-tertiary); width: 90px; flex-shrink: 0; }
    .add-run-row { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 10px; }
    .add-run-row .form-group { margin: 0; flex: 1; min-width: 80px; }

    /* ── Run rows ── */
    .run-row {
      display: flex; align-items: center; gap: 10px;
      padding: 6px 0;
      background: transparent;
      border-bottom: 1px solid var(--gym-b1);
      font-size: 12px; font-family: var(--font-mono);
    }
    .run-num  { color: var(--text-tertiary); opacity: 0.5; width: 40px; flex-shrink: 0; }
    .run-dist { color: var(--sp-blue); width: 82px; font-weight: 600; flex-shrink: 0; }
    .run-time { color: var(--text-primary); font-weight: 700; flex: 1; letter-spacing: -0.03em; }
    .run-type { color: var(--text-tertiary); font-size: 10px; opacity: 0.6; }
    .run-del  { background: none; border: none; color: var(--text-tertiary); cursor: pointer; font-size: 12px; opacity: 0; transition: opacity 0.15s; margin-left: auto; padding: 0 4px; }
    .run-row:hover .run-del { opacity: 1; }
    .run-del:hover { color: var(--danger); }
    @media (hover: none) { .run-del { opacity: 0.5; } }

    /* ── Section divider & labels ── */
    .session-divider { border: none; border-top: 1px solid var(--gym-b1); margin: 14px 0 12px; }
    .eval-label {
      font-size: 10px; font-family: var(--font-mono); color: var(--text-tertiary);
      text-transform: uppercase; letter-spacing: 0.08em; opacity: 0.6; margin-bottom: 10px;
    }

    /* ══════════════════════════════════════
       PAIN TREND — compact matrix
    ══════════════════════════════════════ */
    .trend-section {
      background: var(--gym-s1);
      border: 1px solid var(--gym-b0);
      border-radius: 12px;
      padding: 14px 18px;
    }
    .trend-section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .trend-section-title {
      font-size: 10px; font-family: var(--font-mono);
      text-transform: uppercase; letter-spacing: 0.10em;
      color: var(--text-tertiary); opacity: 0.6;
    }

    /* ══════════════════════════════════════
       HISTORY — scannable cards
    ══════════════════════════════════════ */
    .history-section {
      background: var(--gym-s1);
      border: 1px solid var(--gym-b0);
      border-radius: 12px;
      overflow: hidden;
    }
    .history-section-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 13px 18px;
      border-bottom: 1px solid var(--gym-b1);
    }
    #historyList { display: flex; flex-direction: column; gap: 0; }
    .tp-history-hd { display: flex; align-items: center; justify-content: space-between; }
    .tp-history-title {
      font-size: 10px; font-family: var(--font-mono);
      text-transform: uppercase; letter-spacing: 0.10em;
      color: var(--text-tertiary); opacity: 0.6;
    }
    .tp-history-title::before { content: none; }
    .tp-history-toggle {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07);
      border-radius: 5px; color: var(--text-tertiary); cursor: pointer;
      font-size: 12px; padding: 3px 9px; transition: background 0.12s, color 0.12s;
    }
    .tp-history-toggle:hover { background: rgba(255,255,255,0.07); color: var(--text-primary); }

    /* ── Date group label ── */
    .hist-date-group { border-bottom: 1px solid var(--gym-b1); }
    .hist-date-group:last-child { border-bottom: none; }
    /* hist-date-label + hist-sessions arver fra styles.css (samme som gym) */

    /* ── Session meta ── */
    .sess-meta { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-top: 6px; }
    .sess-rpe-tag {
      font-size: 10px; font-family: var(--font-mono); padding: 2px 7px;
      border-radius: 4px; border: 1px solid rgba(255,255,255,0.07);
      background: rgba(255,255,255,0.03); color: var(--text-secondary);
    }

    /* ── History rows (inside drawer) ── */
    .history-row {
      display: flex; align-items: center; gap: 12px;
      padding: 5px 0; font-size: 13px; font-family: var(--font-mono);
      border-bottom: 1px solid var(--gym-b1);
    }
    .history-row:last-child { border-bottom: none; }
    .history-dist { color: var(--sp-blue); min-width: 90px; flex-shrink: 0; white-space: nowrap; font-weight: 600; }
    .history-time { color: var(--text-primary); font-weight: 700; font-size: 15px; flex: 1; letter-spacing: -0.03em; }
    .history-type { color: var(--text-tertiary); font-size: 10px; opacity: 0.6; flex-shrink: 0; }

    /* ── Session card ──
       Arver den delte kortstilen fra styles.css (avrundet, egen bakgrunn,
       3px kategoristripe til venstre) — samme utseende som gym.html og
       treningsoversikt. De flate rad-overstyringene som lå her er fjernet. */
    .sess-card:hover { border-color: rgba(255,255,255,0.10); background: var(--surface-3, rgba(255,255,255,0.03)); }
    .sess-hdr { display: flex; align-items: center; gap: 10px; width: 100%; min-width: 0; }
    .sess-hdr-body { flex: 1; min-width: 0; }
    /* Matcher gym.html / treningsoversikt sine økthistorikk-kort */
    .sess-type {
      font-size: 16px; font-weight: 600; color: var(--text-primary);
      letter-spacing: -0.015em; line-height: 1.2;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .sess-info-row {
      display: flex; align-items: center; gap: 7px; margin-top: 4px;
      flex-wrap: nowrap; min-width: 0;
    }
    .sess-vol-txt {
      font-size: 11px; font-family: var(--font-mono); color: var(--text-tertiary);
      white-space: nowrap; flex-shrink: 0;
    }
    .sess-rir-badge {
      font-size: 10px; font-family: var(--font-mono); padding: 2px 6px;
      border-radius: 4px; background: rgba(91,164,245,0.08);
      color: #5BA4F5; border: 1px solid rgba(91,164,245,0.14);
      white-space: nowrap; flex-shrink: 0;
    }
    @media (max-width: 600px) {
      .sess-type { font-size: 14px; }
      .sess-vol-txt { font-size: 10px; }
      .sess-rir-badge { font-size: 9px; padding: 1px 5px; }
    }
    .sess-caret {
      color: var(--text-tertiary); flex-shrink: 0; font-size: 14px; line-height: 1;
      transition: transform 0.22s cubic-bezier(0.2,0.7,0.2,1), color 0.15s;
    }
    .sess-card.expanded .sess-caret { transform: rotate(90deg); color: var(--text-secondary); }
    .sess-card:hover .sess-caret { color: var(--text-secondary); }

    /* ── Injury chips ── */
    .sess-inj {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: var(--font-sans);
      padding: 2px 5px 2px 8px; border-radius: 5px;
      background: color-mix(in srgb, var(--inj) 10%, transparent);
      border: 1px solid color-mix(in srgb, var(--inj) 30%, transparent);
    }
    .sess-inj-warn { border-color: color-mix(in srgb, var(--inj) 60%, rgba(255,200,0,0.5)) !important; }
    .sess-inj-name { font-size: 10px; font-weight: 600; color: var(--inj); letter-spacing: 0.01em; }
    .sess-inj-ph { font-size: 10px; color: var(--text-secondary); font-variant-numeric: tabular-nums; }
    .sess-inj-ph b { font-weight: 700; margin-left: 3px; }
    .sess-inj-ph b.pain-low  { color: #6BE3A4; }
    .sess-inj-ph b.pain-mid  { color: var(--warning); }
    .sess-inj-ph b.pain-high { color: #FF6B6B; }
    .gym-hist-injs { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }

    /* ── Detail drawer ── */
    .sess-detail {
      display: none;
      background: var(--gym-s2);
      border-top: 1px solid var(--gym-b1);
      overflow: hidden;
    }
    .sess-detail.open {
      display: block;
      animation: sessDetailIn 200ms cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes sessDetailIn {
      from { opacity: 0; transform: translateY(-3px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Drawer header ── */
    .sess-detail-hd {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; padding: 10px 18px;
      background: rgba(255,255,255,0.02);
      border-bottom: 1px solid var(--gym-b1);
    }
    .sdh-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .sdh-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; opacity: 0.8; }
    .sdh-title { font-size: 12px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.01em; line-height: 1.2; }
    .sdh-meta  { font-size: 10px; font-family: var(--font-mono); color: var(--text-tertiary); margin-top: 1px; opacity: 0.6; }

    .sess-detail-title { font-size: 12px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.01em; }
    .sess-detail-date  { font-size: 10px; font-family: var(--font-mono); color: var(--text-tertiary); margin-top: 2px; opacity: 0.6; }

    /* ── 2-column drawer layout ── */
    .gsx-grid { display:grid; grid-template-columns:minmax(0,1.1fr) minmax(0,0.9fr); gap:0; padding:12px 18px 0; }
    .gsx-col { min-width:0; padding-bottom:12px; }
    .gsx-col+.gsx-col { border-left:1px solid var(--gym-b1); padding-left:18px; margin-left:4px; }
    .gsx-sec-block { background: var(--gym-s1); border: 1px solid var(--gym-b0); border-radius: 7px; padding: 8px 10px; }
    .gsx-sec-lbl {
      font-size: 9px; font-family: var(--font-mono); color: var(--text-tertiary);
      text-transform: uppercase; letter-spacing: 0.08em; opacity: 0.6; margin-bottom: 7px;
    }
    .he-inj-name { font-size: 10px; font-family: var(--font-mono); color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
    @media (max-width:820px) { .gsx-grid { grid-template-columns:1fr; } .gsx-col+.gsx-col { border-left:none; padding-left:0; margin-left:0; margin-top:10px; } }

    /* ── Delete session button ── */
    .btn-del-session {
      background: rgba(160,40,40,0.07); border: 1px solid rgba(160,40,40,0.15);
      color: rgba(200,80,80,0.55); border-radius: 4px;
      font-size: 9px; font-family: var(--font-mono);
      padding: 3px 9px; cursor: pointer; letter-spacing: 0.04em;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .btn-del-session:hover { background: rgba(160,40,40,0.15); border-color: rgba(200,80,80,0.30); color: rgba(220,100,100,0.9); }

    /* ── Knee trend ── */
    .trend-row { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
    .trend-label-sm { font-size: 10px; font-family: var(--font-mono); color: var(--text-tertiary); opacity: 0.6; width: 90px; flex-shrink: 0; }
    @media (max-width: 600px) { .log-grid { grid-template-columns: 1fr 1fr; } }

    /* ── PB edit inputs ── */
    .pb-edit-wrap { margin-top: 6px; display: flex; flex-direction: column; gap: 5px; }
    .pb-edit-inp {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.09);
      border-radius: 5px; color: var(--text-primary); font-family: var(--font-mono);
      font-size: 12px; padding: 3px 6px; width: 100%; box-sizing: border-box; text-align: center;
    }
    .pb-edit-inp:focus { outline: none; border-color: rgba(91,164,245,0.4); }
    .pb-edit-actions { display: flex; gap: 4px; }

    /* ── Sprint level selector ── */
    .sprint-lvl-btns { display: flex; gap: 4px; }
    .sprint-lvl-btn {
      flex: 1; padding: 5px 4px;
      background: transparent; border: 1px solid rgba(255,255,255,0.06);
      border-radius: 5px; cursor: pointer; text-align: center;
      font-size: 10px; font-family: var(--font-mono); color: var(--text-tertiary);
      transition: background 0.12s, border-color 0.12s, color 0.12s;
    }
    .sprint-lvl-btn:hover { background: rgba(255,255,255,0.04); color: var(--text-secondary); }
    .sprint-lvl-btn.selected {
      background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.11); color: var(--text-primary);
    }
  </style>
</head>
<body data-entrance>

<nav class="main-nav" data-nav></nav>

<main class="page">

  <!-- PB Board — hero -->
  <div class="pb-board-section">
    <div class="pb-board-header">
      <span class="pb-board-title" data-i18n="sprint.personal_records">Personlige rekorder</span>
    </div>
    <div class="grid-4" id="pbGrid"><div class="loading" data-i18n="loading">Laster…</div></div>
  </div>

  <!-- Sprint goals -->
  <div class="goals-section">
    <div class="goals-section-header">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="utils.js"></script>
<script>
let db;
document.querySelector('[data-p="sprint"]').classList.add('active');
applyLang();

// distLabel kommer fra utils.js («60m_flying» → «60m (flying)»)

let _severeInjuries = [];   // [{id, body_part, side, status, severity}]
let _injuryScores   = {};   // {injuryId: {before, during, after, dayafter}}
let _manualScores   = {};   // {injuryId: {before, during, after, dayafter}}
let _histInjuryPain = {};   // `${injuryId}|${date}` → injury_pain-rad (historikk)
let _isSavingLog  = false;
let _sprintLevel  = 'høy'; // valgt akselerasjonsnivå for belastning (default: høy = 3.0)
let runs     = [];   // [{ distance, type, time }]
let sprintLog = [];
let _pbData = {};          // distance → { best_time, date }

const DRAFT_KEY = 'sprint_form_draft';

function selectSprintLevel(btn) {
  document.querySelectorAll('.sprint-lvl-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  _sprintLevel = btn.dataset.level;
  saveDraft();
}

function saveDraft() {
  const draft = {
    date:         document.getElementById('logDate').value,
    dist:         document.getElementById('logDist').value,
    type:         document.getElementById('logType').value,
    level:        _sprintLevel,
    rpe:          rpeValue('logRpe'),
    notes:        document.getElementById('logNotes').value,
    runs:         runs,
    injuryScores: _injuryScores,
  };
  localStorage.setItem(DRAFT_KEY, JSON.stringify(draft));
}

function clearDraft() {
  localStorage.removeItem(DRAFT_KEY);
}

function restoreDraft() {
  const raw = localStorage.getItem(DRAFT_KEY);
  if (!raw) return;
  try {
    const d = JSON.parse(raw);
    if (d.date)  { document.getElementById('logDate').value = d.date; const dd=document.getElementById('logDateDisplay'); if(dd) dd.textContent = d.date; }
    if (d.dist)  document.getElementById('logDist').value = d.dist;
    if (d.type)  document.getElementById('logType').value = d.type;
    if (d.level) {
      _sprintLevel = d.level;
      document.querySelectorAll('.sprint-lvl-btn').forEach(b => {
        b.classList.toggle('selected', b.dataset.level === d.level);
      });
    }
    if (d.rpe != null) renderLogRpe(d.rpe);
    if (d.notes) document.getElementById('logNotes').value = d.notes;
    if (Array.isArray(d.runs)) { runs = d.runs; renderRuns(); }
    if (d.injuryScores && typeof d.injuryScores === 'object') {
      Object.assign(_injuryScores, d.injuryScores);
    }
  } catch (e) { /* ugyldig draft, ignorer */ }
}

// Date default
document.getElementById('logDate').value = today();
const _logDateDisplayEl = document.getElementById('logDateDisplay');
if (_logDateDisplayEl) _logDateDisplayEl.textContent = today();

// ── Pain buttons ──────────────────────────────────────────────────────────
function painClass(s) {
  return s <= 3 ? 'sel-green' : s <= 5 ? 'sel-yellow' : s <= 7 ? 'sel-orange' : 'sel-red';
}

function _isKneeInjury(inj) {
  return !!inj && (inj.body_part === 'body.knee' || /kne|knee/i.test(inj.body_part || ''));
}

// Oversett body_part til visningsnavn (body.knee → «Kne» el. «Knee»)
function bodyPartName(inj) {
  const base = t(inj.body_part) !== inj.body_part ? t(inj.body_part) : inj.body_part;
  if (!inj.side || inj.side === 'none') return base;
  const sideStr = t(`side.${inj.side}`);
  return sideStr !== `side.${inj.side}` ? `${base} (${sideStr.toLowerCase()})` : base;
}

function renderInjuryPainBlocks(containerId) {
  const el = document.getElementById(containerId);
  if (!el) return;
  if (!_severeInjuries.length) {
    el.innerHTML = `<div style="font-size:11px;color:var(--text-tertiary);font-style:italic;padding:4px 0">${t('pain.no_severe')}</div>`;
    return;
  }
  const phases = [
    { id: 'before',   label: 'knee.before_session' },
    { id: 'during',   label: 'knee.during_session' },
    { id: 'after',    label: 'knee.after_session' },
    { id: 'dayafter', label: 'knee.dayafter' },
  ];
  el.innerHTML = _severeInjuries.map(inj => `
<div style="margin-bottom:12px">
  <div class="form-label" style="margin-bottom:8px">${escHtml(bodyPartName(inj))} (0–10)</div>
  ${phases.map(ph => {
    const cur = (_injuryScores[inj.id] || {})[ph.id];
    return painMeterHTML(`ipm-${inj.id}-${ph.id}`, (cur != null ? cur : null),
      { label: t(ph.label), onset: `selectInjuryPain('${inj.id}','${ph.id}',$v)` });
  }).join('')}
</div>`).join('');
}

function selectInjuryPain(injId, phase, score) {
  if (!_injuryScores[injId]) _injuryScores[injId] = {};
  _injuryScores[injId][phase] = score;   // måleren er alt oppdatert visuelt av painMeterSet
  saveDraft();
}

// ── Injuries (last fra DB ved sidelast) ──────────────────────────────────────
async function loadSevereInjuries() {
  const { data, error } = await db.from('injuries')
    .select('id, body_part, side, status, severity')
    .in('status', ['active', 'improving'])
    .eq('severity', 'severe');
  if (error) { console.error('loadSevereInjuries', error); toast(t('err.load_data'), 'err'); return; }
  _severeInjuries = data || [];
  _severeInjuries.forEach(inj => {
    if (!_injuryScores[inj.id])
      _injuryScores[inj.id] = { before: null, during: null, after: null, dayafter: null };
  });
  renderInjuryPainBlocks('injuryPainBlocks');
  renderManualPainForms();
}

// ── Manuell smerteregistrering ────────────────────────────────────────────────
function openManualModal() {
  renderManualPainForms();
  const m = document.getElementById('manualPainModal');
  if (m) m.style.display = 'flex';
}
function closeManualModal() {
  const m = document.getElementById('manualPainModal');
  if (m) m.style.display = 'none';
}
function renderManualPainForms() {
  const btn   = document.getElementById('manualPainBtn');
  const forms = document.getElementById('manualPainForms');
  const show  = _severeInjuries.length > 0;
  if (btn) btn.style.display = show ? '' : 'none';
  if (!show) { closeManualModal(); return; }
  if (!forms) return;
  const phases = [
    { id: 'before',   label: 'knee.before_session' },
    { id: 'during',   label: 'knee.during_session' },
    { id: 'after',    label: 'knee.after_session' },
    { id: 'dayafter', label: 'knee.dayafter' },
  ];
  forms.innerHTML = _severeInjuries.map(inj => `
<div style="margin-bottom:16px">
  <div style="font-size:11px;font-family:var(--font-mono);color:var(--text-secondary);
    margin-bottom:8px;text-transform:uppercase;letter-spacing:0.1em">${escHtml(bodyPartName(inj))}</div>
  <div class="form-group" style="max-width:180px;margin-bottom:8px">
    <label class="form-label" data-i18n="date">${t('date')}</label>
    <input type="date" id="mp-date-${inj.id}" class="input-sm" style="width:100%;box-sizing:border-box">
  </div>
  ${phases.map(ph => {
    const cur = (_manualScores[inj.id] || {})[ph.id];
    return painMeterHTML(`mpm-${inj.id}-${ph.id}`, (cur != null ? cur : null),
      { label: t(ph.label), onset: `selectManualPain('${inj.id}','${ph.id}',$v)` });
  }).join('')}
  <div class="form-group" style="margin:8px 0">
    <textarea class="input-sm" id="mp-notes-${inj.id}" rows="2"
      placeholder="${escHtml(t('pain.manual_notes_ph'))}"
      style="width:100%;resize:none;box-sizing:border-box"></textarea>
  </div>
  <button class="btn btn-success btn-sm" onclick="saveManualPain('${inj.id}')"
    data-i18n="save">${t('save')}</button>
</div>`).join('<hr style="border-color:rgba(255,255,255,0.07);margin:12px 0">');

  _severeInjuries.forEach(inj => {
    const dateEl = document.getElementById(`mp-date-${inj.id}`);
    if (dateEl) dateEl.value = today();
  });
}

function selectManualPain(injId, phase, score) {
  if (!_manualScores[injId]) _manualScores[injId] = {};
  _manualScores[injId][phase] = score;   // måleren er alt oppdatert visuelt av painMeterSet
}

async function saveManualPain(injId) {
  const scores = _manualScores[injId] || {};
  if (Object.values(scores).every(v => v == null)) {
    toast(t('gym.select_pain_score'), 'err'); return;
  }
  const dateEl  = document.getElementById(`mp-date-${injId}`);
  const notesEl = document.getElementById(`mp-notes-${injId}`);
  const date  = dateEl?.value || today();
  const notes = notesEl?.value.trim() || null;

  const { error } = await db.from('injury_pain').insert({
    injury_id: injId, date, source: 'manual',
    before_score:    scores.before   ?? null,
    during_score:    scores.during   ?? null,
    after_score:     scores.after    ?? null,
    day_after_score: scores.dayafter ?? null,
    notes,
  });
  if (error) { toast(t('pain.save_err', { msg: error.message }), 'err'); return; }

  toast(t('pain.manual_saved'));
  _manualScores[injId] = {};
  renderManualPainForms();   // re-render → nullstiller målerne
  closeManualModal();
  await loadKneeTrend();
}

restoreDraft();

// Lagre draft ved endringer i tekstfelt/select
['logDate','logDist','logType','logNotes'].forEach(id => {
  const el = document.getElementById(id);
  if (el) el.addEventListener('input', saveDraft);
  if (el) el.addEventListener('change', saveDraft);
});

// RPE-slider (injiseres i #logRpeHost). renderLogRpe(value) tegner den på nytt.
function renderLogRpe(value = null) {
  const host = document.getElementById('logRpeHost');
  if (!host) return;
  host.innerHTML = rpeSliderHTML('logRpe', value);
  const el = document.getElementById('logRpe');
  if (el) el.addEventListener('change', saveDraft);
}
renderLogRpe();

// ── Runs list ─────────────────────────────────────────────────────────────
function addRun() {
  const dist = document.getElementById('logDist').value;
  const type = document.getElementById('logType').value;
  const time = parseFloat(document.getElementById('logTime').value);
  if (!dist || isNaN(time) || time <= 0) { toast(t('sprint.fill_fields'), 'err'); return; }
  runs.push({ distance: dist, type: type + ':' + _sprintLevel, time });
  document.getElementById('logTime').value = '';
  document.getElementById('logTime').focus();
  renderRuns();
  // ny rad glir inn (li-enter); siste .run-row = den nettopp lagt til
  const rows = document.querySelectorAll('#runsList .run-row');
  rows[rows.length - 1]?.classList.add('li-enter');
  saveDraft();
}

function removeRun(i) {
  const rows = document.querySelectorAll('#runsList .run-row');
  const doRemove = () => { runs.splice(i, 1); renderRuns(); saveDraft(); };
  removeWithCollapse(rows[i], doRemove);
}

function renderRuns() {
  const el = document.getElementById('runsList');
  if (!runs.length) {
    el.innerHTML = `<div style="font-size:11px;font-family:var(--font-mono);color:var(--text-tertiary);padding:6px 2px 10px">${t('sprint.no_runs_yet')}</div>`;
    return;
  }
  el.innerHTML = runs.map((r, i) => `
    <div class="run-row">
      <span class="run-num">${t('sprint.run_num', { n: i + 1 })}</span>
      <span class="run-dist">${escHtml(distLabel(r.distance))}</span>
      <span class="run-time">${r.time.toFixed(2)}s</span>
      <span class="run-type">${escHtml(r.type.split(':')[0])}</span>
      <button class="run-del" onclick="removeRun(${i})" title="${t('delete')}">✕</button>
    </div>`).join('');
}

// ── Distanser (DB-drevet) ───────────────────────────────────────────────────
// Alle distanser kommer fra sprint_records (utvidet i migrasjon 045 med
// color/sort_order/show_pb/show_goal/all_runs_count). _distances driver
// logg-dropdown, PB-board OG mål-seksjonen. Filip kan legge til / slette i UI.
let _distances = [];
const DIST_COLORS = ['#5BA4F5','#6BE3A4','#F2C063','#C792EA','#FF8A80','#80DEEA','#FFB74D'];

function distRow(dist) { return _distances.find(d => d.distance === dist); }

async function loadDistances() {
  const { data, error } = await db.from('sprint_records').select('*').order('sort_order', { ascending: true });
  if (error) { console.error('loadDistances', error); toast(t('err.load_data'), 'err'); return; }
  let rows = (data || []).map(r => ({
    ...r,
    best_time:     r.best_time     != null ? +r.best_time     : null,
    baseline_time: r.baseline_time != null ? +r.baseline_time : null,
    goal_time:     r.goal_time     != null ? +r.goal_time     : null,
    sort_order:    r.sort_order    != null ? +r.sort_order    : 100,
  }));
  // Fallback hvis migrasjon 045 ikke er kjørt ennå (ingen sort_order-kolonne osv.)
  if (!rows.length || rows.every(r => r.show_pb == null && r.show_goal == null)) {
    const seed = {
      '60m':        { show_pb:true,  sort_order:10 },
      '60m_celler': { show_pb:true,  all_runs_count:true, sort_order:20 },
      '100m':       { show_pb:true,  show_goal:true, color:'#5BA4F5', baseline_time:11.52, goal_time:11.10, sort_order:50 },
      '200m':       { show_pb:true,  show_goal:true, color:'#5BA4F5', baseline_time:23.11, goal_time:22.30, sort_order:90 },
    };
    rows = rows.map(r => ({ ...r, ...(seed[r.distance] || { sort_order:100 }) }));
    // legg til seedede distanser som mangler helt
    Object.keys(seed).forEach(d => { if (!rows.some(r => r.distance === d)) rows.push({ distance:d, ...seed[d] }); });
    rows.sort((a,b) => (a.sort_order||100) - (b.sort_order||100));
  }
  _distances = rows;
}

function renderDistOptions() {
  const sel = document.getElementById('logDist');
  if (!sel) return;
  const prev = sel.value;
  sel.innerHTML = _distances.map(d =>
    `<option value="${escHtml(d.distance)}">${escHtml(distLabel(d.distance))}</option>`).join('');
  if (_distances.some(d => d.distance === prev)) sel.value = prev;
  else if (_distances.some(d => d.distance === '100m')) sel.value = '100m';
}

// ── PB Board ──────────────────────────────────────────────────────────────
async function loadPBs() {
  if (!_distances.length) await loadDistances();

  // all_runs_count-distanser (f.eks. 60m_celler): PB = raskeste tid UANSETT type.
  const liveDists = _distances.filter(d => d.all_runs_count).map(d => d.distance);
  const live = {};
  await Promise.all(liveDists.map(async dist => {
    let q = db.from('sprint_log')
      .select('time_seconds,date')
      .eq('distance', dist)
      .not('time_seconds', 'is', null);
    if (dist === '60m_celler') q = q.eq('type', 'Trening');
    const { data } = await q.order('time_seconds', { ascending: true }).limit(1);
    if (data?.length) live[dist] = { best_time: +data[0].time_seconds, date: data[0].date };
  }));

  const byDist = {};
  _distances.forEach(d => {
    byDist[d.distance] = live[d.distance]
      ? { best_time: live[d.distance].best_time, date: live[d.distance].date }
      : { best_time: d.best_time, date: d.date };
  });
  _pbData = byDist;

  const el = document.getElementById('pbGrid');
  el.innerHTML = _distances.filter(d => d.show_pb).map((d, i) => {
    const r = byDist[d.distance];
    const days   = r?.date ? Math.floor((Date.now() - new Date(r.date + 'T12:00:00').getTime()) / 86400000) : null;
    const barClr = days === null ? 'rgba(255,255,255,0.14)' : days < 30 ? '#5BA4F5' : days < 90 ? 'rgba(91,164,245,0.45)' : 'rgba(255,255,255,0.1)';
    const timeHtml = r?.best_time != null
      ? `<span data-countup="${r.best_time}" data-cu-decimals="2">0.00</span>`
      : '–';
    return `<div class="pb-cell" id="pb-${d.distance}" style="--anim-i:${Math.min(i,4)}">
      <div class="pb-dist">${distLabel(d.distance)}</div>
      <div id="pb-display-${d.distance}">
        <div class="pb-time">${timeHtml}</div>
        <div class="pb-date">
          ${r?.date ? `<span class="pb-fresh" style="background:${barClr}"></span>${fmtDate(r.date)}` : '—'}
        </div>
      </div>
    </div>`;
  }).join('');
  staggerIn(el.querySelectorAll('.pb-cell'));
  countUpAll(el);
}

// ── Sprint goals ──────────────────────────────────────────────────────────
async function loadSprintGoals() {
  if (!_distances.length) await loadDistances();
  renderSprintGoals();
}

function renderSprintGoals() {
  const el = document.getElementById('sprintGoals');
  const goals = _distances.filter(d => d.show_goal && d.goal_time != null);
  const rowsHtml = goals.map(d => {
    const goalVal = d.goal_time;
    const pb      = _pbData[d.distance]?.best_time ?? d.best_time ?? d.baseline_time ?? goalVal;
    const start   = d.baseline_time ?? pb;
    const color   = d.color || '#5BA4F5';
    const pct   = Math.min(100, Math.max(0, (start - pb) / (start - goalVal) * 100));
    const delta = pb - goalVal;
    const deltaStr   = delta <= 0 ? t('sprint.goal_reached') : t('sprint.from_goal', { n: delta.toFixed(2) });
    const deltaColor = delta <= 0 ? 'var(--success)' : 'var(--text-tertiary)';
    return `<div class="goal-row">
      <div class="goal-header">
        <span class="goal-name">${escHtml(distLabel(d.distance))}</span>
        <div class="goal-vals">
          PB: <span>${pb.toFixed(2)}s</span>
          &nbsp;·&nbsp; ${t('sprint.goal')}: <span>${goalVal.toFixed(2)}s</span>
          &nbsp;·&nbsp; <span style="color:${deltaColor}">${deltaStr}</span>
        </div>
        <div class="goal-actions">
          <button class="goal-act" onclick="editGoal('${d.distance}')"
            title="${escHtml(t('sprint.edit_goal'))}" aria-label="${escHtml(t('sprint.edit_goal'))}">✎</button>
          <button class="goal-act" onclick="resetBaseline('${d.distance}')"
            title="${escHtml(t('sprint.reset_baseline'))}" aria-label="${escHtml(t('sprint.reset_baseline'))}">↺</button>
          <button class="goal-act goal-act--danger" onclick="deleteDistance('${d.distance}')"
            title="${escHtml(t('sprint.dist_delete'))}" aria-label="${escHtml(t('sprint.dist_delete'))}">✕</button>
        </div>
      </div>
      <div id="goal-edit-${d.distance}" style="display:none" class="pb-edit-wrap">
        <input class="pb-edit-inp" id="goal-inp-${d.distance}" type="number" step="0.01" min="0.01" placeholder="sek" data-i18n-placeholder="unit.sec" value="${goalVal.toFixed(2)}">
        <div class="pb-edit-actions">
          <button class="btn btn-primary btn-sm" style="flex:1;font-size:10px" onclick="saveGoal('${d.distance}')">${t('save')}</button>
          <button class="btn btn-ghost btn-sm" style="flex:1;font-size:10px" onclick="cancelGoalEdit('${d.distance}')">${t('cancel')}</button>
        </div>
      </div>
      <div class="goal-bar-bg">
        <div class="goal-bar-fill" style="width:${pct.toFixed(1)}%;background:${color}"></div>
      </div>
    </div>`;
  }).join('');

  const addBtn = `<button class="btn btn-ghost btn-sm" style="margin-top:8px" onclick="toggleAddDistance()" data-i18n="sprint.dist_add">+ Legg til distanse</button>
    <div id="addDistWrap" style="display:none" class="pb-edit-wrap" data-state="closed">
      <input class="pb-edit-inp" id="addDistName" type="text" placeholder="${escHtml(t('sprint.dist_name_ph'))}">
      <input class="pb-edit-inp" id="addDistGoal" type="number" step="0.01" min="0.01" placeholder="${escHtml(t('sprint.dist_goal_ph'))}">
      <input class="pb-edit-inp" id="addDistStart" type="number" step="0.01" min="0.01" placeholder="${escHtml(t('sprint.dist_start_ph'))}">
      <div class="pb-edit-actions">
        <button class="btn btn-primary btn-sm" style="flex:1;font-size:10px" onclick="addDistance()">${t('save')}</button>
        <button class="btn btn-ghost btn-sm" style="flex:1;font-size:10px" onclick="toggleAddDistance()">${t('cancel')}</button>
      </div>
    </div>`;

  el.innerHTML = (rowsHtml || `<div style="font-size:11px;color:var(--text-tertiary);padding:2px 0 8px">${t('sprint.dist_none')}</div>`) + addBtn;
}

async function resetBaseline(dist) {
  const pb = _pbData[dist]?.best_time ?? distRow(dist)?.best_time;
  if (pb == null) return;
  const { error } = await db.from('sprint_records').upsert({ distance: dist, baseline_time: pb }, { onConflict: 'distance' });
  if (error) { toast(error.message, 'err'); return; }
  const row = distRow(dist); if (row) row.baseline_time = pb;
  renderSprintGoals();
  toast(t('sprint.baseline_reset', { time: pb.toFixed(2) }));
}

function editGoal(dist)       { document.getElementById(`goal-edit-${dist}`).style.display = ''; }
function cancelGoalEdit(dist) { document.getElementById(`goal-edit-${dist}`).style.display = 'none'; }

async function saveGoal(dist) {
  const v = parseFloat(document.getElementById(`goal-inp-${dist}`).value);
  if (!v || v <= 0 || isNaN(v)) { toast(t('sprint.goal_invalid'), 'err'); return; }
  const { error } = await db.from('sprint_records').upsert({ distance: dist, goal_time: v, show_goal: true }, { onConflict: 'distance' });
  if (error) {
    toast(/goal_time/.test(error.message) ? t('sprint.goal_col_missing') : error.message, 'err');
    return;
  }
  const row = distRow(dist); if (row) { row.goal_time = v; row.show_goal = true; }
  renderSprintGoals();
  toast(t('sprint.goal_saved', { time: v.toFixed(2) }));
}

// ── Legg til / slett distanse ────────────────────────────────────────────────
function toggleAddDistance() {
  const w = document.getElementById('addDistWrap');
  if (w) w.style.display = w.style.display === 'none' ? '' : 'none';
}

async function addDistance() {
  const raw = (document.getElementById('addDistName').value || '').trim();
  if (!raw) { toast(t('sprint.dist_name_req'), 'err'); return; }
  // normaliser: "300" → "300m", behold koder som 60m_celler
  const dist = /^\d+$/.test(raw) ? raw + 'm' : raw;
  if (_distances.some(d => d.distance.toLowerCase() === dist.toLowerCase())) {
    toast(t('sprint.dist_exists', { d: dist }), 'err'); return;
  }
  const goal  = parseFloat(document.getElementById('addDistGoal').value);
  const start = parseFloat(document.getElementById('addDistStart').value);
  if (!goal || goal <= 0) { toast(t('sprint.dist_goal_req'), 'err'); return; }
  const sort  = Math.max(0, ..._distances.map(d => d.sort_order || 0)) + 10;
  const color = DIST_COLORS[_distances.filter(d => d.show_goal).length % DIST_COLORS.length];
  const row = {
    distance: dist, sort_order: sort, show_pb: true, show_goal: true,
    all_runs_count: false, color,
    goal_time: goal,
    baseline_time: (start && start > 0) ? start : goal,
  };
  const { error } = await db.from('sprint_records').upsert(row, { onConflict: 'distance' });
  if (error) { toast(error.message, 'err'); return; }
  await loadDistances();
  renderDistOptions();
  await loadPBs();
  renderSprintGoals();
  toast(t('sprint.dist_added', { d: distLabel(dist) }));
}

async function deleteDistance(dist) {
  if (!confirm(t('sprint.dist_del_confirm', { d: distLabel(dist) }))) return;
  const { error } = await db.from('sprint_records').delete().eq('distance', dist);
  if (error) { toast(error.message, 'err'); return; }
  await loadDistances();
  renderDistOptions();
  await loadPBs();
  renderSprintGoals();
  toast(t('sprint.dist_deleted', { d: distLabel(dist) }));
}

// ── Log session ───────────────────────────────────────────────────────────
async function logSession() {
  if (_isSavingLog) return;
  if (!runs.length) { toast(t('sprint.add_first'), 'err'); return; }
  _isSavingLog = true;
  const btn = document.getElementById('sprintSaveBtn');
  if (btn) btn.disabled = true;
  try {
    const date  = document.getElementById('logDate').value || today();
    const rpe   = rpeValue('logRpe');
    const notes = document.getElementById('logNotes').value.trim();
    // sRPE: øktvarighet (samme verdi på alle løp den økta — grupperes per dato ved lesing)
    const durRaw = document.getElementById('logDuration')?.value;
    const duration_min = (durRaw === '' || durRaw == null) ? null : Math.round(Number(durRaw));

    const inserts = runs.map(r => ({
      date, distance: r.distance, type: r.type, time_seconds: r.time,
      rpe, notes, duration_min,
    }));

    // session_type er visningstekst → bruk distLabel, aldri rå koder
    const distList   = [...new Set(runs.map(r => distLabel(r.distance)))].join('/');
    const sessionType = `Sprint ${distList} ${runs[0].type.split(':')[0]}`;

    const logRes = await db.from('sprint_log').insert(inserts).select();
    if (logRes.error) { toast(t('sprint.save_error', {msg: logRes.error.message}), 'err'); return; }

    // Skriv injury_pain for alle alvorlige skader
    const injRows = _severeInjuries
      .map(inj => {
        const s = _injuryScores[inj.id] || {};
        if (Object.values(s).every(v => v == null)) return null;
        return {
          injury_id: inj.id, date, session_type: sessionType, source: 'sprint',
          before_score: s.before ?? null, during_score: s.during ?? null,
          after_score: s.after ?? null, day_after_score: s.dayafter ?? null, notes,
        };
      })
      .filter(Boolean);
    if (injRows.length) {
      const ipRes = await db.from('injury_pain').insert(injRows);
      if (ipRes.error) toast(t('pain.save_err', { msg: ipRes.error.message }), 'err');
    }

    // Check / update PB — kun Stevne teller, UNNTATT distanser med all_runs_count
    // (f.eks. 60m_celler) der ALT teller (trening + stevne), raskeste vinner.
    const newPBs = [];
    for (const r of runs) {
      if (r.distance === '60m_flying') continue;
      const baseType = r.type.split(':')[0];
      const allRuns  = !!distRow(r.distance)?.all_runs_count;
      const countsForPB = allRuns ? true : baseType === 'Stevne';
      if (!countsForPB) continue;
      const { data: rec } = await db.from('sprint_records')
        .select('best_time').eq('distance', r.distance).maybeSingle();
      if (!rec || rec.best_time == null || r.time < rec.best_time) {
        await db.from('sprint_records').upsert(
          { distance: r.distance, best_time: r.time, date },
          { onConflict: 'distance' }
        );
        newPBs.push(`${r.distance} ${r.time.toFixed(2)}s`);
        const cell = document.getElementById(`pb-${r.distance}`);
        if (cell) { cell.classList.add('pb-pulse'); setTimeout(() => cell.classList.remove('pb-pulse'), 600); }
      }
    }

    toast(newPBs.length ? t('sprint.new_pb', {pbs: newPBs.join(', ')}) : t('sprint.runs_saved', {n: runs.length}));
    clearDraft();

    // Reset
    runs = [];
    renderRuns();
    renderLogRpe();
    document.getElementById('logNotes').value = '';
    _severeInjuries.forEach(inj => {
      _injuryScores[inj.id] = { before: null, during: null, after: null, dayafter: null };
    });
    renderInjuryPainBlocks('injuryPainBlocks');

    await loadDistances();
    renderDistOptions();
    await Promise.all([loadPBs(), loadSprintGoals(), loadHistory()]);
  } finally {
    _isSavingLog = false;
    if (btn) btn.disabled = false;
  }
}

// ── History ───────────────────────────────────────────────────────────────
async function loadHistory() {
  const { data, error } = await db.from('sprint_log').select('*')
    .order('date', { ascending: false })
    .limit(60);
  sprintLog = data || [];
  // Per-skade smerte (injury_pain er kilde-til-sannhet) for de viste datoene.
  _histInjuryPain = {};
  try {
    const dates = [...new Set(sprintLog.map(r => r.date))];
    if (dates.length && _severeInjuries.length) {
      const { data: ipRows } = await db.from('injury_pain').select('*').in('date', dates);
      (ipRows || []).forEach(r => {
        const key = `${r.injury_id}|${r.date}`;
        if (!_histInjuryPain[key] || (r.created_at || '') > (_histInjuryPain[key].created_at || ''))
          _histInjuryPain[key] = r;
      });
    }
  } catch (e) { /* injury_pain er tillegg — sprint_log.knee_* dekker gammel historikk */ }
  renderHistory();
  await loadKneeTrend();
}

let _openDetail = null;

function _painColorClass(s) {
  if (s == null) return '';
  if (s <= 3) return 'pain-low';
  if (s <= 6) return 'pain-mid';
  return 'pain-high';
}

function _buildSessCard(date, runs, isOpen) {
  const rpe          = runs.find(r => r.rpe           != null)?.rpe;
  const duration_min = runs.find(r => r.duration_min  != null)?.duration_min;
  const kneeBefore   = runs.find(r => r.knee_before   != null)?.knee_before;
  const kneeDuring   = runs.find(r => r.knee_during   != null)?.knee_during;
  const kneeAfter    = runs.find(r => r.knee_after    != null)?.knee_after;
  const kneeDayAfter = runs.find(r => r.knee_day_after != null)?.knee_day_after;
  const notes        = runs.find(r => r.notes)?.notes;

  const runRows = runs.map(r => `
    <div class="history-row">
      <span class="history-dist">${escHtml(distLabel(r.distance))}</span>
      <span class="history-time">${r.time_seconds != null ? (+r.time_seconds).toFixed(2) + 's' : '–'}</span>
      <span class="history-type">${escHtml((r.type || '').split(':')[0])}</span>
    </div>`).join('');

  // Legacy kne-verdier fra sprint_log.knee_* (fallback for kne-skaden / ingen skader).
  const kneeLegacy = { before_score: kneeBefore, during_score: kneeDuring,
                       after_score: kneeAfter, day_after_score: kneeDayAfter };
  const distList = [...new Set(runs.map(r => distLabel(r.distance)))].join('/');
  const sessType = `Sprint ${distList}`.trim();
  const _histRowSp = inj => _histInjuryPain[`${inj.id}|${date}`] || (_isKneeInjury(inj) ? kneeLegacy : null);

  // Gym-stil skade-chips med d.etter-advarsel
  function _sprintPainSummary() {
    const INJ_COLORS = ['#FF6B6B', '#FFB347', '#9B59B6', '#3498DB', '#E91E63'];
    const isPast = date < today();
    if (_severeInjuries.length) {
      const chips = _severeInjuries.map((inj, idx) => {
        const injStart = (inj.start_date || inj.created_at || '').slice(0,10);
        if (injStart && injStart > date) return '';
        const row = _histRowSp(inj);
        const missingDayAfter = isPast && (!row || row.day_after_score == null);
        const phases = row ? [
          { l: t('knee.before_short'),   v: row.before_score },
          { l: t('knee.during_short'),   v: row.during_score },
          { l: t('knee.after_short'),    v: row.after_score },
          { l: t('knee.dayafter_short'), v: row.day_after_score },
        ].filter(p => p.v != null) : [];
        if (!phases.length && !missingDayAfter) return '';
        const col = INJ_COLORS[idx % INJ_COLORS.length];
        return `<span class="sess-inj${missingDayAfter ? ' sess-inj-warn' : ''}" style="--inj:${col}">
          <span class="sess-inj-name">${escHtml(bodyPartName(inj))}</span>${
          phases.map(p => `<span class="sess-inj-ph">${p.l}<b class="${_painColorClass(p.v)}">${p.v}</b></span>`).join('')
        }${missingDayAfter ? `<span class="sess-inj-ph" style="opacity:0.6;font-style:italic">${t('knee.dayafter_short')} ?</span>` : ''}</span>`;
      }).filter(Boolean);
      return chips.length ? `<div class="gym-hist-injs">${chips.join('')}</div>` : '';
    } else {
      const missingDayAfter = isPast && kneeDayAfter == null;
      const vals = [kneeBefore, kneeDuring, kneeAfter, kneeDayAfter];
      if (vals.every(v => v == null) && !missingDayAfter) return '';
      const phases = [
        { l: t('knee.before_short'),   v: kneeBefore },
        { l: t('knee.during_short'),   v: kneeDuring },
        { l: t('knee.after_short'),    v: kneeAfter },
        { l: t('knee.dayafter_short'), v: kneeDayAfter },
      ].filter(p => p.v != null);
      return `<div class="gym-hist-injs"><span class="sess-inj${missingDayAfter ? ' sess-inj-warn' : ''}" style="--inj:#FF6B6B">
        <span class="sess-inj-name">${t('knee.pain')}</span>${
        phases.map(p => `<span class="sess-inj-ph">${p.l}<b class="${_painColorClass(p.v)}">${p.v}</b></span>`).join('')
      }${missingDayAfter ? `<span class="sess-inj-ph" style="opacity:0.6;font-style:italic">${t('knee.dayafter_short')} ?</span>` : ''}</span></div>`;
    }
  }

  const volTxt = t('sprint.runs_count', { n: runs.length });
  const card = `<div class="sess-card${isOpen ? ' expanded' : ''}" id="sess-card-${date}"
    onclick="toggleSprintDetail('${date}')" style="--cat:var(--accent-blue)">
    <div class="sess-hdr">
      <div class="sess-hdr-body">
        <div class="sess-type">${escHtml(sessType)}</div>
        <div class="sess-info-row">
          <span class="sess-vol-txt">${escHtml(volTxt)}</span>
          ${rpe != null ? `<span class="sess-rir-badge">RPE ${rpe}</span>` : ''}
          <span class="sess-dur-wrap" onclick="event.stopPropagation()">
            <input class="sess-dur-input" type="number" min="1" max="600"
              value="${duration_min ?? ''}" placeholder="—"
              onblur="saveHistField('${date}','duration_min',this.value)"
              onkeydown="if(event.key==='Enter')this.blur()">
            <span>min</span>
          </span>
        </div>
        ${_sprintPainSummary()}
        ${renderNoteBlock(notes)}
      </div>
      <span class="sess-caret">›</span>
    </div>
  </div>`;

  const d       = new Date(date + 'T12:00:00');
  const dateStr = d.toLocaleDateString(fmtLocale(), { weekday:'long', day:'numeric', month:'long', year:'numeric' });

  const detail = isOpen ? `<div class="sess-detail open" id="sess-detail-${date}" onclick="event.stopPropagation()">
    <div class="sess-detail-hd">
      <div class="sdh-left">
        <span class="sdh-dot" style="background:var(--accent-blue)"></span>
        <div>
          <div class="sdh-title">${escHtml(sessType)}</div>
          <div class="sdh-meta">${dateStr} · ${escHtml(volTxt)}</div>
        </div>
      </div>
      <button class="sess-detail-close" onclick="event.stopPropagation();toggleSprintDetail('${date}')" title="${t('close')}">✕</button>
    </div>
    <div class="gsx-grid">
      <div class="gsx-col">
        <div class="gsx-sec-block">
          <div class="gsx-sec-lbl">${t('sprint.runs')}</div>
          ${runRows}
        </div>
        <div class="gsx-sec-block" style="margin-top:10px">
          <div class="gsx-sec-lbl">RPE / ${t('tp.duration')}</div>
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
            <input type="number" min="1" max="100" class="sess-edit-input" style="max-width:60px"
              value="${rpe ?? ''}" placeholder="–"
              onblur="saveHistField('${date}','rpe',this.value)"
              onkeydown="if(event.key==='Enter')this.blur()">
            <span style="font-size:10px;font-family:var(--font-mono);color:var(--text-tertiary)">RPE</span>
            <input type="number" min="1" max="600" class="sess-edit-input" style="max-width:60px"
              value="${duration_min ?? ''}" placeholder="–"
              onblur="saveHistField('${date}','duration_min',this.value)"
              onkeydown="if(event.key==='Enter')this.blur()">
            <span style="font-size:10px;font-family:var(--font-mono);color:var(--text-tertiary)">min</span>
          </div>
        </div>
      </div>
      <div class="gsx-col">
        <div class="gsx-sec-block">
          <div class="gsx-sec-lbl">${t('knee.pain')}</div>
          ${_severeInjuries.length ? _severeInjuries.map(inj => {
            const row = _histRowSp(inj);
            return `<div style="margin-bottom:10px">
              <div class="he-inj-name">${escHtml(bodyPartName(inj))}</div>
              ${[[t('knee.before'),'before_score',row?.before_score],[t('knee.during'),'during_score',row?.during_score],[t('knee.after'),'after_score',row?.after_score],[t('tp.knee_dayafter'),'day_after_score',row?.day_after_score]].map(([lbl,field,val]) =>
                painMeterHTML(`sphm-${inj.id}-${field}`, (val != null ? val : null),
                  { label: lbl, onset: `saveHistInjuryPain('${inj.id}','${date}','${escHtml(sessType)}','${field}',$v)` })
              ).join('')}
            </div>`;
          }).join('') : [[t('knee.before'),'knee_before',kneeBefore],[t('knee.during'),'knee_during',kneeDuring],[t('knee.after'),'knee_after',kneeAfter],[t('tp.knee_dayafter'),'knee_day_after',kneeDayAfter]].map(([lbl,field,val]) =>
            painMeterHTML(`sphm-_knee-${field}`, (val != null ? val : null),
              { label: lbl, onset: `saveHistField('${date}','${field}',$v)` })
          ).join('')}
        </div>
      </div>
    </div>
    <div style="padding:10px 14px 0">
      <div class="gsx-sec-lbl" style="margin-bottom:5px">${t('notes')}</div>
      <textarea class="sess-edit-textarea"
        onblur="saveHistField('${date}','notes',this.value)"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();this.blur()}"
      >${notes ? escHtml(notes) : ''}</textarea>
    </div>
    <div class="sess-detail-footer" style="justify-content:flex-end">
      <button class="sess-detail-del" onclick="event.stopPropagation();deleteSprintDate('${date}')">${t('sprint.delete_session')}</button>
    </div>
  </div>` : `<div class="sess-detail" id="sess-detail-${date}"></div>`;

  return card + detail;
}

let _historyCollapsed = true;

function renderHistory() {
  const el = document.getElementById('historyList');
  if (!sprintLog.length) { el.innerHTML = `<div class="empty">${t('sprint.no_sessions')}</div>`; return; }

  const groups = new Map();
  for (const s of sprintLog) {
    if (!groups.has(s.date)) groups.set(s.date, []);
    groups.get(s.date).push(s);
  }

  const grpHtmls = [...groups.entries()].map(([date, runs]) => {
    const d       = new Date(date + 'T12:00:00');
    const dateStr = d.toLocaleDateString(fmtLocale(), { weekday:'long', day:'numeric', month:'long' });
    return `<div class="hist-date-group">
      <div class="hist-date-label">${dateStr}</div>
      <div class="hist-sessions">${_buildSessCard(date, runs, _openDetail === date)}</div>
    </div>`;
  });

  const olderHtml = grpHtmls.length > 1
    ? `<div id="histOlderSessions" style="${_historyCollapsed ? 'display:none' : ''}">${grpHtmls.slice(1).join('')}</div>`
    : '';
  el.innerHTML = (grpHtmls[0] || '') + olderHtml;

  const btn = document.getElementById('histToggleBtn');
  if (btn) btn.style.display = grpHtmls.length > 1 ? '' : 'none';
}

function toggleHistory() {
  _historyCollapsed = !_historyCollapsed;
  const older = document.getElementById('histOlderSessions');
  const btn   = document.getElementById('histToggleBtn');
  if (older) older.style.display = _historyCollapsed ? 'none' : '';
  if (btn)   btn.textContent = _historyCollapsed ? '∨' : '∧';
}

function toggleSprintDetail(date) {
  _openDetail = _openDetail === date ? null : date;
  renderHistory();
}

async function saveHistField(date, field, valueStr) {
  // valueStr kommer enten som streng (fra tekstfelt) eller number/null (fra
  // painMeterHTML sin painMeterValue(id) — null = eksplisitt fjernet).
  let value;
  const s = String(valueStr ?? '').trim();
  if (field === 'notes') {
    value = s || null;
  } else {
    if (s === '') { value = null; }
    else {
      const n = Number(s);
      if (isNaN(n)) { toast(t('sprint.invalid'), 'err'); return; }
      if (field === 'rpe' && (n < 1 || n > 100)) { toast(t('sprint.rpe_range'), 'err'); return; }
      if (field === 'duration_min' && (n < 1 || n > 600)) { toast(t('sprint.invalid'), 'err'); return; }
      if (!['rpe','duration_min'].includes(field) && (n < 0 || n > 10)) { toast(t('sprint.pain_range'), 'err'); return; }
      value = n;
    }
  }
  const ids = sprintLog.filter(r => r.date === date).map(r => r.id);
  if (!ids.length) return;
  // DEPRECATED (P6): sprint_log.knee_* columns — keep editable until DROP migration
  const kneeFields = ['knee_before','knee_during','knee_after','knee_day_after'];
  if (kneeFields.includes(field) && ids.length > 1 && value !== null) {
    toast(t('sprint.updating', {n: ids.length}), 'ok');
  }
  const { error } = await db.from('sprint_log').update({ [field]: value }).in('id', ids);
  if (error) { toast(t('sprint.save_fail'), 'err'); return; }
  sprintLog.filter(r => r.date === date).forEach(r => { r[field] = value; });
  refreshHistCard(date);
  if (['knee_before','knee_during','knee_after','knee_day_after'].includes(field)) {
    loadKneeTrend();
  }
}

// Per-skade smerte-redigering i historikk → injury_pain (kne-skaden faller tilbake
// til sprint_log.knee_* ved første redigering hvis ingen injury_pain-rad finnes).
async function saveHistInjuryPain(injId, date, sessionType, field, valueStr) {
  // valueStr kommer enten som streng (fra tekstfelt) eller number/null (fra
  // painMeterHTML sin painMeterValue(id) — null = eksplisitt fjernet).
  const s = String(valueStr ?? '').trim();
  let numVal;
  if (s === '') numVal = null;
  else {
    const n = Number(s);
    if (isNaN(n) || n < 0 || n > 10) { toast(t('sprint.pain_range'), 'err'); return; }
    numVal = n;
  }
  const key = `${injId}|${date}`;
  const existing = _histInjuryPain[key];
  if (existing) {
    const { error } = await db.from('injury_pain').update({ [field]: numVal }).eq('id', existing.id);
    if (error) { toast(t('sprint.save_fail'), 'err'); return; }
    _histInjuryPain[key][field] = numVal;
  } else {
    const { data, error } = await db.from('injury_pain').insert({
      injury_id: injId, date, session_type: sessionType, source: 'sprint', [field]: numVal,
    }).select().single();
    if (error) { toast(t('sprint.save_fail'), 'err'); return; }
    if (data) _histInjuryPain[key] = data;
  }
  refreshHistCard(date);
}

function refreshHistCard(date) {
  const runs = sprintLog.filter(r => r.date === date);
  const container = document.querySelector(`#sess-card-${date}`)?.closest('.hist-sessions');
  if (!container) return;
  container.innerHTML = _buildSessCard(date, runs, _openDetail === date);
}

// Re-beregn PB fra gjenværende stevne-løp etter sletting. Uten dette ble en
// feillogget rask tid hengende som PB selv om løpet ble slettet i øktloggen.
// Regel (samme som ved logging): kun type 'Stevne' teller. all_runs_count-distanser
// (f.eks. 60m_celler) beregnes live i loadPBs() (alt teller der), 60m_flying er ikke en PB-distanse.
async function recomputeSprintPBs(distances) {
  for (const dist of [...new Set(distances)]) {
    if (dist === '60m_flying' || distRow(dist)?.all_runs_count) continue;
    const { data } = await db.from('sprint_log')
      .select('time_seconds,date,type').eq('distance', dist).not('time_seconds', 'is', null);
    const stevne = (data || []).filter(r => String(r.type || '').split(':')[0] === 'Stevne');
    if (stevne.length) {
      const best = stevne.reduce((a, b) => (b.time_seconds < a.time_seconds ? b : a));
      await db.from('sprint_records').update({ best_time: best.time_seconds, date: best.date }).eq('distance', dist);
    } else {
      await db.from('sprint_records').update({ best_time: null, date: null }).eq('distance', dist);
    }
  }
}


async function deleteSprintDate(date) {
  if (!confirm(t('confirm.delete_runs', { date }))) return;
  const dists = sprintLog.filter(r => r.date === date).map(r => r.distance);
  await db.from('sprint_log').delete().eq('date', date);
  // Fjern smerterader denne sprint-økta skapte (source='sprint') så de ikke blir
  // hengende i kne-/skadetrend. Gym- og manuelle smerterader på samme dato røres ikke.
  await db.from('injury_pain').delete().eq('date', date).eq('source', 'sprint');
  Object.keys(_histInjuryPain).forEach(k => { if (k.endsWith('|' + date)) delete _histInjuryPain[k]; });
  await recomputeSprintPBs(dists);
  await loadDistances();
  await Promise.all([loadHistory(), loadPBs(), loadSprintGoals()]);
  toast(t('sprint.deleted'));
}

// ── Smertetrend per skade — injury_pain primær, knee_pain fallback for kne-skaden ──
async function loadKneeTrend() {
  renderTrendInjurySelector();
  // Standardskade: kne hvis registrert, ellers første alvorlige.
  if (_severeInjuries.length && (!_trendInjId || !_severeInjuries.some(i => i.id === _trendInjId))) {
    const knee = _severeInjuries.find(_isKneeInjury);
    _trendInjId = knee ? knee.id : _severeInjuries[0].id;
  }
  // Dedupliser på dato – behold første (nyeste) forekomst per dato, ta 5 unike datoer.
  const dedupByDate = (arr) => {
    const seen = new Set();
    return arr.filter(r => seen.has(r.date) ? false : seen.add(r.date)).slice(0, 5);
  };

  const _kneeFallback = async () => {
    const { data } = await db.from('knee_pain')
      .select('id,date,before_score,during_score,after_score,day_after_score')
      .ilike('session_type', 'Sprint%')
      .order('date', { ascending: false }).limit(25);
    return dedupByDate((data || []).map(r => ({ ...r, _src: 'knee_pain' })));
  };

  let rows = [];
  if (_trendInjId) {
    const { data } = await db.from('injury_pain')
      .select('id,date,before_score,during_score,after_score,day_after_score,session_type')
      .eq('injury_id', _trendInjId)
      .ilike('session_type', 'Sprint%')
      .order('date', { ascending: false }).limit(25);
    rows = dedupByDate((data || []).map(r => ({ ...r, _src: 'injury_pain' })));
    if (!rows.length && _isKneeInjury(_severeInjuries.find(i => i.id === _trendInjId))) {
      rows = await _kneeFallback();   // gammel kne-data uten injury_pain
    }
  } else {
    rows = await _kneeFallback();     // ingen alvorlige skader → legacy
  }
  renderKneeTrend(rows);
}

// Skadevelger over trend-matrisen (kun når det finnes mer enn én alvorlig skade).
function renderTrendInjurySelector() {
  const el = document.getElementById('trendInjPills');
  if (!el) return;
  if (_severeInjuries.length < 2) { el.style.display = 'none'; el.innerHTML = ''; return; }
  el.style.display = 'flex';
  el.innerHTML = _severeInjuries.map(inj => {
    const a = inj.id === _trendInjId;
    return `<button onclick="selectTrendInjury('${inj.id}')" style="padding:4px 11px;border-radius:20px;cursor:pointer;
      font-size:11px;font-family:var(--font-mono);
      border:1px solid ${a ? 'rgba(255,255,255,0.16)' : 'rgba(255,255,255,0.09)'};
      background:${a ? 'rgba(255,255,255,0.08)' : 'transparent'};
      color:${a ? 'var(--text-primary)' : 'var(--text-tertiary)'}">${escHtml(bodyPartName(inj))}</button>`;
  }).join('');
}
function selectTrendInjury(injId) {
  _trendInjId = injId;
  closeKneeEdit();
  loadKneeTrend();
}

let _kneeTrendData = [];
let _editingKneeIdx = null;
let _trendInjId = null;   // valgt skade i smertetrend-panelet

function fmtDateShort(ds) {
  const d = new Date(ds + 'T12:00:00');
  return String(d.getDate()).padStart(2,'0') + '.' + String(d.getMonth()+1).padStart(2,'0');
}

function renderKneeTrend(data) {
  _kneeTrendData = data;
  const el = document.getElementById('kneeTrend');
  if (!data.length) { el.innerHTML = `<div class="empty">${t('sprint.no_data_yet')}</div>`; return; }

  const phases = [
    { key: 'before_score',    label: t('knee.before') },
    { key: 'during_score',    label: t('knee.during') },
    { key: 'after_score',     label: t('knee.after') },
    { key: 'day_after_score', label: t('knee.dayafter') },
  ];

  function painClr(v) {
    if (v === null || v === undefined) return 'rgba(255,255,255,0.08)';
    if (v <= 3) return '#6BE3A4'; if (v <= 5) return '#F2C063';
    if (v <= 7) return 'rgba(242,130,60,1)'; return '#FF6B6B';
  }

  el.innerHTML = `<div style="overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px">
    <div style="display:flex;gap:6px;margin-bottom:6px;align-items:flex-end">
      <div style="width:90px;flex-shrink:0"></div>
      <div style="display:flex;gap:4px;flex:1">
        ${data.map((d, i) => `
          <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px">
            <div style="font-size:12px;font-family:var(--font-mono);color:var(--text-secondary);
              font-weight:600;white-space:nowrap">${window.innerWidth <= 768 ? fmtDateShort(d.date) : fmtDate(d.date)}</div>
            <button onclick="openKneeEdit(${i})" title="${t('edit')}" style="background:none;border:none;
              color:var(--text-tertiary);cursor:pointer;font-size:11px;padding:1px 4px;line-height:1;
              opacity:0.6;transition:opacity 0.15s" onmouseover="this.style.opacity=1"
              onmouseout="this.style.opacity=0.6">✎</button>
          </div>`).join('')}
      </div>
    </div>
    ${phases.map(ph => `
      <div class="trend-row">
        <span class="trend-label-sm">${ph.label}</span>
        <div style="display:flex;gap:4px;flex:1">
          ${data.map(d => {
            const v = d[ph.key];
            return `<div style="flex:1;height:28px;border-radius:4px;background:${painClr(v)};
              display:flex;align-items:center;justify-content:center;font-size:11px;
              font-family:var(--font-mono);color:${v !== null ? '#050506' : 'var(--text-tertiary)'}">
              ${v ?? '–'}</div>`;
          }).join('')}
        </div>
      </div>`).join('')}</div>`;
}

function openKneeEdit(idx) {
  _editingKneeIdx = idx;
  const d = _kneeTrendData[idx];
  document.getElementById('kneeEditDate').textContent = fmtDate(d.date);
  document.getElementById('kneeEditMeters').innerHTML =
      painMeterHTML('kem-before',   (d.before_score    != null ? d.before_score    : null), { label: t('knee.before') })
    + painMeterHTML('kem-during',   (d.during_score    != null ? d.during_score    : null), { label: t('knee.during') })
    + painMeterHTML('kem-after',    (d.after_score     != null ? d.after_score     : null), { label: t('knee.after') })
    + painMeterHTML('kem-dayafter', (d.day_after_score != null ? d.day_after_score : null), { label: t('tp.knee_dayafter') });
  document.getElementById('kneeEditPanel').style.display = 'block';
}

function closeKneeEdit() {
  _editingKneeIdx = null;
  document.getElementById('kneeEditPanel').style.display = 'none';
}

// Redigerer trend-cellen i kildetabellen den kom fra (injury_pain, ellers legacy knee_pain).
async function saveKneeInline() {
  if (_editingKneeIdx === null) return;
  const d = _kneeTrendData[_editingKneeIdx];

  const table = d._src === 'injury_pain' ? 'injury_pain' : 'knee_pain';
  const { error } = await db.from(table).update({
    before_score:    painMeterValue('kem-before'),
    during_score:    painMeterValue('kem-during'),
    after_score:     painMeterValue('kem-after'),
    day_after_score: painMeterValue('kem-dayafter'),
  }).eq('id', d.id);

  if (error) { toast(t('sprint.knee_save_error', {msg: error.message}), 'err'); return; }
  closeKneeEdit();
  await loadKneeTrend();
  toast(t('sprint.knee_updated'));
}
