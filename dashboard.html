<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="icon" href="/favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="/favicon.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#050506">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Dashboard">
  <title>Dashboard</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* ── Hero ── */
    .page { max-width: 1280px; gap: 24px; }
    .nav-inner { max-width: 1280px; }
    /* Topp (hero/status/graf) full bredde; nederste moduler tilbake til designbredde så de ikke strekkes */
    .dash-lower { display: flex; flex-direction: column; gap: 24px; width: 100%; max-width: 1180px; margin-inline: auto; }
    .dash-hero {
      display: flex; justify-content: space-between; align-items: flex-end; gap: 12px;
      padding-bottom: 4px;
    }
    .dash-title {
      font-size: 26px; font-weight: 700; letter-spacing: -0.03em;
      background: linear-gradient(135deg, #fff 0%, #c8c5be 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 5px;
    }
    .dash-tagline {
      font-size: 10px; font-family: var(--font-mono); letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--text-tertiary);
    }
    .dash-tagline .tg-sep { color: rgba(255,255,255,0.25); padding: 0 4px; }
    .dash-date {
      font-size: 10px; font-family: var(--font-mono); color: var(--text-tertiary);
      letter-spacing: 0.06em; text-align: right; flex-shrink: 0; padding-bottom: 2px;
      white-space: nowrap;
    }

    /* ── OS Section label ── */
    .os-label {
      display: flex; align-items: center; gap: 9px;
      margin-bottom: 10px; margin-top: 6px;
    }
    .os-label-dot {
      width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0;
      background: rgba(91,164,245,0.65);
      box-shadow: 0 0 7px rgba(91,164,245,0.45);
    }
    .os-label-text {
      font-size: 9px; font-family: var(--font-mono); letter-spacing: 0.22em;
      text-transform: uppercase; color: var(--text-tertiary); white-space: nowrap;
    }
    .os-label-line {
      flex: 1; height: 1px;
      background: linear-gradient(to right, rgba(255,255,255,0.07), transparent);
    }

    /* ── Status row (3 cols) ── */
    .status-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
    @media (max-width: 768px) { .status-row { grid-template-columns: 1fr; } }

    /* ── I dag: prioritetsband (Gjøremål stor + Søvn/økt stablet) ── */
    .dash-primary { display: grid; grid-template-columns: 1.35fr 1fr; gap: 14px; align-items: stretch; }
    .dash-primary-side { display: flex; flex-direction: column; gap: 14px; }
    .card-tasks { display: flex; flex-direction: column; }
    .card-tasks #importantTodos { flex: 1; }
    @media (max-width: 860px) { .dash-primary { grid-template-columns: 1fr; } }

    /* ── Status: Skader + Dagens fokus ── */
    .status2-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; align-items: start; }
    @media (max-width: 768px) { .status2-grid { grid-template-columns: 1fr; } }

    /* Card borders & accents */
    .card { border: 1px solid rgba(255,255,255,0.06); transition: border-color 0.2s, box-shadow 0.2s; }
    .card:hover { box-shadow: 0 4px 32px rgba(0,0,0,0.28); }
    .card-sleep   { border-top-color: rgba(91,164,245,0.28) !important; border-top-width: 2px !important; }
    .card-knee    { border-top-color: rgba(255,107,107,0.22) !important; border-top-width: 2px !important; }
    .card-session { border-top-color: rgba(91,164,245,0.28) !important;  border-top-width: 2px !important; }
    .card-tasks   { border-top-color: rgba(91,164,245,0.45) !important; border-top-width: 2px !important; }

    /* ══════════════════════════════════════════════════════════════
       SØVNKORT v2 — Readiness-first
    ══════════════════════════════════════════════════════════════ */
    .sc-wrap { display: flex; flex-direction: column; gap: 12px; }

    /* ── Hero row: big ring + readiness verdict ── */
    .sc-hero { display: flex; align-items: center; gap: 16px; }

    /* Ring */
    .sc-ring-col { display: flex; flex-direction: column; align-items: center; gap: 6px; flex-shrink: 0; }
    .sc-ring-wrap { position: relative; width: 92px; height: 92px; }
    .sc-ring-wrap svg { width: 92px; height: 92px; display: block; }
    .sc-ring-center {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 0;
    }
    .sc-score {
      font-size: 32px; font-weight: 800; font-family: var(--font-mono);
      letter-spacing: -0.04em; line-height: 1;
    }
    .sc-score-sub {
      font-size: 7px; font-family: var(--font-mono); color: var(--text-tertiary);
      letter-spacing: 0.1em; text-transform: uppercase; margin-top: 2px;
    }

    /* Verdict block — right of ring */
    .sc-verdict { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 5px; }
    .sc-verdict-label {
      font-size: 8px; font-family: var(--font-mono); letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--text-tertiary);
    }
    .sc-verdict-status {
      font-size: 15px; font-weight: 700; line-height: 1.2; color: var(--text-primary);
    }
    .sc-verdict-status.v-green { color: #6BE3A4; }
    .sc-verdict-status.v-yellow { color: #5BA4F5; }
    .sc-verdict-status.v-red { color: #FF8A8A; }

    /* Training recommendation pills */
    .sc-rec-row { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 2px; }
    .sc-rec-pill {
      font-size: 8.5px; font-family: var(--font-mono); letter-spacing: 0.07em;
      text-transform: uppercase; padding: 2px 7px; border-radius: 4px;
      display: flex; align-items: center; gap: 4px;
    }
    .sc-rec-pill .rp-label { color: var(--text-tertiary); }
    .sc-rec-pill .rp-val { font-weight: 700; }
    .sc-rec-pill.rp-green { background: rgba(107,227,164,0.07); border: 1px solid rgba(107,227,164,0.18); }
    .sc-rec-pill.rp-green .rp-val { color: #6BE3A4; }
    .sc-rec-pill.rp-yellow { background: rgba(91,164,245,0.07); border: 1px solid rgba(91,164,245,0.18); }
    .sc-rec-pill.rp-yellow .rp-val { color: #5BA4F5; }
    .sc-rec-pill.rp-red { background: rgba(255,107,107,0.07); border: 1px solid rgba(255,107,107,0.18); }
    .sc-rec-pill.rp-red .rp-val { color: #FF8A8A; }
    .sc-rec-pill.rp-blue { background: rgba(91,164,245,0.07); border: 1px solid rgba(91,164,245,0.18); }
    .sc-rec-pill.rp-blue .rp-val { color: #5BA4F5; }

    /* Age badge */
    .sc-age {
      font-size: 9px; font-family: var(--font-mono); color: var(--text-tertiary);
      letter-spacing: 0.04em;
    }

    /* ── Score factors — HRV/RHR/Søvn vs baseline ── */
    .sc-factors { display: grid; grid-template-columns: repeat(4,1fr); gap: 5px; }
    .sc-factor {
      background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.055);
      border-radius: 8px; padding: 9px 8px 8px;
      display: flex; flex-direction: column; gap: 1px;
    }
    .sc-factor-lbl {
      font-size: 8.5px; font-family: var(--font-mono); letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 4px;
    }
    .sc-factor-val {
      font-size: 19px; font-weight: 700; font-family: var(--font-mono);
      line-height: 1; letter-spacing: -0.02em;
    }
    .sc-factor-unit { font-size: 8px; font-family: var(--font-mono); color: var(--text-tertiary); margin-top: 2px; }
    .sc-factor-delta {
      font-size: 8.5px; font-family: var(--font-mono); letter-spacing: 0.03em;
      margin-top: 4px; font-weight: 600;
    }
    .delta-pos { color: #6BE3A4; }
    .delta-neg { color: #FF8A8A; }
    .delta-neu { color: var(--text-tertiary); }

    .sc-factor.f-hrv .sc-factor-val { color: #4A9EE8; }
    .sc-factor.f-rhr .sc-factor-val { color: #FF8A8A; }
    .sc-factor.f-deep .sc-factor-val { color: #9D93E8; }
    .sc-factor.f-dur .sc-factor-val { color: #6BE3A4; }

    /* ── Insights ── */
    .sc-insights { display: flex; flex-direction: column; gap: 4px; }
    .sc-insight-row {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 7px 10px; border-radius: 8px;
    }
    .sc-insight-row.ins-pos { background: rgba(107,227,164,0.04); border: 1px solid rgba(107,227,164,0.12); }
    .sc-insight-row.ins-warn { background: rgba(242,192,99,0.04); border: 1px solid rgba(242,192,99,0.15); }
    .sc-insight-row.ins-bad  { background: rgba(255,107,107,0.04); border: 1px solid rgba(255,107,107,0.15); }
    .sc-insight-icon { font-size: 11px; line-height: 1.4; flex-shrink: 0; }
    .sc-insight-text { font-size: 10.5px; color: var(--text-secondary); line-height: 1.4; }
    .sc-insight-text strong { color: var(--text-primary); font-weight: 600; }

    /* ── Sparkline ── */
    .sc-spark-wrap { display: flex; flex-direction: column; gap: 5px; }
    .sc-spark-header {
      font-size: 8.5px; font-family: var(--font-mono); letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--text-tertiary);
      display: flex; align-items: center; gap: 6px;
    }
    .sc-spark-header::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(to right, rgba(255,255,255,0.07), transparent);
    }
    .sc-spark-body { display: flex; align-items: stretch; gap: 6px; }
    .sc-spark { position: relative; flex: 1; height: 54px; }
    .sc-spark canvas { display: block; }
    .sc-spark-yaxis {
      display: flex; flex-direction: column; justify-content: space-between;
      padding: 2px 0; align-items: flex-end; flex-shrink: 0;
    }
    .sc-spark-ytick {
      font-size: 8px; font-family: var(--font-mono); color: var(--text-tertiary);
      letter-spacing: 0.02em; line-height: 1;
    }

    /* legacy — keep for old insight row (not used in v2 but avoid breakage) */
    .sc-insight { display:none; }
    .sc-badge { display:none; }
    .sc-metrics { display:none; }
    .sc-mc { display:none; }

    /* ── Knee ── */
    .knee-phases { display: flex; gap: 7px; }
    .knee-phase {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px;
      background: rgba(255,255,255,0.025); border-radius: 8px; padding: 10px 6px 8px;
    }
    .knee-phase-num {
      font-size: 24px; font-weight: 700; font-family: var(--font-mono); line-height: 1;
    }
    .knee-phase-lbl {
      font-size: 8px; font-family: var(--font-mono); letter-spacing: 0.07em;
      text-transform: uppercase; color: var(--text-tertiary); text-align: center;
    }

    /* ══════════════════════════════════════════════════════════════
       SESSION CARD v2 — Decision-first
    ══════════════════════════════════════════════════════════════ */

    /* Badge — same shapes, kept for type identity */
    .session-badge {
      display: inline-block; font-size: 9.5px; font-weight: 700; font-family: var(--font-mono);
      padding: 3px 10px; border-radius: 20px; margin-bottom: 8px;
      letter-spacing: 0.08em; text-transform: uppercase;
    }
    .session-badge.styrke    { background: rgba(91,164,245,0.15);  color: #5BA4F5; border: 1px solid rgba(91,164,245,0.30); }
    .session-badge.kondisjon { background: rgba(107,227,164,0.12); color: #6BE3A4; border: 1px solid rgba(107,227,164,0.2); }
    .session-badge.power     { background: rgba(91,164,245,0.12);  color: #5BA4F5; border: 1px solid rgba(91,164,245,0.2); }
    .session-badge.hvile     { background: rgba(255,255,255,0.04); color: var(--text-tertiary); border: 1px solid rgba(255,255,255,0.08); }
    .session-badge.soccer    { background: rgba(124,111,212,0.12); color: #9D93E8; border: 1px solid rgba(124,111,212,0.2); }
    .session-badge.rehab     { background: rgba(242,130,60,0.12);  color: #F2823C; border: 1px solid rgba(242,130,60,0.2); }

    /* Session name */
    .session-name-big { font-size: 16px; font-weight: 700; color: var(--text-primary); margin-bottom: 2px; line-height: 1.25; }
    .session-meta-sm  { font-size: 9.5px; color: var(--text-tertiary); font-family: var(--font-mono); letter-spacing: 0.04em; }

    /* ── Readiness + risk row ── */
    .sc2-status-row {
      display: flex; align-items: center; gap: 8px; margin: 10px 0 6px;
      flex-wrap: wrap;
    }
    .sc2-readiness-pill {
      display: flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 6px;
      font-size: 10px; font-family: var(--font-mono); font-weight: 700; letter-spacing: 0.05em;
    }
    .sc2-readiness-pill.rp-green  { background: rgba(107,227,164,0.1);  border: 1px solid rgba(107,227,164,0.22); color: #6BE3A4; }
    .sc2-readiness-pill.rp-yellow { background: rgba(91,164,245,0.1);   border: 1px solid rgba(91,164,245,0.22);  color: #5BA4F5; }
    .sc2-readiness-pill.rp-red    { background: rgba(255,107,107,0.1);  border: 1px solid rgba(255,107,107,0.22); color: #FF8A8A; }
    .sc2-risk-pill {
      display: flex; align-items: center; gap: 4px;
      padding: 4px 9px; border-radius: 6px;
      font-size: 9.5px; font-family: var(--font-mono); font-weight: 600; letter-spacing: 0.04em;
    }
    .sc2-risk-pill.risk-low  { background: rgba(107,227,164,0.06); border: 1px solid rgba(107,227,164,0.14); color: rgba(107,227,164,0.8); }
    .sc2-risk-pill.risk-mod  { background: rgba(242,192,99,0.06);  border: 1px solid rgba(242,192,99,0.14);  color: rgba(242,192,99,0.9); }
    .sc2-risk-pill.risk-high { background: rgba(255,107,107,0.06); border: 1px solid rgba(255,107,107,0.18); color: rgba(255,138,138,0.9); }

    /* ── Session meta row (focus / duration / load / start) ── */
    .sc2-meta-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 4px 10px;
      margin: 8px 0;
    }
    .sc2-meta-item { display: flex; flex-direction: column; gap: 1px; }
    .sc2-meta-lbl  { font-size: 8px; font-family: var(--font-mono); letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-tertiary); }
    .sc2-meta-val  { font-size: 11.5px; font-weight: 600; color: var(--text-secondary); letter-spacing: 0.01em; }

    /* ── Injury/AI alert ── */
    .sc2-alert {
      display: flex; align-items: flex-start; gap: 7px;
      padding: 7px 10px; border-radius: 8px; margin-bottom: 4px;
    }
    .sc2-alert.al-warn { background: rgba(242,130,60,0.06);  border: 1px solid rgba(242,130,60,0.2); }
    .sc2-alert.al-info { background: rgba(91,164,245,0.05);  border: 1px solid rgba(91,164,245,0.15); }
    .sc2-alert.al-ok   { background: rgba(107,227,164,0.04); border: 1px solid rgba(107,227,164,0.12); }
    .sc2-alert-icon { font-size: 11px; line-height: 1.5; flex-shrink: 0; }
    .sc2-alert-text { font-size: 10.5px; color: var(--text-secondary); line-height: 1.45; }
    .sc2-alert-text strong { color: var(--text-primary); font-weight: 600; }

    /* ── Rest day block ── */
    .sc2-rest-wrap { display: flex; flex-direction: column; gap: 10px; }
    .sc2-rest-row {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 7px 10px; border-radius: 8px;
      background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06);
    }
    .sc2-rest-icon { font-size: 13px; line-height: 1.4; flex-shrink: 0; }
    .sc2-rest-body { flex: 1; }
    .sc2-rest-title { font-size: 11.5px; font-weight: 600; color: var(--text-primary); line-height: 1.3; }
    .sc2-rest-sub   { font-size: 9.5px; font-family: var(--font-mono); color: var(--text-tertiary); margin-top: 2px; letter-spacing: 0.03em; }
    .sc2-next-focus {
      font-size: 9px; font-family: var(--font-mono); letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--text-tertiary);
      display: flex; align-items: center; gap: 5px; margin-top: 4px;
    }
    .sc2-next-focus::before { content: '→'; color: #5BA4F5; }

    /* ── CTA ── */
    .session-cta {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(91,164,245,0.1); border: 1px solid rgba(91,164,245,0.22);
      color: #5BA4F5; font-family: var(--font-mono); font-size: 10.5px; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase; padding: 7px 14px;
      border-radius: 6px; cursor: pointer; text-decoration: none; margin-top: 6px;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      display: inline-flex;
    }
    .session-cta:hover { background: rgba(91,164,245,0.18); border-color: rgba(91,164,245,0.38); transform: translateY(-1px); }
    .session-cta:active { transform: scale(0.97); opacity: 0.85; }
    .session-cta .cta-arrow { display: inline-block; transition: transform 0.2s; }
    .session-cta:hover .cta-arrow { transform: translateX(3px); }

    /* ── Fokus grid ── */
    .fokus-grid { display: grid; grid-template-columns: 0.85fr 1fr; gap: 14px; align-items: start; }
    @media (max-width: 768px) { .fokus-grid { grid-template-columns: 1fr; } }
    .fokus-right { display: flex; flex-direction: column; gap: 14px; }

    /* ── Dagens fokus ── */
    .fokus-panel { display: flex; flex-direction: column; gap: 4px; }
    .fokus-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 10px 8px 12px;
      border-radius: 7px;
      border-left: 2px solid transparent;
      background: rgba(255,255,255,0.018);
      transition: background 0.15s;
      cursor: default;
    }
    .fokus-item.is-checkable { cursor: pointer; }
    .fokus-item.is-checkable:hover { background: rgba(255,255,255,0.038); }
    .fokus-item.is-checkable:active { background: rgba(255,255,255,0.06); transform: scale(0.98); }
    .fokus-item.is-done { opacity: 0.38; }
    .fokus-item.is-done .fokus-text { text-decoration: line-through; color: var(--text-tertiary); }
    .fokus-item.cat-styrke   { border-left-color: rgba(91,164,245,0.55); }
    .fokus-item.cat-sprint   { border-left-color: rgba(91,164,245,0.55); }
    .fokus-item.cat-rehab    { border-left-color: rgba(107,227,164,0.5); }
    .fokus-item.cat-recovery { border-left-color: rgba(177,151,252,0.45); }
    .fokus-item.cat-sovn     { border-left-color: rgba(91,164,245,0.35); }
    .fokus-item.cat-warning  { border-left-color: rgba(242,130,60,0.6); background: rgba(242,130,60,0.04); }
    .fokus-item.cat-kalender { border-left-color: rgba(91,164,245,0.55); }
    .fokus-body  { flex: 1; min-width: 0; }
    .fokus-text  { font-size: 12px; color: var(--text-secondary); line-height: 1.3; }
    .fokus-subtext {
      font-size: 9px; font-family: var(--font-mono); color: var(--text-tertiary);
      margin-top: 1px; letter-spacing: 0.02em;
    }
    .fokus-badge {
      font-size: 8px; font-family: var(--font-mono); letter-spacing: 0.12em;
      text-transform: uppercase; padding: 2px 5px; border-radius: 3px;
      flex-shrink: 0; white-space: nowrap;
    }
    .fokus-badge--styrke   { background: rgba(91,164,245,0.1);  color: rgba(91,164,245,0.8); }
    .fokus-badge--sprint   { background: rgba(91,164,245,0.1);  color: rgba(91,164,245,0.8); }
    .fokus-badge--rehab    { background: rgba(107,227,164,0.1); color: rgba(107,227,164,0.8); }
    .fokus-badge--recovery { background: rgba(177,151,252,0.1); color: rgba(177,151,252,0.8); }
    .fokus-badge--sovn     { background: rgba(91,164,245,0.07); color: rgba(91,164,245,0.65); }
    .fokus-badge--warning  { background: rgba(242,130,60,0.12); color: rgba(242,130,60,0.9); }
    .fokus-badge--kalender { background: rgba(91,164,245,0.1);  color: rgba(91,164,245,0.8); }
    .fokus-check {
      width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0;
      border: 1.5px solid rgba(255,255,255,0.14); margin-left: 6px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, border-color 0.2s;
    }
    .fokus-item.is-done .fokus-check { background: var(--success); border-color: var(--success); }
    .fokus-item.is-done .fokus-check::after { content: '✓'; font-size: 8px; color: #050506; font-weight: 700; }

    .dash-todo-add { display: flex; gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.06); }

<script>
let db;
let weekPlan = {}; // { day_index: lesbar økt-label } resolvet fra session_templates
let sessionTemplates = [];
let _wpBase = [], _wpOverride = [];   // rå rader for re-resolve ved språkbytte

async function loadSessionTemplates() {
  const { data } = await db.from('session_templates').select('id,name,i18n_key');
  sessionTemplates = data || [];
}
function tplById(id)   { return id == null ? null : (sessionTemplates.find(x => String(x.id) === String(id)) || null); }
function tplLabel(tpl) { return tpl ? (tpl.i18n_key ? t(tpl.i18n_key) : tpl.name) : ''; }
// template_id = sannhetskilde; fall tilbake til lagret tekst-snapshot. Tom = hvile.
function _wpLabel(tid, txt) { const tpl = tplById(tid); return tpl ? tplLabel(tpl) : (txt || '').trim(); }
function rebuildWeekPlanLabels() {
  weekPlan = {};
  _wpBase.forEach(r => { const v = _wpLabel(r.template_id, r.session_type); if (v) weekPlan[r.day] = v; });
  _wpOverride.forEach(r => {
    const v = _wpLabel(r.template_id, r.session_text);   // rad finnes = overstyring; tom = eksplisitt hvile
    if (v) weekPlan[r.day_index] = v; else delete weekPlan[r.day_index];
  });
}
document.querySelector('[data-p="dashboard"]').classList.add('active');
applyLang();

async function loadWeekPlan() {
  // weekly_plan = fast standarduke. training_plan_weekly = per-dag-overstyring for
  // inneværende uke (dato-forankret), så en endring arver ikke til neste uke.
  const now  = new Date();
  const mon  = new Date(now);
  mon.setDate(now.getDate() - ((now.getDay() + 6) % 7));
  const weekMonday = mon.getFullYear() + '-' +
    String(mon.getMonth() + 1).padStart(2, '0') + '-' + String(mon.getDate()).padStart(2, '0');

  const [{ data: base }, { data: override }] = await Promise.all([
    db.from('weekly_plan').select('day,session_type,template_id'),
    db.from('training_plan_weekly').select('day_index,session_text,template_id').eq('week_monday', weekMonday),
  ]);
  _wpBase = base || []; _wpOverride = override || [];
  rebuildWeekPlanLabels();
}

let _sleepSparkChart = null;
let _sleepHistoryCache = [];

async function loadSleep() {
  const el = document.getElementById('sleepCard');
  // Hent nyeste + 6 dagers historikk parallelt
  const [{ data, error }, { data: hist }] = await Promise.all([
    db.from('health_data').select('*').order('date', { ascending: false }).order('timestamp', { ascending: false }).limit(1),
    db.from('health_data').select('date,sleep_score').order('date', { ascending: false }).limit(7),
  ]);
  if (error) { console.error('loadSleep', error); el.innerHTML = `<div class="empty">${t('err.load_data')}</div>`; return null; }
  if (!data?.length) { el.innerHTML = `<div class="empty">${t('no_data')}</div>`; return null; }
  const row = data[0];
  const todayStr = new Date().toISOString().slice(0, 10);
  const rowDate = (row.date || '').slice(0, 10);
  const hasSleep = (row.sleep_score > 0) || (row.sleep_hours > 0);
  if (rowDate < todayStr && !hasSleep) { el.innerHTML = `<div class="empty">${t('no_data')}</div>`; return null; }
  _sleepRowCache = row;
  _sleepHistoryCache = (hist || []).reverse(); // oldest → newest
  return renderSleepCard(_sleepRowCache);
}

// Rendrer søvnkortet fra cachet rad — kalles direkte ved språkbytte (ingen DB-kall)
function renderSleepCard(d) {
  const el = document.getElementById('sleepCard');
  if (!d) { el.innerHTML = `<div class="empty">${t('no_data')}</div>`; return null; }

  const sc   = d.sleep_score > 0        ? d.sleep_score        : null;
  const hrs  = d.sleep_hours > 0        ? d.sleep_hours        : null;
  const rhr  = d.rhr > 0                ? d.rhr                : null;
  const hrv  = d.hrv > 0                ? d.hrv                : null;
  const deep = d.deep_sleep_minutes > 0  ? d.deep_sleep_minutes : null;
  const rem  = d.rem_sleep_minutes  > 0  ? d.rem_sleep_minutes  : null;

  if (sc == null && hrs == null && rhr == null && hrv == null) {
    el.innerHTML = `<div class="empty">${t('sovn.no_data')}</div>`;
    return null;
  }

  // ── Readiness score (0-100): weighted composite ──
  // HRV 40%, RHR 25%, SleepScore 25%, Duration 10%
  let readiness = null;
  let components = 0;
  let wsum = 0;
  if (hrv)  { const s = hrv >= 60 ? 100 : hrv >= 50 ? 82 : hrv >= 40 ? 58 : hrv >= 30 ? 32 : 10; wsum += s * 0.45; components++; }
  if (sc)   { wsum += sc * 0.40; components++; }
  if (hrs)  { const s = hrs >= 8.5 ? 100 : hrs >= 7.5 ? 88 : hrs >= 7 ? 72 : hrs >= 6 ? 50 : 22; wsum += s * 0.15; components++; }
  if (components >= 1) {
    // normalize: scale by sum of used weights
    const usedW = (hrv ? 0.45 : 0) + (sc ? 0.40 : 0) + (hrs ? 0.15 : 0);
    readiness = Math.round(wsum / usedW);
  } else if (sc) {
    readiness = sc;
  }

  // ── Verdict (based on sleep_score directly) ──
  const ringScore = sc; // sleep_score from Garmin, not composite readiness
  const ringClr = !ringScore ? '#555' : ringScore >= 80 ? '#6BE3A4' : ringScore >= 60 ? '#5BA4F5' : '#FF8A8A';
  const verdictCls = !ringScore ? '' : ringScore >= 80 ? 'v-green' : ringScore >= 60 ? 'v-yellow' : 'v-red';
  let verdictText;
  if (!ringScore)           verdictText = t('no_data');
  else if (ringScore >= 80) verdictText = t('sovn.ready_high');
  else if (ringScore >= 65) verdictText = t('sovn.ready_good');
  else if (ringScore >= 45) verdictText = t('sovn.ready_moderate');
  else                      verdictText = t('sovn.ready_rest');

  // ── Training recommendations ──
  const R = readiness || 0; // still use composite readiness for training recs
  const hu = t('dash.hr_unit'), mu = t('dash.min_unit');
  const fmtHours = h => { if (!h) return '–'; const m = Math.round(h * 60); return m >= 60 ? `${Math.floor(m/60)}${hu} ${m%60}${mu}` : `${m}${mu}`; };
  const fmtMin   = m => { if (!m) return '–'; return m >= 60 ? `${Math.floor(m/60)}${hu}${m%60>0?' '+m%60+mu:''}` : `${m}${mu}`; };

  // Sprint rec
  let sprintCls = 'rp-red', sprintVal;
  if (R >= 80)      { sprintCls = 'rp-green'; sprintVal = '95–100%'; }
  else if (R >= 65) { sprintCls = 'rp-yellow'; sprintVal = '80–90%'; }
  else              { sprintCls = 'rp-red';    sprintVal = t('dash.focus_active_rest').split(' ')[0]; }

  // Strength rec
  let styrkeVal;
  if (R >= 80)      styrkeVal = t('dash.rec_heavy');
  else if (R >= 65) styrkeVal = t('dash.rec_moderate');
  else              styrkeVal = t('dash.rec_light');

  // Volume/intensity
  const volCls   = R >= 80 ? 'rp-green' : R >= 65 ? 'rp-yellow' : 'rp-red';
  const intensCls = R >= 80 ? 'rp-green' : R >= 65 ? 'rp-yellow' : 'rp-red';

  // ── Baseline deltas (rough estimate vs typical; Filip: HRV~60, RHR~51) ──
  // These are personal baselines; ideally from DB 30d avg but we approximate
  const HRV_BASE = 60, RHR_BASE = 51, HRS_BASE = 8.0;
  const delta = (val, base) => val != null ? Math.round(val - base) : null;
  const dHrv  = delta(hrv, HRV_BASE);
  const dRhr  = delta(rhr, RHR_BASE);
  const dHrs  = hrs != null ? Math.round((hrs - HRS_BASE) * 10) / 10 : null;

  const fmtDelta = (d, invert = false) => {
    if (d == null) return '<span class="delta-neu">–</span>';
    const good = invert ? d <= 0 : d >= 0;
    const sign = d >= 0 ? '+' : '';
    return `<span class="${good ? 'delta-pos' : 'delta-neg'}">${sign}${d}</span>`;
  };
  const fmtDeltaH = (d) => {
    if (d == null) return '<span class="delta-neu">–</span>';
    const sign = d >= 0 ? '+' : '';
    return `<span class="${d >= -0.5 ? 'delta-pos' : 'delta-neg'}">${sign}${d}${hu}</span>`;
  };

  // ── Insights (2-3 lines) ──
  const insights = [];
  if (hrv) {
    if (hrv >= 60)      insights.push({ cls: 'ins-pos',  icon: '⚡', html: `<strong>HRV ${hrv}ms</strong> — ${t('sovn.hrv_advice_optimal').split('.')[0]}` });
    else if (hrv >= 50) insights.push({ cls: 'ins-pos',  icon: '✅', html: `<strong>HRV ${hrv}ms</strong> — ${t('sovn.hrv_advice_good').split('.')[0]}` });
    else if (hrv >= 40) insights.push({ cls: 'ins-warn', icon: '⚠️', html: `<strong>HRV ${hrv}ms</strong> — ${t('sovn.hrv_advice_low').split('.')[0]}` });
    else if (hrv >= 30) insights.push({ cls: 'ins-bad',  icon: '🔴', html: `<strong>HRV ${hrv}ms</strong> — ${t('sovn.hrv_advice_critical').split('.')[0]}` });
    else                insights.push({ cls: 'ins-bad',  icon: '🔴', html: `<strong>HRV ${hrv}ms</strong> — ${t('sovn.hrv_advice_alarm').split('.')[0]}` });
  }
  if (hrs) {
    if (hrs >= 8)       insights.push({ cls: 'ins-pos',  icon: '🌙', html: `<strong>${fmtHours(hrs)}</strong> — ${t('sovn.sleep_advice_optimal').split('.')[0]}` });
    else if (hrs >= 7)  insights.push({ cls: 'ins-warn', icon: '🌙', html: `<strong>${fmtHours(hrs)}</strong> — ${t('sovn.sleep_advice_good').split('.')[0].split(',')[0]}` });
    else                insights.push({ cls: 'ins-bad',  icon: '⚠', html: `<strong>${fmtHours(hrs)}</strong> — ${t('sovn.sleep_advice_little').split('.')[0]}` });
  }

  // Age
  const daysAgo = d.date ? Math.max(0, Math.floor((Date.now() - new Date(d.date + 'T12:00:00').getTime()) / 86400000)) : null;
  const dataAge = daysAgo === 0 ? t('dash.tonight') : daysAgo === 1 ? t('dash.yesterday') : daysAgo != null ? t('dash.days_ago', {n: daysAgo}) : '';
  const ageColor = daysAgo != null && daysAgo > 2 ? 'var(--warning)' : 'var(--text-tertiary)';

  // ── SVG ring ──
  const RR = 39, CX = 46, CY = 46, CIRC = 2 * Math.PI * RR;
  const gradId = 'scRingGrad_' + Math.random().toString(36).slice(2, 7);
  const gradStart = ringScore != null && ringScore >= 80 ? '#6BE3A4' : ringScore != null && ringScore >= 65 ? '#5BA4F5' : ringScore != null && ringScore >= 50 ? '#4A87D9' : '#FF6B6B';
  const pct = ringScore != null ? Math.min(ringScore / 100, 1) : 0;
  const dash = pct * CIRC, gap = CIRC - dash;
  const ringHtml = `
    <svg viewBox="0 0 92 92" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="${gradId}" x1="1" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="${gradStart}"/>
          <stop offset="100%" stop-color="${ringClr}"/>
        </linearGradient>
      </defs>
      <circle cx="${CX}" cy="${CY}" r="${RR}" stroke="rgba(255,255,255,0.07)" stroke-width="8"/>
      <circle cx="${CX}" cy="${CY}" r="${RR}"
        stroke="url(#${gradId})" stroke-width="8" stroke-linecap="round"
        stroke-dasharray="${dash.toFixed(2)} ${gap.toFixed(2)}"
        transform="rotate(-90 ${CX} ${CY})"
        style="filter:drop-shadow(0 0 8px ${ringClr}55);transition:stroke-dasharray 0.9s cubic-bezier(.4,0,.2,1)"/>
    </svg>`;

  el.innerHTML = `
    <a href="sovn.html" style="text-decoration:none;color:inherit;display:block">
      <div class="sc-wrap">

        <!-- HERO: ring + verdict -->
        <div class="sc-hero">
          <div class="sc-ring-col">
            <div class="sc-ring-wrap">
              ${ringHtml}
              <div class="sc-ring-center">
                <div class="sc-score" style="color:${ringClr}">${ringScore != null ? `<span data-countup="${ringScore}">0</span>` : '–'}</div>
                <div class="sc-score-sub">/100</div>
              </div>
            </div>
          </div>
          <div class="sc-verdict">
            <div class="sc-verdict-label" data-i18n="dash.sleep_score_lbl">${t('dash.sleep_score_lbl')}</div>
            <div class="sc-verdict-status ${verdictCls}">${verdictText}</div>
            ${dataAge ? `<div class="sc-age" style="color:${ageColor};margin-top:4px">${dataAge}</div>` : ''}
            <!-- Training recs -->
            <div class="sc-rec-row">
              <div class="sc-rec-pill ${sprintCls}">
                <span class="rp-label">Sprint</span>
                <span class="rp-val">${sprintVal}</span>
              </div>
              <div class="sc-rec-pill ${volCls}">
                <span class="rp-label">${t('dash.rec_vol_lbl')}</span>
                <span class="rp-val">${R >= 80 ? '100%' : R >= 65 ? '80%' : '60%'}</span>
              </div>
              <div class="sc-rec-pill ${intensCls}">
                <span class="rp-label">${t('dash.rec_int_lbl')}</span>
                <span class="rp-val">${R >= 80 ? t('dash.rec_high') : R >= 65 ? t('dash.rec_mod') : t('dash.rec_low')}</span>
              </div>
            </div>
          </div>
        </div>

        <!-- FACTORS: HRV / Dyp / Søvn / Våken -->
        <div class="sc-factors">
          <div class="sc-factor f-hrv">
            <div class="sc-factor-lbl">HRV</div>
            <div class="sc-factor-val" style="color:${hrv == null ? 'var(--text-secondary)' : hrv >= 60 ? '#6BE3A4' : hrv >= 50 ? '#6BE3A4' : hrv >= 40 ? '#F2C063' : '#FF6B6B'}">${hrv != null ? hrv : '–'}</div>
            <div class="sc-factor-unit">ms · ${hrv == null ? '–' : hrv >= 60 ? t('sovn.hrv_optimal') : hrv >= 50 ? t('sovn.hrv_good') : hrv >= 40 ? t('sovn.hrv_low') : t('sovn.hrv_critical')}</div>
          </div>
          <div class="sc-factor f-deep">
            <div class="sc-factor-lbl">${t('dash.deep')}</div>
            <div class="sc-factor-val" style="font-size:14px">${fmtMin(deep)}</div>
            <div class="sc-factor-unit">REM ${fmtMin(rem)}</div>
          </div>
          <div class="sc-factor f-dur">
            <div class="sc-factor-lbl">${t('dash.sleep_dur_lbl')}</div>
            <div class="sc-factor-val" style="font-size:14px">${fmtHours(hrs)}</div>
            <div class="sc-factor-unit">${t('sovn.hours')}</div>
          </div>
          <div class="sc-factor f-awake">
            <div class="sc-factor-lbl">${t('sovn.awake')}</div>
            <div class="sc-factor-val" style="font-size:19px;color:${d.awake_minutes > 30 ? '#F2C063' : d.awake_minutes > 50 ? '#FF8A8A' : 'var(--text-secondary)'}">${d.awake_minutes != null ? d.awake_minutes : '–'}</div>
            <div class="sc-factor-unit">min</div>
          </div>
        </div>

        <!-- INSIGHTS -->
        <div class="sc-insights">
          ${insights.slice(0, 2).map(i => `
            <div class="sc-insight-row ${i.cls}">
              <div class="sc-insight-icon">${i.icon}</div>
              <div class="sc-insight-text">${i.html}</div>
            </div>`).join('')}
        </div>

        <!-- 7d sparkline -->
        <div class="sc-spark-wrap">
          <div class="sc-spark-header" data-i18n="dash.trend_7d">${t('dash.trend_7d')}</div>
          <div class="sc-spark-body">
            <div class="sc-spark"><canvas id="sleepSparkCanvas"></canvas></div>
            <div class="sc-spark-yaxis">
              <div class="sc-spark-ytick">100</div>
              <div class="sc-spark-ytick">40</div>
            </div>
          </div>
        </div>

      </div>
    </a>`;

  countUpAll(el);
  _renderSleepSparkline();
  return d;
}

function _renderSleepSparkline() {
  const wrap = document.querySelector('.sc-spark');
  const canvas = document.getElementById('sleepSparkCanvas');
  if (!canvas || !wrap) return;
  if (_sleepSparkChart) { _sleepSparkChart.destroy(); _sleepSparkChart = null; }
  const hist = _sleepHistoryCache;
  if (!hist || hist.length < 2) { wrap.closest('.sc-spark-wrap').style.display = 'none'; return; }
  wrap.closest('.sc-spark-wrap').style.display = '';

  // Set explicit pixel dimensions so Chart.js renders correctly
  const W = wrap.offsetWidth || 260, H = 64;
  canvas.width  = W;
  canvas.height = H;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';

  const scores = hist.map(r => r.sleep_score > 0 ? r.sleep_score : null);
  const labels = hist.map(r => {
    const d = new Date(r.date + 'T12:00:00');
    return d.toLocaleDateString(fmtLocale(), { weekday: 'short', day: 'numeric', month: 'short' });
  });
  const lastIdx = scores.length - 1;
  const lastScore = scores[lastIdx];
  const ringClrFn = s => !s ? '#555' : s >= 80 ? '#6BE3A4' : s >= 60 ? '#5BA4F5' : '#FF6B6B';

  // Custom plugin: draw score pill above the last (today's) point
  const scoreLabelPlugin = {
    id: 'scoreLabel',
    afterDatasetsDraw(chart) {
      if (lastScore == null) return;
      const meta = chart.getDatasetMeta(0);
      const pt   = meta.data[lastIdx];
      if (!pt) return;
      const { ctx } = chart;
      const clr = ringClrFn(lastScore);
      const x = pt.x, y = pt.y - 9;
      const lbl = String(lastScore);
      ctx.save();
      ctx.font = '600 9px monospace';
      const tw = ctx.measureText(lbl).width;
      const pw = tw + 10, ph = 13;
      ctx.fillStyle = clr + '22';
      ctx.strokeStyle = clr + '66';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.roundRect(x - pw/2, y - ph + 2, pw, ph, 4);
      ctx.fill(); ctx.stroke();
      ctx.fillStyle = clr;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      ctx.fillText(lbl, x, y + 2);
      ctx.restore();
    },
  };

  _sleepSparkChart = new Chart(canvas, {
    type: 'line',
    plugins: [scoreLabelPlugin],
    data: {
      labels,
      datasets: [{
        data: scores,
        borderColor: '#5BA4F5',
        borderWidth: 1.5,
        pointRadius: scores.map((_, i) => i === lastIdx ? 3.5 : 2),
        pointHoverRadius: 5,
        pointBackgroundColor: scores.map(s => ringClrFn(s)),
        pointBorderColor: 'transparent',
        tension: 0.4,
        fill: true,
        backgroundColor: ctx => {
          const g = ctx.chart.ctx.createLinearGradient(0, 0, 0, H);
          g.addColorStop(0, 'rgba(91,164,245,0.18)');
          g.addColorStop(1, 'rgba(91,164,245,0)');
          return g;
        },
        spanGaps: true,
      }],
    },
    options: {
      animation: false,
      responsive: false,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          enabled: true,
          backgroundColor: 'rgba(18,18,22,0.92)',
          borderColor: 'rgba(91,164,245,0.25)',
          borderWidth: 1,
          titleColor: 'rgba(255,255,255,0.5)',
          titleFont: { family: 'monospace', size: 9 },
          bodyColor: '#fff',
          bodyFont: { family: 'monospace', size: 12, weight: '700' },
          padding: { top: 6, bottom: 6, left: 10, right: 10 },
          displayColors: false,
          callbacks: {
            title: items => items[0]?.label || '',
            label: item => {
              const v = item.raw;
              if (v == null) return t('no_data');
              const clr = v >= 80 ? t('sovn.score_excellent') : v >= 65 ? t('sovn.score_good') : v >= 50 ? t('sovn.score_ok') : t('sovn.score_bad');
              return `${v}/100  ${clr}`;
            },
          },
        },
      },
      scales: {
        x: { display: false },
        y: { display: false, min: 30, max: 100 },
      },
      layout: { padding: { top: 18, bottom: 2, left: 2, right: 4 } },
    },
  });
  fadeInChart(canvas);
}

// ── Rehab data ─────────────────────────────────────────────────────────────
async function loadRehabData() {
  const { data: sessions } = await db.from('gym_log')
    .select('id, date, session_type')
    .ilike('session_type', '%rehab%')
    .order('date', { ascending: false })
    .limit(1);

  const lastSession = sessions?.[0] || null;
  if (!lastSession) return { lastDate: null, daysSince: Infinity, lastKnee: null };

  const lastDate   = lastSession.date;
  const todayStr   = new Date().toLocaleDateString('sv');
  const diffMs     = new Date(todayStr) - new Date(lastDate);
  const daysSince  = Math.round(diffMs / 86400000);

  const { data: kneeRows } = await db.from('knee_pain')
    .select('*')
    .eq('date', lastDate)
    .ilike('session_type', '%rehab%')
    .limit(1);

  return { lastDate, daysSince, lastKnee: kneeRows?.[0] || null };
}

// ── Injury status cards (generisk, én blokk per alvorlig skade) ────────────
async function loadInjuryCards() {
  const { data: injData, error: injErr } = await db.from('injuries')
    .select('id,body_part,side,status,severity')
    .eq('severity', 'severe').in('status', ['active', 'improving']);
  if (injErr) {
    console.error('loadInjuryCards/injuries', injErr);
    document.getElementById('injuryStatusCards').innerHTML = `<div class="empty">${t('err.load_data')}</div>`;
    return null;
  }
  _severeInjuries = injData || [];

  const el = document.getElementById('injuryStatusCards');
  if (!_severeInjuries.length) {
    el.innerHTML = `<div class="empty">${t('pain.no_severe')}</div>`;
    _injuryCardDataCache = { injuries: [], injuryPainRows: [], kneeRow: null };
    return null;
  }

  const injIds = _severeInjuries.map(i => i.id);
  const kneeInj = _severeInjuries.find(i => _isDashKneeInj(i));

  const { ipRows, knRows } = await _getPain42(injIds, kneeInj);
  const kneeRow = knRows[0] || null;

  _injuryCardDataCache = { injuries: _severeInjuries, injuryPainRows: ipRows, kneeRow };
  renderInjuryCards();
  return kneeRow;   // knee_pain row — compat med renderDailyFokus
}

function renderInjuryCards() {
  if (!_injuryCardDataCache) return;
  const el = document.getElementById('injuryStatusCards');
  const { injuries, injuryPainRows, kneeRow } = _injuryCardDataCache;

  if (!injuries.length) {
    el.innerHTML = `<div class="empty">${t('pain.no_severe')}</div>`;
    return;
  }

  // Fargekode per skade (samme palett som grafen under → kne=rød, hamstring=oransje).
  const CARD_COLORS = ['#FF6B6B', '#FFB347', '#9B59B6', '#3498DB', '#E91E63'];

  // Samle alle injury_pain-rader per skade (allerede dato-synkende fra spørringen).
  const rowsByInj = {};
  for (const row of injuryPainRows) (rowsByInj[row.injury_id] ||= []).push(row);

  const parts = injuries.map((inj, idx) => {
    const color = CARD_COLORS[idx % CARD_COLORS.length];
    const name  = _dashBodyPartName(inj);
    const rows  = rowsByInj[inj.id] || [];

    // Slå sammen ALLE øktene på siste dato (siste ikke-null per fase) – ellers viste
    // kortet tilfeldige streker når en dag hadde flere økter (f.eks. Rehab + Turgåing).
    let d = null;
    if (rows.length) {
      const latestDate = rows[0].date;
      const sameDay = rows.filter(r => r.date === latestDate);
      const pick = f => { for (const r of sameDay) if (r[f] != null) return r[f]; return null; };
      d = {
        date: latestDate,
        session_type: sameDay.find(r => r.session_type)?.session_type || '',
        multi: sameDay.length > 1,
        before_score: pick('before_score'), during_score: pick('during_score'),
        after_score: pick('after_score'),  day_after_score: pick('day_after_score'),
      };
    } else if (_isDashKneeInj(inj) && kneeRow) {
      d = { date: kneeRow.date, session_type: kneeRow.session_type, multi: false,
            before_score: kneeRow.before_score, during_score: kneeRow.during_score,
            after_score: kneeRow.after_score, day_after_score: kneeRow.day_after_score };
    }

    const head = `<div style="font-size:10px;color:${color};font-family:var(--font-mono);letter-spacing:0.05em;text-transform:uppercase;margin-bottom:6px;font-weight:600;display:flex;align-items:center;gap:6px">
      <span style="width:7px;height:7px;border-radius:50%;background:${color};flex-shrink:0"></span>${escHtml(name)}</div>`;

    if (!d) {
      return `<div style="margin-bottom:14px;padding-left:10px;border-left:3px solid ${color}40">
        ${head}<div class="empty" style="font-size:11px">${t('dash.no_pain')}</div></div>`;
    }
    const phases = [
      { label: t('knee.before'),   val: d.before_score },
      { label: t('knee.during'),   val: d.during_score },
      { label: t('knee.after'),    val: d.after_score },
      { label: t('knee.dayafter'), val: d.day_after_score },
    ];
    const sub = d.multi ? fmtDate(d.date) : `${escHtml(d.session_type || '')} · ${fmtDate(d.date)}`;
    return `<div style="margin-bottom:14px;padding-left:10px;border-left:3px solid ${color}">
      ${head}
      <a href="treningsplan.html?date=${encodeURIComponent(d.date)}" style="text-decoration:none;color:inherit;display:block">
        <div class="knee-phases">
          ${phases.map(p => `
            <div class="knee-phase">
              <div class="knee-phase-num" style="color:${painColor(p.val)}">${p.val ?? '–'}</div>
              <div class="knee-phase-lbl">${p.label}</div>
            </div>`).join('')}
        </div>
        <div style="font-size:9px;color:var(--text-tertiary);font-family:var(--font-mono);margin-top:6px;letter-spacing:0.03em">${sub}</div>
      </a>
    </div>`;
  });

  el.innerHTML = parts.join('');
}

// ── Load × knesmerte (ACWR vs smerte, siste 6 uker) ────────────────────────
let _loadPainCache  = null;   // { series, injuryPainSeries } — gjenbrukes ved språkbytte
let _loadPainChart  = null;
let _severeInjuries = [];   // [{id,body_part,side,status,severity}] — deles med loadInjuryCards + loadLoadPain
let _injuryCardDataCache = null;  // { injuries, injuryPainRows, kneeRow }
let _pain42Prom = null;    // memoized promise — injury_pain + knee_pain (42 days), deles av loadInjuryCards + loadLoadPain

// Henter injury_pain + knee_pain for siste 42 dager én gang per sidelast.
// Begge funksjonene som trenger disse dataene kaller hit; den andre returnerer
// den allerede-startet-Promise slik at bare én DB-runde-tur sendes.
function _getPain42(injIds, kneeInj) {
  if (_pain42Prom) return _pain42Prom;
  const since42 = _isoDaysAgo(41);
  const ipF = injIds.length
    ? db.from('injury_pain').select('*').in('injury_id', injIds).gte('date', since42).order('date', { ascending: false })
    : Promise.resolve({ data: [] });
  const knF = kneeInj
    ? db.from('knee_pain').select('*').gte('date', since42).order('date', { ascending: false })
    : Promise.resolve({ data: [] });
  _pain42Prom = Promise.all([ipF, knF]).then(([ip, kn]) => ({
    ipRows: ip.data || [],
    knRows: kn.data || [],
  }));
  return _pain42Prom;
}

function _isDashKneeInj(inj) {
  const bp = (inj.body_part || '').toLowerCase();
  return bp === 'body.knee' || bp === 'knee' || bp.includes('kne');
}
function _dashBodyPartName(inj) {
  const part = t(inj.body_part) || inj.body_part;
  const side = inj.side && inj.side !== '' ? ' ' + t('side.' + inj.side) : '';
  return part + side;
}

function _isoDaysAgo(n) {
  const d = new Date(); d.setDate(d.getDate() - n);
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}

async function loadLoadPain() {
  const DAYS = 42;
  const since70 = _isoDaysAgo(97);   // 42d graf + 56d EWMA-oppvarming bakover
  const todayISO = _isoDaysAgo(0);

  const [spRes, gyRes, acRes] = await Promise.all([
    db.from('sprint_log').select('date,rpe').gte('date', since70),
    db.from('gym_log').select('date,rpe').gte('date', since70),
    db.from('activity_log').select('date,rpe').gte('date', since70),
  ]);
  if (spRes.error || gyRes.error || acRes.error) {
    const err = spRes.error || gyRes.error || acRes.error;
    console.error('loadLoadPain/activity', err);
    toast(t('err.load_data'), 'err');
  }
  const sp = { data: spRes.data || [] };
  const gy = { data: gyRes.data || [] };
  const ac = { data: acRes.data || [] };

  // Hent skader hvis ikke allerede lastet av loadInjuryCards
  let injuries = _severeInjuries;
  if (!injuries.length) {
    const { data: injData } = await db.from('injuries')
      .select('id,body_part,side,status,severity')
      .eq('severity', 'severe').in('status', ['active', 'improving']);
    injuries = injData || [];
    _severeInjuries = injuries;
  }

  const injIds = injuries.map(i => i.id);
  const kneeInj = injuries.find(i => _isDashKneeInj(i));

  // Rebruk delte pain-data (én DB-runde-tur delt med loadInjuryCards)
  const { ipRows: ipData, knRows: knData } = await _getPain42(injIds, kneeInj);
  const ipRes = { data: ipData };
  const knRes = { data: knData };

  const events = AcwrCore.buildLoadEvents({
    sprint: sp.data || [], gym: gy.data || [], activity: ac.data || [],
  });
  const series = AcwrCore.acwrSeries(events, todayISO, DAYS);

  // Per-skade smertekart med knee_pain-fallback for kneet
  const injuryPainSeries = injuries.map(inj => {
    const painByDate = {};
    const bump = (date, v) => {
      if (v == null || !date) return;
      painByDate[date] = Math.max(painByDate[date] ?? 0, v);
    };
    for (const row of (ipRes.data || [])) {
      if (row.injury_id !== inj.id) continue;
      bump(row.date, Math.max(row.before_score ?? 0, row.during_score ?? 0, row.after_score ?? 0));
      if (row.day_after_score != null) {
        const d = new Date(row.date + 'T12:00:00'); d.setDate(d.getDate() + 1);
        bump(d.toISOString().slice(0, 10), row.day_after_score);
      }
    }
    if (_isDashKneeInj(inj)) {
      for (const k of (knRes.data || [])) {
        bump(k.date, Math.max(k.before_score ?? 0, k.during_score ?? 0, k.after_score ?? 0));
        if (k.day_after_score != null) {
          const d = new Date(k.date + 'T12:00:00'); d.setDate(d.getDate() + 1);
          bump(d.toISOString().slice(0, 10), k.day_after_score);
        }
      }
    }
    return { inj, painByDate };
  });

  _loadPainCache = { series, injuryPainSeries };
  renderLoadPain();
}

function renderLoadPain() {
  const wrap = document.getElementById('loadPainWrap');
  if (!_loadPainCache) return;
  const { series, injuryPainSeries } = _loadPainCache;

  const hasAcwr = series.some(p => p.acwr != null);
  const hasPain  = (injuryPainSeries || []).some(({ painByDate }) => Object.keys(painByDate).length > 0);
  if (!hasAcwr && !hasPain) {
    wrap.innerHTML = `<div class="empty">${t('dash.load_pain_empty')}</div>`;
    return;
  }

  wrap.innerHTML = '<canvas id="loadPainChart" class="chart-fade"></canvas>';
  if (_loadPainChart) { _loadPainChart.destroy(); _loadPainChart = null; }

  const dates  = series.map(p => p.date);
  const labels = dates.map(ds => fmtDate(ds));

  // Smertegrense: smerte >= denne = «spike» → fremhevet stort punkt m/hvit ring.
  // Default 5 (tendon-rehab «akseptabel smerte»-regel). Endre her ved behov.
  const PAIN_LIMIT = 5;

  const PAIN_COLORS = ['#FF6B6B', '#FFB347', '#9B59B6', '#3498DB', '#E91E63'];
  const painDatasets = (injuryPainSeries || []).map(({ inj, painByDate }, idx) => {
    const col  = PAIN_COLORS[idx % PAIN_COLORS.length];
    const hi   = c => (c.raw?.y ?? 0) >= PAIN_LIMIT;   // spike?
    return {
      label: _dashBodyPartName(inj),
      // Full-lengde og indeks-justert med ACWR-linja: di === dato-indeks i ALLE
      // datasett. Da treffer mode:'index'-tooltipet riktig dato hver gang. Dager
      // uten smerte = y:null (tegnes ikke), men holder indeksene på linje.
      data: dates.map((ds, di) => ({ x: di, y: painByDate[ds] ?? null, _date: ds })),
      parsing: false,
      yAxisID: 'yP',
      borderColor: col,
      backgroundColor: col,
      borderWidth: 1.5,
      // Spikes (>= PAIN_LIMIT) stikker ut: stort punkt, full farge, hvit ring.
      // Lave verdier dempes (lite + halv-transparent) så de ikke konkurrerer visuelt.
      pointRadius:          c => c.raw?.y == null ? 0 : (hi(c) ? 7.5 : 2.5),
      pointHoverRadius:     c => c.raw?.y == null ? 0 : (hi(c) ? 9 : 4),
      pointBackgroundColor: c => hi(c) ? col : col + '55',
      pointBorderColor:     c => hi(c) ? '#FFFFFF' : 'transparent',
      pointBorderWidth:     c => hi(c) ? 1.5 : 0,
      tension: 0.2, spanGaps: false, showLine: false,
    };
  });

  _loadPainChart = new Chart(document.getElementById('loadPainChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: t('dash.acwr_label'),
          data: series.map((p, i) => ({ x: i, y: p.acwr })),
          parsing: false,
          yAxisID: 'yA', borderColor: '#5BA4F5', backgroundColor: 'rgba(91,164,245,0.08)',
          borderWidth: 2, pointRadius: 0, tension: 0.3, spanGaps: true, fill: true,
        },
        {
          label: t('dash.risk_line'),
          data: dates.map((_, i) => ({ x: i, y: 1.5 })),
          parsing: false,
          yAxisID: 'yA', borderColor: 'rgba(255,107,107,0.45)', borderWidth: 1,
          borderDash: [5, 4], pointRadius: 0, fill: false, _noTooltip: true,
        },
        {
          label: t('dash.pain_limit', { n: PAIN_LIMIT }),
          data: dates.map((_, i) => ({ x: i, y: PAIN_LIMIT })),
          parsing: false,
          yAxisID: 'yP', borderColor: 'rgba(255,159,67,0.55)', borderWidth: 1,
          borderDash: [2, 4], pointRadius: 0, fill: false, _noTooltip: true,
        },
        ...painDatasets,
      ],
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      animation: { duration: 380 },
      // axis:'x' → hover styres KUN av dato-kolonnen (x), ikke hvor nær linja/prikken
      // musa er vertikalt. Tooltip forsvinner ikke når du beveger deg vekk fra streken,
      // og hopper ikke mellom linje og prikker — den viser alltid hele datoens kolonne.
      interaction: { mode: 'index', intersect: false, axis: 'x' },
      hover: { mode: 'index', intersect: false, axis: 'x' },
      plugins: {
        legend: {
          display: true, position: 'bottom',
          labels: { color: '#C8C6C0', font: { family: 'ui-monospace', size: 11 }, boxWidth: 16, boxHeight: 3, padding: 12 },
        },
        tooltip: {
          backgroundColor: 'rgba(10,10,13,0.97)', titleColor: '#FAFAFA', bodyColor: '#B8B6B0',
          borderColor: 'rgba(255,255,255,0.08)', borderWidth: 1, padding: 10, cornerRadius: 8,
          filter: item => !item.dataset._noTooltip && item.parsed.y != null && !isNaN(item.parsed.y),
          callbacks: {
            title: items => items.length ? (labels[items[0].dataIndex] || '') : '',
            label: ctx => `${ctx.dataset.label}: ${ctx.datasetIndex === 0 ? ctx.parsed.y.toFixed(2) : ctx.parsed.y}`,
          },
        },
      },
      scales: {
        x: {
          type: 'linear',
          min: -0.5,
          max: dates.length - 0.5,
          grid: { color: 'rgba(255,255,255,0.04)', drawBorder: false },
          ticks: {
            color: '#C8C6C0', font: { family: 'ui-monospace', size: 11 },
            maxRotation: 45, maxTicksLimit: 14, stepSize: 1,
            // Only show label at integer positions (the actual date indices)
            callback: (v) => { const i = Math.round(v); return Math.abs(v - i) < 0.01 && i >= 0 && i < labels.length ? labels[i] : null; },
          },
        },
        yA: {
          position: 'left', min: 0, suggestedMax: 2,
          grid: { color: 'rgba(255,255,255,0.05)', drawBorder: false },
          ticks: { color: '#5BA4F5', font: { family: 'ui-monospace', size: 11 } },
          title: { display: true, text: t('dash.acwr_label'), color: 'rgba(91,164,245,0.7)', font: { size: 11, weight: '600' } },
        },
        yP: {
          position: 'right', min: 0, max: 10,
          grid: { drawOnChartArea: false },
          ticks: { color: '#FF6B6B', font: { family: 'ui-monospace', size: 11 }, stepSize: 2 },
          title: { display: true, text: t('dash.pain_label'), color: 'rgba(255,107,107,0.7)', font: { size: 11, weight: '600' } },
        },
      },
    },
  });
  fadeInChart(document.getElementById('loadPainChart'));
}

function loadSession() {
  const el = document.getElementById('sessionCard');
  const planIndex = (new Date().getDay() + 6) % 7;
  const planText = (weekPlan[planIndex] || '').trim();
  const isRest = !planText || /^hvile/i.test(planText) || /^fri$/i.test(planText);

  // Pull readiness from cached sleep for cross-card context
  const sleep = _sleepRowCache;
  const hrv = sleep?.hrv > 0 ? sleep.hrv : null;
  const sc  = sleep?.sleep_score > 0 ? sleep.sleep_score : null;
  const hrs = sleep?.sleep_hours > 0 ? sleep.sleep_hours : null;
  let readiness = null;
  if (hrv || sc) {
    let wsum = 0, usedW = 0;
    if (hrv) { const s = hrv >= 60 ? 100 : hrv >= 50 ? 82 : hrv >= 40 ? 58 : hrv >= 30 ? 32 : 10; wsum += s * 0.45; usedW += 0.45; }
    if (sc)  { wsum += sc * 0.40; usedW += 0.40; }
    if (hrs) { const s = hrs >= 8.5 ? 100 : hrs >= 7.5 ? 88 : hrs >= 7 ? 72 : hrs >= 6 ? 50 : 22; wsum += s * 0.15; usedW += 0.15; }
    if (usedW > 0) readiness = Math.round(wsum / usedW);
  }

  // Last knee pain
  const kneeCache = _injuryCardDataCache;
  const lastPain = kneeCache?.kneeRow?.after_score ?? kneeCache?.kneeRow?.during_score ?? null;

  // Risk level
  let riskCls, riskLabel;
  const highPain = lastPain != null && lastPain >= 3;
  const lowReady = readiness != null && readiness < 60;
  if (highPain || lowReady) { riskCls = 'risk-high'; riskLabel = t('dash.risk_high'); }
  else if ((readiness != null && readiness < 75) || (lastPain != null && lastPain >= 1)) { riskCls = 'risk-mod'; riskLabel = t('dash.risk_mod'); }
  else { riskCls = 'risk-low'; riskLabel = t('dash.risk_low'); }

  const readinessCls = !readiness ? '' : readiness >= 80 ? 'rp-green' : readiness >= 60 ? 'rp-yellow' : 'rp-red';

  if (isRest) {
    // ── REST DAY ──
    const tmrwIdx = (planIndex + 1) % 7;
    const tmrwTxt = (weekPlan[tmrwIdx] || '').trim();
    const tmrwIsRest = !tmrwTxt || /^hvile/i.test(tmrwTxt);

    el.innerHTML = `
      <span class="session-badge hvile">${t('session.rest_day')}</span>
      <div class="session-name-big" style="color:var(--text-secondary)">${t('dash.recovery_day')}</div>
      <div class="session-meta-sm" style="margin-bottom:10px">${t('dash.no_session')}</div>

      <div class="sc2-rest-wrap">
        <div class="sc2-rest-row">
          <div class="sc2-rest-icon">🦵</div>
          <div class="sc2-rest-body">
            <div class="sc2-rest-title">${t('dash.rest_mobility')}</div>
            <div class="sc2-rest-sub">${t('dash.rest_mobility_sub')}</div>
          </div>
        </div>
        <div class="sc2-rest-row">
          <div class="sc2-rest-icon">🚶</div>
          <div class="sc2-rest-body">
            <div class="sc2-rest-title">${t('dash.rest_walk')}</div>
            <div class="sc2-rest-sub">${t('dash.rest_walk_sub')}</div>
          </div>
        </div>
        <div class="sc2-rest-row">
          <div class="sc2-rest-icon">🌙</div>
          <div class="sc2-rest-body">
            <div class="sc2-rest-title">${t('dash.rest_sleep_goal')}</div>
            <div class="sc2-rest-sub">${t('dash.rest_sleep_sub')}</div>
          </div>
        </div>
        ${!tmrwIsRest ? `<div class="sc2-next-focus">${tmrwTxt || t('dash.training_day')}</div>` : ''}
      </div>`;
    return { isRest: true };
  }

  // ── TRAINING DAY ──
  let cls = 'styrke';
  if (/sprint/i.test(planText)) cls = 'power';
  else if (/fotball|soccer|basket/i.test(planText)) cls = 'soccer';
  else if (/rehab/i.test(planText)) cls = 'rehab';
  else if (/kondisjon|sirkulasjon|mobilitet/i.test(planText)) cls = 'kondisjon';

  const badgeLabels = {
    styrke: t('dash.badge_styrke'), kondisjon: t('dash.badge_kondisjon'), power: 'Sprint',
    soccer: t('dash.badge_soccer'), rehab: t('dash.cat_rehab'),
  };

  // Focus area
  const focusMap = {
    power:    t('dash.focus_area_sprint'),
    styrke:   t('dash.focus_area_styrke'),
    kondisjon:t('dash.focus_area_kondi'),
    soccer:   t('dash.focus_area_soccer'),
    rehab:    t('dash.focus_area_rehab'),
  };

  // AI alert — injury-aware recommendation
  let alerts = [];
  if (highPain && cls === 'power') {
    alerts.push({ cls: 'al-warn', icon: '⚠', html: `<strong>${t('dash.ai_avoid_sprint')}</strong> — ${t('dash.ai_avoid_sprint_sub', {n: lastPain})}` });
  } else if (highPain) {
    alerts.push({ cls: 'al-warn', icon: '⚠', html: `<strong>${t('dash.focus_no_push')}</strong> — ${t('dash.focus_pain_after', {n: lastPain})}` });
  }
  if (readiness != null && readiness < 60) {
    alerts.push({ cls: 'al-warn', icon: '🔴', html: `<strong>${t('dash.low_readiness')}</strong> — ${t('dash.low_readiness_sub')}` });
  } else if (readiness != null && readiness >= 80 && !highPain) {
    alerts.push({ cls: 'al-ok', icon: '⚡', html: `<strong>${t('dash.high_readiness')}</strong> — ${t('dash.high_readiness_sub')}` });
  }
  if (!alerts.length) {
    alerts.push({ cls: 'al-info', icon: '🎯', html: `<strong>${t('dash.focus_warmup')}</strong> — ${t('dash.ai_default_tip')}` });
  }

  const ctaHref  = cls === 'power' ? 'sprint.html' : cls === 'soccer' ? 'treningsplan.html' : 'gym.html?day=today';
  const ctaLabel = cls === 'power' ? t('dash.open_sprint') : cls === 'soccer' ? t('dash.full_overview') : t('dash.open_gym');

  el.innerHTML = `
    <span class="session-badge ${cls}">${badgeLabels[cls] || planText}</span>
    <div class="session-name-big">${escHtml(planText)}</div>
    <div class="session-meta-sm">${focusMap[cls] || ''}</div>

    <!-- Readiness + risk -->
    <div class="sc2-status-row">
      ${readiness != null ? `
      <div class="sc2-readiness-pill ${readinessCls}">
        ${readiness}% ${t('dash.readiness_lbl')}
      </div>` : ''}
      <div class="sc2-risk-pill ${riskCls}">
        ${riskLabel}
      </div>
    </div>

    <!-- Alerts / AI rec -->
    ${alerts.slice(0, 2).map(a => `
      <div class="sc2-alert ${a.cls}">
        <div class="sc2-alert-icon">${a.icon}</div>
        <div class="sc2-alert-text">${a.html}</div>
      </div>`).join('')}

    <a href="${ctaHref}" class="session-cta">${ctaLabel} <span class="cta-arrow">→</span></a>`;

  return { isRest: false, planText, cls };
}

// ── Week strip ─────────────────────────────────────────────────────────────
function _localDateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function _weekStripLabel(txt) {
  if (/sprint/i.test(txt))    return t('dash.chip_sprint');
  if (/fotball|soccer/i.test(txt)) return t('dash.chip_soccer');
  if (/basket/i.test(txt))    return t('dash.chip_basket');
  if (/sirk/i.test(txt))      return t('dash.chip_sirk');
  if (/mobil/i.test(txt))     return t('dash.chip_mobil');
  if (/kondi|condition/i.test(txt)) return t('dash.chip_kondi');
  if (/styrke|strength/i.test(txt)) return t('dash.chip_styrke');
  if (/hvile|rest/i.test(txt))     return t('dash.chip_hvile');
  if (/rehab/i.test(txt))     return t('dash.chip_rehab');
  const first = txt.split(/\s+/)[0];
  return first.length <= 8 ? first : first.slice(0, 7) + '…';
}
async function renderWeekStrip() {
  const now  = new Date();
  const dow  = now.getDay();
  const monday = new Date(now);
  monday.setDate(now.getDate() - ((dow + 6) % 7));
  monday.setHours(0,0,0,0);
  const sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);

  // Use LOCAL date strings to match DB dates (avoids UTC offset bug)
  const mondayStr = _localDateStr(monday);
  const sundayStr = _localDateStr(sunday);

  const [gymRes, sprintRes] = await Promise.all([
    db.from('gym_log').select('date,session_type').gte('date', mondayStr).lte('date', sundayStr),
    db.from('sprint_log').select('date').gte('date', mondayStr).lte('date', sundayStr),
  ]);

  const gymByDate = {};
  (gymRes.data || []).forEach(s => { gymByDate[s.date] = s.session_type || ''; });
  const sprintDates = new Set((sprintRes.data || []).map(s => s.date));

  const dayNames = (typeof _lang !== 'undefined' && _lang === 'en')
    ? ['mon','tue','wed','thu','fri','sat','sun']
    : ['man','tir','ons','tor','fre','lør','søn'];
  const el = document.getElementById('weekStrip');
  const todayStr = _localDateStr(now);

  el.innerHTML = Array.from({ length: 7 }, (_, i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    const dateStr = _localDateStr(d);
    const isToday = dateStr === todayStr;

    const chips = [];

    // Logged gym session
    const gymType = gymByDate[dateStr];
    if (gymType !== undefined) {
      let cls = 'ind-styrke';
      if (/sprint/i.test(gymType))                              cls = 'ind-sprint';
      else if (/mobilitet|sirkulasjon|kondisjon|mobility|condition/i.test(gymType)) cls = 'ind-kondisjon';
      else if (/rehab/i.test(gymType))                          cls = 'ind-rehab';
      else if (/fotball|soccer|basket|football/i.test(gymType)) cls = 'ind-soccer';
      chips.push({ cls, label: _weekStripLabel(gymType) || t('dash.chip_styrke') });
    }

    // Logged sprint session (if not already counted as sprint)
    if (sprintDates.has(dateStr) && !chips.some(c => c.cls === 'ind-sprint')) {
      chips.push({ cls: 'ind-sprint', label: t('dash.chip_sprint') });
    }

    // Plan-based chip for days with no logged session
    if (!chips.length) {
      const txt = (weekPlan[i] || '').trim();
      if (txt && !/^hvile/i.test(txt) && !/^fri$/i.test(txt)) {
        const t = txt.toLowerCase();
        let cls = 'ind-styrke';
        if (/sprint/.test(t)) cls = 'ind-sprint';
        else if (/kondisjon|sirkulasjon|mobilitet|condition|mobility/.test(t)) cls = 'ind-kondisjon';
        else if (/rehab/.test(t)) cls = 'ind-rehab';
        else if (/fotball|soccer|basket|football/.test(t)) cls = 'ind-soccer';
        chips.push({ cls, label: _weekStripLabel(txt) });
      }
    }

    return `<div class="week-day${isToday ? ' today' : ''}">
      <div class="week-day-name">${dayNames[i]}</div>
      <div class="week-day-num">${d.getDate()}</div>
      ${chips.length
        ? chips.map(c => `<div class="week-session-chip ${c.cls}">${c.label}</div>`).join('')
        : `<div class="week-day-indicator ind-rest"></div>`}
    </div>`;
  }).join('');
}

// ── Dagens fokus ─────────────────────────────────────────────────────────────
let _calUpcoming   = [];
let _calTodayEvts  = [];   // cache — re-rendres uten nettverksfall ved språkbytte
let _sleepRowCache = null; // cache — re-rendres uten DB-kall ved språkbytte
let _lastFokusData = null;

function _fokusKey(id)    { return `fokus_done_${today()}_${id}`; }
function _isFokusDone(id) { return !!localStorage.getItem(_fokusKey(id)); }

// Rydd fokus-nøkler eldre enn 7 dager så localStorage ikke vokser ubegrenset
(function cleanFokusKeys() {
  const cutoff = Date.now() - 7 * 86400000;
  Object.keys(localStorage).forEach(k => {
    if (!k.startsWith('fokus_done_')) return;
    const datePart = k.split('_')[2]; // fokus_done_YYYY-MM-DD_id
    if (datePart && new Date(datePart).getTime() < cutoff) localStorage.removeItem(k);
  });
})();

function toggleFokusItem(id) {
  const key = _fokusKey(id);
  if (localStorage.getItem(key)) localStorage.removeItem(key);
  else localStorage.setItem(key, '1');
  if (_lastFokusData) renderDailyFokus(_lastFokusData);
}

function _buildFokusList({ sleepData, kneeData, sessionData, rehabData }) {
  const items = [];
  const isRest   = !!sessionData?.isRest;
  const isSprint = sessionData?.cls === 'power';
  const isSoccer = sessionData?.cls === 'soccer';
  const isRehabSession = sessionData?.cls === 'rehab';
  const isStyrke = !isRest && !isSprint && !isSoccer && !isRehabSession;

  const sleepHours      = sleepData?.sleep_hours || 0;
  const lastPain        = kneeData?.after_score ?? null;
  const dayAfterMissing = kneeData &&
    (kneeData.day_after_score === null || kneeData.day_after_score === undefined);

  // ── Priority 1-2: Urgent / blocking ──────────────────────────────────
  if (dayAfterMissing) {
    items.push({ id: 'knee-dayafter', priority: 1, cat: 'rehab', type: 'actionable',
      text: t('dash.focus_knee_dayafter') });
  }

  if (lastPain !== null && lastPain >= 3) {
    items.push({ id: 'knee-warning', priority: 2, cat: 'warning', type: 'info',
      text: isSprint ? t('dash.focus_careful_sprint') : t('dash.focus_no_push'),
      subtext: t('dash.focus_pain_after', {n: lastPain}) });
  }

  // ── Rehab-specific checks ─────────────────────────────────────────────
  if (rehabData) {
    const { daysSince, lastKnee } = rehabData;
    const rehabDayAfterMissing = lastKnee && daysSince === 1 &&
      (lastKnee.day_after_score === null || lastKnee.day_after_score === undefined);
    if (rehabDayAfterMissing) {
      items.push({ id: 'rehab-dayafter', priority: 1, cat: 'rehab', type: 'actionable',
        text: t('dash.focus_rehab_dayafter') });
    }
    if (lastKnee?.day_after_score > 3) {
      items.push({ id: 'rehab-pain-warning', priority: 2, cat: 'warning', type: 'info',
        text: t('dash.focus_rehab_pain_warning'),
        subtext: t('dash.focus_pain_after', { n: lastKnee.day_after_score }) });
    }
    // Fjernet «rehab ikke gjennomført på X dager»-varselet: Filip gjør rehab
    // som del av oppvarmingen på styrke-/sprintdager, så de logges ikke som
    // egne rehab-økter. Varselet ble derfor misvisende.
  }

  // ── Priority 2-3: Sleep ───────────────────────────────────────────────
  if (sleepHours > 0 && sleepHours < 7) {
    items.push({ id: 'sleep-critical', priority: 2, cat: 'sovn', type: 'info',
      text: t('dash.focus_reduced_load'),
      subtext: t('dash.focus_sleep_sub', {h: fmtHM(sleepHours)}) });
  } else if (sleepHours > 0 && sleepHours < 8) {
    items.push({ id: 'sleep-under8', priority: 4, cat: 'sovn', type: 'info',
      text: t('dash.focus_under8'),
      subtext: t('dash.focus_under8_sub', {h: fmtHM(sleepHours)}) });
  }

  // ── Priority 2-3: Calendar ────────────────────────────────────────────
  const tmrw    = new Date(); tmrw.setDate(tmrw.getDate() + 1);
  const tmrwStr = tmrw.toDateString();

  // Check tomorrow's planned session from weekPlan to avoid suggesting heavy prep for rest days
  const tmrwPlanIndex = (tmrw.getDay() + 6) % 7; // tomorrow's weekPlan index (0=Mon)
  const tmrwPlanText = (weekPlan[tmrwPlanIndex] || '').trim();
  const tmrwIsRest = !tmrwPlanText || /^hvile/i.test(tmrwPlanText) || /^fri$/i.test(tmrwPlanText);
  const tmrwIsRehab = /^rehab/i.test(tmrwPlanText);

  const compTomorrow = _calUpcoming.some(e => {
    const d = new Date(e.start?.dateTime || (e.start?.date + 'T12:00:00'));
    return d.toDateString() === tmrwStr &&
      /stevne|konkurranse|competition|meet|race/i.test(e.summary || '');
  });
  // Only suggest heavy tomorrow if plan says it's not a rest/rehab day
  const heavyTomorrow = !tmrwIsRest && !tmrwIsRehab && !compTomorrow && _calUpcoming.some(e => {
    const d = new Date(e.start?.dateTime || (e.start?.date + 'T12:00:00'));
    return d.toDateString() === tmrwStr &&
      /styrke|sprint|friidrett|trening/i.test(e.summary || '');
  });

  if (compTomorrow) {
    items.push({ id: 'cal-comp', priority: 2, cat: 'kalender', type: 'info',
      text: t('dash.focus_restitusjon') });
    items.push({ id: 'cal-sleep-early', priority: 3, cat: 'kalender', type: 'info',
      text: t('dash.focus_sleep_early') });
  } else if (heavyTomorrow) {
    items.push({ id: 'cal-heavy', priority: 7, cat: 'kalender', type: 'info',
      text: t('dash.focus_heavy_tmrw') });
  }

  // ── Priority 5-8: Training-day specific ──────────────────────────────
  if (isRest) {
    items.push({ id: 'rehab', priority: 5, cat: 'rehab', type: 'actionable',
      text: t('dash.focus_rehab') });
    items.push({ id: 'active-rest', priority: 8, cat: 'recovery', type: 'info',
      text: t('dash.focus_active_rest') });
  }

  if (isStyrke) {
    items.push({ id: 'warmup-styrke', priority: 6, cat: 'styrke', type: 'info',
      text: t('dash.focus_warmup') });
    items.push({ id: 'knee-log-session', priority: 6, cat: 'styrke', type: 'actionable',
      text: t('dash.focus_knee_log'),
      autoDone: kneeData?.date === today() });
  }

  if (isRehabSession) {
    items.push({ id: 'rehab-day', priority: 5, cat: 'rehab', type: 'actionable',
      text: t('dash.focus_rehab') });
    items.push({ id: 'rehab-knee-log', priority: 6, cat: 'rehab', type: 'actionable',
      text: t('dash.focus_knee_log'),
      autoDone: kneeData?.date === today() });
  }

  if (isSoccer) {
    items.push({ id: 'soccer-warmup', priority: 6, cat: 'sprint', type: 'info',
      text: t('dash.focus_soccer_warmup') });
    items.push({ id: 'soccer-knee-care', priority: 6, cat: 'warning', type: 'info',
      text: t('dash.focus_soccer_knee') });
    items.push({ id: 'soccer-log', priority: 7, cat: 'sprint', type: 'actionable',
      text: t('dash.focus_soccer_log') });
  }

  if (isSprint) {
    items.push({ id: 'sprint-warmup', priority: 6, cat: 'sprint', type: 'info',
      text: t('dash.focus_sprint_warmup') });
    items.push({ id: 'sprint-log', priority: 6, cat: 'sprint', type: 'actionable',
      text: t('dash.focus_sprint_log') });
    items.push({ id: 'sprint-intensity', priority: 7, cat: 'sprint', type: 'info',
      text: t('dash.focus_intensity') });
  }

  return items.sort((a, b) => a.priority - b.priority).slice(0, 5);
}

function _FOKUS_CAT_LABELS() { return {
  styrke: t('dash.cat_styrke'), sprint: t('dash.cat_sprint'), rehab: t('dash.cat_rehab'),
  recovery: t('dash.cat_recovery'), sovn: t('dash.cat_sovn'), warning: t('dash.cat_warning'), kalender: t('dash.cat_kalender'),
}; }

function _renderFokusItem(item) {
  const manualDone  = item.type === 'actionable' && !item.autoDone && _isFokusDone(item.id);
  const isDone      = !!item.autoDone || manualDone;
  const isCheckable = item.type === 'actionable' && !item.autoDone;
  const cls = ['fokus-item', `cat-${item.cat}`,
    isCheckable && 'is-checkable', isDone && 'is-done'].filter(Boolean).join(' ');

  return `<div class="${cls}"${isCheckable ? ` onclick="toggleFokusItem('${item.id}')"` : ''}>
    <div class="fokus-body">
      <div class="fokus-text">${escHtml(item.text)}</div>
      ${item.subtext ? `<div class="fokus-subtext">${escHtml(item.subtext)}</div>` : ''}
    </div>
    <span class="fokus-badge fokus-badge--${item.cat}">${_FOKUS_CAT_LABELS()[item.cat] || item.cat}</span>
    ${isCheckable ? '<div class="fokus-check"></div>' : ''}
  </div>`;
}

function updateOfflineBanner() {
  const b = document.getElementById('offlineBanner');
  if (b) b.style.display = navigator.onLine ? 'none' : '';
}
