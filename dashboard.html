<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Oversikt</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* ── Hero ── */
    .dash-hero {
      display: flex; justify-content: space-between; align-items: flex-end; gap: 12px;
    }
    .dash-title {
      font-size: 28px; font-weight: 700; letter-spacing: -0.03em;
      background: linear-gradient(135deg, #fff 0%, #c8c5be 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 6px;
    }
    .dash-tagline {
      font-size: 10px; font-family: var(--font-mono); letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--text-tertiary);
    }
    .dash-tagline .tg-sep { color: rgba(255,255,255,0.12); padding: 0 4px; }
    .dash-date {
      font-size: 10px; font-family: var(--font-mono); color: var(--text-tertiary);
      letter-spacing: 0.06em; text-align: right; flex-shrink: 0; padding-bottom: 3px;
      white-space: nowrap;
    }
    /* ── Layout ── */
    .summary-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
    /* ── Session badge ── */
    .session-badge {
      display: inline-block; font-size: 10px; font-weight: 700; font-family: var(--font-mono);
      padding: 3px 10px; border-radius: 20px; margin-bottom: 10px;
      letter-spacing: 0.08em; text-transform: uppercase;
    }
    .session-badge.styrke    { background: rgba(242,192,99,0.13);  color: #F2C063; border: 1px solid rgba(242,192,99,0.2); }
    .session-badge.kondisjon { background: rgba(107,227,164,0.13); color: #6BE3A4; border: 1px solid rgba(107,227,164,0.2); }
    .session-badge.power     { background: rgba(91,164,245,0.13);  color: #5BA4F5; border: 1px solid rgba(91,164,245,0.2); }
    .session-badge.hvile     { background: rgba(255,255,255,0.05); color: var(--text-tertiary); border: 1px solid rgba(255,255,255,0.08); }
    /* ── Session card ── */
    .session-card-main { border-color: rgba(91,164,245,0.1) !important; }
    .session-card-main:hover { border-color: rgba(91,164,245,0.2) !important; }
    .session-name-big { font-size: 15px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; line-height: 1.3; }
    .session-meta-sm { font-size: 10px; color: var(--text-tertiary); font-family: var(--font-mono); margin-bottom: 16px; letter-spacing: 0.04em; }
    .session-cta {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(91,164,245,0.1); border: 1px solid rgba(91,164,245,0.22);
      color: #5BA4F5; font-family: var(--font-mono); font-size: 11px; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase; padding: 8px 16px;
      border-radius: 6px; cursor: pointer; text-decoration: none;
      transition: background 0.2s ease, border-color 0.2s ease, transform 0.15s ease;
    }
    .session-cta:hover { background: rgba(91,164,245,0.18); border-color: rgba(91,164,245,0.38); transform: translateY(-1px); }
    .session-cta .cta-arrow { display: inline-block; transition: transform 0.2s ease; }
    .session-cta:hover .cta-arrow { transform: translateX(3px); }
    /* ── Exercise list ── */
    .ex-list { display: flex; flex-direction: column; gap: 3px; margin-top: 8px; }
    .ex-item { font-size: 11px; font-family: var(--font-mono); color: var(--text-tertiary); }
    .ex-item::before { content: '› '; color: var(--success); }
    /* ── Todos ── */
    .todos-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .todos-progress { font-size: 10px; font-family: var(--font-mono); color: var(--text-tertiary); letter-spacing: 0.08em; }
    .todo-item { transition: opacity 0.32s ease, transform 0.32s ease; border-radius: 5px; }
    .todo-item:hover { background: rgba(255,255,255,0.025); }
    .todo-item.completing { opacity: 0.2 !important; transform: translateX(8px); pointer-events: none; }
    /* ── Calendar ── */
    .cal-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1.25rem; }
    .cal-header-line { height: 1px; background: rgba(255,255,255,0.07); flex: 1; }
    .cal-header-label { font-family: var(--font-mono); font-size: 0.62rem; letter-spacing: 0.14em; color: var(--text-tertiary); white-space: nowrap; text-transform: uppercase; }
    .cal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    @media (max-width: 640px) { .cal-grid { grid-template-columns: 1fr; } }
    .cal-col-title { font-family: var(--font-mono); font-size: 0.6rem; letter-spacing: 0.1em; color: var(--success); margin-bottom: 0.75rem; text-transform: uppercase; }
    .cal-event {
      display: flex; align-items: center; gap: 0.45rem;
      padding: 0.4rem 0.35rem; border-bottom: 1px solid rgba(255,255,255,0.045);
      border-radius: 4px; margin: 0 -0.35rem;
      transition: background 0.15s ease;
    }
    .cal-event:last-child { border-bottom: none; }
    .cal-event:hover { background: rgba(255,255,255,0.025); }
    .cal-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .cal-event-time { font-family: var(--font-mono); font-size: 0.67rem; color: var(--success); min-width: 3rem; flex-shrink: 0; }
    .cal-event-title { font-size: 0.8rem; color: var(--text-secondary); line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cal-event-title.allday { color: var(--text-tertiary); font-style: italic; }
    .cal-empty { font-family: var(--font-mono); font-size: 0.72rem; color: var(--text-tertiary); padding: 0.5rem 0; }
    .cal-error { font-family: var(--font-mono); font-size: 0.68rem; color: var(--danger); padding: 0.5rem 0; }
    /* ── Knee pain ── */
    .pain-score-big { font-size: 38px; font-weight: 700; font-family: var(--font-mono); line-height: 1; }
    .pain-phase { font-size: 9px; font-family: var(--font-mono); letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-tertiary); }
    .pain-cols { display: flex; gap: 16px; justify-content: space-around; }
    .pain-col { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    /* ── Card polish ── */
    .card { transition: border-color 0.2s ease, box-shadow 0.2s ease; }
    .card:hover { box-shadow: 0 4px 28px rgba(0,0,0,0.2); }
    @media (max-width: 768px) { .summary-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<nav class="main-nav">
  <div class="nav-inner">
    <div class="nav-tabs">
      <a href="dashboard.html" class="nav-tab" data-p="dashboard">Dashboard</a>
      <a href="gym.html"       class="nav-tab" data-p="gym">Gym</a>
      <a href="sprint.html"    class="nav-tab" data-p="sprint">Sprint</a>
      <a href="sovn.html"      class="nav-tab" data-p="sovn">Søvn</a>
      <a href="gjoremal.html"  class="nav-tab" data-p="gjoremal">Gjøremål</a>
      <a href="treningsplan.html" class="nav-tab" data-p="treningsplan">Treningsoversikt</a>
    </div>
    <button onclick="signOut()" class="btn btn-ghost btn-sm" style="font-size:11px;flex-shrink:0;margin-left:8px">Logg ut</button>
  </div>
</nav>

<main class="page">
  <div class="dash-hero">
    <div>
      <div class="dash-title">Filip's Dashboard</div>
      <div class="dash-tagline">Sprint <span class="tg-sep">·</span> Rehab <span class="tg-sep">·</span> Performance</div>
    </div>
    <div class="dash-date" id="dateLabel">–</div>
  </div>

  <!-- Summary row -->
  <div class="summary-row">
    <!-- Sleep -->
    <div class="card">
      <div class="section-title">Søvn siste natt</div>
      <div id="sleepCard"><div class="loading">Laster…</div></div>
    </div>
    <!-- Knee pain -->
    <div class="card">
      <div class="section-title">Knesmerte siste økt</div>
      <div id="kneeCard"><div class="loading">Laster…</div></div>
    </div>
    <!-- Today's session -->
    <div class="card session-card-main">
      <div class="section-title">Dagens økt</div>
      <div id="sessionCard"><div class="loading">Laster…</div></div>
    </div>
  </div>

  <!-- Important todos -->
  <div class="card">
    <div class="todos-header">
      <div class="section-title" style="margin-bottom:0">Viktige gjøremål</div>
      <div class="todos-progress" id="todosProgress"></div>
    </div>
    <div id="importantTodos"><div class="loading">Laster…</div></div>
  </div>

  <!-- Calendar -->
  <div class="card">
    <div class="cal-header">
      <div class="cal-header-line"></div>
      <span class="cal-header-label">KALENDER — DENNE UKEN</span>
      <div class="cal-header-line"></div>
    </div>
    <div class="cal-grid">
      <div>
        <p class="cal-col-title">I dag</p>
        <div id="cal-today"><div class="loading">Laster…</div></div>
      </div>
      <div>
        <p class="cal-col-title">Kommende</p>
        <div id="cal-upcoming"><div class="loading">Laster…</div></div>
      </div>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
let db;

// Active nav
document.querySelector('[data-p="dashboard"]').classList.add('active');

// Toast
let _tt;
function toast(msg, type = 'ok') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `toast ${type} show`;
  clearTimeout(_tt); _tt = setTimeout(() => el.classList.remove('show'), 3000);
}
async function signOut() {
  if (db) await db.auth.signOut();
  window.location.href = 'login.html';

}

// Helpers
function today() { return new Date().toISOString().slice(0,10); }
function fmtDate(ds) {
  if (!ds) return '';
  const d = new Date(ds + 'T12:00:00');
  return d.toLocaleDateString('no-NO', { day:'numeric', month:'short', year:'2-digit' });
}
function painColor(s) {
  if (s === null || s === undefined) return 'var(--text-tertiary)';
  if (s <= 3) return 'var(--success)';
  if (s <= 5) return 'var(--warning)';
  if (s <= 7) return 'rgba(242,130,60,1)';
  return 'var(--danger)';
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Date label
const now = new Date();
document.getElementById('dateLabel').textContent =
  now.toLocaleDateString('no-NO', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

// ── Auto-clean completed todos from before today (max once per day) ──────
async function autoCleanTodos() {
  const key = 'ac_' + today();
  if (localStorage.getItem(key)) return;
  localStorage.setItem(key, '1');
  await db.from('todos').delete()
    .eq('completed', true)
    .lt('completed_at', today() + 'T00:00:00.000Z');
}

// ── Sleep card ──────────────────────────────────────────────────────────
async function loadSleep() {
  const { data } = await db.from('health_data')
    .select('*').order('date', { ascending: false }).limit(1);
  const el = document.getElementById('sleepCard');
  if (!data || !data.length) {
    el.innerHTML = `<div class="empty">Ingen data — send via iPhone-snarvei</div>`; return;
  }
  const d = data[0];
  const sc = d.sleep_score > 0 ? d.sleep_score : null;
  const scoreColor = !sc ? 'var(--text-tertiary)' : sc >= 80 ? 'var(--success)' : sc >= 60 ? 'var(--warning)' : 'var(--danger)';
  el.innerHTML = `
    <div class="grid-2">
      <div class="metric-tile">
        <div class="metric-lbl">Score</div>
        <div class="metric-val" style="color:${scoreColor}">${sc ?? '–'}</div>
        <div class="metric-unit">/ 100</div>
      </div>
      <div class="metric-tile">
        <div class="metric-lbl">Timer</div>
        <div class="metric-val">${d.sleep_hours > 0 ? d.sleep_hours : '–'}</div>
        <div class="metric-unit">t</div>
      </div>
      <div class="metric-tile">
        <div class="metric-lbl">Hvilepuls</div>
        <div class="metric-val ${d.rhr > 65 ? 'danger' : ''}">${d.rhr > 0 ? d.rhr : '–'}</div>
        <div class="metric-unit">bpm</div>
      </div>
      <div class="metric-tile">
        <div class="metric-lbl">HRV</div>
        <div class="metric-val">${d.hrv > 0 ? d.hrv : '–'}</div>
        <div class="metric-unit">ms</div>
      </div>
    </div>
    <div style="font-size:10px;color:var(--text-tertiary);font-family:var(--font-mono);margin-top:10px">${fmtDate(d.date)}</div>`;
}

// ── Knee pain card ──────────────────────────────────────────────────────
async function loadKnee() {
  const { data } = await db.from('knee_pain')
    .select('*').order('created_at', { ascending: false }).limit(1);
  const el = document.getElementById('kneeCard');
  if (!data || !data.length) {
    el.innerHTML = `<div class="empty">Ingen smertelogg ennå</div>`; return;
  }
  const d = data[0];
  const phases = [
    { label: 'Før',       val: d.before_score },
    { label: 'Under',     val: d.during_score },
    { label: 'Etter',     val: d.after_score },
    { label: 'Dagen etter', val: d.day_after_score },
  ];
  el.innerHTML = `
    <div class="pain-cols">
      ${phases.map(p => `
        <div class="pain-col">
          <div class="pain-score-big" style="color:${painColor(p.val)}">${p.val ?? '–'}</div>
          <div class="pain-phase">${p.label}</div>
        </div>`).join('')}
    </div>
    <div style="font-size:10px;color:var(--text-tertiary);font-family:var(--font-mono);margin-top:12px">
      ${escHtml(d.session_type || '')} · ${fmtDate(d.date)}
    </div>`;
}

// ── Today's session card ────────────────────────────────────────────────
function loadSession() {
  const el = document.getElementById('sessionCard');
  const plan = JSON.parse(localStorage.getItem('treningsplan_v1') || '{}');
  const planIndex = (new Date().getDay() + 6) % 7;
  const planText = (plan[planIndex] || '').trim();

  if (!planText || /^hvile/i.test(planText)) {
    el.innerHTML = `
      <span class="session-badge hvile">Hviledag</span>
      <div class="session-name-big" style="color:var(--text-secondary)">Restitusjonsdag</div>
      <div class="session-meta-sm">Ingen planlagt økt i dag</div>`;
    return;
  }

  let cls = 'styrke';
  if (/sprint/i.test(planText)) cls = 'power';
  else if (/kondisjon|sirkulasjon|mobilitet/i.test(planText)) cls = 'kondisjon';

  const badgeLabels = { styrke: 'Styrke', kondisjon: 'Kondisjon', power: 'Sprint' };
  const dayNow = new Date().toLocaleDateString('no-NO', { weekday: 'long' });

  el.innerHTML = `
    <span class="session-badge ${cls}">${badgeLabels[cls]}</span>
    <div class="session-name-big">${escHtml(planText)}</div>
    <div class="session-meta-sm">Fra ukeplanen · ${dayNow}</div>
    <a href="gym.html" class="session-cta">Åpne Gym <span class="cta-arrow">→</span></a>`;
}

// ── Important todos ─────────────────────────────────────────────────────
async function loadTodos() {
  const { data } = await db.from('todos')
    .select('*')
    .eq('important', true)
    .eq('completed', false)
    .order('due_date', { ascending: true, nullsLast: true });
  const el = document.getElementById('importantTodos');
  const progressEl = document.getElementById('todosProgress');
  if (!data || !data.length) {
    if (progressEl) progressEl.textContent = '';
    el.innerHTML = `<div class="empty">Ingen viktige gjøremål — legg til i <a href="gjoremal.html" style="color:var(--accent-blue)">Gjøremål</a></div>`;
    return;
  }
  if (progressEl) progressEl.textContent = `${data.length} aktive`;
  el.innerHTML = data.map(t => {
    const due = t.due_date ? new Date(t.due_date + 'T12:00:00') : null;
    const isOverdue = due && due < new Date();
    return `<div class="todo-item important">
      <div class="todo-cb" onclick="completeTodo('${t.id}', this)"></div>
      <span class="todo-text">${escHtml(t.title)}</span>
      ${t.due_date ? `<span class="todo-due ${isOverdue?'overdue':''}">${fmtDate(t.due_date)}</span>` : ''}
      <span class="star-btn active">★</span>
    </div>`;
  }).join('');
}

async function completeTodo(id, cbEl) {
  const item = cbEl.closest('.todo-item');
  item.classList.add('completing');
  await db.from('todos').update({ completed: true, completed_at: new Date().toISOString() }).eq('id', id);
  setTimeout(() => {
    item.remove();
    const progressEl = document.getElementById('todosProgress');
    if (progressEl) {
      const remaining = document.querySelectorAll('#importantTodos .todo-item').length;
      progressEl.textContent = remaining > 0 ? `${remaining} aktive` : '';
    }
  }, 350);
}

// ── Google Calendar ─────────────────────────────────────────────────────
function _calFmtTime(start) {
  if (!start.dateTime) return 'Heldags';
  return new Date(start.dateTime).toLocaleTimeString('nb-NO', { hour: '2-digit', minute: '2-digit' });
}
function _calFmtDate(start) {
  const d = new Date(start.dateTime || start.date);
  const tmrw = new Date(); tmrw.setDate(tmrw.getDate() + 1);
  if (d.toDateString() === tmrw.toDateString()) return 'I morgen';
  return d.toLocaleDateString('nb-NO', { weekday: 'short', day: 'numeric', month: 'short' });
}
function _calIsToday(start) {
  return new Date(start.dateTime || start.date).toDateString() === new Date().toDateString();
}
function kalenderFarge(tittel) {
  const t = tittel || '';
  if (t.includes('Styrke') || t.includes('Friidrett')) return '#FFB84D';
  if (t.includes('Stevne') || t.includes('Konkurranse')) return '#F6C453';
  if (t.includes('Gudstjeneste') || t.includes('Salhus') || t.includes('Salt')) return '#EFD97A';
  if (t.includes('Helligdag') || t.includes('Fri')) return '#66C7A3';
  return '#B197FC';
}
function _calEventHTML(timeLabel, title, allDay) {
  return `<div class="cal-event">
    <div class="cal-dot" style="background:${kalenderFarge(title)}"></div>
    <span class="cal-event-time">${timeLabel}</span>
    <span class="cal-event-title${allDay ? ' allday' : ''}">${escHtml(title)}</span>
  </div>`;
}

async function loadCalendar() {
  const elToday    = document.getElementById('cal-today');
  const elUpcoming = document.getElementById('cal-upcoming');
  try {
    const res = await fetch('/api/google-calendar');
    if (!res.ok) throw new Error('API svarte ' + res.status);
    const { today: todayEvts = [], upcoming = [] } = await res.json();

    elToday.innerHTML = todayEvts.length
      ? todayEvts.map(e => _calEventHTML(_calFmtTime(e.start), e.summary || '(uten tittel)', !e.start.dateTime)).join('')
      : '<p class="cal-empty">Ingen hendelser i dag</p>';

    const future = upcoming.filter(e => !_calIsToday(e.start));
    elUpcoming.innerHTML = future.length
      ? future.slice(0, 8).map(e => _calEventHTML(_calFmtDate(e.start), e.summary || '(uten tittel)', !e.start.dateTime)).join('')
      : '<p class="cal-empty">Ingenting planlagt</p>';
  } catch {
    elToday.innerHTML    = '<p class="cal-error">Kalender ikke tilkoblet</p>';
    elUpcoming.innerHTML = '';
  }
}

// ── Init ────────────────────────────────────────────────────────────────
(async () => {
  try {
    const r = await fetch('/api/config');
    if (!r.ok) throw new Error('Config-tjeneste svarte ' + r.status);
    const cfg = await r.json();
    if (cfg.error) throw new Error(cfg.error);
    db = supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);
    const { data: { session } } = await db.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }
  } catch (err) {
    document.querySelector('.page').innerHTML =
      `<div class="card" style="text-align:center;padding:40px">
        <div style="color:var(--danger);font-family:var(--font-mono);font-size:13px">${err.message}</div>
        <div style="color:var(--text-tertiary);font-size:11px;margin-top:10px">
          Deploy til Netlify og sett SUPABASE_URL og SUPABASE_ANON_KEY som miljøvariabler.
        </div>
      </div>`;
    return;
  }
  loadSession();
  await Promise.all([autoCleanTodos(), loadSleep(), loadKnee(), loadTodos(), loadCalendar()]);
})();
</script>
</body>
</html>
