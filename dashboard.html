<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Oversikt</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .dash-title {
      font-size: 26px; font-weight: 700; letter-spacing: -0.025em;
      background: linear-gradient(180deg, #fff 0%, #C7C4BC 120%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 4px;
    }
    .dash-sub { font-size: 12px; color: var(--text-tertiary); font-family: var(--font-mono); }
    .summary-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
    .session-badge {
      display: inline-block; font-size: 13px; font-weight: 700; font-family: var(--font-mono);
      padding: 4px 12px; border-radius: 20px; margin-bottom: 8px;
    }
    .session-badge.styrke   { background: rgba(242,192,99,0.15);  color: #F2C063; }
    .session-badge.kondisjon { background: rgba(107,227,164,0.15); color: #6BE3A4; }
    .session-badge.power    { background: rgba(91,164,245,0.15);  color: #5BA4F5; }
    .session-badge.hvile    { background: rgba(255,255,255,0.06); color: var(--text-tertiary); }
    .ex-list { display: flex; flex-direction: column; gap: 3px; margin-top: 8px; }
    .ex-item { font-size: 11px; font-family: var(--font-mono); color: var(--text-tertiary); }
    .ex-item::before { content: '› '; color: var(--success); }
    .cal-day { margin-bottom: 12px; }
    .cal-day-label { font-size: 10px; font-family: var(--font-mono); color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 5px; }
    .cal-event-pill {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 10px; background: rgba(255,255,255,0.03); border-radius: 7px;
      margin-bottom: 3px; border-left: 2px solid rgba(255,255,255,0.15);
    }
    .cal-event-time { font-size: 10px; font-family: var(--font-mono); color: var(--text-tertiary); flex-shrink: 0; }
    .cal-event-title { font-size: 12px; color: var(--text-secondary); }
    .pain-score-big { font-size: 40px; font-weight: 700; font-family: var(--font-mono); line-height: 1; }
    .pain-phase { font-size: 9px; font-family: var(--font-mono); letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-tertiary); }
    .pain-cols { display: flex; gap: 16px; justify-content: space-around; }
    .pain-col { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    @media (max-width: 768px) { .summary-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<nav class="main-nav">
  <div class="nav-inner">
    <div class="nav-tabs">
      <a href="dashboard.html" class="nav-tab" data-p="dashboard">Dashboard</a>
      <a href="gym.html"       class="nav-tab" data-p="gym">Gym</a>
      <a href="sprint.html"    class="nav-tab" data-p="sprint">Sprint</a>
      <a href="sovn.html"      class="nav-tab" data-p="sovn">Søvn</a>
      <a href="gjoremal.html"  class="nav-tab" data-p="gjoremal">Gjøremål</a>
    </div>
  </div>
</nav>

<main class="page">
  <div>
    <div class="dash-title">Filip's Dashboard</div>
    <div class="dash-sub" id="dateLabel">–</div>
  </div>

  <!-- Summary row -->
  <div class="summary-row">
    <!-- Sleep -->
    <div class="card">
      <div class="section-title">Søvn siste natt</div>
      <div id="sleepCard"><div class="loading">Laster…</div></div>
    </div>
    <!-- Knee pain -->
    <div class="card">
      <div class="section-title">Knesmerte siste økt</div>
      <div id="kneeCard"><div class="loading">Laster…</div></div>
    </div>
    <!-- Today's session -->
    <div class="card">
      <div class="section-title">Dagens økt</div>
      <div id="sessionCard"><div class="loading">Laster…</div></div>
    </div>
  </div>

  <!-- Important todos -->
  <div class="card">
    <div class="section-title">Viktige gjøremål</div>
    <div id="importantTodos"><div class="loading">Laster…</div></div>
  </div>

  <!-- Calendar -->
  <div class="card">
    <div class="section-title">Kalender — denne uken</div>
    <div id="calendarCard"><div class="loading">Laster…</div></div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
let db;

// Active nav
document.querySelector('[data-p="dashboard"]').classList.add('active');

// Toast
let _tt;
function toast(msg, type = 'ok') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `toast ${type} show`;
  clearTimeout(_tt); _tt = setTimeout(() => el.classList.remove('show'), 3000);
}

// Helpers
function today() { return new Date().toISOString().slice(0,10); }
function dayName() {
  return ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'][new Date().getDay()];
}
function fmtDate(ds) {
  if (!ds) return '';
  const d = new Date(ds + 'T12:00:00');
  return d.toLocaleDateString('no-NO', { day:'numeric', month:'short', year:'2-digit' });
}
function painColor(s) {
  if (s === null || s === undefined) return 'var(--text-tertiary)';
  if (s <= 3) return 'var(--success)';
  if (s <= 5) return 'var(--warning)';
  if (s <= 7) return 'rgba(242,130,60,1)';
  return 'var(--danger)';
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Date label
const now = new Date();
document.getElementById('dateLabel').textContent =
  now.toLocaleDateString('no-NO', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

// ── Auto-clean completed todos from before today ────────────────────────
async function autoCleanTodos() {
  const todayStart = today() + 'T00:00:00.000Z';
  await db.from('todos').delete()
    .eq('completed', true)
    .lt('completed_at', todayStart);
}

// ── Sleep card ──────────────────────────────────────────────────────────
async function loadSleep() {
  const { data } = await db.from('health_data')
    .select('*').order('date', { ascending: false }).limit(1);
  const el = document.getElementById('sleepCard');
  if (!data || !data.length) {
    el.innerHTML = `<div class="empty">Ingen data — send via iPhone-snarvei</div>`; return;
  }
  const d = data[0];
  const scoreColor = d.sleep_score >= 80 ? 'var(--success)' : d.sleep_score >= 60 ? 'var(--warning)' : 'var(--danger)';
  el.innerHTML = `
    <div class="grid-2">
      <div class="metric-tile">
        <div class="metric-lbl">Score</div>
        <div class="metric-val" style="color:${scoreColor}">${d.sleep_score ?? '–'}</div>
        <div class="metric-unit">/ 100</div>
      </div>
      <div class="metric-tile">
        <div class="metric-lbl">Timer</div>
        <div class="metric-val">${d.sleep_hours ?? '–'}</div>
        <div class="metric-unit">t</div>
      </div>
      <div class="metric-tile">
        <div class="metric-lbl">HRV</div>
        <div class="metric-val">${d.hrv ?? '–'}</div>
        <div class="metric-unit">ms</div>
      </div>
      <div class="metric-tile">
        <div class="metric-lbl">Hvilepuls</div>
        <div class="metric-val ${d.rhr > 65 ? 'danger' : ''}">${d.rhr ?? '–'}</div>
        <div class="metric-unit">bpm</div>
      </div>
    </div>
    <div style="font-size:10px;color:var(--text-tertiary);font-family:var(--font-mono);margin-top:10px">${fmtDate(d.date)}</div>`;
}

// ── Knee pain card ──────────────────────────────────────────────────────
async function loadKnee() {
  const { data } = await db.from('knee_pain')
    .select('*').order('date', { ascending: false }).limit(1);
  const el = document.getElementById('kneeCard');
  if (!data || !data.length) {
    el.innerHTML = `<div class="empty">Ingen smertelogg ennå</div>`; return;
  }
  const d = data[0];
  const phases = [
    { label: 'Før',       val: d.before_score },
    { label: 'Under',     val: d.during_score },
    { label: 'Etter',     val: d.after_score },
    { label: 'Dagen etter', val: d.day_after_score },
  ];
  el.innerHTML = `
    <div class="pain-cols">
      ${phases.map(p => `
        <div class="pain-col">
          <div class="pain-score-big" style="color:${painColor(p.val)}">${p.val ?? '–'}</div>
          <div class="pain-phase">${p.label}</div>
        </div>`).join('')}
    </div>
    <div style="font-size:10px;color:var(--text-tertiary);font-family:var(--font-mono);margin-top:12px">
      ${escHtml(d.session_type || '')} · ${fmtDate(d.date)}
    </div>`;
}

// ── Today's session card ────────────────────────────────────────────────
async function loadSession() {
  const el = document.getElementById('sessionCard');
  const d  = dayName();
  const sessionMap = {
    monday:    { label: 'Styrke Kapasitet', cls: 'styrke' },
    wednesday: { label: 'Sirkulasjon & Mobilitet', cls: 'kondisjon' },
    friday:    { label: 'Styrke Power', cls: 'power' },
  };
  const s = sessionMap[d];
  if (!s) {
    el.innerHTML = `<span class="session-badge hvile">HVILEDAG</span><div style="font-size:12px;color:var(--text-tertiary)">Ingen planlagt økt i dag.</div>`;
    return;
  }
  const { data: exs } = await db.from('workout_program')
    .select('exercise_name, sets, reps, section')
    .eq('day', d).order('sort_order').limit(8);
  const beinExs = (exs || []).filter(e => e.section === 'Bein').slice(0,4);
  el.innerHTML = `
    <span class="session-badge ${s.cls}">${s.label.toUpperCase()}</span>
    <div class="ex-list">
      ${beinExs.map(e => `<div class="ex-item">${escHtml(e.exercise_name)} — ${e.sets}×${e.reps}</div>`).join('')}
      ${beinExs.length < (exs||[]).length ? `<div class="ex-item" style="color:var(--accent-blue)">+ ${(exs||[]).length - beinExs.length} øvelser til →</div>` : ''}
    </div>
    <a href="gym.html" class="btn btn-ghost btn-sm" style="margin-top:12px;text-decoration:none">Åpne Gym →</a>`;
}

// ── Important todos ─────────────────────────────────────────────────────
async function loadTodos() {
  const { data } = await db.from('todos')
    .select('*')
    .eq('important', true)
    .eq('completed', false)
    .order('due_date', { ascending: true, nullsLast: true });
  const el = document.getElementById('importantTodos');
  if (!data || !data.length) {
    el.innerHTML = `<div class="empty">Ingen viktige gjøremål — legg til i <a href="gjoremal.html" style="color:var(--accent-blue)">Gjøremål</a></div>`;
    return;
  }
  el.innerHTML = data.map(t => {
    const due = t.due_date ? new Date(t.due_date + 'T12:00:00') : null;
    const isOverdue = due && due < new Date();
    return `<div class="todo-item important">
      <div class="todo-cb" onclick="completeTodo('${t.id}', this)"></div>
      <span class="todo-text">${escHtml(t.title)}</span>
      ${t.due_date ? `<span class="todo-due ${isOverdue?'overdue':''}">${fmtDate(t.due_date)}</span>` : ''}
      <span class="star-btn active">★</span>
    </div>`;
  }).join('');
}

async function completeTodo(id, cbEl) {
  await db.from('todos').update({ completed: true, completed_at: new Date().toISOString() }).eq('id', id);
  cbEl.closest('.todo-item').style.opacity = '0.3';
  setTimeout(() => { cbEl.closest('.todo-item').remove(); }, 400);
}

// ── Google Calendar ─────────────────────────────────────────────────────
const GC_COLORS = {'1':'#A8C8FA','2':'#6BE3A4','5':'#F2C063','6':'#FF9068','11':'#FF6B6B'};

async function loadCalendar() {
  const el = document.getElementById('calendarCard');
  try {
    const res = await fetch('/api/google-calendar');
    if (!res.ok) throw new Error(res.statusText);
    const { events } = await res.json();
    if (!events || !events.length) { el.innerHTML = `<div class="empty">Ingen hendelser denne uken</div>`; return; }

    // Group by date
    const byDate = {};
    events.forEach(e => {
      const ds = (e.start || '').slice(0,10);
      if (!byDate[ds]) byDate[ds] = [];
      byDate[ds].push(e);
    });

    const dayNames = ['Søndag','Mandag','Tirsdag','Onsdag','Torsdag','Fredag','Lørdag'];
    el.innerHTML = Object.entries(byDate).sort(([a],[b]) => a.localeCompare(b)).map(([ds, evts]) => {
      const d = new Date(ds + 'T12:00:00');
      const isToday = ds === today();
      return `<div class="cal-day">
        <div class="cal-day-label" style="${isToday?'color:var(--success)':''}">${dayNames[d.getDay()]} ${d.getDate()}.${d.getMonth()+1}${isToday?' — I dag':''}</div>
        ${evts.map(e => {
          const acc = GC_COLORS[e.color] || 'rgba(255,255,255,0.2)';
          const t = e.allDay ? 'Heldags' : (e.start || '').slice(11,16);
          return `<div class="cal-event-pill" style="border-left-color:${acc}">
            <span class="cal-event-time">${t}</span>
            <span class="cal-event-title">${escHtml(e.title)}</span>
          </div>`;
        }).join('')}
      </div>`;
    }).join('');
  } catch {
    el.innerHTML = `<div class="empty">Kalender ikke tilkoblet (kun tilgjengelig via Netlify)</div>`;
  }
}

// ── Init ────────────────────────────────────────────────────────────────
(async () => {
  try {
    const r = await fetch('/api/config');
    if (!r.ok) throw new Error('Config-tjeneste svarte ' + r.status);
    const cfg = await r.json();
    if (cfg.error) throw new Error(cfg.error);
    db = supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);
  } catch (err) {
    document.querySelector('.page').innerHTML =
      `<div class="card" style="text-align:center;padding:40px">
        <div style="color:var(--danger);font-family:var(--font-mono);font-size:13px">${err.message}</div>
        <div style="color:var(--text-tertiary);font-size:11px;margin-top:10px">
          Deploy til Netlify og sett SUPABASE_URL og SUPABASE_ANON_KEY som miljøvariabler.
        </div>
      </div>`;
    return;
  }
  await autoCleanTodos();
  await Promise.all([loadSleep(), loadKnee(), loadSession(), loadTodos(), loadCalendar()]);
})();
</script>
</body>
</html>
