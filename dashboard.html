function renderDailyFokus(data) {
  if (!data) return;
  _lastFokusData = data;
  const el    = document.getElementById('dailyFokus');
  const items = _buildFokusList(data);
  if (!items.length) {
    el.innerHTML = `<div class="empty" style="padding:2px 0">${t('dash.all_ok')}</div>`;
  } else {
    el.innerHTML = `<div class="fokus-panel">${items.map(_renderFokusItem).join('')}</div>`;
  }
  // Oppdater «I dag»-fanen så den kan falle tilbake på fokus-forslag når den er tom
  if (typeof renderDashTodos === 'function') renderDashTodos();
}

// ── Dashboard-gjøremål: I dag / I morgen / Forfalt (basert på due_date) ──────
let dashTodoData = { today: [], tomorrow: [], overdue: [] };
let dashTodoTab  = 'today';

async function loadTodos() {
  const todayStr = today();
  const tm = new Date(); tm.setDate(tm.getDate() + 1);
  const tmrwStr = `${tm.getFullYear()}-${String(tm.getMonth()+1).padStart(2,'0')}-${String(tm.getDate()).padStart(2,'0')}`;
  const { data } = await db.from('todos').select('*')
    .eq('completed', false)
    .order('due_date', { ascending: true, nullsLast: true });
  const all = data || [];
  dashTodoData = {
    today:    all.filter(t => t.due_date === todayStr),
    tomorrow: all.filter(t => t.due_date === tmrwStr),
    overdue:  all.filter(t => t.due_date && t.due_date < todayStr),
  };
  renderDashTodos();
}

function setDashTab(tab) { dashTodoTab = tab; renderDashTodos(); }

function openTaskList(listName) {
  try { if (listName) localStorage.setItem('gjoremal_active_tab', listName); } catch {}
  window.location.href = 'gjoremal.html';
}

function renderDashTodos() {
  const el = document.getElementById('importantTodos');
  if (!el) return;
  const counts = { today: dashTodoData.today.length, tomorrow: dashTodoData.tomorrow.length, overdue: dashTodoData.overdue.length };
  const tab  = dashTodoTab;
  const list = dashTodoData[tab] || [];
  const tabBtn = (key, label, extra = '') =>
    `<div class="dtt ${tab===key?'active':''} ${extra}" onclick="setDashTab('${key}')">${label} <span class="dtt-n">${counts[key]}</span></div>`;
  let html = `<div class="dash-todo-tabs">
      ${tabBtn('today', t('dash.today'))}
      ${tabBtn('tomorrow', t('dash.tomorrow'))}
      ${tabBtn('overdue', t('dash.overdue'), counts.overdue > 0 ? 'overdue has-overdue' : 'overdue')}
    </div><div class="dash-todo-list">`;
  if (!list.length) {
    const fb = (tab === 'today' && typeof _buildFokusList === 'function' && _lastFokusData)
      ? _buildFokusList(_lastFokusData).filter(i => i.type === 'actionable' && !i.autoDone && !_isFokusDone(i.id))
      : [];
    if (fb.length) {
      html += `<div class="dash-fallback-hint">${t('dash.from_focus')}</div>`;
      html += fb.map(i => `<div class="todo-item" style="cursor:pointer" onclick="toggleFokusItem('${i.id}')">
          <div class="todo-cb"></div>
          <span class="todo-text">${escHtml(i.text)}</span>
        </div>`).join('');
    } else {
      html += `<div class="empty">${t('gm.no_todos_empty')}</div>`;
    }
  } else {
    const moveBtns = (td) => {
      const b = (when, label) => `<span class="todo-move" onclick="event.stopPropagation(); moveTodo('${td.id}', '${when}', this)">→ ${label}</span>`;
      if (tab === 'overdue')  return b('today', t('dash.move_today')) + b('tomorrow', t('dash.move_tomorrow')) + `<span class="todo-move" onclick="event.stopPropagation(); clearDueDash('${td.id}', this)" title="${t('gm.clear_date')}">✕ dato</span>`;
      if (tab === 'today')    return b('tomorrow', t('dash.move_tomorrow'));
      if (tab === 'tomorrow') return b('today', t('dash.move_today'));
      return '';
    };
    html += list.map(td => `<div class="todo-item ${td.important ? 'important' : ''}">
        <div class="todo-cb" onclick="completeTodo('${td.id}', this)"></div>
        <span class="todo-text" style="cursor:pointer" data-list="${escHtml(td.list_name || '')}" onclick="openTaskList(this.dataset.list)">${escHtml(td.title)}</span>
        ${(td.due_date && tab !== 'today') ? `<span class="todo-due ${tab==='overdue'?'overdue':''}">${fmtDate(td.due_date)}</span>` : ''}
        <span class="todo-moves">${moveBtns(td)}</span>
        ${td.important ? `<span class="star-btn active">★</span>` : ''}
      </div>`).join('');
  }
  html += `</div>`;
  el.innerHTML = html;
  const progressEl = document.getElementById('todosProgress');
  if (progressEl) {
    const active = counts.today + counts.overdue;
    progressEl.textContent = active ? t('dash.active_tasks', { n: active }) : '';
  }
}

async function completeTodo(id, cbEl) {
  const item = cbEl.closest('.todo-item');
  if (item) item.classList.add('completing');
  const { error } = await db.from('todos').update({ completed: true, completed_at: new Date().toISOString() }).eq('id', id);
  if (error) { if (item) item.classList.remove('completing'); toast(t('dash.todo_err'), 'err'); return; }
  for (const k of ['today', 'tomorrow', 'overdue'])
    dashTodoData[k] = dashTodoData[k].filter(td => String(td.id) !== String(id));
  setTimeout(renderDashTodos, 350);
}

// Flytt et gjøremål til i dag / i morgen (oppdaterer due_date). Brukes på forfalte/dagens/morgendagens.
async function moveTodo(id, when, el) {
  const item = el && el.closest('.todo-item');
  const base = new Date();
  if (when === 'tomorrow') base.setDate(base.getDate() + 1);
  const due = `${base.getFullYear()}-${String(base.getMonth()+1).padStart(2,'0')}-${String(base.getDate()).padStart(2,'0')}`;
  if (item) item.classList.add('completing');
  const { error } = await db.from('todos').update({ due_date: due }).eq('id', id);
  if (error) { if (item) item.classList.remove('completing'); toast(t('dash.move_err'), 'err'); return; }
  toast(t('dash.moved'));
  await loadTodos().catch(() => {});
}

// Fjern forfallsdato på forfalt-fanen i dashboardet
async function clearDueDash(id, el) {
  const item = el && el.closest('.todo-item');
  if (item) item.classList.add('completing');
  const { error } = await db.from('todos').update({ due_date: null }).eq('id', id);
  if (error) { if (item) item.classList.remove('completing'); toast(t('gm.save_error'), 'err'); return; }
  toast(t('gm.date_removed'));
  await loadTodos().catch(() => {});
}

// Legg til fra forsiden — havner på dagen som matcher aktiv fane (I morgen → i morgen, ellers idag)
async function addDashTodo() {
  const input = document.getElementById('dashTodoInput');
  const title = input.value.trim();
  if (!title) return;
  const base = new Date();
  if (dashTodoTab === 'tomorrow') base.setDate(base.getDate() + 1);
  const due = `${base.getFullYear()}-${String(base.getMonth()+1).padStart(2,'0')}-${String(base.getDate()).padStart(2,'0')}`;
  input.disabled = true;
  const { error } = await db.from('todos').insert({ title, list_name: 'Generelt', completed: false, due_date: due });
  input.disabled = false;
  if (error) { toast(t('gm.save_error'), 'err'); return; }
  input.value = ''; input.focus();
  if (dashTodoTab === 'overdue') dashTodoTab = 'today';
  toast(t('gm.added'));
  await loadTodos().catch(() => {});
}

// ── Calendar helpers ───────────────────────────────────────────────────────
function _calFmtTime(start) {
  if (!start.dateTime) return t('kal.whole_day');
  return new Date(start.dateTime).toLocaleTimeString(fmtLocale(), { hour: '2-digit', minute: '2-digit' });
}
function _calFmtDate(start) {
  const d = new Date(start.dateTime || start.date);
  const tmrw = new Date(); tmrw.setDate(tmrw.getDate() + 1);
  if (d.toDateString() === tmrw.toDateString()) return t('dash.tomorrow');
  return d.toLocaleDateString(fmtLocale(), { weekday: 'short', day: 'numeric', month: 'short' });
}
function _calIsToday(start) {
  return new Date(start.dateTime || start.date).toDateString() === new Date().toDateString();
}
function kalenderFarge(tittel) {
  const s = tittel || '';
  if (/styrke|friidrett|strength|track/i.test(s)) return '#5BA4F5';
  if (/stevne|konkurranse|competition|meet|race/i.test(s)) return '#5BA4F5';
  if (/gudstjeneste|salhus|salt|church|service|worship/i.test(s)) return '#7EC8E3';
  if (/helligdag|holiday/i.test(s)) return '#66C7A3';
  return '#B197FC';
}
function _calEventHTML(timeLabel, title, allDay) {
  return `<div class="cal-event">
    <div class="cal-dot" style="background:${kalenderFarge(title)}"></div>
    <span class="cal-event-time">${timeLabel}</span>
    <span class="cal-event-title${allDay ? ' allday' : ''}">${escHtml(title)}</span>
  </div>`;
}

// ── Next event ─────────────────────────────────────────────────────────────
function renderNextEvent(upcoming) {
  const future = upcoming.filter(e => !_calIsToday(e.start));
  const cardEl = document.getElementById('nextEventCard');
  const el     = document.getElementById('nextEvent');
  if (!future.length || !cardEl) { if (cardEl) cardEl.style.display = 'none'; return; }

  const next = future[0];
  const color = kalenderFarge(next.summary || '');
  let whenStr;
  if (next.start.dateTime) {
    const d = new Date(next.start.dateTime);
    const tmrw = new Date(); tmrw.setDate(tmrw.getDate() + 1);
    const dayLabel = d.toDateString() === tmrw.toDateString()
      ? t('dash.tomorrow')
      : d.toLocaleDateString(fmtLocale(), { weekday: 'long', day: 'numeric', month: 'long' });
    whenStr = `${dayLabel} · ${d.toLocaleTimeString(fmtLocale(), { hour: '2-digit', minute: '2-digit' })}`;
  } else {
    whenStr = new Date(next.start.date + 'T12:00:00').toLocaleDateString(fmtLocale(), { weekday: 'long', day: 'numeric', month: 'long' });
  }

  el.innerHTML = `
    <div class="next-evt">
      <div class="next-evt-dot" style="background:${color}"></div>
      <div>
        <div class="next-evt-title">${escHtml(next.summary || t('dash.untitled'))}</div>
        <div class="next-evt-when">${whenStr}</div>
      </div>
    </div>`;
  cardEl.style.display = '';
}

// ── Google Calendar ────────────────────────────────────────────────────────
async function loadCalendar() {
  const elToday    = document.getElementById('cal-today');
  const elUpcoming = document.getElementById('cal-upcoming');
  try {
    // Cache i sessionStorage i 30 min — unngår unødvendig API-kall ved sidebytte
    const CAL_KEY = `cal_cache_${today()}`;
    let calData = null;
    const cached = sessionStorage.getItem(CAL_KEY);
    if (cached) {
      const { ts, data } = JSON.parse(cached);
      if (Date.now() - ts < 30 * 60 * 1000) calData = data;
    }
    if (!calData) {
      const { data: { session: calSess } } = await db.auth.getSession();
      const authHdr = calSess ? { Authorization: `Bearer ${calSess.access_token}` } : {};
      const res = await fetch('/api/google-calendar', { headers: authHdr });
      if (res.status === 401) { elToday.innerHTML = `<p class="cal-error">${t('dash.cal_not_connected')}</p>`; return; }
      if (!res.ok) throw new Error('API svarte ' + res.status);
      calData = await res.json();
      sessionStorage.setItem(CAL_KEY, JSON.stringify({ ts: Date.now(), data: calData }));
    }
    const { today: todayEvts = [], upcoming = [] } = calData;
    _calUpcoming  = upcoming;
    _calTodayEvts = todayEvts;
    renderCalendar();
    renderNextEvent(upcoming);
  } catch {
    const elToday2    = document.getElementById('cal-today');
    const elUpcoming2 = document.getElementById('cal-upcoming');
    if (elToday2)    elToday2.innerHTML    = `<p class="cal-error">${t('dash.cal_not_connected')}</p>`;
    if (elUpcoming2) elUpcoming2.innerHTML = '';
  }
}

// Re-render kalender fra cache — ingen nettverksfall, brukt ved språkbytte
function renderCalendar() {
  const elToday    = document.getElementById('cal-today');
  const elUpcoming = document.getElementById('cal-upcoming');
  if (!elToday || !elUpcoming) return;
  const todayEvts = _calTodayEvts;
  const upcoming  = _calUpcoming;
  elToday.innerHTML = todayEvts.length
    ? todayEvts.map(e => _calEventHTML(_calFmtTime(e.start), e.summary || t('dash.untitled'), !e.start.dateTime)).join('')
    : `<p class="cal-empty">${t('dash.no_today')}</p>`;
  const future = upcoming.filter(e => !_calIsToday(e.start));
  elUpcoming.innerHTML = future.length
    ? future.slice(0, 8).map(e => _calEventHTML(_calFmtDate(e.start), e.summary || t('dash.untitled'), !e.start.dateTime)).join('')
    : `<p class="cal-empty">${t('dash.cal_nothing_planned')}</p>`;
}

// ── Init ───────────────────────────────────────────────────────────────────
(async () => {
  try {
    const cfg = await getConfig();
    db = supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);
    const { data: { session } } = await db.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }
  } catch (err) {
    document.querySelector('.page').innerHTML =
      `<div class="card" style="text-align:center;padding:40px">
        <div style="color:var(--danger);font-family:var(--font-mono);font-size:13px">${err.message}</div>
        <div style="color:var(--text-tertiary);font-size:11px;margin-top:10px">
          ${t('dash.cfg_error')}
        </div>
      </div>`;
    return;
  }

  applyLang();
  staggerIn(document.querySelectorAll('.page > .card'));
  await loadSessionTemplates().catch(() => {});
  await loadWeekPlan().catch(() => {});
  const sessionData = loadSession();

  // #13: autoClean må fullføres FØR loadTodos (unngår race condition)
  await autoCleanTodos().catch(() => {});

  // Hvert kort har egen feilhåndtering — én feil stopper ikke resten
  const [sleepData, kneeData, rehabData] = await Promise.all([
    loadSleep().catch(e => { console.error('sleep', e); return null; }),
    loadInjuryCards().catch(e => { console.error('injuries', e); return null; }),
    loadRehabData().catch(() => null),
    loadTodos().catch(e => { console.error('todos', e); document.getElementById('importantTodos').innerHTML = `<div class="empty">${t('dash.todo_err')}</div>`; }),
    loadCalendar().catch(() => {}),
    renderWeekStrip().catch(() => {}),
    loadLoadPain().catch(e => { console.error('loadpain', e); document.getElementById('loadPainWrap').innerHTML = `<div class="empty">${t('dash.load_pain_empty')}</div>`; }),
  ]);

  renderDailyFokus({ sleepData, kneeData, sessionData, rehabData });

  // Hent søvn automatisk hvis de siste dagene mangler (null oppsett for brukeren)
  autoSyncSleep().then(async got => {
    if (!got) return;
    const fresh = await loadSleep().catch(() => null);
    renderDailyFokus({ sleepData: fresh, kneeData, sessionData, rehabData });
  });
})();

// Re-render dynamic content when language toggles (utils.js calls this from toggleLang)
// Ingen DB-kall her — alt re-rendres fra lokale cacher for umiddelbar respons.
onLangChange = () => {
  applyLang();
  rebuildWeekPlanLabels();        // re-resolve økt-labels til nytt språk
  loadSession();                  // synkron — bygger badge/CTA med t()
  renderSleepCard(_sleepRowCache);// re-render fra cache (ingen DB-kall)
  renderInjuryCards();            // re-render skadekort (fasenavn, kroppsdelsnavn)
  renderWeekStrip().catch(() => {});
  if (typeof renderDashTodos === 'function') renderDashTodos(); // bruker dashTodoData-cache
  if (_lastFokusData) renderDailyFokus(_lastFokusData);
  renderLoadPain();               // re-render graf med oversatte etiketter
  renderCalendar();               // re-render fra _calTodayEvts/_calUpcoming-cache
};
</script>
