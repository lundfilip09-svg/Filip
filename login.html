<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="icon" href="/favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="/favicon.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#050506">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Dashboard">
  <title>Logg inn</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .login-wrap {
      max-width: 360px; margin: 14vh auto 0; padding: 28px 26px 26px;
      animation: animInUp 0.5s cubic-bezier(0.2,0.7,0.2,1) both;
    }
    .login-mark {
      width: 46px; height: 46px; border-radius: 13px; margin-bottom: 18px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 800; font-family: var(--font-mono);
      color: var(--accent-blue);
      background: rgba(91,164,245,0.12);
      border: 1px solid rgba(91,164,245,0.28);
      box-shadow: 0 0 28px rgba(91,164,245,0.14);
    }
    .login-title { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; color: var(--text-primary); margin-bottom: 5px; }
    .login-sub { font-size: 12px; font-family: var(--font-mono); color: var(--text-tertiary); margin-bottom: 26px; }
    .login-error { color: var(--danger); font-size: 12px; font-family: var(--font-mono); min-height: 18px; margin-top: 8px; }
    .login-wrap .form-group + .form-group { margin-top: 14px; }
    #securityStep { display: none; }
    .lockout-msg { color: var(--danger); font-size: 12px; font-family: var(--font-mono); margin-top: 8px; }
    @media (prefers-reduced-motion: reduce) { .login-wrap { animation: none; } }
  </style>
</head>
<body>
<main class="page">
  <div class="card login-wrap">
    <div class="login-mark">F</div>
    <div class="login-title">Filip's Dashboard</div>

    <!-- Step 1: email + password -->
    <div id="passwordStep">
      <div class="login-sub" data-i18n="login.sub">Logg inn for å fortsette</div>
      <div class="form-group">
        <label class="form-label" data-i18n="login.email">E-post</label>
        <input type="email" id="email" placeholder="din@epost.no"
          data-i18n-placeholder="login.email_ph"
          onkeydown="if(event.key==='Enter')document.getElementById('password').focus()">
      </div>
      <div class="form-group">
        <label class="form-label" data-i18n="login.password">Passord</label>
        <input type="password" id="password" placeholder="••••••••"
          onkeydown="if(event.key==='Enter')signIn()">
      </div>
      <div class="login-error" id="loginError"></div>
      <button class="btn btn-primary" onclick="signIn()" id="loginBtn" style="width:100%;margin-top:12px" data-i18n="login.btn">
        Logg inn
      </button>
    </div>

    <!-- Step 2: security questions -->
    <div id="securityStep">
      <div class="login-sub" data-i18n="login.q_title">Sikkerhetsspørsmål</div>
      <div class="form-group">
        <label class="form-label" data-i18n="login.q1">Hvilket år begynte du med friidrett?</label>
        <input type="text" id="ans1" autocomplete="off"
          onkeydown="if(event.key==='Enter')document.getElementById('ans2').focus()">
      </div>
      <div class="form-group" style="margin-top:14px">
        <label class="form-label" data-i18n="login.q2">Hva het din første lærer?</label>
        <input type="text" id="ans2" autocomplete="off"
          onkeydown="if(event.key==='Enter')verifySecrets()">
      </div>
      <div class="login-error" id="secError"></div>
      <button class="btn btn-primary" onclick="verifySecrets()" id="secBtn" style="width:100%;margin-top:12px" data-i18n="login.q_btn">
        Bekreft
      </button>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="utils.js"></script>
<script>
let db;
let _pendingEmail    = '';
let _pendingPassword = '';

const MAX_ATTEMPTS = 5;
const LOCKOUT_MS   = 15 * 60 * 1000;
const LS_KEY       = 'login_attempts';

applyLang();
onLangChange = () => applyLang();

(async () => {
  try {
    const cfg = await getConfig();
    // tempDb: no session persistence — used only to validate password in step 1
    // This prevents Supabase from writing to localStorage and triggering redirects
    window._supabaseCfg = cfg;
    db = supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey, {
      auth: { persistSession: false, autoRefreshToken: false }
    });
    // Check for existing real session (from a previous full login)
    const realDb = supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);
    const { data: { session } } = await realDb.auth.getSession();
    if (session) window.location.href = 'dashboard.html';
  } catch (err) {
    document.getElementById('loginError').textContent = err.message;
  }
})();

// ── Rate limiting ──────────────────────────────────────────────
function getAttemptData() {
  try { return JSON.parse(localStorage.getItem(LS_KEY)) || { count: 0, lockedUntil: 0 }; }
  catch { return { count: 0, lockedUntil: 0 }; }
}
function saveAttemptData(d) { localStorage.setItem(LS_KEY, JSON.stringify(d)); }

function checkLockout() {
  const d = getAttemptData();
  if (d.lockedUntil && Date.now() < d.lockedUntil) {
    const minsLeft = Math.ceil((d.lockedUntil - Date.now()) / 60000);
    return t('login.lockout').replace('{m}', minsLeft);
  }
  if (d.lockedUntil && Date.now() >= d.lockedUntil) {
    saveAttemptData({ count: 0, lockedUntil: 0 });
  }
  return null;
}

function recordFailedAttempt() {
  const d = getAttemptData();
  d.count = (d.count || 0) + 1;
  if (d.count >= MAX_ATTEMPTS) {
    d.lockedUntil = Date.now() + LOCKOUT_MS;
    d.count = 0;
  }
  saveAttemptData(d);
  const remaining = MAX_ATTEMPTS - d.count;
  if (d.lockedUntil) return null; // locked — no attempts-left hint
  return remaining > 0 ? t('login.attempts_left').replace('{n}', remaining) : null;
}

function clearAttempts() { localStorage.removeItem(LS_KEY); }

// ── Step 1: password ──────────────────────────────────────────
async function signIn() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errEl    = document.getElementById('loginError');
  const btn      = document.getElementById('loginBtn');

  errEl.textContent = '';

  const lockMsg = checkLockout();
  if (lockMsg) { errEl.textContent = lockMsg; return; }

  if (!db)               { errEl.textContent = t('login.loading'); return; }
  if (!email || !password) { errEl.textContent = t('login.empty'); return; }

  btn.disabled = true;
  btn.textContent = t('login.loading');

  const { error } = await db.auth.signInWithPassword({ email, password });
  if (error) {
    const hint = recordFailedAttempt();
    const lockNow = checkLockout();
    errEl.textContent = (lockNow || error.message) + (hint ? '  ' + hint : '');
    btn.disabled = false;
    btn.textContent = t('login.btn');
    return;
  }

  // Password OK — store credentials, show security questions
  // No signOut needed: db uses persistSession:false so nothing was written to localStorage
  _pendingEmail    = email;
  _pendingPassword = password;
  document.getElementById('passwordStep').style.display = 'none';
  document.getElementById('securityStep').style.display = 'block';
  document.getElementById('ans1').focus();
  btn.disabled = false;
  btn.textContent = t('login.btn');
}

// ── Step 2: security questions ────────────────────────────────
async function verifySecrets() {
  const ans1  = document.getElementById('ans1').value.trim().toLowerCase();
  const ans2  = document.getElementById('ans2').value.trim().toLowerCase();
  const errEl = document.getElementById('secError');
  const btn   = document.getElementById('secBtn');

  errEl.textContent = '';
  if (!ans1 || !ans2) { errEl.textContent = t('login.empty'); return; }

  btn.disabled = true;
  btn.textContent = t('login.loading');

  const res = await fetch(
    `${window._supabaseCfg.supabaseUrl}/rest/v1/app_secrets?select=key,value&key=in.(q1_answer,q2_answer)`,
    { headers: { apikey: window._supabaseCfg.supabaseAnonKey } }
  );
  const data = res.ok ? await res.json() : null;
  const error = res.ok ? null : { message: `HTTP ${res.status}` };

  if (error || !data || data.length < 2) {
    errEl.textContent = error?.message || t('login.q_error');
    btn.disabled = false;
    btn.textContent = t('login.q_btn');
    return;
  }

  const map = {};
  data.forEach(r => { map[r.key] = r.value.trim().toLowerCase(); });

  if (ans1 !== map['q1_answer'] || ans2 !== map['q2_answer']) {
    const hint = recordFailedAttempt();
    const lockNow = checkLockout();
    errEl.textContent = (lockNow || t('login.q_error')) + (hint ? '  ' + hint : '');
    btn.disabled = false;
    btn.textContent = t('login.q_btn');
    return;
  }

  // Both correct — sign in for real with a session-persisting client
  clearAttempts();
  const realDb = supabase.createClient(window._supabaseCfg.supabaseUrl, window._supabaseCfg.supabaseAnonKey);
  const { error: signInErr } = await realDb.auth.signInWithPassword({ email: _pendingEmail, password: _pendingPassword });
  if (signInErr) {
    errEl.textContent = signInErr.message;
    btn.disabled = false;
    btn.textContent = t('login.q_btn');
    return;
  }

  window.location.href = 'dashboard.html';
}
</script>
</body>
</html>
