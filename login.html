<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logg inn</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .login-wrap { max-width: 360px; margin: 80px auto 0; }
    .login-title { font-size: 20px; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; }
    .login-sub { font-size: 12px; font-family: var(--font-mono); color: var(--text-tertiary); margin-bottom: 24px; }
    .login-error { color: var(--danger); font-size: 12px; font-family: var(--font-mono); min-height: 18px; margin-top: 6px; }
  </style>
</head>
<body>
<main class="page">
  <div class="card login-wrap">
    <div class="login-title">Filip's Dashboard</div>
    <div class="login-sub">Logg inn for å fortsette</div>
    <div class="form-group">
      <label class="form-label">E-post</label>
      <input type="email" id="email" placeholder="din@epost.no"
        onkeydown="if(event.key==='Enter')document.getElementById('password').focus()">
    </div>
    <div class="form-group">
      <label class="form-label">Passord</label>
      <input type="password" id="password" placeholder="••••••••"
        onkeydown="if(event.key==='Enter')signIn()">
    </div>
    <div class="login-error" id="loginError"></div>
    <button class="btn btn-primary" onclick="signIn()" id="loginBtn" style="width:100%;margin-top:12px">
      Logg inn
    </button>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
let db;

(async () => {
  try {
    const r = await fetch('/api/config');
    if (!r.ok) throw new Error('Config-tjeneste svarte ' + r.status);
    const cfg = await r.json();
    if (cfg.error) throw new Error(cfg.error);
    db = supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);

    const { data: { session } } = await db.auth.getSession();
    if (session) window.location.href = 'dashboard.html';
  } catch (err) {
    document.getElementById('loginError').textContent = err.message;
  }
})();

async function signIn() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errEl    = document.getElementById('loginError');
  const btn      = document.getElementById('loginBtn');

  errEl.textContent = '';
  if (!email || !password) { errEl.textContent = 'Fyll inn e-post og passord'; return; }

  btn.disabled = true;
  btn.textContent = 'Logger inn…';

  const { error } = await db.auth.signInWithPassword({ email, password });
  if (error) {
    errEl.textContent = error.message;
    btn.disabled = false;
    btn.textContent = 'Logg inn';
    return;
  }

  window.location.href = 'dashboard.html';
}
</script>
</body>
</html>
