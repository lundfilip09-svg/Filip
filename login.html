<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="/favicon.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#050506">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Dashboard">
  <title>Logg inn</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .login-wrap { max-width: 360px; margin: 80px auto 0; }
    .login-title { font-size: 20px; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; }
    .login-sub { font-size: 12px; font-family: var(--font-mono); color: var(--text-tertiary); margin-bottom: 24px; }
    .login-error { color: var(--danger); font-size: 12px; font-family: var(--font-mono); min-height: 18px; margin-top: 6px; }
  </style>
</head>
<body>
<main class="page">
  <div class="card login-wrap">
    <div class="login-title">Filip's Dashboard</div>
    <div class="login-sub" data-i18n="login.sub">Logg inn for å fortsette</div>
    <div class="form-group">
      <label class="form-label" data-i18n="login.email">E-post</label>
      <input type="email" id="email" placeholder="din@epost.no"
        data-i18n-placeholder="login.email_ph"
        onkeydown="if(event.key==='Enter')document.getElementById('password').focus()">
    </div>
    <div class="form-group">
      <label class="form-label" data-i18n="login.password">Passord</label>
      <input type="password" id="password" placeholder="••••••••"
        onkeydown="if(event.key==='Enter')signIn()">
    </div>
    <div class="login-error" id="loginError"></div>
    <button class="btn btn-primary" onclick="signIn()" id="loginBtn" style="width:100%;margin-top:12px" data-i18n="login.btn">
      Logg inn
    </button>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="utils.js"></script>
<script>
let db;

applyLang();

(async () => {
  try {
    const cfg = await getConfig();
    db = supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);

    const { data: { session } } = await db.auth.getSession();
    if (session) window.location.href = 'dashboard.html';
  } catch (err) {
    document.getElementById('loginError').textContent = err.message;
  }
})();

async function signIn() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errEl    = document.getElementById('loginError');
  const btn      = document.getElementById('loginBtn');

  errEl.textContent = '';
  if (!db) { errEl.textContent = t('login.loading'); return; }
  if (!email || !password) { errEl.textContent = t('login.empty'); return; }

  btn.disabled = true;
  btn.textContent = t('login.loading');

  const { error } = await db.auth.signInWithPassword({ email, password });
  if (error) {
    errEl.textContent = error.message;
    btn.disabled = false;
    btn.textContent = t('login.btn');
    return;
  }

  window.location.href = 'dashboard.html';
}
</script>
</body>
</html>
