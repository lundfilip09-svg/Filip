<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="icon" href="/favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="/favicon.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#050506">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Dashboard">
  <title>Dashboard</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .page { max-width: 1100px; gap: 20px; }

    /* ── Header ── */
    .inv-header { display: flex; flex-direction: column; gap: 14px; }
    .inv-header-top { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .inv-ticker-sel { position: relative; flex: 1; min-width: 180px; }
    .inv-ticker-btn {
      display: flex; align-items: center; gap: 8px; width: 100%;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px; padding: 9px 12px; cursor: pointer; color: var(--text-primary);
    }
    .inv-ticker-btn .itk { font-weight: 700; font-family: var(--font-mono); font-size: 14px; }
    .inv-ticker-btn .inm { color: var(--text-tertiary); font-size: 11px; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .inv-ticker-btn .iar { color: var(--text-tertiary); font-size: 10px; transition: transform 0.15s; }
    .inv-ticker-btn.open .iar { transform: rotate(180deg); }
    /* Dropdown rendres som position:fixed med koordinater satt av JS (positionTickerDD()).
       Årsak til at panelet tidligere "dyttet" siden ned: .inv-header er en .card, og .card har
       backdrop-filter — det skaper en ny compositing-context i nettleseren, så et
       position:absolute-panel forankret inni det filtrerte kortet komponeres feil i forhold til
       resten av siden i stedet for å flyte fritt over den. Løsning: panel + backdrop er nå
       position:fixed med top/left beregnet via getBoundingClientRect(), utenfor kortets context. */
    .inv-dd-backdrop {
      display: none; position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,0.4);
    }
    .inv-dd-backdrop.open { display: block; animation: modalBackdropIn 0.18s ease-out both; }
    .inv-dd-panel {
      display: none; position: fixed; z-index: 310;
      background: #141416; border: 1px solid rgba(255,255,255,0.12); border-radius: 12px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.5); max-height: 360px; flex-direction: column;
      animation: modalPanelIn 0.18s cubic-bezier(0.2,0.7,0.2,1) both;
    }
    .inv-dd-panel.open { display: flex; }
    .inv-dd-search { padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.07); }
    .inv-dd-search input { font-size: 13px; }
    .inv-dd-list { overflow-y: auto; padding: 4px; }
    .inv-dd-item {
      display: flex; align-items: center; gap: 8px; padding: 8px 9px; border-radius: 8px;
      cursor: pointer; color: var(--text-secondary);
    }
    .inv-dd-item:hover { background: rgba(255,255,255,0.06); }
    .inv-dd-item .ddt { font-family: var(--font-mono); font-weight: 700; font-size: 12px; color: var(--text-primary); width: 54px; flex-shrink: 0; }
    .inv-dd-item .ddn { font-size: 11.5px; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .inv-dd-item .ddst { font-size: 9px; font-family: var(--font-mono); text-transform: uppercase; flex-shrink: 0; }
    .inv-dd-empty { padding: 18px 10px; text-align: center; font-size: 12px; color: var(--text-tertiary); }

    .inv-fav-btn, .inv-add-btn {
      flex-shrink: 0; display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 13px; border-radius: 10px; font-size: 12px; font-family: var(--font-mono);
      cursor: pointer; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.04);
      color: var(--text-secondary); white-space: nowrap;
    }
    .inv-fav-btn.is-fav { color: #F2C063; border-color: rgba(242,192,99,0.3); background: rgba(242,192,99,0.1); }
    .inv-add-btn { background: rgba(91,164,245,0.15); border-color: rgba(91,164,245,0.3); color: #5BA4F5; }
    .inv-add-btn:hover { background: rgba(91,164,245,0.25); }

    .inv-fav-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .inv-fav-chip {
      display: inline-flex; align-items: center; gap: 9px; padding: 7px 12px 7px 10px;
      border-radius: 10px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
      cursor: pointer; color: var(--text-secondary); transition: background 0.12s, border-color 0.12s;
    }
    .inv-fav-chip:hover { background: rgba(255,255,255,0.07); }
    .inv-fav-chip.active { border-color: rgba(91,164,245,0.35); background: rgba(91,164,245,0.09); }
    .inv-fav-chip .ifc-tkr { font-family: var(--font-mono); font-weight: 700; font-size: 12px; color: var(--text-primary); letter-spacing: 0.02em; }
    .inv-fav-chip .ifc-px { font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary); }
    .inv-fav-chip .ifc-chg { font-family: var(--font-mono); font-size: 11px; font-weight: 700; }
    .inv-fav-chip .ifc-chg.pos { color: #6BE3A4; }
    .inv-fav-chip .ifc-chg.neg { color: #FF6B6B; }
    .inv-fav-chip .ifc-chg.flat { color: var(--text-tertiary); }

    /* ── Quote card ── */
    .inv-quote-card { display: flex; flex-direction: column; gap: 14px; }
    .inv-quote-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    .inv-quote-name { font-size: 18px; font-weight: 700; color: var(--text-primary); }
    .inv-quote-sub { font-size: 10.5px; font-family: var(--font-mono); color: var(--text-tertiary); margin-top: 2px; letter-spacing: 0.04em; }
    .inv-quote-price { font-size: 30px; font-weight: 800; font-family: var(--font-mono); letter-spacing: -0.03em; text-align: right; }
    .inv-quote-change { font-size: 13px; font-family: var(--font-mono); font-weight: 700; text-align: right; margin-top: 2px; }
    .inv-quote-change.pos { color: #6BE3A4; }
    .inv-quote-change.neg { color: #FF6B6B; }
    .inv-quote-tiles { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; }
    @media (max-width: 640px) { .inv-quote-tiles { grid-template-columns: repeat(2,1fr); } }
    .inv-status-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
    .inv-tv-wrap { width: 100%; height: 360px; border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.07); position: relative; }
    .inv-chart-ranges { display: flex; gap: 6px; padding: 8px 10px; border-bottom: 1px solid rgba(255,255,255,0.07); }
    .inv-chart-range-btn {
      padding: 5px 10px; border-radius: 7px; font-size: 11px; font-family: var(--font-mono);
      color: var(--text-tertiary); cursor: pointer; background: transparent; border: 1px solid transparent;
    }
    .inv-chart-range-btn.active { color: var(--text-primary); background: rgba(91,164,245,0.15); border-color: rgba(91,164,245,0.3); }
    .inv-chart-canvas-wrap { position: relative; height: calc(100% - 38px); padding: 8px 10px; }
    .inv-chart-empty { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--text-tertiary); font-size: 12px; }
    .inv-empty-state { text-align: center; padding: 50px 20px; color: var(--text-tertiary); }
    .inv-empty-state .iei { font-size: 32px; margin-bottom: 10px; }

    /* ── Add-stock søk ── */
    .inv-search-wrap { position: relative; }
    .inv-search-results {
      display: none; position: absolute; top: calc(100% + 4px); left: 0; right: 0; z-index: 20;
      background: #141416; border: 1px solid rgba(255,255,255,0.12); border-radius: 10px;
      max-height: 220px; overflow-y: auto; box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    .inv-search-results.open { display: block; }
    .inv-search-item {
      display: flex; align-items: center; gap: 8px; padding: 9px 11px; cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .inv-search-item:last-child { border-bottom: none; }
    .inv-search-item:hover { background: rgba(255,255,255,0.06); }
    .inv-search-item .sit { font-family: var(--font-mono); font-weight: 700; font-size: 12px; color: var(--text-primary); flex-shrink: 0; width: 64px; }
    .inv-search-item .sin { font-size: 11.5px; color: var(--text-secondary); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .inv-search-item .sie { font-size: 9px; font-family: var(--font-mono); color: var(--text-tertiary); flex-shrink: 0; }
    .inv-search-empty, .inv-search-loading { padding: 14px 11px; font-size: 11.5px; color: var(--text-tertiary); text-align: center; }

    /* ── Tabs ── */
    .inv-tabs { display: flex; gap: 6px; border-bottom: 1px solid rgba(255,255,255,0.07); margin-bottom: 16px; }
    .inv-tab {
      padding: 9px 4px; font-size: 12px; font-weight: 600; font-family: var(--font-mono);
      color: var(--text-tertiary); cursor: pointer; border-bottom: 2px solid transparent;
      margin-bottom: -1px; letter-spacing: 0.04em; text-transform: uppercase;
    }
    .inv-tab.active { color: var(--text-primary); border-bottom-color: var(--accent-blue); }

    /* ── Analysis ── */
    .inv-locked-banner {
      display: flex; align-items: center; gap: 8px; padding: 9px 12px; border-radius: 9px;
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
      font-size: 11.5px; color: var(--text-tertiary); margin-bottom: 14px;
    }
    .inv-section {
      padding: 14px 0; border-bottom: 1px solid var(--hairline-soft);
    }
    .inv-section:first-of-type { padding-top: 0; }
    .inv-section:last-child { border-bottom: none; padding-bottom: 0; }
    .inv-section-h {
      font-size: 10px; font-weight: 700; font-family: var(--font-mono); letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--text-primary); margin-bottom: 10px;
      display: flex; align-items: center; gap: 6px;
    }
    .inv-section-h::before { content: ''; width: 3px; height: 11px; background: var(--accent-blue); border-radius: 2px; display: inline-block; }
    .inv-field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 14px; }
    @media (max-width: 640px) { .inv-field-grid { grid-template-columns: 1fr; } }
    .inv-field { display: flex; flex-direction: column; gap: 3px; }
    .inv-ro-val { font-size: 13px; color: var(--text-secondary); line-height: 1.45; }
    .inv-ro-val.empty { color: var(--text-tertiary); font-style: italic; }
    .inv-ro-val.empty::before { content: '–'; }

    /* ── Journal ── */
    .inv-journal-add { display: flex; gap: 8px; margin-bottom: 16px; }
    .inv-journal-list { display: flex; flex-direction: column; gap: 10px; }
    .inv-j-item { display: flex; gap: 10px; padding: 10px 12px; background: rgba(255,255,255,0.025); border-radius: 10px; border-left: 2px solid rgba(255,255,255,0.1); }
    .inv-j-item.jt-buy   { border-left-color: #6BE3A4; }
    .inv-j-item.jt-sell  { border-left-color: #FF6B6B; }
    .inv-j-item.jt-stop_loss { border-left-color: #FF6B6B; }
    .inv-j-item.jt-target_hit { border-left-color: #F2C063; }
    .inv-j-item.jt-update { border-left-color: #5BA4F5; }
    .inv-j-icon { font-size: 14px; flex-shrink: 0; line-height: 1.4; }
    .inv-j-body { flex: 1; min-width: 0; }
    .inv-j-title { font-size: 12.5px; font-weight: 600; color: var(--text-primary); }
    .inv-j-desc { font-size: 11.5px; color: var(--text-secondary); margin-top: 2px; line-height: 1.4; white-space: pre-wrap; }
    .inv-j-date { font-size: 9.5px; font-family: var(--font-mono); color: var(--text-tertiary); margin-top: 4px; }
    .inv-j-empty { text-align: center; padding: 30px; color: var(--text-tertiary); font-size: 12px; }

    /* ── Result ── */
    .inv-result-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 18px; }
    @media (max-width: 640px) { .inv-result-grid { grid-template-columns: 1fr; } }

    /* ── Position ── */
    .inv-pos-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 16px; }
    @media (max-width: 640px) { .inv-pos-grid { grid-template-columns: repeat(2,1fr); } }
    .inv-lots-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .inv-lot-item, .inv-sale-item {
      display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px;
      background: rgba(255,255,255,0.025); border-left: 2px solid #6BE3A4; margin-bottom: 8px;
    }
    .inv-sale-item { border-left-color: #FF6B6B; }
    .inv-lot-main { flex: 1; min-width: 0; }
    .inv-lot-line1 { font-size: 12.5px; font-weight: 600; color: var(--text-primary); font-family: var(--font-mono); }
    .inv-lot-line2 { font-size: 11px; color: var(--text-tertiary); margin-top: 2px; }
    .inv-lot-del { background: none; border: none; color: var(--text-tertiary); cursor: pointer; font-size: 15px; padding: 4px 6px; flex-shrink: 0; }
    .inv-lot-del:hover { color: #FF6B6B; }

    /* ── Modal ── */
    .inv-backdrop {
      display: none; position: fixed; inset: 0; z-index: 400;
      background: rgba(0,0,0,0.55); align-items: center; justify-content: center; padding: 16px;
    }
    .inv-backdrop.open { display: flex; animation: modalBackdropIn 0.18s ease-out both; }
    .inv-panel {
      background: #131315; border: 1px solid rgba(255,255,255,0.1); border-radius: 16px;
      padding: 22px; width: 100%; max-width: 480px; max-height: 85vh; overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      animation: modalPanelIn 0.2s cubic-bezier(0.2,0.7,0.2,1) both;
    }
    .inv-panel-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .inv-panel-title { font-size: 15px; font-weight: 700; }
    .inv-panel-close { background: none; border: none; color: var(--text-tertiary); font-size: 18px; cursor: pointer; padding: 2px 6px; }
    .inv-panel-foot { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }
    .inv-stack { display: flex; flex-direction: column; gap: 12px; }
  </style>
</head>
<body>

<nav class="main-nav" data-nav></nav>

<main class="page">

  <!-- ══════════════════  HEADER  ══════════════════ -->
  <div class="card inv-header">
    <div class="inv-header-top">
      <div class="inv-ticker-sel" id="invTickerSel">
        <button class="inv-ticker-btn" id="invTickerBtn" onclick="toggleTickerDD()">
          <span class="itk" id="invSelTicker">—</span>
          <span class="inm" id="invSelName" data-i18n="inv.select_ticker">Velg aksje…</span>
          <span class="iar">▾</span>
        </button>
        <div class="inv-dd-backdrop" id="invDDBackdrop" onclick="closeTickerDD(event)"></div>
        <div class="inv-dd-panel" id="invDDPanel" onclick="event.stopPropagation()">
          <div class="inv-dd-search">
            <input type="text" id="invDDSearch" data-i18n-placeholder="inv.search_placeholder" placeholder="Søk ticker eller navn…" oninput="renderTickerDD()">
          </div>
          <div class="inv-dd-list" id="invDDList"></div>
        </div>
      </div>
      <button class="inv-fav-btn" id="invFavBtn" onclick="toggleFavorite()">
        <span id="invFavIcon">☆</span><span data-i18n="inv.favorite">Favoritt</span>
      </button>
      <button class="inv-add-btn" onclick="openAddModal()">+ <span data-i18n="inv.add_stock">Legg til aksje</span></button>
    </div>
    <div class="inv-fav-row" id="invFavRow"></div>
  </div>

  <!-- ══════════════════  QUOTE / EMPTY  ══════════════════ -->
  <div id="invMain"></div>

</main>

<!-- ══════════════════  ADD STOCK MODAL  ══════════════════ -->
<div class="inv-backdrop" id="addBackdrop">
  <div class="inv-panel">
    <div class="inv-panel-head">
      <div class="inv-panel-title" data-i18n="inv.add_stock">Legg til aksje</div>
      <button class="inv-panel-close" onclick="closeAddModal()">✕</button>
    </div>
    <div class="inv-stack">
      <div class="form-group inv-search-wrap">
        <label class="form-label" data-i18n="inv.search_stock">Søk aksje</label>
        <input type="text" id="addSearchInput" data-i18n-placeholder="inv.search_stock_placeholder" placeholder="Skriv navn eller ticker…" oninput="onAddSearchInput()" autocomplete="off">
        <div class="inv-search-results" id="addSearchResults"></div>
      </div>
      <div class="form-group" id="addSelectedWrap" style="display:none">
        <label class="form-label" data-i18n="inv.selected_stock">Valgt aksje</label>
        <div class="inv-ro-val" id="addSelectedLabel"></div>
      </div>
      <input type="hidden" id="addTicker">
      <input type="hidden" id="addName">
    </div>
    <div class="inv-panel-foot">
      <button class="btn btn-ghost" onclick="closeAddModal()" data-i18n="cancel">Avbryt</button>
      <button class="btn btn-primary" id="addSaveBtn" onclick="saveAddStock()" data-i18n="save" disabled>Lagre</button>
    </div>
  </div>
</div>

<!-- ══════════════════  BUY MODAL  ══════════════════ -->
<div class="inv-backdrop" id="buyBackdrop">
  <div class="inv-panel">
    <div class="inv-panel-head">
      <div class="inv-panel-title" data-i18n="inv.register_buy">Registrer kjøp</div>
      <button class="inv-panel-close" onclick="closeBuyModal()">✕</button>
    </div>
    <div class="inv-stack">
      <div class="form-row">
        <div class="form-group" style="flex:1">
          <label class="form-label" data-i18n="inv.buy_date">Kjøpsdato</label>
          <input type="date" id="buyDate">
        </div>
        <div class="form-group" style="flex:1">
          <label class="form-label" data-i18n="inv.buy_price">Kjøpskurs</label>
          <input type="number" id="buyPrice" step="0.01">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group" style="flex:1">
          <label class="form-label" data-i18n="inv.quantity">Antall</label>
          <input type="number" id="buyQty" step="0.0001">
        </div>
        <div class="form-group" style="flex:1">
          <label class="form-label" data-i18n="inv.commission">Kurtasje</label>
          <input type="number" id="buyCommission" step="0.01" value="0">
        </div>
      </div>
    </div>
    <div class="inv-panel-foot">
      <button class="btn btn-ghost" onclick="closeBuyModal()" data-i18n="cancel">Avbryt</button>
      <button class="btn btn-primary" onclick="saveBuy()" data-i18n="save">Lagre</button>
    </div>
  </div>
</div>

<!-- ══════════════════  SELL MODAL  ══════════════════ -->
<div class="inv-backdrop" id="sellBackdrop">
  <div class="inv-panel">
    <div class="inv-panel-head">
      <div class="inv-panel-title" data-i18n="inv.register_sell">Registrer salg</div>
      <button class="inv-panel-close" onclick="closeSellModal()">✕</button>
    </div>
    <div class="inv-stack">
      <div class="form-row">
        <div class="form-group" style="flex:1">
          <label class="form-label" data-i18n="inv.sell_date">Salgsdato</label>
          <input type="date" id="sellDate">
        </div>
        <div class="form-group" style="flex:1">
          <label class="form-label" data-i18n="inv.sell_price">Salgskurs</label>
          <input type="number" id="sellPrice" step="0.01">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group" style="flex:1">
          <label class="form-label" data-i18n="inv.quantity_sold">Antall solgt</label>
          <input type="number" id="sellQty" step="0.0001">
        </div>
        <div class="form-group" style="flex:1">
          <label class="form-label" data-i18n="inv.commission">Kurtasje</label>
          <input type="number" id="sellCommission" step="0.01" value="0">
        </div>
      </div>
    </div>
    <div class="inv-panel-foot">
      <button class="btn btn-ghost" onclick="closeSellModal()" data-i18n="cancel">Avbryt</button>
      <button class="btn btn-danger" onclick="saveSell()" data-i18n="save">Lagre</button>
    </div>
  </div>
</div>

<!-- ══════════════════  ANALYSIS EDIT MODAL  ══════════════════ -->
<div class="inv-backdrop" id="analysisBackdrop">
  <div class="inv-panel" style="max-width:560px">
    <div class="inv-panel-head">
      <div class="inv-panel-title" data-i18n="inv.edit_analysis">Rediger analyse</div>
      <button class="inv-panel-close" onclick="closeAnalysisModal()">✕</button>
    </div>
    <div class="inv-stack">
      <div class="inv-section-h" data-i18n="inv.thesis">Tese</div>
      <div class="form-group"><label class="form-label" data-i18n="inv.thesis_why">Hvorfor</label><textarea id="anWhy" rows="2"></textarea></div>
      <div class="form-group"><label class="form-label" data-i18n="inv.thesis_catalyst">Katalysator</label><textarea id="anCatalyst" rows="2"></textarea></div>
      <div class="form-row">
        <div class="form-group" style="flex:1"><label class="form-label" data-i18n="inv.thesis_horizon">Horisont</label><input type="text" id="anHorizon"></div>
      </div>
      <div class="form-group"><label class="form-label" data-i18n="inv.thesis_must">Må skje</label><textarea id="anMustHappen" rows="2"></textarea></div>

      <div class="inv-section-h" style="margin-top:6px" data-i18n="inv.ta">Teknisk analyse</div>
      <div class="form-row">
        <div class="form-group" style="flex:1"><label class="form-label" data-i18n="inv.ta_trend">Trend</label><input type="text" id="anTrend"></div>
        <div class="form-group" style="flex:1"><label class="form-label" data-i18n="inv.ta_rsi">RSI</label><input type="number" id="anRsi" step="0.1"></div>
      </div>
      <div class="form-row">
        <div class="form-group" style="flex:1"><label class="form-label" data-i18n="inv.ta_support">Støtte</label><input type="number" id="anSupport" step="0.01"></div>
        <div class="form-group" style="flex:1"><label class="form-label" data-i18n="inv.ta_resistance">Motstand</label><input type="number" id="anResistance" step="0.01"></div>
      </div>
      <div class="form-group"><label class="form-label" data-i18n="inv.ta_macd">MACD</label><input type="text" id="anMacd"></div>
      <div class="form-group"><label class="form-label" data-i18n="inv.ta_volume">Volumkommentar</label><input type="text" id="anVolume"></div>
      <div class="form-group"><label class="form-label" data-i18n="inv.ta_comment">TA-kommentar</label><textarea id="anTaComment" rows="2"></textarea></div>

      <div class="inv-section-h" style="margin-top:6px" data-i18n="inv.plan">Plan</div>
      <div class="form-row">
        <div class="form-group" style="flex:1"><label class="form-label" data-i18n="inv.plan_entry">Inngang</label><input type="number" id="anEntry" step="0.01"></div>
        <div class="form-group" style="flex:1"><label class="form-label" data-i18n="inv.plan_stop">Stop loss</label><input type="number" id="anStop" step="0.01"></div>
      </div>
      <div class="form-row">
        <div class="form-group" style="flex:1"><label class="form-label" data-i18n="inv.plan_t1">Mål 1</label><input type="number" id="anT1" step="0.01"></div>
        <div class="form-group" style="flex:1"><label class="form-label" data-i18n="inv.plan_t2">Mål 2</label><input type="number" id="anT2" step="0.01"></div>
      </div>
      <div class="form-group"><label class="form-label" data-i18n="inv.plan_horizon">Tidshorisont</label><input type="text" id="anPlanHorizon"></div>

      <div class="inv-section-h" style="margin-top:6px" data-i18n="inv.risk">Risiko</div>
      <div class="form-group"><label class="form-label" data-i18n="inv.risk_wrong">Hva kan gå galt</label><textarea id="anRiskWrong" rows="2"></textarea></div>
      <div class="form-group"><label class="form-label" data-i18n="inv.risk_sell">Selg-trigger</label><textarea id="anRiskSell" rows="2"></textarea></div>
      <div class="form-group"><label class="form-label" data-i18n="inv.risk_buy_more">Kjøp mer-trigger</label><textarea id="anRiskBuyMore" rows="2"></textarea></div>
    </div>
    <div class="inv-panel-foot">
      <button class="btn btn-ghost" onclick="closeAnalysisModal()" data-i18n="cancel">Avbryt</button>
      <button class="btn btn-primary" onclick="saveAnalysis()" data-i18n="save">Lagre</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<script src="utils.js"></script>
<script>
let db;
let _investments = [];   // alle rader, egne investments
let _journal = [];        // journal for valgt investering
let _lots = [];            // kjøps-lots for valgt investering
let _sales = [];           // salg for valgt investering
let _selected = null;     // valgt investment-objekt
let _activeTab = 'position';
let _quoteCache = {};     // ticker -> {ts, data}

const JT_ICON = { note: '📝', buy: '🟢', sell: '🔴', update: '🔄', stop_loss: '⛔', target_hit: '🎯' };

// ── Auth/session helper ─────────────────────────────────────────────────
async function authHeader() {
  const { data: { session } } = await db.auth.getSession();
  return session ? { Authorization: `Bearer ${session.access_token}` } : {};
}

// ── Load investments ─────────────────────────────────────────────────────
async function loadInvestments() {
  const { data, error } = await db.from('investments').select('*').order('created_at', { ascending: false });
  if (error) throw error;
  _investments = data || [];
  renderFavRow();
  if (document.getElementById('invDDBackdrop')?.classList.contains('open')) renderTickerDD();
}

function renderFavRow() {
  const favs = _investments.filter(i => i.is_favorite);
  const el = document.getElementById('invFavRow');
  if (!favs.length) { el.innerHTML = ''; return; }
  el.innerHTML = favs.map(i => {
    const cached = _quoteCache[i.ticker]?.quote;
    let mid = `<span class="ifc-px">—</span>`;
    if (cached && cached.price != null) {
      let chgHtml = '';
      if (cached.previousClose != null) {
        const change = cached.price - cached.previousClose;
        const pct = cached.previousClose ? (change / cached.previousClose) * 100 : 0;
        const cls = pct > 0 ? 'pos' : pct < 0 ? 'neg' : 'flat';
        chgHtml = `<span class="ifc-chg ${cls}">${pct >= 0 ? '+' : ''}${pct.toFixed(2)}%</span>`;
      }
      mid = `<span class="ifc-px">${cached.price.toFixed(2)}</span>${chgHtml}`;
    }
    return `
    <div class="inv-fav-chip${_selected?.id === i.id ? ' active' : ''}" onclick="selectInvestment('${i.id}')">
      <span class="ifc-tkr">${escHtml(i.ticker)}</span>${mid}
    </div>`;
  }).join('');
  favs.forEach(i => loadFavQuote(i.ticker));
}

async function loadFavQuote(ticker) {
  try {
    const cached = _quoteCache[ticker];
    if (cached && Date.now() - cached.ts < 60000) return;
    const quote = await yhFetch(ticker, 'quote');
    _quoteCache[ticker] = { ts: Date.now(), quote };
    renderFavRow();
  } catch (e) {
    // stille feil for favoritt-rad — hovedvisning viser feil ved behov
  }
}

// ── Ticker dropdown ───────────────────────────────────────────────────────
function positionTickerDD() {
  const anchor = document.getElementById('invTickerSel');
  const panel = document.getElementById('invDDPanel');
  if (!anchor || !panel) return;
  const r = anchor.getBoundingClientRect();
  panel.style.top = `${r.bottom + 6}px`;
  panel.style.left = `${r.left}px`;
  panel.style.width = `${r.width}px`;
}
function toggleTickerDD() {
  const bd = document.getElementById('invDDBackdrop');
  const open = bd.classList.toggle('open');
  document.getElementById('invDDPanel').classList.toggle('open', open);
  document.getElementById('invTickerBtn').classList.toggle('open', open);
  if (open) {
    positionTickerDD();
    renderTickerDD();
    setTimeout(() => document.getElementById('invDDSearch').focus(), 30);
    window.addEventListener('resize', positionTickerDD);
    window.addEventListener('scroll', positionTickerDD, true);
  } else {
    window.removeEventListener('resize', positionTickerDD);
    window.removeEventListener('scroll', positionTickerDD, true);
  }
}
function closeTickerDD(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('invDDBackdrop').classList.remove('open');
  document.getElementById('invDDPanel').classList.remove('open');
  document.getElementById('invTickerBtn').classList.remove('open');
  window.removeEventListener('resize', positionTickerDD);
  window.removeEventListener('scroll', positionTickerDD, true);
}
function renderTickerDD() {
  const q = (document.getElementById('invDDSearch').value || '').toLowerCase();
  const list = _investments.filter(i =>
    i.ticker.toLowerCase().includes(q) || (i.name || '').toLowerCase().includes(q));
  const el = document.getElementById('invDDList');
  if (!list.length) { el.innerHTML = `<div class="inv-dd-empty" data-i18n="inv.no_matches">Ingen treff</div>`; applyLang(); return; }
  const statusBadge = { watchlist: 'badge-grey', open: 'badge-blue', closed: 'badge-green' };
  el.innerHTML = list.map(i => `
    <div class="inv-dd-item" onclick="selectInvestment('${i.id}')">
      <span class="ddt">${escHtml(i.ticker)}</span>
      <span class="ddn">${escHtml(i.name || '')}</span>
      <span class="ddst badge ${statusBadge[i.status] || 'badge-grey'}" data-i18n="inv.status_${i.status}">${i.status}</span>
    </div>`).join('');
  applyLang();
}

function selectInvestment(id) {
  _selected = _investments.find(i => i.id === id) || null;
  closeTickerDD();
  _activeTab = 'position';
  renderHeader();
  renderFavRow();
  renderMain();
  if (_selected) { loadJournal(_selected.id); loadLots(_selected.id); }
}

function renderHeader() {
  document.getElementById('invSelTicker').textContent = _selected ? _selected.ticker : '—';
  document.getElementById('invSelName').textContent = _selected ? (_selected.name || _selected.ticker) : t('inv.select_ticker');
  document.getElementById('invSelName').removeAttribute('data-i18n');
  if (!_selected) document.getElementById('invSelName').setAttribute('data-i18n', 'inv.select_ticker');
  const favBtn = document.getElementById('invFavBtn');
  favBtn.classList.toggle('is-fav', !!_selected?.is_favorite);
  document.getElementById('invFavIcon').textContent = _selected?.is_favorite ? '★' : '☆';
  favBtn.style.opacity = _selected ? '1' : '0.4';
  favBtn.style.pointerEvents = _selected ? 'auto' : 'none';
}

async function toggleFavorite() {
  if (!_selected) return;
  const newVal = !_selected.is_favorite;
  const { error } = await db.from('investments').update({ is_favorite: newVal }).eq('id', _selected.id);
  if (error) { toast(t('inv.err_save'), 'err'); return; }
  _selected.is_favorite = newVal;
  const idx = _investments.findIndex(i => i.id === _selected.id);
  if (idx > -1) _investments[idx].is_favorite = newVal;
  renderHeader();
  renderFavRow();
}

// ── Main render (empty state / quote / tabs) ───────────────────────────────
function renderMain() {
  const el = document.getElementById('invMain');
  if (!_selected) {
    el.innerHTML = `
      <div class="card inv-empty-state">
        <div class="iei">📈</div>
        <div data-i18n="inv.empty_title">Velg en aksje for å se detaljer</div>
      </div>`;
    applyLang();
    return;
  }
  el.innerHTML = `
    <div class="card inv-quote-card">
      <div class="inv-quote-top">
        <div>
          <div class="inv-quote-name">${escHtml(_selected.name || _selected.ticker)}</div>
          <div class="inv-quote-sub">${escHtml(_selected.ticker)}</div>
        </div>
        <div>
          <div class="inv-quote-price" id="invPrice">—</div>
          <div class="inv-quote-change" id="invChange"></div>
        </div>
      </div>
      <div class="inv-quote-tiles">
        <div class="metric-tile"><div class="metric-lbl" data-i18n="inv.open">Åpning</div><div class="metric-val" id="invOpen">—</div></div>
        <div class="metric-tile"><div class="metric-lbl" data-i18n="inv.high">Høy</div><div class="metric-val" id="invHigh">—</div></div>
        <div class="metric-tile"><div class="metric-lbl" data-i18n="inv.low">Lav</div><div class="metric-val" id="invLow">—</div></div>

      </div>
      <div class="inv-status-row">
        <span class="badge ${({watchlist:'badge-grey',open:'badge-blue',closed:'badge-green'})[_selected.status]}" data-i18n="inv.status_${_selected.status}">${_selected.status}</span>
        ${_selected.locked ? `<span class="badge badge-grey" data-i18n="inv.locked">Låst</span>` : ''}
        ${!_selected.locked ? `<button class="btn btn-success btn-sm" onclick="openBuyModal()" data-i18n="${totalQty(_selected) > 0 ? 'inv.buy_more' : 'inv.register_buy'}">${totalQty(_selected) > 0 ? 'Kjøp mer' : 'Registrer kjøp'}</button>` : ''}
        ${!_selected.locked && totalQty(_selected) > 0 ? `<button class="btn btn-danger btn-sm" onclick="openSellModal()" data-i18n="inv.register_sell">Registrer salg</button>` : ''}
      </div>
      <div class="inv-tv-wrap">
        <div class="inv-chart-ranges" id="invChartRanges">
          ${['1d','1u','1m','3m','1y','5y'].map(r => `<div class="inv-chart-range-btn${r==='3m'?' active':''}" data-range="${r}" onclick="setChartRange('${r}')" data-i18n="inv.range_${r}">${r}</div>`).join('')}
        </div>
        <div class="inv-chart-canvas-wrap" id="invChartWrap">
          <canvas id="invChartCanvas"></canvas>
        </div>
      </div>
    </div>

    ${_selected.status === 'closed' ? renderResultBlock() : ''}

    <div class="card">
      <div class="inv-tabs">
        <div class="inv-tab ${_activeTab==='position'?'active':''}" onclick="setTab('position')" data-i18n="inv.tab_position">Posisjon</div>
        <div class="inv-tab ${_activeTab==='analysis'?'active':''}" onclick="setTab('analysis')" data-i18n="inv.tab_analysis">Analyse</div>
        <div class="inv-tab ${_activeTab==='journal'?'active':''}" onclick="setTab('journal')" data-i18n="inv.tab_journal">Journal</div>
      </div>
      <div id="invTabBody"></div>
    </div>
  `;
  applyLang();
  try {
    renderTabBody();
    loadQuote(_selected.ticker);
    loadChart(_selected.ticker, _chartRange);
  } catch (e) {
    console.error('renderMain', e);
  }
}

function renderResultBlock() {
  const buyTotal = _lots.reduce((s, l) => s + Number(l.quantity) * Number(l.buy_price) + Number(l.commission_buy || 0), 0);
  const sellTotal = _sales.reduce((s, sale) => s + Number(sale.quantity_sold) * Number(sale.sell_price) - Number(sale.commission_sell || 0), 0);
  const pl = sellTotal - buyTotal;
  const plPct = buyTotal ? (pl / buyTotal) * 100 : 0;
  const buyDates = _lots.map(l => new Date(l.buy_date)).filter(d => !isNaN(d));
  const sellDates = _sales.map(s => new Date(s.sell_date)).filter(d => !isNaN(d));
  const days = (buyDates.length && sellDates.length)
    ? Math.round((Math.max(...sellDates) - Math.min(...buyDates)) / 86400000) : null;
  const cls = pl >= 0 ? 'success' : 'danger';
  return `
    <div class="card">
      <div class="section-title" data-i18n="inv.result">Resultat</div>
      <div class="inv-result-grid">
        <div class="metric-tile"><div class="metric-lbl" data-i18n="inv.pl_nok">Gevinst/tap (NOK)</div><div class="metric-val ${cls}">${pl >= 0 ? '+' : ''}${pl.toFixed(2)}</div></div>
        <div class="metric-tile"><div class="metric-lbl" data-i18n="inv.pl_pct">Gevinst/tap (%)</div><div class="metric-val ${cls}">${plPct >= 0 ? '+' : ''}${plPct.toFixed(1)}%</div></div>
        <div class="metric-tile"><div class="metric-lbl" data-i18n="inv.days_held">Dager holdt</div><div class="metric-val">${days ?? '—'}</div></div>
      </div>
    </div>`;
}

// ── Position (lots/sales) ────────────────────────────────────────────────
async function loadLots(investmentId) {
  const [lotsRes, salesRes] = await Promise.all([
    db.from('investment_lots').select('*').eq('investment_id', investmentId).order('buy_date', { ascending: false }),
    db.from('investment_sales').select('*').eq('investment_id', investmentId).order('sell_date', { ascending: false }),
  ]);
  _lots = lotsRes.error ? [] : (lotsRes.data || []);
  _sales = salesRes.error ? [] : (salesRes.data || []);
  refreshStatusRow();
  renderTabBody();
}

function refreshStatusRow() {
  const el = document.querySelector('.inv-status-row');
  if (!el || !_selected) return;
  el.innerHTML = `
    <span class="badge ${({watchlist:'badge-grey',open:'badge-blue',closed:'badge-green'})[_selected.status]}" data-i18n="inv.status_${_selected.status}">${_selected.status}</span>
    ${_selected.locked ? `<span class="badge badge-grey" data-i18n="inv.locked">Låst</span>` : ''}
    ${!_selected.locked ? `<button class="btn btn-success btn-sm" onclick="openBuyModal()" data-i18n="${totalQty(_selected) > 0 ? 'inv.buy_more' : 'inv.register_buy'}">${totalQty(_selected) > 0 ? 'Kjøp mer' : 'Registrer kjøp'}</button>` : ''}
    ${!_selected.locked && totalQty(_selected) > 0 ? `<button class="btn btn-danger btn-sm" onclick="openSellModal()" data-i18n="inv.register_sell">Registrer salg</button>` : ''}
  `;
  applyLang();
}

function totalQty(inv) {
  if (!inv || inv.id !== _selected?.id) return 0;
  return _lots.reduce((s, l) => s + Number(l.quantity_remaining || 0), 0);
}
function avgPrice() {
  const qty = _lots.reduce((s, l) => s + Number(l.quantity_remaining || 0), 0);
  if (!qty) return 0;
  const cost = _lots.reduce((s, l) => s + Number(l.quantity_remaining || 0) * Number(l.buy_price || 0), 0);
  return cost / qty;
}
function totalInvested() {
  return _lots.reduce((s, l) => s + Number(l.quantity_remaining || 0) * Number(l.buy_price || 0), 0);
}

function renderPositionTab() {
  const qty = totalQty(_selected);
  const avg = avgPrice();
  const invested = totalInvested();
  const lastPrice = _quoteCache[_selected.ticker]?.quote?.price;
  const marketValue = lastPrice != null ? qty * lastPrice : null;
  const upl = marketValue != null ? marketValue - invested : null;
  const uplPct = (upl != null && invested) ? (upl / invested) * 100 : null;
  const cls = upl == null ? '' : (upl >= 0 ? 'success' : 'danger');
  return `
    <div class="inv-pos-grid">
      <div class="metric-tile"><div class="metric-lbl" data-i18n="inv.total_qty">Antall</div><div class="metric-val">${qty || '—'}</div></div>
      <div class="metric-tile"><div class="metric-lbl" data-i18n="inv.avg_price">Snittkurs</div><div class="metric-val">${qty ? avg.toFixed(2) : '—'}</div></div>
      <div class="metric-tile"><div class="metric-lbl" data-i18n="inv.invested">Investert</div><div class="metric-val">${qty ? invested.toFixed(2) : '—'}</div></div>
      <div class="metric-tile"><div class="metric-lbl" data-i18n="inv.unrealized_pl">Urealisert gevinst/tap</div><div class="metric-val ${cls}">${upl != null ? `${upl >= 0 ? '+' : ''}${upl.toFixed(2)} (${uplPct >= 0 ? '+' : ''}${uplPct.toFixed(1)}%)` : '—'}</div></div>
    </div>
    <div class="inv-lots-head">
      <div class="section-title" data-i18n="inv.lots_title" style="margin:0">Kjøp</div>
    </div>
    <div id="invLotsList">${renderLotsList()}</div>
    ${_sales.length ? `
    <div class="inv-lots-head" style="margin-top:18px">
      <div class="section-title" data-i18n="inv.sales_title" style="margin:0">Salg</div>
    </div>
    <div>${renderSalesList()}</div>` : ''}
  `;
}

function renderLotsList() {
  if (!_lots.length) return `<div class="inv-j-empty" data-i18n="inv.lots_empty">Ingen kjøp registrert</div>`;
  return _lots.map(l => `
    <div class="inv-lot-item">
      <div class="inv-lot-main">
        <div class="inv-lot-line1">${Number(l.quantity_remaining)} × ${Number(l.buy_price).toFixed(2)}</div>
        <div class="inv-lot-line2">${fmtDate(l.buy_date)}${Number(l.quantity_remaining) !== Number(l.quantity) ? ` · ${Number(l.quantity_remaining)}/${Number(l.quantity)} <span data-i18n="inv.lot_remaining">gjenstår</span>` : ''}</div>
      </div>
      <button class="inv-lot-del" onclick="deleteLot('${l.id}')" title="${t('inv.delete_lot')}">✕</button>
    </div>`).join('');
}

function renderSalesList() {
  if (!_sales.length) return `<div class="inv-j-empty" data-i18n="inv.sales_empty">Ingen salg registrert</div>`;
  return _sales.map(s => `
    <div class="inv-sale-item">
      <div class="inv-lot-main">
        <div class="inv-lot-line1">${Number(s.quantity_sold)} × ${Number(s.sell_price).toFixed(2)}</div>
        <div class="inv-lot-line2">${fmtDate(s.sell_date)}</div>
      </div>
    </div>`).join('');
}

function fmtDate(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString(fmtLocale(), { day: '2-digit', month: 'short', year: 'numeric' });
}

async function deleteLot(id) {
  if (!confirm(t('inv.delete_lot_confirm'))) return;
  const { error } = await db.from('investment_lots').delete().eq('id', id);
  if (error) { toast(t('inv.err_save'), 'err'); return; }
  await loadLots(_selected.id);
  await syncInvestmentStatus();
  renderMain();
  toast(t('inv.saved'));
}

function setTab(tab) { _activeTab = tab; renderMain(); }

function renderTabBody() {
  const el = document.getElementById('invTabBody');
  if (!el) return;
  if (_activeTab === 'position') { el.innerHTML = renderPositionTab(); }
  else if (_activeTab === 'analysis') { el.innerHTML = renderAnalysisTab(); }
  else { el.innerHTML = renderJournalTab(); }
  applyLang();
}

// ── Analysis tab ─────────────────────────────────────────────────────────
function renderAnalysisTab() {
  const s = _selected;
  const locked = !!s.locked;
  const field = (labelKey, label, val) =>
    `<div class="inv-field">
      <span class="form-label" data-i18n="${labelKey}">${label}</span>
      <div class="inv-ro-val${val == null || val === '' ? ' empty' : ''}">${val != null && val !== '' ? escHtml(String(val)) : ''}</div>
    </div>`;
  return `
    ${locked ? `<div class="inv-locked-banner">🔒 <span data-i18n="inv.locked_msg">Posisjon er lukket — analyse er låst</span></div>` : ''}
    ${!locked ? `<div style="display:flex;justify-content:flex-end;margin-bottom:10px"><button class="btn btn-ghost btn-sm" onclick="openAnalysisModal()" data-i18n="inv.edit">Rediger</button></div>` : ''}

    <div class="inv-section">
      <div class="inv-section-h" data-i18n="inv.thesis">Tese</div>
      <div class="inv-field-grid">
        ${field('inv.thesis_why', 'Hvorfor', s.thesis_why)}
        ${field('inv.thesis_catalyst', 'Katalysator', s.thesis_catalyst)}
        ${field('inv.thesis_horizon', 'Horisont', s.thesis_horizon)}
        ${field('inv.thesis_must', 'Må skje', s.thesis_must_happen)}
      </div>
    </div>

    <div class="inv-section">
      <div class="inv-section-h" data-i18n="inv.ta">Teknisk analyse</div>
      <div class="inv-field-grid">
        ${field('inv.ta_trend', 'Trend', s.ta_trend)}
        ${field('inv.ta_rsi', 'RSI', s.ta_rsi)}
        ${field('inv.ta_support', 'Støtte', s.ta_support)}
        ${field('inv.ta_resistance', 'Motstand', s.ta_resistance)}
        ${field('inv.ta_macd', 'MACD', s.ta_macd)}

function renderJournalList() {
  if (!_journal.length) return `<div class="inv-j-empty" data-i18n="inv.journal_empty">Ingen oppføringer ennå</div>`;
  return _journal.map(j => `
    <div class="inv-j-item jt-${j.type}">

function fmtDateTime(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleString(fmtLocale(), { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
}

async function loadJournal(investmentId) {

async function addJournalEntry(type, title, description) {

// ── Add stock modal (live-søk) ───────────────────────────────────────────
let _addSearchTimer = null;
let _addSelected = null; // { symbol, shortname, exchange }

function openAddModal() {
  document.getElementById('addSearchInput').value = '';
  document.getElementById('addTicker').value = '';
  document.getElementById('addName').value = '';
  document.getElementById('addSelectedWrap').style.display = 'none';
  document.getElementById('addSaveBtn').disabled = true;
  _addSelected = null;
  closeAddSearchResults();
  document.getElementById('addBackdrop').classList.add('open');
  setTimeout(() => document.getElementById('addSearchInput').focus(), 30);
}
function closeAddModal() { document.getElementById('addBackdrop').classList.remove('open'); }

function closeAddSearchResults() {
  const el = document.getElementById('addSearchResults');
  el.classList.remove('open');
  el.innerHTML = '';
}

function onAddSearchInput() {
  const q = document.getElementById('addSearchInput').value.trim();
  _addSelected = null;
  document.getElementById('addSelectedWrap').style.display = 'none';
  document.getElementById('addSaveBtn').disabled = true;
  clearTimeout(_addSearchTimer);
  if (q.length < 2) { closeAddSearchResults(); return; }
  const el = document.getElementById('addSearchResults');
  el.classList.add('open');
  el.innerHTML = `<div class="inv-search-loading" data-i18n="inv.searching">Søker…</div>`;
  applyLang();
  _addSearchTimer = setTimeout(async () => {
    try {
      const headers = await authHeader();
      const r = await fetch(`/api/quote?endpoint=search&q=${encodeURIComponent(q)}`, { headers });
      if (!r.ok) throw new Error('search ' + r.status);
      const { quotes } = await r.json();
      renderAddSearchResults(quotes || []);
    } catch (e) {
      console.error('search', e);
      el.innerHTML = `<div class="inv-search-empty" data-i18n="inv.search_error">Søk feilet</div>`;
      applyLang();
    }
  }, 350);
}

function renderAddSearchResults(quotes) {
  const el = document.getElementById('addSearchResults');
  if (!quotes.length) { el.innerHTML = `<div class="inv-search-empty" data-i18n="inv.no_matches">Ingen treff</div>`; applyLang(); return; }
  el.innerHTML = quotes.map((q, i) => `
    <div class="inv-search-item" onclick="pickAddSearchResult(${i})">
      <span class="sit">${escHtml(q.symbol.replace(/\.OL$/, ''))}</span>
      <span class="sin">${escHtml(q.shortname || '')}</span>
      <span class="sie">${escHtml(q.exchange || '')}</span>
    </div>`).join('');
  el._quotes = quotes;
}

function pickAddSearchResult(i) {
  const el = document.getElementById('addSearchResults');
  const q = el._quotes?.[i];
  if (!q) return;
  const ticker = q.symbol.replace(/\.OL$/, '');
  _addSelected = { symbol: ticker, name: q.shortname || ticker };
  document.getElementById('addTicker').value = ticker;
  document.getElementById('addName').value = q.shortname || '';
  document.getElementById('addSearchInput').value = `${ticker} — ${q.shortname || ''}`;
  document.getElementById('addSelectedWrap').style.display = '';
  document.getElementById('addSelectedLabel').textContent = `${ticker} — ${q.shortname || ''}`;
  document.getElementById('addSaveBtn').disabled = false;

}

document.addEventListener('click', (e) => {
  const results = document.getElementById('addSearchResults');

  if (!e.target.closest('.inv-search-wrap')) closeAddSearchResults();

async function saveAddStock() {

// ── Sell modal (trekker FIFO fra lots) ───────────────────────────────────
function openSellModal() {
  document.getElementById('sellDate').value = today();
  document.getElementById('sellPrice').value = '';
  document.getElementById('sellQty').value = '';
  document.getElementById('sellQty').max = totalQty(_selected) || '';
  document.getElementById('sellCommission').value = '0';
  document.getElementById('sellBackdrop').classList.add('open');
}
function closeSellModal() { document.getElementById('sellBackdrop').classList.remove('open'); }

async function saveSell() {
  const sell_date = document.getElementById('sellDate').value;
  const sell_price = parseFloat(document.getElementById('sellPrice').value);
  let quantity_sold = parseFloat(document.getElementById('sellQty').value);
  const commission_sell = parseFloat(document.getElementById('sellCommission').value) || 0;
  if (!sell_date || !sell_price || !quantity_sold) { toast(t('inv.err_fields'), 'err'); return; }
  const available = totalQty(_selected);
  if (quantity_sold > available) { toast(t('inv.err_qty_exceeds'), 'err'); return; }

  // Trekk FIFO: eldste kjøp (siste i buy_date-sortert desc-liste) først
  const lotsFifo = [..._lots].filter(l => Number(l.quantity_remaining) > 0)
    .sort((a, b) => new Date(a.buy_date) - new Date(b.buy_date));
  let remainingToSell = quantity_sold;
  const updates = [];
  for (const lot of lotsFifo) {
    if (remainingToSell <= 0) break;
    const take = Math.min(Number(lot.quantity_remaining), remainingToSell);
    updates.push({ id: lot.id, quantity_remaining: Number(lot.quantity_remaining) - take });
    remainingToSell -= take;
  }
  for (const u of updates) {
    const { error } = await db.from('investment_lots').update({ quantity_remaining: u.quantity_remaining }).eq('id', u.id);
    if (error) { toast(t('inv.err_save'), 'err'); return; }
  }
  const { error: saleErr } = await db.from('investment_sales').insert({
    investment_id: _selected.id, sell_date, sell_price, quantity_sold, commission_sell,
  });
  if (saleErr) { toast(t('inv.err_save'), 'err'); return; }

  await loadLots(_selected.id);
  await syncInvestmentStatus();
  await addJournalEntry('sell', t('inv.jt_sell'), `${quantity_sold} @ ${sell_price} (${sell_date})`);
  closeSellModal();
  renderMain();
  toast(t('inv.saved'));
}

// ── Status-synk: avledet av lots (watchlist=0 kjøp, open=har beholdning, closed=solgt alt) ──
async function syncInvestmentStatus() {
  const qty = totalQty(_selected);
  const hasSales = _sales.length > 0;
  let status = 'watchlist';
  if (qty > 0) status = 'open';
  else if (hasSales) status = 'closed';
  const locked = status === 'closed';
  if (_selected.status === status && _selected.locked === locked) return;
  const patch = { status, locked };
  const { error } = await db.from('investments').update(patch).eq('id', _selected.id);
  if (error) return;
  Object.assign(_selected, patch);
  const idx = _investments.findIndex(i => i.id === _selected.id);
  if (idx > -1) Object.assign(_investments[idx], patch);
}

// ── Børs-symbol-mapping ──────────────────────────────────────────────────
// Filip handler kun på Oslo Børs. Ticker lagres rått (f.eks. "KOG") —
// her legges .OL-suffiks på for Yahoo-kall.
function yahooSymbol(ticker) { return `${ticker}.OL`; }

// ── Yahoo Finance quote (key-fri) ────────────────────────────────────────
async function yhFetch(ticker, endpoint, extraQS) {
  const headers = await authHeader();
  const symbol = yahooSymbol(ticker);
  let url = `/api/quote?ticker=${encodeURIComponent(symbol)}&endpoint=${endpoint}`;
  if (extraQS) url += `&${extraQS}`;
  const r = await fetch(url, { headers });
  if (r.status === 422) { const body = await r.json().catch(() => ({})); const err = new Error(body.error || 'no_data'); err.noData = true; throw err; }
  if (!r.ok) throw new Error('quote ' + r.status);
  return r.json();
}

async function loadQuote(ticker) {
  try {
    const cached = _quoteCache[ticker];
    let quote;
    if (cached && Date.now() - cached.ts < 60000) {
      ({ quote } = cached);
    } else {
      quote = await yhFetch(ticker, 'quote');
      _quoteCache[ticker] = { ts: Date.now(), quote };
    }
    if (_selected?.ticker !== ticker) return;
    renderQuote(quote);
    if (_activeTab === 'position') renderTabBody();
  } catch (e) {
    if (_selected?.ticker !== ticker) return;
    if (e.noData) { renderQuoteUnavailable(); }
    else { renderQuoteError(); console.error('quote', e); }
  }
}

function renderQuoteUnavailable() {
  const priceEl = document.getElementById('invPrice');
  if (!priceEl) return;
  priceEl.textContent = t('inv.no_quote_data');
  priceEl.style.fontSize = '14px';
  document.getElementById('invChange').textContent = '';
  ['invOpen', 'invHigh', 'invLow'].forEach(id => { document.getElementById(id).textContent = '—'; });
}

function renderQuoteError() {
  const priceEl = document.getElementById('invPrice');
  if (!priceEl) return;
  priceEl.textContent = t('inv.quote_error');
  priceEl.style.fontSize = '14px';
  document.getElementById('invChange').textContent = '';
  ['invOpen', 'invHigh', 'invLow'].forEach(id => { document.getElementById(id).textContent = '—'; });
}

function renderQuote(q) {
  const priceEl = document.getElementById('invPrice');
  const changeEl = document.getElementById('invChange');
  if (!priceEl) return;
  priceEl.style.fontSize = '';
  const cur = q.currency || 'NOK';
  priceEl.textContent = q.price != null ? `${q.price.toFixed(2)} ${cur}` : '—';
  if (q.price != null && q.previousClose != null) {
    const change = q.price - q.previousClose;
    const pct = q.previousClose ? (change / q.previousClose) * 100 : 0;
    changeEl.textContent = `${change >= 0 ? '+' : ''}${change.toFixed(2)} (${pct >= 0 ? '+' : ''}${pct.toFixed(2)}%)`;
    changeEl.className = 'inv-quote-change ' + (change >= 0 ? 'pos' : 'neg');
  } else {
    changeEl.textContent = '';
  }
  document.getElementById('invOpen').textContent = q.open != null ? q.open.toFixed(2) : '—';
  document.getElementById('invHigh').textContent = q.dayHigh != null ? q.dayHigh.toFixed(2) : '—';
  document.getElementById('invLow').textContent = q.dayLow != null ? q.dayLow.toFixed(2) : '—';
}

// ── Chart.js graf (historikk fra Yahoo) ──────────────────────────────────
let _chartRange = '3m';
let _chartInstance = null;
let _chartCache = {}; // `${ticker}:${range}` -> {ts, points, currency}

function setChartRange(range) {
  _chartRange = range;
  document.querySelectorAll('#invChartRanges .inv-chart-range-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.range === range));
  if (_selected) loadChart(_selected.ticker, range);
}

async function loadChart(ticker, range) {
  const wrap = document.getElementById('invChartWrap');
  if (!wrap) return;
  const key = `${ticker}:${range}`;
  try {
    let entry = _chartCache[key];
    if (!entry || Date.now() - entry.ts > 60000) {
      const headers = await authHeader();
      const symbol = yahooSymbol(ticker);
      const r = await fetch(`/api/quote?ticker=${encodeURIComponent(symbol)}&endpoint=chart&range=${range}`, { headers });
      if (r.status === 422) { renderChartEmpty(); return; }
      if (!r.ok) throw new Error('chart ' + r.status);
      const data = await r.json();
      entry = { ts: Date.now(), points: data.points || [], currency: data.currency || 'NOK' };
      _chartCache[key] = entry;
    }
    if (_selected?.ticker !== ticker || _chartRange !== range) return;
    renderChart(entry.points, entry.currency);
  } catch (e) {
    console.error('loadChart', e);
    renderChartEmpty();
  }
}

function renderChartEmpty() {
  const wrap = document.getElementById('invChartWrap');
  if (!wrap) return;
  if (_chartInstance) { _chartInstance.destroy(); _chartInstance = null; }
  wrap.innerHTML = `<div class="inv-chart-empty" data-i18n="inv.no_chart_data">Ingen graf-data tilgjengelig</div>`;
  applyLang();
}

function renderChart(points, currency) {
  const wrap = document.getElementById('invChartWrap');
  if (!wrap) return;
  if (!points.length) { renderChartEmpty(); return; }
  if (!document.getElementById('invChartCanvas')) {
    wrap.innerHTML = `<canvas id="invChartCanvas"></canvas>`;
  }
  const ctx = document.getElementById('invChartCanvas').getContext('2d');
  const labels = points.map(p => new Date(p.t));
  const values = points.map(p => p.c);
  const first = values[0], last = values[values.length - 1];
  const up = last >= first;
  const lineColor = up ? '#6BE3A4' : '#FF6B6B';
  if (_chartInstance) { _chartInstance.destroy(); _chartInstance = null; }
  _chartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: values,
        borderColor: lineColor,
        backgroundColor: up ? 'rgba(107,227,164,0.08)' : 'rgba(255,107,107,0.08)',
        fill: true,
        pointRadius: 0,
        borderWidth: 1.75,
        tension: 0.15,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: {
        callbacks: { label: (c) => `${c.parsed.y.toFixed(2)} ${currency}` },
      } },
      scales: {
        x: { type: 'time', time: { unit: (_chartRange === '1d' || _chartRange === '1u') ? 'hour' : _chartRange === '5y' ? 'year' : 'day' },
          grid: { display: false }, ticks: { color: 'rgba(255,255,255,0.35)', font: { size: 9 }, maxTicksLimit: 6 } },
        y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: 'rgba(255,255,255,0.35)', font: { size: 9 } } },
      },
    },
  });
}

// ── Init ──────────────────────────────────────────────────────────────────
(async () => {
  // Flytt dropdown-panel/backdrop til <body>. position:fixed alene er ikke nok til å
  // garantere "flyt over alt": en forelder med filter/backdrop-filter (her: .card) skaper
  // en ny stacking/containing-context som position:fixed regnes relativt til i moderne
  // nettlesere, så elementet kan likevel komponeres feil. Ved å flytte DOM-noden ut av
  // .card og rett under <body> unngår vi det helt.
  const ddBackdrop = document.getElementById('invDDBackdrop');
  const ddPanel = document.getElementById('invDDPanel');
  if (ddBackdrop && ddPanel) { document.body.appendChild(ddBackdrop); document.body.appendChild(ddPanel); }
  try {
    const cfg = await getConfig();
    db = supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);
    const { data: { session } } = await db.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }
  } catch (err) {
    document.querySelector('.page').innerHTML =
      `<div class="card" style="text-align:center;padding:40px">
        <div style="color:var(--danger);font-family:var(--font-mono);font-size:13px">${err.message}</div>
      </div>`;
    return;
  }
  document.querySelector('[data-p="investments"]')?.classList.add('active');
  applyLang();
  await loadInvestments().catch(e => { console.error('loadInvestments', e); toast(t('inv.err_save'), 'err'); });
  try {
    renderMain();
  } catch (e) {
    console.error('renderMain init', e);
  }
  staggerIn(document.querySelectorAll('.page > .card'));
})();

onLangChange = () => {
