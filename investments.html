<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="icon" href="/favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="/favicon.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#050506">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Dashboard">
  <title>Dashboard</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .page { max-width: 1100px; gap: 20px; }

    /* ── Header ── */
    .inv-header { display: flex; flex-direction: column; gap: 14px; }
    .inv-header-top { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .inv-ticker-sel { position: relative; flex: 1; min-width: 180px; }
    .inv-ticker-btn {
      display: flex; align-items: center; gap: 8px; width: 100%;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px; padding: 9px 12px; cursor: pointer; color: var(--text-primary);
    }
    .inv-ticker-btn .itk { font-weight: 700; font-family: var(--font-mono); font-size: 14px; }
    .inv-ticker-btn .inm { color: var(--text-tertiary); font-size: 11px; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .inv-ticker-btn .iar { color: var(--text-tertiary); font-size: 10px; transition: transform 0.15s; }
    .inv-ticker-btn.open .iar { transform: rotate(180deg); }
    .inv-dd-backdrop {
      display: none; position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,0.4);
    }
    .inv-dd-backdrop.open { display: block; animation: modalBackdropIn 0.18s ease-out both; }
    .inv-dd-panel {
      position: absolute; top: calc(100% + 6px); left: 0; right: 0; z-index: 310;
      background: #141416; border: 1px solid rgba(255,255,255,0.12); border-radius: 12px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.5); max-height: 360px; display: flex; flex-direction: column;
      animation: modalPanelIn 0.18s cubic-bezier(0.2,0.7,0.2,1) both;
    }
    .inv-dd-search { padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.07); }
    .inv-dd-search input { font-size: 13px; }
    .inv-dd-list { overflow-y: auto; padding: 4px; }
    .inv-dd-item {
      display: flex; align-items: center; gap: 8px; padding: 8px 9px; border-radius: 8px;
      cursor: pointer; color: var(--text-secondary);
    }
    .inv-dd-item:hover { background: rgba(255,255,255,0.06); }
    .inv-dd-item .ddt { font-family: var(--font-mono); font-weight: 700; font-size: 12px; color: var(--text-primary); width: 54px; flex-shrink: 0; }
    .inv-dd-item .ddn { font-size: 11.5px; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .inv-dd-item .ddst { font-size: 9px; font-family: var(--font-mono); text-transform: uppercase; flex-shrink: 0; }
    .inv-dd-empty { padding: 18px 10px; text-align: center; font-size: 12px; color: var(--text-tertiary); }

    .inv-fav-btn, .inv-add-btn {
      flex-shrink: 0; display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 13px; border-radius: 10px; font-size: 12px; font-family: var(--font-mono);
      cursor: pointer; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.04);
      color: var(--text-secondary); white-space: nowrap;
    }
    .inv-fav-btn.is-fav { color: #F2C063; border-color: rgba(242,192,99,0.3); background: rgba(242,192,99,0.1); }
    .inv-add-btn { background: rgba(91,164,245,0.15); border-color: rgba(91,164,245,0.3); color: #5BA4F5; }
    .inv-add-btn:hover { background: rgba(91,164,245,0.25); }

    .inv-fav-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .inv-fav-chip {
      display: inline-flex; align-items: center; gap: 5px; padding: 5px 10px;
      border-radius: 7px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      font-size: 11px; font-family: var(--font-mono); cursor: pointer; color: var(--text-secondary);
    }
    .inv-fav-chip:hover { background: rgba(255,255,255,0.08); }
    .inv-fav-chip.active { color: #5BA4F5; border-color: rgba(91,164,245,0.3); background: rgba(91,164,245,0.1); }

    /* ── Quote card ── */
    .inv-quote-card { display: flex; flex-direction: column; gap: 14px; }
    .inv-quote-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    .inv-quote-name { font-size: 18px; font-weight: 700; color: var(--text-primary); }
    .inv-quote-sub { font-size: 10.5px; font-family: var(--font-mono); color: var(--text-tertiary); margin-top: 2px; letter-spacing: 0.04em; }
    .inv-quote-price { font-size: 30px; font-weight: 800; font-family: var(--font-mono); letter-spacing: -0.03em; text-align: right; }
    .inv-quote-change { font-size: 13px; font-family: var(--font-mono); font-weight: 700; text-align: right; margin-top: 2px; }
    .inv-quote-change.pos { color: #6BE3A4; }
    .inv-quote-change.neg { color: #FF6B6B; }
    .inv-quote-tiles { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; }
    @media (max-width: 640px) { .inv-quote-tiles { grid-template-columns: repeat(2,1fr); } }
    .inv-status-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
    .inv-tv-wrap { width: 100%; height: 360px; border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.07); }
    .inv-empty-state { text-align: center; padding: 50px 20px; color: var(--text-tertiary); }
    .inv-empty-state .iei { font-size: 32px; margin-bottom: 10px; }

    /* ── Tabs ── */
    .inv-tabs { display: flex; gap: 6px; border-bottom: 1px solid rgba(255,255,255,0.07); margin-bottom: 16px; }
    .inv-tab {
      padding: 9px 4px; font-size: 12px; font-weight: 600; font-family: var(--font-mono);
      color: var(--text-tertiary); cursor: pointer; border-bottom: 2px solid transparent;
      margin-bottom: -1px; letter-spacing: 0.04em; text-transform: uppercase;
    }
    .inv-tab.active { color: var(--text-primary); border-bottom-color: var(--accent-blue); }

    /* ── Analysis ── */
    .inv-locked-banner {
      display: flex; align-items: center; gap: 8px; padding: 9px 12px; border-radius: 9px;
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
      font-size: 11.5px; color: var(--text-tertiary); margin-bottom: 14px;
    }
    .inv-section { margin-bottom: 18px; }
    .inv-section:last-child { margin-bottom: 0; }
    .inv-section-h { font-size: 9.5px; font-family: var(--font-mono); letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 8px; }
    .inv-field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    @media (max-width: 640px) { .inv-field-grid { grid-template-columns: 1fr; } }
    .inv-ro-val { font-size: 13px; color: var(--text-secondary); line-height: 1.5; padding: 8px 0; min-height: 20px; }
    .inv-ro-val:empty::before { content: '—'; color: var(--text-tertiary); }

    /* ── Journal ── */
    .inv-journal-add { display: flex; gap: 8px; margin-bottom: 16px; }
    .inv-journal-list { display: flex; flex-direction: column; gap: 10px; }
    .inv-j-item { display: flex; gap: 10px; padding: 10px 12px; background: rgba(255,255,255,0.025); border-radius: 10px; border-left: 2px solid rgba(255,255,255,0.1); }
    .inv-j-item.jt-buy   { border-left-color: #6BE3A4; }
    .inv-j-item.jt-sell  { border-left-color: #FF6B6B; }
    .inv-j-item.jt-stop_loss { border-left-color: #FF6B6B; }
    .inv-j-item.jt-target_hit { border-left-color: #F2C063; }
    .inv-j-item.jt-update { border-left-color: #5BA4F5; }
    .inv-j-icon { font-size: 14px; flex-shrink: 0; line-height: 1.4; }
    .inv-j-body { flex: 1; min-width: 0; }
    .inv-j-title { font-size: 12.5px; font-weight: 600; color: var(--text-primary); }
    .inv-j-desc { font-size: 11.5px; color: var(--text-secondary); margin-top: 2px; line-height: 1.4; white-space: pre-wrap; }
    .inv-j-date { font-size: 9.5px; font-family: var(--font-mono); color: var(--text-tertiary); margin-top: 4px; }
    .inv-j-empty { text-align: center; padding: 30px; color: var(--text-tertiary); font-size: 12px; }

    /* ── Result ── */
    .inv-result-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 18px; }
    @media (max-width: 640px) { .inv-result-grid { grid-template-columns: 1fr; } }

    /* ── Modal ── */
    .inv-backdrop {
      display: none; position: fixed; inset: 0; z-index: 400;
      background: rgba(0,0,0,0.55); align-items: center; justify-content: center; padding: 16px;
    }
    .inv-backdrop.open { display: flex; animation: modalBackdropIn 0.18s ease-out both; }
    .inv-panel {
      background: #131315; border: 1px solid rgba(255,255,255,0.1); border-radius: 16px;
      padding: 22px; width: 100%; max-width: 480px; max-height: 85vh; overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      animation: modalPanelIn 0.2s cubic-bezier(0.2,0.7,0.2,1) both;
    }
    .inv-panel-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .inv-panel-title { font-size: 15px; font-weight: 700; }
    .inv-panel-close { background: none; border: none; color: var(--text-tertiary); font-size: 18px; cursor: pointer; padding: 2px 6px; }
    .inv-panel-foot { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }
    .inv-stack { display: flex; flex-direction: column; gap: 12px; }
  </style>
</head>
<body>

<nav class="main-nav" data-nav></nav>

<main class="page">

  <!-- ══════════════════  HEADER  ══════════════════ -->
  <div class="card inv-header">
    <div class="inv-header-top">
      <div class="inv-ticker-sel">
        <button class="inv-ticker-btn" id="invTickerBtn" onclick="toggleTickerDD()">
          <span class="itk" id="invSelTicker">—</span>
          <span class="inm" id="invSelName" data-i18n="inv.select_ticker">Velg aksje…</span>
          <span class="iar">▾</span>
        </button>
        <div class="inv-dd-backdrop" id="invDDBackdrop" onclick="closeTickerDD(event)">
          <div class="inv-dd-panel" id="invDDPanel" onclick="event.stopPropagation()" style="top:46px">
            <div class="inv-dd-search">
              <input type="text" id="invDDSearch" data-i18n-placeholder="inv.search_placeholder" placeholder="Søk ticker eller navn…" oninput="renderTickerDD()">
            </div>
            <div class="inv-dd-list" id="invDDList"></div>
          </div>
        </div>
      </div>
      <button class="inv-fav-btn" id="invFavBtn" onclick="toggleFavorite()">
        <span id="invFavIcon">☆</span><span data-i18n="inv.favorite">Favoritt</span>
      </button>
      <button class="inv-add-btn" onclick="openAddModal()">+ <span data-i18n="inv.add_stock">Legg til aksje</span></button>
    </div>
    <div class="inv-fav-row" id="invFavRow"></div>
  </div>

  <!-- ══════════════════  QUOTE / EMPTY  ══════════════════ -->
  <div id="invMain"></div>

</main>

<!-- ══════════════════  ADD STOCK MODAL  ══════════════════ -->
<div class="inv-backdrop" id="addBackdrop">
  <div class="inv-panel">
    <div class="inv-panel-head">
      <div class="inv-panel-title" data-i18n="inv.add_stock">Legg til aksje</div>
      <button class="inv-panel-close" onclick="closeAddModal()">✕</button>
    </div>
    <div class="inv-stack">
      <div class="form-group">
        <label class="form-label" data-i18n="inv.ticker">Ticker</label>
        <input type="text" id="addTicker" placeholder="AAPL" style="text-transform:uppercase">
      </div>
      <div class="form-group">
        <label class="form-label" data-i18n="inv.name">Navn</label>
        <input type="text" id="addName" placeholder="Apple Inc.">
      </div>
    </div>
    <div class="inv-panel-foot">
      <button class="btn btn-ghost" onclick="closeAddModal()" data-i18n="cancel">Avbryt</button>
      <button class="btn btn-primary" onclick="saveAddStock()" data-i18n="save">Lagre</button>
    </div>
  </div>
</div>

<!-- ══════════════════  BUY MODAL  ══════════════════ -->
<div class="inv-backdrop" id="buyBackdrop">
  <div class="inv-panel">
    <div class="inv-panel-head">
      <div class="inv-panel-title" data-i18n="inv.register_buy">Registrer kjøp</div>
      <button class="inv-panel-close" onclick="closeBuyModal()">✕</button>
    </div>
    <div class="inv-stack">
      <div class="form-row">
        <div class="form-group" style="flex:1">
          <label class="form-label" data-i18n="inv.buy_date">Kjøpsdato</label>
          <input type="date" id="buyDate">
        </div>
        <div class="form-group" style="flex:1">
          <label class="form-label" data-i18n="inv.buy_price">Kjøpskurs</label>
          <input type="number" id="buyPrice" step="0.01">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group" style="flex:1">
          <label class="form-label" data-i18n="inv.quantity">Antall</label>
          <input type="number" id="buyQty" step="0.0001">
        </div>
        <div class="form-group" style="flex:1">
          <label class="form-label" data-i18n="inv.commission">Kurtasje</label>
          <input type="number" id="buyCommission" step="0.01" value="0">
        </div>
      </div>
    </div>
    <div class="inv-panel-foot">
      <button class="btn btn-ghost" onclick="closeBuyModal()" data-i18n="cancel">Avbryt</button>
      <button class="btn btn-primary" onclick="saveBuy()" data-i18n="save">Lagre</button>
    </div>
  </div>
</div>

<!-- ══════════════════  SELL MODAL  ══════════════════ -->
<div class="inv-backdrop" id="sellBackdrop">
  <div class="inv-panel">
    <div class="inv-panel-head">
      <div class="inv-panel-title" data-i18n="inv.register_sell">Registrer salg</div>
      <button class="inv-panel-close" onclick="closeSellModal()">✕</button>
    </div>
    <div class="inv-stack">
      <div class="form-row">
        <div class="form-group" style="flex:1">
          <label class="form-label" data-i18n="inv.sell_date">Salgsdato</label>
          <input type="date" id="sellDate">
        </div>
        <div class="form-group" style="flex:1">
          <label class="form-label" data-i18n="inv.sell_price">Salgskurs</label>
          <input type="number" id="sellPrice" step="0.01">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group" style="flex:1">
          <label class="form-label" data-i18n="inv.quantity_sold">Antall solgt</label>
          <input type="number" id="sellQty" step="0.0001">
        </div>
        <div class="form-group" style="flex:1">
          <label class="form-label" data-i18n="inv.commission">Kurtasje</label>
          <input type="number" id="sellCommission" step="0.01" value="0">
        </div>
      </div>
    </div>
    <div class="inv-panel-foot">
      <button class="btn btn-ghost" onclick="closeSellModal()" data-i18n="cancel">Avbryt</button>
      <button class="btn btn-danger" onclick="saveSell()" data-i18n="save">Lagre</button>
    </div>
  </div>
</div>

<!-- ══════════════════  ANALYSIS EDIT MODAL  ══════════════════ -->
<div class="inv-backdrop" id="analysisBackdrop">
  <div class="inv-panel" style="max-width:560px">
    <div class="inv-panel-head">
      <div class="inv-panel-title" data-i18n="inv.edit_analysis">Rediger analyse</div>
      <button class="inv-panel-close" onclick="closeAnalysisModal()">✕</button>
    </div>
    <div class="inv-stack">
      <div class="inv-section-h" data-i18n="inv.thesis">Tese</div>
      <div class="form-group"><label class="form-label" data-i18n="inv.thesis_why">Hvorfor</label><textarea id="anWhy" rows="2"></textarea></div>
      <div class="form-group"><label class="form-label" data-i18n="inv.thesis_catalyst">Katalysator</label><textarea id="anCatalyst" rows="2"></textarea></div>
      <div class="form-row">
        <div class="form-group" style="flex:1"><label class="form-label" data-i18n="inv.thesis_horizon">Horisont</label><input type="text" id="anHorizon"></div>
      </div>
      <div class="form-group"><label class="form-label" data-i18n="inv.thesis_must">Må skje</label><textarea id="anMustHappen" rows="2"></textarea></div>

      <div class="inv-section-h" style="margin-top:6px" data-i18n="inv.ta">Teknisk analyse</div>
      <div class="form-row">
        <div class="form-group" style="flex:1"><label class="form-label" data-i18n="inv.ta_trend">Trend</label><input type="text" id="anTrend"></div>
        <div class="form-group" style="flex:1"><label class="form-label" data-i18n="inv.ta_rsi">RSI</label><input type="number" id="anRsi" step="0.1"></div>
      </div>
      <div class="form-row">
        <div class="form-group" style="flex:1"><label class="form-label" data-i18n="inv.ta_support">Støtte</label><input type="number" id="anSupport" step="0.01"></div>
        <div class="form-group" style="flex:1"><label class="form-label" data-i18n="inv.ta_resistance">Motstand</label><input type="number" id="anResistance" step="0.01"></div>
      </div>
      <div class="form-group"><label class="form-label" data-i18n="inv.ta_macd">MACD</label><input type="text" id="anMacd"></div>
      <div class="form-group"><label class="form-label" data-i18n="inv.ta_volume">Volumkommentar</label><input type="text" id="anVolume"></div>
      <div class="form-group"><label class="form-label" data-i18n="inv.ta_comment">TA-kommentar</label><textarea id="anTaComment" rows="2"></textarea></div>

      <div class="inv-section-h" style="margin-top:6px" data-i18n="inv.plan">Plan</div>
      <div class="form-row">
        <div class="form-group" style="flex:1"><label class="form-label" data-i18n="inv.plan_entry">Inngang</label><input type="number" id="anEntry" step="0.01"></div>
        <div class="form-group" style="flex:1"><label class="form-label" data-i18n="inv.plan_stop">Stop loss</label><input type="number" id="anStop" step="0.01"></div>
      </div>
      <div class="form-row">
        <div class="form-group" style="flex:1"><label class="form-label" data-i18n="inv.plan_t1">Mål 1</label><input type="number" id="anT1" step="0.01"></div>
        <div class="form-group" style="flex:1"><label class="form-label" data-i18n="inv.plan_t2">Mål 2</label><input type="number" id="anT2" step="0.01"></div>
      </div>
      <div class="form-group"><label class="form-label" data-i18n="inv.plan_horizon">Tidshorisont</label><input type="text" id="anPlanHorizon"></div>

      <div class="inv-section-h" style="margin-top:6px" data-i18n="inv.risk">Risiko</div>
      <div class="form-group"><label class="form-label" data-i18n="inv.risk_wrong">Hva kan gå galt</label><textarea id="anRiskWrong" rows="2"></textarea></div>
      <div class="form-group"><label class="form-label" data-i18n="inv.risk_sell">Selg-trigger</label><textarea id="anRiskSell" rows="2"></textarea></div>
      <div class="form-group"><label class="form-label" data-i18n="inv.risk_buy_more">Kjøp mer-trigger</label><textarea id="anRiskBuyMore" rows="2"></textarea></div>
    </div>
    <div class="inv-panel-foot">
      <button class="btn btn-ghost" onclick="closeAnalysisModal()" data-i18n="cancel">Avbryt</button>
      <button class="btn btn-primary" onclick="saveAnalysis()" data-i18n="save">Lagre</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script src="utils.js"></script>
<script src="https://s3.tradingview.com/tv.js"></script>
<script>
let db;
let _investments = [];   // alle rader, egne investments
let _journal = [];        // journal for valgt investering
let _selected = null;     // valgt investment-objekt
let _activeTab = 'analysis';
let _quoteCache = {};     // ticker -> {ts, data}
let _tvWidget = null;

const JT_ICON = { note: '📝', buy: '🟢', sell: '🔴', update: '🔄', stop_loss: '⛔', target_hit: '🎯' };

// ── Auth/session helper ─────────────────────────────────────────────────
async function authHeader() {
  const { data: { session } } = await db.auth.getSession();
  return session ? { Authorization: `Bearer ${session.access_token}` } : {};
}

// ── Load investments ─────────────────────────────────────────────────────
async function loadInvestments() {
  const { data, error } = await db.from('investments').select('*').order('created_at', { ascending: false });
  if (error) throw error;
  _investments = data || [];
  renderFavRow();
  if (document.getElementById('invDDBackdrop')?.classList.contains('open')) renderTickerDD();
}

function renderFavRow() {
  const favs = _investments.filter(i => i.is_favorite);
  const el = document.getElementById('invFavRow');
  if (!favs.length) { el.innerHTML = ''; return; }
  el.innerHTML = favs.map(i => `
    <div class="inv-fav-chip${_selected?.id === i.id ? ' active' : ''}" onclick="selectInvestment('${i.id}')">
      <span>⭐</span><span>${escHtml(i.ticker)}</span>
    </div>`).join('');
}

// ── Ticker dropdown ───────────────────────────────────────────────────────
function toggleTickerDD() {
  const bd = document.getElementById('invDDBackdrop');
  const open = bd.classList.toggle('open');
  document.getElementById('invTickerBtn').classList.toggle('open', open);

async function toggleFavorite() {

function renderResultBlock() {
  const buyTotal = (_selected.buy_price || 0) * (_selected.quantity || 0) + (_selected.commission_buy || 0);

  const plPct = buyTotal ? (pl / buyTotal) * 100 : 0;
  const days = _selected.buy_date && _selected.sell_date
    ? Math.round((new Date(_selected.sell_date) - new Date(_selected.buy_date)) / 86400000) : null;

// ── Finnhub quote ─────────────────────────────────────────────────────────
async function fhFetch(ticker, endpoint) {
  const headers = await authHeader();
  const r = await fetch(`/api/finnhub?ticker=${encodeURIComponent(ticker)}&endpoint=${endpoint}`, { headers });
  if (!r.ok) throw new Error('finnhub ' + r.status);
  return r.json();
}

async function loadQuote(ticker) {
  try {
    const cached = _quoteCache[ticker];
    let quote, profile;
    if (cached && Date.now() - cached.ts < 60000) {
      ({ quote, profile } = cached);
    } else {
      [quote, profile] = await Promise.all([
        fhFetch(ticker, 'quote'),
        fhFetch(ticker, 'profile').catch(() => null),
      ]);
      _quoteCache[ticker] = { ts: Date.now(), quote, profile };
    }
    if (_selected?.ticker !== ticker) return;
    renderQuote(quote, profile);
    loadEarnings(ticker);
  } catch (e) {
    console.error('quote', e);
  }
}

function renderQuote(q, profile) {
  const priceEl = document.getElementById('invPrice');
  const changeEl = document.getElementById('invChange');
  if (!priceEl) return;
  const cur = profile?.currency || 'USD';
  priceEl.textContent = q.c != null ? `${q.c.toFixed(2)} ${cur}` : '—';
  const change = q.d, pct = q.dp;
  if (change != null) {
    changeEl.textContent = `${change >= 0 ? '+' : ''}${change.toFixed(2)} (${pct >= 0 ? '+' : ''}${pct.toFixed(2)}%)`;
    changeEl.className = 'inv-quote-change ' + (change >= 0 ? 'pos' : 'neg');
  }
  document.getElementById('invOpen').textContent = q.o != null ? q.o.toFixed(2) : '—';
  document.getElementById('invHigh').textContent = q.h != null ? q.h.toFixed(2) : '—';
  document.getElementById('invLow').textContent = q.l != null ? q.l.toFixed(2) : '—';
  const mcapEl = document.getElementById('invMcap');
  if (mcapEl && profile?.marketCapitalization) {
    mcapEl.textContent = `· ${t('inv.mcap')}: ${(profile.marketCapitalization / 1000).toFixed(1)}B`;
  }
}

async function loadEarnings(ticker) {
  try {
    const data = await fhFetch(ticker, 'earnings');
    const el = document.getElementById('invEarnings');
    if (!el) return;
    const next = data?.earningsCalendar?.[0];
    el.textContent = next?.date ? fmtDate(next.date) : '—';
  } catch (e) { /* silent */ }
}

  try {
    const cfg = await getConfig();
    db = supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);
    const { data: { session } } = await db.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }
  } catch (err) {
    document.querySelector('.page').innerHTML =
      `<div class="card" style="text-align:center;padding:40px">
        <div style="color:var(--danger);font-family:var(--font-mono);font-size:13px">${err.message}</div>
      </div>`;
    return;
  }
  applyLang();
  await loadInvestments().catch(e => { console.error('loadInvestments', e); toast(t('inv.err_save'), 'err'); });
  try {
    renderMain();
  } catch (e) {
    console.error('renderMain init', e);
  }
  staggerIn(document.querySelectorAll('.page > .card'));
})();

onLangChange = () => {
  applyLang();
  renderHeader();
  renderFavRow();
  if (_selected) { renderTabBody(); }
  renderTickerDD();
};
</script>
</body>
</html>
